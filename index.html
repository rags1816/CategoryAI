<html lang="en">
<head>
<meta charset="UTF-8">

<style>

  a{color:var(--slate);}
  button{font-family:'Inter',sans-serif;cursor:pointer;}
  input,select,textarea{font-family:'Inter',sans-serif;}

<script>
/* ============================================================
   CLM SUITE — Contract Lifecycle Management
   Single-file, self-contained. No install, no server, no account.
   Data lives in localStorage on this device only.
   ============================================================ */

/* ---------- constants ---------- */
const SCREENS = [
  {id:'about', label:'About'},
  {id:'tiering', label:'0 · Tiering'},
  {id:'framework', label:'Framework'},
  {id:'qbr', label:'QBR'},
  {id:'rebates', label:'Rebates'},
  {id:'register', label:'Obligations/SLA/CO'},
  {id:'coverage', label:'Coverage & Feedback'},
  {id:'scorecard', label:'Maturity'},
  {id:'governance', label:'Governance'},
  {id:'settings', label:'⚙ Settings'}
];

const TIERS = [
  {min:3.6, name:'Strategic', code:'t1',
   workflow:['Named relationship owner accountable for the account','Full quarterly business review (QBR) with live KPI/SLA dashboard','Obligation & SLA tracking fully automated, 30/60/90-day alerts','Joint Business Planning (JBP) and innovation/collaboration roadmap','Change control via formal board sign-off (legal + category lead)','Termination/renewal notice flagged 120+ days in advance']},
  {min:2.8, name:'Managed', code:'t2',
   workflow:['Category owner responsible, no dedicated relationship lead required','Semi-annual performance review against defined KPIs','Automated obligation and SLA alerts, manual escalation','Rebate/credit reconciliation on a quarterly cycle','Standard change control, materiality-based approval','Renewal notice flagged 90 days in advance']},
  {min:1.8, name:'Transactional', code:'t3',
   workflow:['Managed by category/ops team as part of broader portfolio','Annual or exception-based review only','Automated renewal and compliance alerts, no active KPI tracking','Amendments via lightweight approval, no formal board','Renewal notice flagged 60 days in advance']},
  {min:0, name:'Routine / Leverage', code:'t4',
   workflow:['Compliance-only oversight, no active management cycle','System-generated renewal alert is the only required touchpoint','Reviewed only if flagged by spend anomaly or supplier issue','Candidate for consolidation or catalogue/PO buying instead']}
];

function weightedScore(v){ return v.value*0.3 + v.risk*0.3 + v.criticality*0.2 + v.impact*0.2; }
function getTier(score){ return TIERS.find(t=>score>=t.min) || TIERS[TIERS.length-1]; }

/* Naming scheme: 'standard' (Strategic/Managed/Transactional/Routine) or
   'gsb' (Gold/Silver/Bronze — the recognised public-procurement/GCF naming).
   GSB is a 3-band scheme, so Transactional + Routine both display as Bronze —
   the underlying 4-way score/tier engine is unchanged either way. */
const GSB_LABELS = {t1:'🥇 Gold', t2:'🥈 Silver', t3:'🥉 Bronze', t4:'🥉 Bronze'};
const GSB_CLASS = {t1:'gold', t2:'silver', t3:'bronze', t4:'bronze'};
function tierDisplayName(code){
  if(STATE.tierScheme==='gsb') return GSB_LABELS[code];
  return TIERS.find(t=>t.code===code).name;
}
function tierBadgeClass(code){
  return STATE.tierScheme==='gsb' ? GSB_CLASS[code] : code;
}
function tierBucketCounts(bulk){
  if(STATE.tierScheme==='gsb'){
    const counts={t1:0,t2:0,t3:0};
    bulk.forEach(r=>{ const code=getTier(weightedScore(r)).code; counts[code==='t4'?'t3':code]++; });
    return [
      {code:'t1', label:GSB_LABELS.t1, cls:'gold', count:counts.t1},
      {code:'t2', label:GSB_LABELS.t2, cls:'silver', count:counts.t2},
      {code:'t3', label:GSB_LABELS.t3, cls:'bronze', count:counts.t3}
    ];
  }
  const counts={t1:0,t2:0,t3:0,t4:0};
  bulk.forEach(r=>{ counts[getTier(weightedScore(r)).code]++; });
  return TIERS.map(t=>({code:t.code, label:t.name, cls:t.code, count:counts[t.code]}));
}

const GUIDE_TIPS = {
  about:['This is the front door — the pitch, the framework at a glance, and where to start.','Head to Settings first if you want AI drafting (Claude/Gemini) rather than Sandbox mode.','See the "offline vs. internet" card below for what needs a connection.'],
  tiering:['Score one contract with the sliders, or paste several into the bulk table to test auto-tiering.','Weights: Value & Risk 30% each, Criticality & Impact 20% each — tune the logic to your risk appetite in code if needed.','"AI score contract list" works even in Sandbox mode (offline heuristic) — no connection required.'],
  framework:['The full 0–7 framework brief, plus benchmarking references (CIPS, Hackett, WorldCC).','Use "AI draft executive summary" to tailor it to your org profile — works offline in Sandbox mode too.','Word export needs internet once per session to load the library; falls back to a plain .doc file if blocked.'],
  qbr:['Fill supplier, period, KPIs and SLAs — then let AI draft the narrative summary from what you\'ve entered.','Word export falls back automatically if offline; PowerPoint export has no offline fallback and needs a connection.'],
  rebates:['Track tier thresholds against actual spend — accrued entitlement is calculated live, not typed in.','Reconcile against the supplier\'s own statement each cycle and flag variances as Disputed rather than letting them go quiet.'],
  register:['One register for obligations, SLAs, and change orders — filter by type. Status auto-flags overdue items by due date.','Word/PDF import needs internet to load the parser — no offline fallback for that specific action.','Import also suggests a Section 0 tier for the contract, and routes KPI/SLA-style clauses to the QBR tab.'],
  coverage:['Three logs in one place: category spend coverage, stakeholder feedback, and supplier collaboration opportunities.','% spend under contract here feeds the Governance rollup — keep it current, it\'s the headline leakage indicator.'],
  scorecard:['Score your organisation 1–5 across each dimension. This feeds the Governance rollup.','Re-run quarterly to track maturity trend.'],
  governance:['This is the CPO-facing rollup: spend coverage, tier mix, overdue obligations, maturity gaps — the value-leak view.','Everything here is computed live from the other tabs.','PowerPoint deck export needs internet to load the library once per session.'],
  settings:['Sandbox mode drafts offline using templates — no key needed, good for testing.','Claude/Gemini calls go direct from your browser to the provider API using your own key. Keys are stored only in this browser\'s localStorage, never sent anywhere else by this app.','Set a fallback provider so a blocked/failed call still returns something useful (Sandbox is the safest default).','"Ground with web search" is off by default — without it, AI drafts come from trained knowledge only, not a live lookup.']
};

const SCORECARD_QUESTIONS = [
  {id:'d1',dim:'Foundation & Data', text:'Contracts are held in a structured repository with tagged metadata (not just PDFs in folders).'},
  {id:'d2',dim:'Foundation & Data', text:'Every contract is mapped to a category taxonomy and a management tier at signature.'},
  {id:'d3',dim:'Obligations', text:'Obligations are extracted and logged at signature, not discovered later by re-reading contracts.'},
  {id:'d4',dim:'Obligations', text:'Obligation owners sit with the business, not solely with procurement.'},
  {id:'d5',dim:'KPIs & SLAs', text:'KPIs and SLA thresholds are defined pre-signature with clear formulas and data sources.'},
  {id:'d6',dim:'KPIs & SLAs', text:'SLA/KPI data feeds automatically from operational systems rather than manual quarterly collection.'},
  {id:'d7',dim:'Rebates', text:'Rebate tiers are tracked against actual ERP/P2P spend data, not supplier-reported numbers.'},
  {id:'d8',dim:'Rebates', text:'Rebate variances trigger a formal reconciliation/claim workflow every cycle.'},
  {id:'d9',dim:'Change & Termination', text:'Amendments go through materiality-based approval with full version/audit trail.'},
  {id:'d10',dim:'Change & Termination', text:'Auto-renewal and termination notice windows are flagged automatically well before the deadline.'},
  {id:'d11',dim:'QBR & Review', text:'QBR cadence and depth is tiered by supplier segment, not uniform across all suppliers.'},
  {id:'d12',dim:'QBR & Review', text:'QBR action items feed back into the obligation tracker and are closed out, not just discussed.'},
  {id:'d13',dim:'Stakeholder & Spend', text:'We can report % of spend under active, compliant contract at any time.'},
  {id:'d14',dim:'Stakeholder & Spend', text:'Business stakeholder feedback on supplier performance is captured systematically, not ad hoc.'},
  {id:'d15',dim:'Collaboration', text:'Strategic suppliers have a documented joint business plan or innovation pipeline.'}
];

const FRAMEWORK_MD = `
## Section 0 — Foundation & Pre-Contract Tiering
Every feature below depends on structured contract metadata, not PDFs in a folder. Core metadata: type, category, value, dates, renewal type, owner, risk tier. A clause library should tag key clauses (termination, liability, SLA, price adjustment, audit rights) so obligations and SLAs auto-populate a register rather than living in prose.

**Pre-contract tiering** segments contracts by Value, Risk, Criticality and Business Impact (1–5 each) into four tiers — Strategic, Managed, Transactional, Routine/Leverage — which sets the default management intensity for everything downstream. Score at signature; re-score on amendment, supplier risk event, or spend threshold breach.

## Section 1 — Obligation Tracking
Every deliverable, deadline, notice, and compliance requirement extracted into a trackable task: description, owner (business, not just procurement), due date, recurrence, evidence required, escalation path. Automated reminders at 30/60/90 days. Top-quartile organisations track over 90% of obligations with automated alerts (Hackett); median organisations still do this reactively in spreadsheets.

## Section 2 — KPIs
Defined pre-signature, not after: formula, data source, frequency, target/threshold written into the contract. Fed from operational systems into a live scorecard rather than manual quarterly collection.

## Section 3 — SLAs
Time/quality-bound commitments with financial consequences. Tiered breach mechanism (informal flag → formal notice → escalation → remedy/credit), with credit calculation automated — manual SLA credit tracking is a common source of value leakage.

## Section 4 — Rebate Monitoring
Rebate/tier entitlements linked to actual ERP/P2P spend data, with a running accrual-vs-entitlement view and quarterly reconciliation against supplier statements. Consistently one of the highest-value, least-visible leakage sources in benchmarking studies.

## Section 5 — Contract Change Orders / Amendments
Formal change control: request → impact assessment → materiality-based approval → version control with full audit trail. Every amendment should re-trigger the obligation/KPI/SLA register.

## Section 6 — Termination
Notice windows and auto-renewal triggers flagged 90–120 days ahead. Exit/transition checklist: knowledge transfer, data return, TSA if needed, final reconciliation. "% of contracts with unwanted auto-renewal" is a named red-flag metric in Hackett benchmarking.

## Section 7 — QBR (Quarterly Business Review)
Standard template auto-populated from KPI/SLA/spend/risk/rebate data. Intensity tiered by supplier segment — not every supplier needs a full QBR. Action items must feed back into the obligation tracker, closing the loop.

## Stakeholder Feedback, Spend & Category Coverage
Structured post-QBR stakeholder surveys tied to specific KPIs, not generic satisfaction checks. A spend cube mapped against the contract repository gives % of spend under active contract. A category × contract-status heatmap surfaces white space and prioritises where to build coverage next. Collaboration opportunities — joint business planning, innovation logs, gain-share — should be surfaced directly from QBR data for top-tier suppliers.

## Best Practice Reference Points
**CIPS** frames contract management as a distinct post-award competency — implementation, ongoing management, review, close-out — with strong emphasis on relationship management and risk, not just compliance administration.

**Hackett Group** benchmarks % spend under management, contract compliance rate, amendment cycle time, and % obligations tracked with automation. The gap between top-quartile and median performers is driven by automation and pre-signature discipline, not raw effort.

**WorldCC (formerly IACCM)** research puts average value leakage from poor contract/commercial management at roughly **9% of contract value** — largely unmanaged obligations, unclaimed rebates/credits, and missed renegotiation windows. Their maturity model (ad hoc → managed → optimised) is a useful self-assessment reference.
`;

  {match:'Section 1 — Obligation Tracking', action:'obligations', label:'+ Add starter obligations to Register', rows:[
    'Insurance certificate renewal — annual',
    'Audit rights exercise — as needed',
    'Annual price review notice',

  ]},

    {contractName:'', tierName:'Tier 1', threshold:'$0 – $500,000', ratePct:0},
    {contractName:'', tierName:'Tier 2', threshold:'$500,001 – $1,000,000', ratePct:2},

  ]},

    'Pricing amendment — CPI/index adjustment',

  ]},

function applyQuickAdd(spec){
  if(spec.action==='obligations'){
    spec.rows.forEach(r=> STATE.register.push({id:uid(), type:'Obligation', contract:'', description:r, owner:'', dueDate:'', recurrence:'One-off', status:'Open'}));
  }else if(spec.action==='changeorders'){
    spec.rows.forEach(r=> STATE.register.push({id:uid(), type:'Change Order', contract:'', description:r, owner:'', dueDate:'', recurrence:'One-off', status:'Open'}));
  }else if(spec.action==='kpis'){
    spec.rows.forEach(r=> STATE.qbr.kpis.push({id:uid(), name:r.name, target:r.target, actual:'', status:'On track'}));
  }else if(spec.action==='slas'){
    spec.rows.forEach(r=> STATE.qbr.slas.push({id:uid(), name:r.name, target:r.target, actual:'', status:'On track'}));
  }else if(spec.action==='rebates'){
    spec.rows.forEach(r=> STATE.rebates.push({id:uid(), contractName:r.contractName||'', tierName:r.tierName, threshold:r.threshold, ratePct:r.ratePct, spendToDate:0, status:'Open'}));
  }
  saveState();
}
/* ---------- charts (canvas-based: same drawing fns power on-screen + exported images) ---------- */
function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight){
  const words = String(text).split(' ');
  let line='', lines=[];
  words.forEach(w=>{
    const test = line?line+' '+w:w;
    if(ctx.measureText(test).width>maxWidth && line){ lines.push(line); line=w; } else line=test;
  });
  if(line) lines.push(line);
  const startY = y - (lines.length-1)*lineHeight/2;
  lines.forEach((l,i)=> ctx.fillText(l, x, startY+i*lineHeight));
}
function drawBarChart(ctx, w, h, data, opts={}){
  ctx.clearRect(0,0,w,h);
  const pad = {l:opts.labelWidth||100,r:24,t:16,b:16};
  const max = opts.max || Math.max(...data.map(d=>d.value),1);
  const rowH = (h-pad.t-pad.b)/Math.max(data.length,1);
  ctx.font = '11px Inter, sans-serif';
  data.forEach((d,i)=>{
    const y = pad.t + i*rowH + rowH*0.22;
    const barH = rowH*0.56;
    const barW = Math.max((w-pad.l-pad.r) * (Math.min(d.value,max)/max), 1);
    ctx.fillStyle = '#6b6459';
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(d.label, pad.l-8, y+barH/2);
    ctx.fillStyle = d.color || '#a8792e';
    ctx.fillRect(pad.l, y, barW, barH);
    ctx.fillStyle = '#161b22';
    ctx.textAlign='left';
    ctx.fillText(opts.unit==='pct' ? d.value.toFixed(0)+'%' : d.value.toLocaleString(undefined,{maximumFractionDigits:1}), pad.l+barW+6, y+barH/2);
  });
}
function drawDonutChart(ctx, w, h, data, opts={}){
  ctx.clearRect(0,0,w,h);
  const total = data.reduce((a,d)=>a+d.value,0) || 1;
  const cx = w*0.32, cy=h/2, rOuter=Math.min(w*0.28,h*0.42), rInner=rOuter*0.55;
  let angle=-Math.PI/2;
  data.forEach(d=>{
    const slice = (d.value/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,rOuter,angle,angle+(slice||0.0001));
    ctx.closePath();
    ctx.fillStyle = d.color;
    ctx.fill();
    angle += slice;
  });
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath(); ctx.arc(cx,cy,rInner,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation='source-over';
  ctx.font='11px Inter, sans-serif'; ctx.textBaseline='middle';
  let ly = cy - (data.length-1)*9;
  data.forEach(d=>{
    ctx.fillStyle = d.color;
    ctx.fillRect(w*0.62, ly-5, 10, 10);
    ctx.fillStyle = '#161b22'; ctx.textAlign='left';
    ctx.fillText(`${d.label} (${d.value})`, w*0.62+15, ly);
    ly += 18;
  });
}
function drawRadarChart(ctx, w, h, data, opts={}){
  ctx.clearRect(0,0,w,h);
  const cx=w/2, cy=h/2-4, r=Math.min(w,h)*0.30;
  const n=data.length;
  const maxVal = opts.max||5;
  for(let ring=1; ring<=4; ring++){
    ctx.strokeStyle='#dcd9d0';
    ctx.beginPath();
    for(let i=0;i<=n;i++){
      const a = -Math.PI/2 + (i%n)*(2*Math.PI/n);
      const rr = r*ring/4;
      const x = cx+rr*Math.cos(a), y=cy+rr*Math.sin(a);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.font='10px Inter, sans-serif';
  data.forEach((d,i)=>{
    const a = -Math.PI/2 + i*(2*Math.PI/n);
    const x=cx+r*Math.cos(a), y=cy+r*Math.sin(a);
    ctx.strokeStyle='#dcd9d0';
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke();
    const lx = cx+(r+16)*Math.cos(a), ly=cy+(r+16)*Math.sin(a);
    ctx.textAlign = Math.cos(a)>0.3?'left':(Math.cos(a)<-0.3?'right':'center');
    ctx.fillStyle='#3a4a5c';
    wrapCanvasText(ctx, d.label, lx, ly, 74, 11);
  });
  ctx.beginPath();
  data.forEach((d,i)=>{
    const a = -Math.PI/2 + i*(2*Math.PI/n);
    const rr = r*(Math.min(d.value,maxVal)/maxVal);
    const x=cx+rr*Math.cos(a), y=cy+rr*Math.sin(a);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle='rgba(168,121,46,0.35)';
  ctx.strokeStyle='#a8792e'; ctx.lineWidth=2;
  ctx.fill(); ctx.stroke();
}

function mdToHtmlClean(md){
  const esc2 = s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = md.split('\n');
  let html='', inList=false;
  for(let raw of lines){
    let line = raw.trim();
    if(!line){ if(inList){html+='</ul>';inList=false;} continue; }
    if(line.startsWith('## ')){ if(inList){html+='</ul>';inList=false;} html+=`<h2>${esc2(line.slice(3))}</h2>`; continue; }
    if(line.startsWith('### ')){ if(inList){html+='</ul>';inList=false;} html+=`<h3>${esc2(line.slice(4))}</h3>`; continue; }
    let body = esc2(line.startsWith('- ')?line.slice(2):line);
    body = body.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
    if(line.startsWith('- ')){ if(!inList){html+='<ul>';inList=true;} html+=`<li>${body}</li>`; continue; }
    if(inList){html+='</ul>';inList=false;}
    html+=`<p>${body}</p>`;
  }
  if(inList) html+='</ul>';
  return html;
}

function downloadBlob(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

/* ---------- lazy-loaded export/import libraries (CDN, loaded on first use) ---------- */
function loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[src="${src}"]`)){ resolve(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload=()=>resolve(); s.onerror=()=>reject(new Error('Could not load '+src+' — check your internet connection.'));
    document.head.appendChild(s);
  });
}

async function extractTextFromPdf(arrayBuffer){
  const pdf = await window.pdfjsLib.getDocument({data:arrayBuffer}).promise;
  const totalPages = pdf.numPages;
  const maxPages = Math.min(totalPages, 60);
  let text='';
  for(let i=1;i<=maxPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it=>it.str).join(' ') + '\n';
  }
  return {text, totalPages, readPages:maxPages};
}

/* blocks: [{h:2,text}, {h:3,text}, {p:text}, {table:{headers:[...],rows:[[...]]}}] */
function blocksToHtml(blocks){
  return blocks.map(b=>{
    if(b.h===2) return `<h2>${esc(b.text)}</h2>`;
    if(b.h===3) return `<h3>${esc(b.text)}</h3>`;
    if(b.p!==undefined) return `<p>${esc(b.p)}</p>`;
    if(b.image) return `<p><img src="${b.image}" width="${b.width||400}" height="${b.height||250}" style="max-width:100%;"></p>`;
    if(b.table){
      const head = `<tr>${b.table.headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>`;
      const rows = b.table.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('');
      return `<table>${head}${rows}</table>`;
    }
    return '';
  }).join('');
}
function mdToBlocks(md){
  const blocks=[];
  md.split('\n').forEach(raw=>{
    const line = raw.trim();
    if(!line) return;
    if(line.startsWith('## ')){ blocks.push({h:2,text:line.slice(3)}); return; }
    if(line.startsWith('### ')){ blocks.push({h:3,text:line.slice(4)}); return; }
    let text = line.startsWith('- ') ? '• '+line.slice(2) : line;
    text = text.replace(/\*\*(.+?)\*\*/g,'$1');
    blocks.push({p:text});
  });
  return blocks;
}
function dataUrlToUint8Array(dataUrl){
  const base64 = dataUrl.split(',')[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return bytes;
}
async function exportDocxReal(title, blocks){
  try{
    await ensureDocxLib();
    const { Document, Packer, Paragraph, HeadingLevel, Table, TableRow, TableCell, WidthType, ImageRun } = window.docx;
    const children = [ new Paragraph({text:title, heading:HeadingLevel.TITLE}) ];
    blocks.forEach(b=>{
      if(b.h===2) children.push(new Paragraph({text:b.text, heading:HeadingLevel.HEADING_1}));
      else if(b.h===3) children.push(new Paragraph({text:b.text, heading:HeadingLevel.HEADING_2}));
      else if(b.p!==undefined) children.push(new Paragraph({text:b.p}));
      else if(b.image){
        children.push(new Paragraph({children:[ new ImageRun({ data: dataUrlToUint8Array(b.image), transformation:{width:b.width||400, height:b.height||250} }) ]}));
      }
      else if(b.table){
        const headerRow = new TableRow({children: b.table.headers.map(h=> new TableCell({children:[new Paragraph({text:String(h), bold:true})]}))});
        const rows = b.table.rows.map(r=> new TableRow({children: r.map(c=> new TableCell({children:[new Paragraph(String(c==null?'':c))]}))}));
        children.push(new Table({rows:[headerRow,...rows], width:{size:100,type:WidthType.PERCENTAGE}}));
      }
    });
    const doc = new Document({sections:[{children}]});
    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=title.replace(/[^a-z0-9]+/gi,'_')+'.docx';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  }catch(e){
    console.warn('Real .docx export failed, falling back to HTML .doc:', e);
    exportWordFallback(title, blocksToHtml(blocks));
  }
}

/* ---------- AI dispatch ---------- */
async function askAI(prompt){
  const mode = STATE.ai.mode;
  try{
    if(mode==='claude') return await askClaude(prompt);
    if(mode==='gemini') return await askGemini(prompt);
    return await sandboxAnswer(prompt);
  }catch(primaryErr){
    const fb = STATE.ai.fallbackMode;
    if(fb && fb!=='none' && fb!==mode){
      try{
        let text;
        if(fb==='claude') text = await askClaude(prompt);
        else if(fb==='gemini') text = await askGemini(prompt);
        else text = await sandboxAnswer(prompt);
        return `[Primary (${mode}) failed — used fallback: ${fb}]\n\n${text}`;
      }catch(fallbackErr){
        throw new Error(primaryErr.message+' — fallback ('+fb+') also failed: '+fallbackErr.message);
      }
    }
    throw primaryErr;
  }
}
async function askClaude(prompt){
  if(!STATE.ai.claudeKey) throw new Error('No Claude API key set in Settings.');
  const body = { model: STATE.ai.claudeModel, max_tokens:1000, messages:[{role:'user',content:prompt}] };
  if(STATE.ai.webSearch) body.tools = [{ type:'web_search_20250305', name:'web_search' }];
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':STATE.ai.claudeKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error('Claude API error '+res.status+' — check key, or the browser may be blocking direct API calls (CORS). Try Sandbox mode.');
  const data = await res.json();
  const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text);
  return textBlocks.length ? textBlocks.join('\n') : '(no text returned)';
}
async function askGemini(prompt){
  if(!STATE.ai.geminiKey) throw new Error('No Gemini API key set in Settings.');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${STATE.ai.geminiModel}:generateContent?key=${STATE.ai.geminiKey}`;
  const body = { contents:[{parts:[{text:prompt}]}] };
  if(STATE.ai.webSearch) body.tools = [{ google_search: {} }];
  const res = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error('Gemini API error '+res.status+' — check key.');
  const data = await res.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  const text = parts.filter(p=>p.text).map(p=>p.text).join('\n');
  return text || '(no text returned)';
}
function sandboxAnswer(prompt){
  // Offline, template-based draft — no network. Labelled honestly as Sandbox output.
  return new Promise(resolve=>{
    setTimeout(()=>{
      resolve(`[Sandbox draft — offline template, not model-generated]\n\nBased on the inputs provided, here is a structured first pass. Review and edit before use; connect Claude or Gemini in Settings for a fully drafted narrative.\n\n${prompt.slice(0,400)}${prompt.length>400?'…':''}`);
    }, 500);
  });
}
function clampScore(n){ n=parseInt(n)||3; return Math.max(1,Math.min(5,n)); }
function sandboxScoreContracts(names){
  // Deterministic offline heuristic — keyword-nudged, no network needed.
  return names.map(name=>{
    const lower = name.toLowerCase();
    let value=3, risk=3, criticality=3, impact=3;
    if(/sole source|single source|critical|core|master|strategic/.test(lower)){ risk++; criticality++; }
    if(/office|supplies|stationery|routine|misc|catering/.test(lower)){ value--; risk--; criticality--; impact--; }
    if(/cloud|it |software|data|security|technology/.test(lower)){ impact++; risk++; }
    if(/logistics|freight|supply chain|distribution/.test(lower)){ criticality++; value++; }
    return {name, value:clampScore(value), risk:clampScore(risk), criticality:clampScore(criticality), impact:clampScore(impact)};
  });
}
async function aiScoreBulkContracts(rawListText){
  const names = rawListText.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,30);
  if(!names.length) return [];
  if(STATE.ai.mode==='sandbox') return sandboxScoreContracts(names);
  const prompt = `For each contract/supplier name below, estimate procurement scores 1-5 for Value, Risk, Criticality, and Business Impact based on typical judgement for that category of spend. Return ONLY a JSON array, no commentary, no markdown fences, in this exact format: [{"name":"...","value":N,"risk":N,"criticality":N,"impact":N}]\n\nContracts:\n${names.join('\n')}`;
  try{
    const text = await askAI(prompt);
    const cleaned = text.replace(/```json|```/g,'').trim();
    const jsonStart = cleaned.indexOf('[');
    const jsonEnd = cleaned.lastIndexOf(']');
    const parsed = JSON.parse(cleaned.slice(jsonStart, jsonEnd+1));
    return parsed.map(p=>({name:p.name||'Unnamed', value:clampScore(p.value), risk:clampScore(p.risk), criticality:clampScore(p.criticality), impact:clampScore(p.impact)}));
  }catch(e){
    return sandboxScoreContracts(names); // graceful fallback if AI didn't return clean JSON
  }
}

/* ========== QBR ========== */
function normalizeSupplierName(s){
  return (s||'').toLowerCase().trim()
    .replace(/[.,]/g,'')
    .replace(/\b(inc|incorporated|ltd|limited|llc|corp|corporation|co|company|plc|gmbh)\b\.?/g,'')
    .replace(/\s+/g,' ').trim();
}
function matchByContractField(list, supplierName, field){
  const target = normalizeSupplierName(supplierName);
  if(!target) return {matches:[], matchType:'none', variants:[]};
  const exact = list.filter(r=> normalizeSupplierName(r[field]||'')===target);
  if(exact.length) return {matches:exact, matchType:'exact', variants:[]};
  const fuzzy = list.filter(r=>{
    const sub = normalizeSupplierName(r[field]||'');
    return sub.length>=4 && target.length>=4 && (sub.includes(target)||target.includes(sub));
  });
  const variants = [...new Set(fuzzy.map(r=>r[field]))];
  return {matches:fuzzy, matchType: fuzzy.length?'fuzzy':'none', variants};
}
function getRegisterForSupplier(supplierName){ return matchByContractField(STATE.register, supplierName, 'contract'); }
function getRebatesForSupplier(supplierName){ return matchByContractField(STATE.rebates, supplierName, 'contractName'); }
function buildQbrRecommendations(q, matchedReg, matchedRebates, feedback){
  const recs = [];
  const breachedKpi = q.kpis.filter(k=>k.status==='Breached');
  const atRiskKpi = q.kpis.filter(k=>k.status==='At risk');
  const breachedSla = q.slas.filter(k=>k.status==='Breached');
  const atRiskSla = q.slas.filter(k=>k.status==='At risk');
  if(breachedSla.length) recs.push(`Escalate ${breachedSla.length} breached SLA(s) and agree a remediation timeline with the supplier before the next cycle.`);
  if(breachedKpi.length) recs.push(`Address ${breachedKpi.length} breached KPI(s) — request a root-cause and corrective action plan.`);
  if(atRiskSla.length || atRiskKpi.length) recs.push(`Monitor ${atRiskSla.length+atRiskKpi.length} at-risk KPI/SLA metric(s) closely ahead of the next review.`);
  const disputedRebates = matchedRebates.filter(r=>r.status==='Disputed');
  if(disputedRebates.length) recs.push(`Resolve ${disputedRebates.length} disputed rebate tier(s) before the next reconciliation cycle.`);
  const overdueItems = matchedReg.filter(r=> r.status!=='Complete' && r.dueDate && new Date(r.dueDate) < new Date());
  if(overdueItems.length) recs.push(`Close ${overdueItems.length} overdue obligation/SLA/change-order item(s) linked to this contract.`);
  const avgRating = feedback.length ? feedback.reduce((a,f)=>a+(Number(f.rating)||0),0)/feedback.length : null;
  if(avgRating!==null && avgRating<3) recs.push('Stakeholder sentiment is below neutral — schedule a relationship review with key stakeholders.');
  if(!recs.length) recs.push('No material issues flagged from current data — maintain current cadence.');
  return recs;
}
function getFeedbackForSupplier(supplierName){
  const target = normalizeSupplierName(supplierName);
  if(!target) return {matches:[], matchType:'none', variants:[]};
  const exact = STATE.coverage.feedback.filter(f=> normalizeSupplierName(f.subject)===target);
  if(exact.length) return {matches:exact, matchType:'exact', variants:[]};
  const fuzzy = STATE.coverage.feedback.filter(f=>{
    const sub = normalizeSupplierName(f.subject);
    return sub.length>=4 && target.length>=4 && (sub.includes(target) || target.includes(sub));
  });
  const variants = [...new Set(fuzzy.map(f=>f.subject))];
  return {matches:fuzzy, matchType: fuzzy.length ? 'fuzzy' : 'none', variants};
}

    ${q.supplier ? `<ul style="font-size:13px;line-height:1.7;margin-top:8px;">${recs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul><p class="small muted">Generated live from KPI/SLA status, linked rebates and register items — offline-safe.</p>` : '<p class="small muted">Enter a supplier name to generate recommendations.</p>'}

  return `
  <h2>Stakeholder Feedback, Spend & Category Coverage</h2>
  <p class="muted">The part of the framework that's usually only prose — here it's three live logs feeding one number: % of spend under active contract.</p>
  <div class="result-strip"><div><div class="eyebrow" style="color:#a39a89;">Spend under active contract</div><div class="tname">${overallPct.toFixed(0)}%</div></div>
    <div class="tscore small mono">$${totalSpend.toLocaleString(undefined,{maximumFractionDigits:0})} total tracked</div></div>

  <div class="card">
    <div class="flex-between"><h3 style="margin:0;">Category spend coverage</h3>

      saveState(); render();

  document.querySelectorAll('[data-delfb]').forEach(b=> b.addEventListener('click',()=>{ c.feedback=c.feedback.filter(r=>r.id!==b.dataset.delfb); saveState(); render(); }));

  document.querySelectorAll('tr[data-collab]').forEach(tr=>{
    const id = tr.dataset.collab;
    tr.querySelectorAll('[data-f]').forEach(inp=> inp.addEventListener('change', e=>{

      saveState(); render();
    }));

  document.getElementById('btnCatCSV').addEventListener('click',()=>{

  });
  document.getElementById('btnCollabCSV').addEventListener('click',()=>{
    exportCSV('collaboration_opportunities.csv', ['Supplier','Type','Description','Status'], c.collaboration.map(r=>[r.supplier,r.type,r.description,r.status]));

}

function statusBadge(row){
  if(row.status==='Complete') return `<span class="badge ok">Complete</span>`;
  if(!row.dueDate) return `<span class="badge t4">No date</span>`;
  const due = new Date(row.dueDate);
  const now = new Date();
  const diffDays = Math.floor((due-now)/86400000);
  if(diffDays<0) return `<span class="badge overdue">Overdue</span>`;
  if(diffDays<=30) return `<span class="badge due">Due soon</span>`;
  return `<span class="badge ok">On track</span>`;
}

/* ========== GOVERNANCE ========== */
function computeGovernanceData(){
  const bulk = STATE.tieringBulk;
  const buckets = tierBucketCounts(bulk);
  const reg = STATE.register;
  const overdue = reg.filter(r=>{
    if(r.status==='Complete'||!r.dueDate) return false;
    return new Date(r.dueDate) < new Date();
  });
  const dims = {};
  SCORECARD_QUESTIONS.forEach(q=>{ dims[q.dim]=dims[q.dim]||[]; dims[q.dim].push(STATE.scorecard[q.id]||3); });
  const dimAvg = Object.keys(dims).map(d=>({dim:d, avg: dims[d].reduce((a,b)=>a+b,0)/dims[d].length}));
  const weakest = [...dimAvg].sort((a,b)=>a.avg-b.avg).slice(0,3);
  const rebates = STATE.rebates;
  const totalAccrued = rebates.reduce((a,r)=>a+(Number(r.spendToDate)||0)*(Number(r.ratePct)||0)/100,0);
  const unreconciled = rebates.filter(r=>r.status!=='Reconciled');
  const disputed = rebates.filter(r=>r.status==='Disputed');
  const cats = STATE.coverage.categories;
  const totalSpend = cats.reduce((a,r)=>a+(Number(r.spend)||0),0);
  const weightedCovered = cats.reduce((a,r)=>a+(Number(r.spend)||0)*(Number(r.pctContract)||0)/100,0);
  const overallCoveragePct = totalSpend ? (weightedCovered/totalSpend*100) : 0;
  const whiteSpace = cats.filter(r=>(Number(r.pctContract)||0)<50);
  const lowFeedback = STATE.coverage.feedback.filter(f=>(Number(f.rating)||0)<=2);
  return {bulk,buckets,reg,overdue,dimAvg,weakest,rebates,totalAccrued,unreconciled,disputed,cats,totalSpend,overallCoveragePct,whiteSpace,lowFeedback};
}
function buildGovernanceInsights(d){
  const risks = [];
  if(d.overdue.length) risks.push(`${d.overdue.length} obligation/SLA/change-order item(s) overdue — contractual exposure until closed.`);
  if(d.disputed.length) risks.push(`${d.disputed.length} rebate tier(s) marked Disputed — potential revenue leakage unresolved.`);
  if(d.whiteSpace.length) risks.push(`${d.whiteSpace.length} spend categor${d.whiteSpace.length===1?'y':'ies'} under 50% contract coverage — maverick spend / uncontrolled risk.`);
  if(d.lowFeedback.length) risks.push(`${d.lowFeedback.length} stakeholder feedback entr${d.lowFeedback.length===1?'y':'ies'} rated 2/5 or below — relationship risk.`);
  if(d.weakest.length) risks.push(`Weakest maturity dimension: "${d.weakest[0].dim}" at ${d.weakest[0].avg.toFixed(1)}/5.`);
  if(!risks.length) risks.push('No material risks flagged from current data.');

  const todo = [];
  if(d.overdue.length) todo.push(`Close out ${d.overdue.length} overdue register item(s), oldest due dates first.`);
  if(d.unreconciled.length) todo.push(`Reconcile ${d.unreconciled.length} open rebate tier(s) against supplier statements.`);
  if(d.whiteSpace.length) todo.push(`Scope contracts for white-space categories: ${d.whiteSpace.slice(0,5).map(c=>c.name||'(unnamed)').join(', ')}.`);
  if(d.weakest.length) todo.push(`Run an improvement action on "${d.weakest[0].dim}" — the lowest-scoring maturity dimension.`);
  if(d.lowFeedback.length) todo.push('Follow up directly with stakeholders who gave low ratings before the next QBR cycle.');
  if(!todo.length) todo.push('No urgent actions from current data — maintain current review cadence.');

  const recs = [];
  if(d.totalSpend>0 && d.overallCoveragePct<70) recs.push(`Spend under contract is ${d.overallCoveragePct.toFixed(0)}% — prioritise closing coverage in the highest-spend uncontracted categories first.`);
  const goldOrT1 = d.buckets.find(b=>b.cls==='gold'||b.cls==='t1');
  if(goldOrT1 && goldOrT1.count>0) recs.push(`Confirm every ${goldOrT1.label} contract has a named owner and an active QBR cadence — this is where value leakage is most costly.`);
  recs.push('Review this rollup at least quarterly alongside the QBR cycle so risks surface before renewal deadlines, not after.');
  return {risks, todo, recs};
}

function extractKpiSlaCandidates(text){
  const sentences = text.split(/\n+|(?<=[.;])\s+/).map(s=>s.trim()).filter(Boolean);
  const kw = /(\d{1,3}(\.\d+)?\s?%|\d+\s?(hours?|business days?|minutes?)|uptime|response time|on-time|defect rate|service level|turnaround|resolution time)/i;
  const seen = new Set(); const out = [];
  for(const s of sentences){
    if(s.length<10 || s.length>250) continue;
    if(kw.test(s) && !seen.has(s)){ seen.add(s); out.push(s); if(out.length>=25) break; }
  }
  return out;
}
function extractTargetNumber(text){
  const m = text.match(/\d{1,3}(\.\d+)?\s?%|\d+\s?(hours?|business days?|minutes?)/i);
  return m ? m[0] : '';
}
function addCandidateToQbr(text){
  STATE.qbr.slas.push({id:uid(), name:text, target:extractTargetNumber(text), actual:'', status:'On track'});
  saveState();
}
function heuristicTierFromText(text){
  const lower = text.toLowerCase();
  let value=3, risk=3, criticality=3, impact=3;
  if(/(\$|USD|GBP|£|EUR|€)\s?\d[\d,]{3,}/.test(text)) value++;
  if(/(sole source|single source|no alternative|penalt(y|ies)|liquidated damages|indemnif|breach of contract)/i.test(lower)) risk++;
  if(/(critical|core system|mission.?critical|essential service|business continuity)/i.test(lower)) criticality++;
  if(/(regulatory|compliance|gdpr|data protection|health and safety|reputation|customer.?facing|public)/i.test(lower)) impact++;
  if(/(auto.?renew|evergreen)/i.test(lower)) risk++;
  return {value:clampScore(value),risk:clampScore(risk),criticality:clampScore(criticality),impact:clampScore(impact)};
}
async function aiSuggestTier(text){
  if(STATE.ai.mode==='sandbox') return heuristicTierFromText(text);
  const prompt = `Based on this contract text, estimate procurement tiering scores 1-5 for Value, Risk, Criticality and Business Impact. Return ONLY JSON, no commentary: {"value":N,"risk":N,"criticality":N,"impact":N}\n\nText:\n${text.slice(0,6000)}`;
  try{
    const res = await askAI(prompt);
    const cleaned = res.replace(/```json|```/g,'').trim();
    const s = cleaned.indexOf('{'), e = cleaned.lastIndexOf('}');
    const parsed = JSON.parse(cleaned.slice(s,e+1));
    return {value:clampScore(parsed.value),risk:clampScore(parsed.risk),criticality:clampScore(parsed.criticality),impact:clampScore(parsed.impact)};
  }catch(e){ return heuristicTierFromText(text); }
}
function extractObligationCandidates(text){
  const sentences = text.split(/\n+|(?<=[.;])\s+/).map(s=>s.trim()).filter(Boolean);
  const kw = /\b(shall|must|will (provide|deliver|notify|pay|maintain|ensure)|no later than|within \d+ (days|business days)|prior written notice|renewal|terminat(e|ion)|service level|penalt(y|ies)|liquidated damages)\b/i;
  const seen = new Set(); const out = [];
  for(const s of sentences){
    if(s.length<15 || s.length>300) continue;
    if(kw.test(s) && !seen.has(s)){ seen.add(s); out.push(s); if(out.length>=40) break; }
  }
  return out;
}
async function aiExtractObligations(rawText){
  const prompt = `Extract distinct contractual obligations, deadlines, and SLA commitments from the following contract text as a plain newline-separated list, one obligation per line, no numbering, no commentary.\n\nText:\n${rawText.slice(0,6000)}`;
  const result = await askAI(prompt);
  return result.split('\n').map(s=>s.replace(/^[-•\d.]+\s*/,'').trim()).filter(s=>s.length>10 && s.length<300).slice(0,40);
}

    STATE.ai.claudeModel = document.getElementById('setClaudeModel').value;
    STATE.ai.geminiKey = document.getElementById('setGeminiKey').value;
    STATE.ai.geminiModel = document.getElementById('setGeminiModel').value;
    saveState();
    document.getElementById('aiTestOut').innerHTML = '<span style="color:var(--green);">Saved.</span>';
  });
  document.getElementById('btnClearKeys').addEventListener('click',()=>{
    STATE.ai.claudeKey=''; STATE.ai.geminiKey=''; STATE.ai.mode='sandbox'; saveState(); render();
  });
  document.getElementById('btnTestAI').addEventListener('click', async ()=>{
    const out = document.getElementById('aiTestOut');
    out.textContent = 'Testing…';
    try{
      const text = await askAI('Reply with a single short sentence confirming this connection works.');
      out.innerHTML = `<span style="color:var(--green);">OK:</span> ${esc(text).slice(0,200)}`;
    }catch(e){
      out.innerHTML = `<span style="color:var(--red);">${esc(e.message)}</span>`;
    }
  });
  document.getElementById('btnResetAll').addEventListener('click',()=>{
    if(confirm('This clears all local CLM Suite data on this device. Continue?')){
      window.localStorage.removeItem('clm_suite_state');
      STATE = JSON.parse(JSON.stringify(DEFAULT_STATE));
      render();
    }
  });
}

/* ---------- floater ---------- */
document.getElementById('floaterBtn').addEventListener('click',()=>{
  const p = document.getElementById('floaterPanel');
  p.hidden = !p.hidden;
});

/* ---------- demo tour ---------- */
const TOUR = [
  {screen:'about', text:'Welcome to CLM Suite. This tour loads sample contracts and walks the full 0–7 model in under two minutes — Skip any time.'},
  {screen:'tiering', text:'Section 0: score Value, Risk, Criticality and Impact — the tier updates live. Four demo contracts have been loaded into the bulk table below.'},
  {screen:'tiering', text:'Scroll down: the bulk table auto-tiers every contract, and the heatmap plots them on Value × Risk so you can see the portfolio at a glance.'},
  {screen:'framework', text:'The full 0–7 framework brief lives here with CIPS / Hackett / WorldCC benchmarks, plus an AI-draft executive summary and Word export.'},
  {screen:'qbr', text:'Build a QBR from KPIs, SLAs, rebates and risks, then let AI draft the narrative — export to Word or PowerPoint.'},
  {screen:'register', text:'One register for obligations and SLAs, auto-flagged overdue by due date. You can also import obligations straight from an uploaded Word contract.'},
  {screen:'scorecard', text:'Score your organisation\u2019s CM maturity across six dimensions — this feeds the Governance rollup.'},
  {screen:'governance', text:'Everything rolls up here: tier mix, overdue exposure, weakest maturity dimensions — the CPO-facing value-leak view.'},
  {screen:'settings', text:'Connect Claude or Gemini here for live AI drafting, or stay in Sandbox mode offline. That\u2019s the tour — explore freely from here.'}
];
let tourIndex = -1;
let TOUR_POS = null;
let TOUR_COLLAPSED = false;
let dragState = {dragging:false, offX:0, offY:0};
document.addEventListener('mousemove', e=>{
  if(!dragState.dragging) return;
  TOUR_POS = { left: e.clientX-dragState.offX, top: e.clientY-dragState.offY };
  const ov = document.getElementById('tourOverlay');
  if(ov){ ov.style.left=TOUR_POS.left+'px'; ov.style.top=TOUR_POS.top+'px'; ov.style.right='auto'; ov.style.bottom='auto'; ov.style.justifyContent='flex-start'; }
});
document.addEventListener('mouseup', ()=>{ dragState.dragging=false; });
function makeDraggable(card){
  const handle = card.querySelector('#tourDragHandle') || card;
  handle.addEventListener('mousedown', e=>{
    dragState.dragging = true;
    const rect = card.getBoundingClientRect();
    dragState.offX = e.clientX - rect.left; dragState.offY = e.clientY - rect.top;
    e.preventDefault();
  });
}
function startDemoTour(){
  if(STATE.tieringBulk.length===0){
    STATE.tieringBulk = [
      {id:uid(),name:'Global Logistics Co',value:5,risk:4,criticality:5,impact:4},
      {id:uid(),name:'Office Supplies Ltd',value:1,risk:1,criticality:1,impact:1},
      {id:uid(),name:'Cloud Hosting Provider',value:4,risk:4,criticality:5,impact:5},
      {id:uid(),name:'Regional Print Vendor',value:2,risk:2,criticality:2,impact:2}
    ];
    saveState();
  }
  TOUR_POS = null; TOUR_COLLAPSED = false;
  tourIndex = 0;
  showTourStep();
}
function showTourStep(){
  const step = TOUR[tourIndex];
  if(!step){ endTour(); return; }
  setScreen(step.screen);
  renderTourOverlay(step);
}
function renderTourOverlay(step){
  let ov = document.getElementById('tourOverlay');
  if(!ov){ ov = document.createElement('div'); ov.id='tourOverlay'; document.body.appendChild(ov); }
  if(TOUR_POS){
    ov.style.left = TOUR_POS.left+'px'; ov.style.top = TOUR_POS.top+'px';
    ov.style.right = 'auto'; ov.style.bottom = 'auto'; ov.style.justifyContent = 'flex-start';
  }else{
    ov.style.left=''; ov.style.top=''; ov.style.right=''; ov.style.bottom=''; ov.style.justifyContent='';
  }
  if(TOUR_COLLAPSED){
    ov.innerHTML = `<div id="tourCard" class="collapsed">
      <span class="small mono">TOUR ${tourIndex+1}/${TOUR.length}</span>
      <button class="btn small gold" id="tourExpand">Show</button>
    </div>`;
    document.getElementById('tourExpand').addEventListener('click',()=>{ TOUR_COLLAPSED=false; renderTourOverlay(step); });
    makeDraggable(document.getElementById('tourCard'));
    return;
  }
  ov.innerHTML = `<div id="tourCard">
    <div id="tourDragHandle" class="row" style="justify-content:space-between;align-items:center;cursor:move;">
      <span class="small mono">GUIDED TOUR · ${tourIndex+1}/${TOUR.length} <span style="opacity:.6;">(drag to move)</span></span>
      <button class="btn small" id="tourMinimize" style="background:none;border:1px solid #4a5361;color:#c9c2b4;padding:2px 9px;">Hide</button>
    </div>
    <p style="margin:8px 0 14px;font-size:14px;line-height:1.5;">${esc(step.text)}</p>
    <div class="row">
      <button class="btn small outline" id="tourPrev" ${tourIndex===0?'disabled':''} style="color:var(--paper);border-color:#4a5361;">Back</button>
      <button class="btn small gold" id="tourNext">${tourIndex===TOUR.length-1?'Finish':'Next'}</button>
      <button class="btn small" id="tourSkip" style="background:none;border:1px solid #4a5361;color:#c9c2b4;">Skip</button>
    </div>
  </div>`;
  document.getElementById('tourNext').addEventListener('click',()=>{ tourIndex++; showTourStep(); });
  document.getElementById('tourPrev').addEventListener('click',()=>{ tourIndex--; showTourStep(); });
  document.getElementById('tourSkip').addEventListener('click', endTour);
  document.getElementById('tourMinimize').addEventListener('click',()=>{ TOUR_COLLAPSED=true; renderTourOverlay(step); });
  makeDraggable(document.getElementById('tourCard'));
}
function endTour(){
  tourIndex = -1;
  TOUR_POS = null; TOUR_COLLAPSED = false;
  const ov = document.getElementById('tourOverlay');
  if(ov) ov.remove();
}
document.addEventListener('click', e=>{
  if(e.target && e.target.id==='btnStartTour') startDemoTour();
});

render();
renderFloaterTips();
</script>
</body>
</html>
