    try{
      const parsed=JSON.parse(await file.text());
      if(!parsed||typeof parsed!=="object"||Array.isArray(parsed)) throw new Error("not a library file");
      const ids=Object.keys(parsed); if(!ids.length) throw new Error("empty library file");
      const lib=loadPortfolioLibrary();
      const clashes=ids.filter(id=>lib[id]).length;
      if(!confirm("Import "+ids.length+" portfolio(s) from \""+file.name+"\" into the library?"+(clashes?"\n\n"+clashes+" entr"+(clashes===1?"y":"ies")+" with the same id will be overwritten.":""))) return;
      ids.forEach(id=>{ lib[id]=parsed[id]; });
      savePortfolioLibrary(lib); setLibTick(t=>t+1);
      logDeclaration(setPortfolioDetails, ids.length+" portfolio(s) imported into the library from file", "Uploaded file: "+file.name);
      setIoMsg({ok:true,msg:"Imported "+ids.length+" portfolio(s) — switch to any of them from the library list."});
    }catch(e){ setIoMsg({ok:false,msg:"Library import failed: "+((e&&e.message)||"unreadable file")}); }
  };

  /* v2.6.0 — Stage 3 assessment state */
  const assessment = portfolioDetails.assessment || {};
  const assessmentSources = portfolioDetails.assessmentSources || {};
  const [assessBusy, setAssessBusy] = useState("");
  const setAssessField=(g,f,val)=>setPortfolioDetails(prev=>({
    ...prev, assessment:{...(prev.assessment||{}), [g]:{...((prev.assessment||{})[g]||{}), [f]:val}}
  }));
  const assessFilled=(g)=>{ const grp=ASSESSMENT_GROUPS.find(x=>x[0]===g); const vals=assessment[g]||{}; return grp[2].filter(([f])=>vals[f]&&String(vals[f]).trim()).length; };
  async function draftAssessmentGroup(g){
    const grp=ASSESSMENT_GROUPS.find(x=>x[0]===g); if(!grp) return;
    setAssessBusy(g);
    try{
      const vals=assessment[g]||{};
      const emptyFields=grp[2].filter(([f])=>!(vals[f]&&String(vals[f]).trim()));
      if(!emptyFields.length){ setIoMsg({ok:true,msg:"All "+grp[1].replace(/^\S+\s/,"")+" fields already have positions — the AI assist only fills empty fields (it never touches your text). Clear a field to re-draft it."}); setAssessBusy(""); return; }
      const charterBrief={}; CHARTER_FIELDS.forEach(([label,k])=>{ if(portfolioDetails[k]) charterBrief[label]=String(portfolioDetails[k]).slice(0,400); });
      const docNotes=(Array.isArray(portfolioDetails.sourceDocs)?portfolioDetails.sourceDocs:[]).map(d=>d.name+": "+String(d.summary).slice(0,500)).join("\n");
      const ai=await askAI(
        `You are building the "${grp[1].replace(/^\S+\s/,"")}" block of a portfolio assessment fact base. Charter: ${JSON.stringify(charterBrief)}\n`+
        `Composition: ${JSON.stringify(cats.map(c=>({name:c.name,spend:Number(c.spend)||0,risk:c.risk,kraljic:c.quadrant,notes:(c.notes||"").slice(0,150)})))}\n`+
        (docNotes?`Source-document notes: ${docNotes}\n`:"")+
        `Return STRICT JSON only with EXACTLY these keys: {${emptyFields.map(([f,label,ph])=>`"${f}":"${label} — ${ph}"`).join(",")}}. Each value: one plain-prose position of max 30 words grounded ONLY in the inputs above; where the inputs are silent, write "To validate: " followed by what to check — do not invent facts.`,
        {json:true}
      );
      if(ai&&typeof ai==="object"){
        setPortfolioDetails(prev=>{
          const cur={...((prev.assessment||{})[g]||{})};
          emptyFields.forEach(([f])=>{ if(ai[f]&&String(ai[f]).trim()&&!(cur[f]&&String(cur[f]).trim())) cur[f]=String(ai[f]).slice(0,400); });
          return {...prev, assessment:{...(prev.assessment||{}), [g]:cur},
            assessmentSources:{...(prev.assessmentSources||{}), [g]:{mode:"ai", by:aiSourceLabel(), when:new Date().toISOString(), fields:emptyFields.map(([f])=>f)}}};
        });
        logDeclaration(setPortfolioDetails, "Portfolio assessment — "+grp[1].replace(/^\S+\s/,"")+" block: "+emptyFields.length+" empty field(s) AI-drafted (user text untouched)", "AI: "+aiSourceLabel());
      } else throw new Error("no usable JSON");
    }catch(e){ setIoMsg({ok:false,msg:"AI assist unavailable ("+((e&&e.message)||"error")+") — the assessment has no honest rule-based fallback; please write positions directly."}); }
    finally{ setAssessBusy(""); }
  }
  const assessSourceText=(g)=>{
    const s=assessmentSources[g]; if(!s) return null;
    return "AI-drafted ("+(s.fields||[]).length+" field"+((s.fields||[]).length===1?"":"s")+", empty-only) by "+s.by+", "+new Date(s.when).toLocaleString()+"; everything typed or edited since is user input.";
  };

  const planSourceText=(key)=>{
    const s=planSources[key];
    if(!s) return null;
    if(s.mode==="user") return "User input, "+new Date(s.when).toLocaleString()+".";
    const base=(s.mode==="ai"?"AI-drafted by "+s.by:"Drafted by "+s.by)+", "+new Date(s.when).toLocaleString();
    return base+(s.edited?" — user-modified since.":" — review before board use.");
  };

  /* v2.4.0 — per-field AI suggest: APPENDS to manual entries, never overwrites */
  const [fieldBusy,setFieldBusy]=useState("");
  async function suggestField(key,label){
    setFieldBusy(key);
    try{
      const existing=portfolioDetails[key]||"";
      const ctx={portfolio:portfolioDetails.name||undefined, description:(portfolioDetails.description||"").slice(0,300)||undefined, objectives:(portfolioDetails.objectives||"").slice(0,300)||undefined, serviceLines:cats.map(c=>c.name).filter(Boolean).join(", ")||undefined};
      const docNotes=(Array.isArray(portfolioDetails.sourceDocs)?portfolioDetails.sourceDocs:[]).map(d=>d.name+": "+String(d.summary).slice(0,400)).join("\n");
      const text=await askAI(
        `You are helping complete the "${label}" field of a procurement portfolio charter. Context: ${JSON.stringify(ctx)}\n`+
        (docNotes?`Source-document notes: ${docNotes}\n`:"")+
        (existing?`The user has already written: "${existing.slice(0,800)}"\nSuggest ADDITIONAL points only — do not repeat or rewrite what they wrote.`:"Suggest a concise starting draft grounded in the context; where context is thin, pose it as points to confirm rather than facts.")+
        `\nMax 60 words, plain prose, no headings or bullets.`,
        {json:false}
      );
      const addition=String(text).trim().slice(0,800);
      handleChange(key, existing ? existing.replace(/\s+$/,"")+"\n[AI suggestion — review]: "+addition : addition);
      logDeclaration(setPortfolioDetails, "Charter field \""+label+"\" — AI suggestion "+(existing?"appended after the user's text (marked for review)":"drafted"), "AI: "+aiSourceLabel());
    }catch(e){ setIoMsg({ok:false,msg:"AI suggestion unavailable ("+((e&&e.message)||"error")+") — type directly instead."}); }
    finally{ setFieldBusy(""); }
  }
  const inputStyle={width:"100%", padding:"6px 10px", marginTop:4, border:"1px solid var(--line)", borderRadius:6, background:"var(--card)", color:"var(--ink)", fontFamily:"inherit", fontSize:12.5};
  const CF=({k,label,rows=2,placeholder})=>(
    <label style={{fontSize:12, fontWeight:700, display:"block"}}>
      <span style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
        <span>{label}</span>
        <button className="btn ghost" style={{border:"none",color:"var(--petrol)",fontSize:10.5,padding:"0 4px",whiteSpace:"nowrap"}} disabled={!!fieldBusy}
          title={portfolioDetails[k]?"Appends AI suggestions AFTER your text, marked '[AI suggestion — review]' — it never overwrites what you wrote. Logged in declarations.":"Drafts a starting suggestion for this field (logged in declarations). You can then edit or extend it freely."}
          onClick={e=>{e.preventDefault(); suggestField(k,label);}}>{fieldBusy===k?"…":"⚡ suggest"}</button>
      </span>
      <textarea rows={rows} value={portfolioDetails[k]||""} onChange={e=>handleChange(k,e.target.value)} placeholder={placeholder} style={inputStyle}/>
    </label>
  );

  /* v2.25 — route-to-market: bulk AI-assist for specialization (gut-feel
     default is fine; this offers a research-informed alternative for lines
     the manager hasn't set explicitly). Never overwrites a user-set value. */
  const [rtmBusy,setRtmBusy]=useState(false);
  async function assistSpecialization(){
    const targets=cats.map((c,i)=>({i,name:c.name})).filter(t=>t.name && (cats[t.i].specSource!=="user"));
    if(!targets.length){ alert("No lines to assess — either add service lines, or every line's specialization is already user-set."); return; }
    setRtmBusy(true);
    try{
      const out=await askClaude(`For each of these procurement categories/service lines, estimate the SUPPLY MARKET SPECIALIZATION (how scarce is capable supply) and a rough count of credible providers. Categories: ${JSON.stringify(targets.map(t=>t.name))}. Respond ONLY with JSON, no fences: {"items":[{"name":"...","specialization":"Commodity|Moderate|Scarce","supplierCount":<int 1-20>,"why":"one line"}]}`);
      if(out&&Array.isArray(out.items)&&out.items.length){
        setCats(list=>list.map(c=>{
          const m=out.items.find(x=>String(x.name||"").trim().toLowerCase()===String(c.name||"").trim().toLowerCase());
          if(!m || c.specSource==="user") return c;
          return {...c, specialization:["Commodity","Moderate","Scarce"].includes(m.specialization)?m.specialization:c.specialization, specSource:"ai", supplierCount: c.supplierCount===""||c.supplierCount==null? (Number(m.supplierCount)||""): c.supplierCount};
        }));
        logDeclaration(setPortfolioDetails, "Route-to-market specialization AI-assisted for "+out.items.length+" line(s) — review and confirm each", "AI research assist");
      } else throw new Error("no usable JSON");
    }catch(e){ alert("AI-assist unavailable ("+(e.message||"error")+") — set specialization manually per line; a gut-feel estimate is a valid starting point."); }
    finally{ setRtmBusy(false); }
  }

  /* v2.17 — custom label overrides state */
  const [labelOv,setLabelOv]=useState(loadLabelOverrides());
  const setLabelOverride=(stdLabel,val)=>{
    const key=stdLabel.toLowerCase();
    const next={...loadLabelOverrides()};
    if(val&&val.trim()) next[key]=val.trim(); else delete next[key];
    saveLabelOverrides(next); setLabelOv(next);
    logDeclaration(setPortfolioDetails, val&&val.trim()?("Template label renamed: \""+stdLabel+"\" → \""+val.trim()+"\" (both accepted on upload)"):("Template label \""+stdLabel+"\" reset to standard"), "User template preference");
  };

  /* v2.12 — Word template round-trip handlers */
  async function downloadWordTemplate(prefill){
    setIoBusy("wordtpl"); setIoMsg(null);
    try{
      await downloadAsWord(buildWordInputTemplateMd(portfolioDetails, prefill), "portfolio-input-template"+(prefill?"-prefilled":"-blank"));
      logDeclaration(setPortfolioDetails, "Word input template downloaded ("+(prefill?"prefilled with current data":"blank")+") — charter, fact base and plans; numbers stay on the Excel route", "User action");
      setIoMsg({ok:true,msg:(prefill?"Prefilled":"Blank")+" Word template downloaded — fill after each colon (· lines are guidance), then upload it back here. Service lines & numbers go via the Excel template."});
    }catch(e){ setIoMsg({ok:false,msg:(e&&e.message)||"Template build failed"}); }
    finally{ setIoBusy(""); }
  }
  async function uploadWordTemplate(file){
    if(!file) return;
    if(!/\.docx$/i.test(file.name)){ setIoMsg({ok:false,msg:"Upload the filled .docx template here (PDF/PPTX go to route 3; spreadsheets to the Excel upload)."}); return; }
    setIoBusy("wordtplu"); setIoMsg(null);
    try{
      const ok=await ensureMammoth(); if(!ok) throw new Error("Word-reading library unavailable (offline?)");
      const result=await window.mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
      const parsed=parseWordInputTemplate(result.value||"");
      if(!parsed.nCharter&&!parsed.nAssess&&!parsed.nPlans) throw new Error("No recognisable 'Label: value' lines found — check the labels weren't edited (download a fresh template to compare).");
      if(!confirm("Apply from \""+file.name+"\"?\n\n• Charter: "+parsed.nCharter+" field(s)\n• Assessment fact base: "+parsed.nAssess+" position(s)\n• Plans: "+parsed.nPlans+" section(s)\n\nOnly fields with content in the file are applied; everything else in the app is untouched. Composition & numbers are unaffected (Excel route).")) { setIoBusy(""); return; }
      setPortfolioDetails(prev=>{
        const mergedAssess={...(prev.assessment||{})};
        Object.entries(parsed.assessment).forEach(([g,fields])=>{ mergedAssess[g]={...(mergedAssess[g]||{}),...fields}; });
        const mergedPlanSources={...(prev.planSources||{})};
        Object.keys(parsed.plans).forEach(k=>{ mergedPlanSources[k]={mode:"user", when:new Date().toISOString(), via:"Word template: "+file.name}; });
        return {...prev, ...parsed.charter, assessment:mergedAssess, plans:{...(prev.plans||{}),...parsed.plans}, planSources:mergedPlanSources};
      });
      logDeclaration(setPortfolioDetails, "Word input template imported — charter "+parsed.nCharter+", assessment "+parsed.nAssess+", plans "+parsed.nPlans+" field(s) applied (content-bearing fields only)", "Uploaded file: "+file.name);
      setIoMsg({ok:true,msg:"Imported from "+file.name+": "+parsed.nCharter+" charter, "+parsed.nAssess+" assessment, "+parsed.nPlans+" plan field(s). Imported values count as user input — review and edit freely."});
    }catch(e){ setIoMsg({ok:false,msg:(e&&e.message)||"Import failed"}); }
    finally{ setIoBusy(""); }
  }

  const removeSourceDoc=(i)=>{
    const d=sourceDocs[i];
    setPortfolioDetails(prev=>({...prev, sourceDocs:(prev.sourceDocs||[]).filter((_,idx)=>idx!==i)}));
    if(d) logDeclaration(setPortfolioDetails, "Source document removed from the strategy inputs", "User action: removed "+d.name);
  };

  const loadESSTemplate = () => {
    setPortfolio("ess");
    setPortfolioDetails({
      name: "Engineering Support Services (ESS)",
      description: "Parent strategy for NESO Engineering Support Services across managed services, resource augmentation, digital/data support, and AI-enabled process support.",
      businessUnit: "NESO - Engineering, Market Operations, Connections, DD&T and enabling functions",
      owner: "Category Manager / Procurement Lead",
      objectives: "1. Protect operational continuity for critical engineering and market processes.\n2. Reduce incumbent dependency before the May 2027 go-to-market.\n3. Create a lotting strategy across managed services, specialist engineering, data/AI and resource augmentation.\n4. Preserve and transfer knowledge from the incumbent model while testing agent support for CM Assessment.",
      outcomes: "Continuity through transition, credible competitive tension, clear service-line ownership, value from offshore delivery where appropriate, and governed AI/agent adoption.",
      currency: "£",
      currentSpend: "4672250",
      futureDemand: "Connections volumes, market reform activity, network modelling demand, balancing and revenue service changes, and AI-enabled assessment support are expected to shape demand through 2027.",
      operatingModel: "Portfolio-led sourcing with service-line lots; strategic managed services for critical operations; specialist panels for scarce skills; controlled PoCs for AI/agent use cases.",
      suppliersText: "Accenture, Avanade, specialist power system engineering consultancies, data science/AI providers, managed service providers, public-sector framework suppliers.",
      technologyLandscape: "Power system models, settlement/revenue processes, CRM and connections tooling, DAP/Azure data platform, ESRI/GIS capability, Power BI dashboards, AI/agent tooling for CM Assessment.",
      regulatory: "UK public procurement environment, NESO public corporation context, energy market obligations, Grid Code / licence obligations, data protection and AI assurance requirements.",
      sustainability: "Social value, responsible offshore delivery, knowledge transfer, workforce resilience, carbon and travel governance, and supplier diversity where proportionate.",
      digitalStrategy: "Assess agent support for CM Assessment via governed PoC; automate repeatable data/process tasks; require explainability, auditability, data controls and human-in-the-loop assurance.",
      riskAppetite: "Low appetite for operational continuity, model quality, regulatory and data risks; moderate appetite for commercial model change; controlled appetite for AI/agent experimentation.",
      governance: "Portfolio board for parent strategy; service-line owners for category strategies; approval gates for lotting, market engagement, sourcing launch, award, mobilisation and transition.",
      stakeholders: "Engineering, Network Modelling, Balancing & Revenue Services, Connections, EMR/market reform, DD&T/data, Finance, Legal, Risk, Information Security and Procurement.",
      kpis: "Service continuity, SLA/KPI performance, transition readiness, knowledge-transfer completion, offshore/onshore mix, savings and cost avoidance, automation benefits, AI assurance gates.",
      benefitsFramework: "Cash savings, cost avoidance, continuity risk reduction, cycle-time improvement, data quality, automation value, social value, and innovation outcomes.",
      categories: PORTFOLIO_CATEGORIES.ess.map(c => ({...c}))
    });
  };

  const downloadInputTemplate = (kind) => {
    const portfolioTemplate = {
      portfolioName: "Engineering Support Services (ESS)",
      businessUnit: "NESO business area(s)",
      owner: "Portfolio owner / category lead",
      description: "Parent strategy scope and boundaries",
      strategicObjectives: ["Continuity", "Competition", "Transition", "Innovation"],
      businessOutcomes: ["Operational resilience", "Value", "Knowledge transfer"],
      currentSpend: "Annual portfolio spend and currency",
      futureDemand: "Demand drivers over the strategy horizon",
      operatingModel: "How the portfolio should be sourced and governed",
      currentSuppliers: ["Incumbent", "challengers", "specialists"],
      technologyLandscape: ["Core systems", "data platforms", "AI/automation tools"],
      regulatoryEnvironment: ["Procurement", "energy", "data", "AI assurance"],
      sustainabilitySocialValue: "Social value and responsible delivery requirements",
      aiDigitalStrategy: "Automation / agent opportunities and controls",
      riskAppetite: "Parent-level risk appetite by risk type",
      governance: "Decision forums and approval gates",
      stakeholders: ["Business owner", "Finance", "Legal", "Risk", "InfoSec"],
      kpis: ["Service continuity", "SLA", "savings", "transition readiness"],
      benefitsFramework: ["Cash", "cost avoidance", "efficiency", "risk", "social value", "innovation"]
    };
    const categoryTemplate = {
      parentPortfolio: portfolioDetails.name || "Engineering Support Services (ESS)",
      categoryName: "Network Modelling / Connections Offers / Balancing & Revenue / EMR",
      scopeIn: ["Services, processes and outcomes included"],
      scopeOut: ["Explicit exclusions"],
      categoryManager: "Named owner",
      spend: "Service-line spend and forecast",
      incumbentSuppliers: ["Current suppliers and FTE/offshore mix"],
      contracts: ["Contract/SOW, expiry, obligations, service credits"],
      demandForecast: "Volumes, workload, project/change drivers",
      serviceCriticality: "Operational/regulatory criticality",
      marketAnalysis: "Supplier market and competition for this service line",
      technologyInnovation: "Automation, data, AI or tooling opportunities",
      risks: ["Continuity", "knowledge", "skills", "data", "transition"],
      savingsTargets: "Cash, cost avoidance and value levers",
      kpis: ["Service-specific KPIs and acceptance criteria"],
      commercialModel: "Managed service, resource augmentation, outcome-based, T&M, fixed price",
      inheritanceOverrides: "What differs from the parent portfolio and why"
    };
    const payload = kind === "category" ? categoryTemplate : portfolioTemplate;
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (kind === "category" ? "category-service-line-input-template" : "portfolio-strategy-input-template") + ".json";
    a.click();
  };
  return (
    <div className="card">
      <h2 className="display">💼 P1 · Portfolio Charter & Composition</h2>
      <p className="hint">Define the parent portfolio here: the charter (strategy, objectives, operating model, risk appetite, governance) and the composition (the categories/service lines it contains). Every service line inherits the charter when deep-dived. <b>Start with the input routes below</b> if your data lives in documents or spreadsheets — otherwise type straight into the charter.</p>

      {/* v2.6.0 — Portfolio library (multiple portfolios) */}
      <Collapse title="📁 My portfolios — save, switch, duplicate" defaultOpen={false} right={<span style={{fontSize:10.5,color:"var(--slate)"}}>{libEntries.length} saved · active: {(portfolioDetails.name||"").trim()||"(unnamed)"}{activePid&&library[activePid]?"":" (unsaved)"}</span>}>
        <p className="hint" style={{marginTop:6}}>Run several portfolios side by side. Each library entry snapshots <b>everything</b> — charter, composition, assessment, plans, options, questions, declarations, confirmed report <b>and that portfolio's line strategies</b>. Switching always snapshots the active portfolio first, so nothing is lost. The library lives in this browser; export it (.json) for backup or moving machines.</p>
        <div style={{display:"flex", gap:8, flexWrap:"wrap", margin:"8px 0"}}>
          <button className="btn primary" onClick={saveCurrentToLibrary} title="Snapshots the active portfolio (and its line strategies) into the library — updates its entry if already saved.">💾 Save current</button>
          <button className="btn" onClick={newBlankPortfolio} title="Snapshots the current portfolio, then opens a fresh blank one.">➕ New blank</button>
          <button className="btn" onClick={duplicateCurrent} title="Saves the current portfolio and creates a '(copy)' entry in the library — useful for scenario variants.">📄 Duplicate current</button>
          <button className="btn" onClick={exportLibrary} title="Downloads the whole library as .json (machine format, for re-import or moving machines — opens in a text editor, not Word/Excel).">⬇ Export library</button>
          <label className="btn" style={{cursor:"pointer"}} title="Imports a previously exported library file; entries with matching ids are overwritten after a confirm.">
            ⬆ Import library
            <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{importLibrary(e.target.files[0]); e.target.value="";}}/>
          </label>
        </div>
        {libEntries.length===0 ? <p style={{fontSize:12, color:"var(--slate)", fontStyle:"italic"}}>No saved portfolios yet — 💾 Save current to create the first entry.</p> : (
          <table style={{width:"100%", borderCollapse:"collapse", fontSize:11.5}}>
            <thead><tr style={{background:"var(--card)"}}>
              <th style={{border:"1px solid var(--line)", padding:5, textAlign:"left"}}>Portfolio</th>
              <th style={{border:"1px solid var(--line)", padding:5, width:70}}>Lines</th>
              <th style={{border:"1px solid var(--line)", padding:5, width:150}}>Saved</th>
              <th style={{border:"1px solid var(--line)", padding:5, width:160}}></th>
            </tr></thead>
            <tbody>
              {libEntries.map(([pid,entry])=>(
                <tr key={pid} style={pid===activePid?{background:"var(--petrolSoft)"}:null}>
                  <td style={{border:"1px solid var(--line)", padding:5}}><b>{entry.name}</b>{pid===activePid?<span style={{color:"var(--petrol)", fontWeight:800, fontSize:10.5}}> · ACTIVE</span>:null}</td>
                  <td style={{border:"1px solid var(--line)", padding:5, textAlign:"center"}}>{(entry.details&&Array.isArray(entry.details.categories))?entry.details.categories.filter(c=>c&&(c.name||"").trim()).length:0}</td>
                  <td style={{border:"1px solid var(--line)", padding:5}}>{entry.savedAt?new Date(entry.savedAt).toLocaleString():"—"}</td>
                  <td style={{border:"1px solid var(--line)", padding:5}}>
                    <div style={{display:"flex", gap:6}}>
                      {pid!==activePid && <button className="btn" style={{fontSize:10.5, padding:"2px 8px"}} onClick={()=>switchToPortfolio(pid)}>Switch to</button>}
                      <button className="btn ghost" style={{border:"none", color:"var(--red)", fontSize:10.5, padding:"2px 4px"}} onClick={()=>deleteFromLibrary(pid)}>✕</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </Collapse>

            {/* v2.1.0 — Input routes: online, Excel round-trip, source documents */}
      <Collapse title="📥 Inputs — fill online, templates round-trip, or source documents" defaultOpen={false} right={<span style={{fontSize:10.5,color:"var(--slate)"}}>{sourceDocs.length} source doc(s)</span>}>
        <p className="hint" style={{marginTop:6}}>Three ways to get input in — use any mix. Whatever the route, the origin is recorded in the <b>Declarations</b> register below and in the report bibliography, so the strategy always shows where its data came from.</p>
        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))", gap:12, marginTop:8}}>
          <div style={{border:"1px solid var(--line)", borderRadius:8, padding:12, background:"var(--card)"}}>
            <b style={{fontSize:12.5, color:"var(--petrol)"}}>1 · Fill online</b>
            <p style={{fontSize:11.5, color:"var(--slate)", margin:"4px 0 0"}}>Type into the charter and composition on this screen — with ⚡ AI assistance where offered. Best when you're building iteratively.</p>
          </div>
          <div style={{border:"1px solid var(--line)", borderRadius:8, padding:12, background:"var(--card)"}}>
            <b style={{fontSize:12.5, color:"var(--petrol)"}}>2 · Templates round-trip<Tip t="Two fillable templates with matching uploads. WORD (.docx) carries the NARRATIVES — the 20 charter fields, the 21 assessment positions and the 10 plan sections as 'Label: value' lines with guidance — ideal for circulating to stakeholders; download it blank or prefilled with current data, and upload the filled file back here (only fields with content are applied). EXCEL (.xlsx) carries the NUMBERS — the charter values and the service-line composition (spend, risk, Kraljic) — with replace-or-append on upload. The split is deliberate: prose belongs in Word, numbers in spreadsheets."/></b>
            <p style={{fontSize:11.5, color:"var(--slate)", margin:"4px 0 6px"}}><b>Word</b> = narratives (charter · fact base · plans) — blank or prefilled. <b>Excel</b> = numbers & composition.</p>
            <div style={{display:"flex", gap:6, flexWrap:"wrap"}}>
              <button className="btn" disabled={!!ioBusy} onClick={()=>downloadWordTemplate(false)} title="Blank Word template — for circulating to stakeholders who start from nothing.">{ioBusy==="wordtpl"?"Building…":"⬇ Word (blank)"}</button>

            <b style={{fontSize:12.5, color:"var(--petrol)"}}>3 · Source documents<Tip t="Upload a PDF, PPTX, DOCX, TXT or MD (e.g. a business case, market report or board pack). Text is extracted in your browser — nothing is uploaded to a server — and summarised into strategy notes by the configured AI provider (or stored as a raw excerpt offline). The document is cited in the report bibliography. Scanned image-only PDFs can't be read; spreadsheets should use route 2."/></b>

        </div>
        {ioMsg && <div className="banner" style={{marginTop:10, background:ioMsg.ok?"#E4F0EA":"#FBEAEA", borderColor:ioMsg.ok?"#7FB89F":"var(--red)", fontSize:12}}>{ioMsg.msg}</div>}

      <div style={{marginTop:6}}>
        <p className="hint" style={{marginTop:2}}><b>What you do here:</b> list the categories/service lines that make up this portfolio — one row each, with its annual spend, risk level and Kraljic placement (best estimates are fine; everything stays editable). <b>What the app does with it:</b> each row becomes a line in the P3 roll-up where a strategy is generated for it (or deep-dived via the Category track); spend, risk and Kraljic drive the roll-up totals, the lever suggestions, the maturity heatmap and Section 2 of the report. <b>Three ways to fill it:</b> type rows directly (+ Add service line), start from a seed template below and edit it into your portfolio, or use the <b>📥 Input routes panel at the top of this page</b> (Excel round-trip or document ingestion) to bring content in from files.</p>
        <div className="banner" style={{background:"var(--petrolSoft)", borderColor:"var(--petrol)", margin:"8px 0 4px", fontSize:12}}>
          <b>About the seed templates:</b> they are worked examples, not your data. <b>ESS</b> loads the NESO Engineering Support Services example — 6 service lines with indicative spend, risk and Kraljic — useful when you want to see what a well-formed composition looks like before writing your own. <b>Demo</b> loads a generic 3-line sandbox for exploring how the roll-up and report behave. Expectation: seed → rename/edit/delete rows until it is <i>your</i> portfolio → the seed origin is recorded in the declarations so the report stays honest about where rows started.
        </div>
        {cats.length === 0 && (
          <div className="banner" style={{background:"var(--amberSoft)", borderColor:"var(--amber)", marginBottom:10}}>
            <span><b>No service lines defined yet.</b> Add rows below, or seed the list from a template. Until you define your own, Step 12b displays the {portfolioId === "ess" ? "ESS" : "demo"} template service lines as a read-only illustration.</span>
          </div>
        )}

          <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:12}}>
            <thead>
              <tr style={{background:"var(--card)"}}>
                <th style={{border:"1px solid var(--line)", padding:6, textAlign:"left"}}>Category / service line</th>
                <th style={{border:"1px solid var(--line)", padding:6, textAlign:"left", width:110}}>Annual spend</th>
                <th style={{border:"1px solid var(--line)", padding:6, textAlign:"left", width:90}}>Risk</th>
                <th style={{border:"1px solid var(--line)", padding:6, textAlign:"left", width:120}}>Kraljic</th>
                <th style={{border:"1px solid var(--line)", padding:6, textAlign:"left", width:130}}>Archetype</th>
                <th style={{border:"1px solid var(--line)", padding:6, textAlign:"left"}}>Notes (context inherited by the wizard)</th>
                <th style={{border:"1px solid var(--line)", padding:6, width:34}}></th>

                  <td style={{border:"1px solid var(--line)", padding:4}}><input type="number" value={c.spend === "" ? "" : (c.spend || 0)} onChange={e=>updateCat(i, "spend", e.target.value)} placeholder="0" style={{width:"100%", padding:"4px 6px", border:"1px solid var(--line)", borderRadius:4, background:"var(--card)", color:"var(--ink)", fontSize:12}}/></td>
                  <td style={{border:"1px solid var(--line)", padding:4}}>
                    <select value={c.risk || "Medium"} onChange={e=>updateCat(i, "risk", e.target.value)} style={{width:"100%", padding:"4px 4px", border:"1px solid var(--line)", borderRadius:4, background:"var(--card)", color:"var(--ink)", fontSize:12}}>

                </tr>
              ))}
            </tbody>
          </table>

        {cats.length > 0 && (
          <div style={{fontSize:11.5, color:"var(--slate)", marginTop:6}}>
            Total defined spend: <b>{portfolioDetails.currency || "£"}{cats.reduce((s, c) => s + (Number(c.spend) || 0), 0).toLocaleString()}</b> across <b>{cats.filter(c => (c.name||"").trim()).length}</b> service line(s){portfolioDetails.currentSpend ? <> · parent charter spend: {portfolioDetails.currency || "£"}{Number(portfolioDetails.currentSpend).toLocaleString()}</> : null}

      {cats.length>0 && (
      <Collapse title="🧭 Route to market — channel recommendations by Kraljic quadrant" defaultOpen={false} right={<span style={{fontSize:10.5,color:"var(--slate)"}}>{cats.filter(c=>c.channel).length} / {cats.length} chosen</span>}>

              <th style={{border:"1px solid var(--line)", padding:5, textAlign:"left", width:90}}>Kraljic</th>
              <th style={{border:"1px solid var(--line)", padding:5, textAlign:"left", width:100}}>Volume</th>
              <th style={{border:"1px solid var(--line)", padding:5, textAlign:"left", width:110}}>Specialization</th>
              <th style={{border:"1px solid var(--line)", padding:5, textAlign:"left", width:90}}>Panel coverage</th>
              <th style={{border:"1px solid var(--line)", padding:5, textAlign:"left", width:70}}># suppliers</th>
              <th style={{border:"1px solid var(--line)", padding:5, textAlign:"left", width:190}}>Suggested → chosen channel</th>
              <th style={{border:"1px solid var(--line)", padding:5, textAlign:"left", width:150}}>Value/Effort tier</th>
            </tr>
          </thead>
          <tbody>
            {cats.map((c,i)=>{
              if(!(c.name||"").trim()) return null;
              const ranked=recommendChannels({quadrant:c.quadrant, specialization:c.specialization||"Moderate", volume:c.volume||"Periodic", coverage:c.coverage||"None", supplierCount:c.supplierCount===""?null:Number(c.supplierCount)});
              const top=ranked[0];
              const businessImpact = c.risk==="High"?4.2:c.risk==="Medium"?3:1.8;   /* composition-level estimate; a deep-dived line's own Kraljic score supersedes this once available */
              const gov=deriveGovernanceTier(businessImpact, c.specialization||"Moderate", c.volume||"Periodic", c.supplierCount===""?null:Number(c.supplierCount));
              return (
                <tr key={i}>
                  <td style={{border:"1px solid var(--line)", padding:4, fontWeight:700}}>{c.name}</td>
                  <td style={{border:"1px solid var(--line)", padding:4}}>{c.quadrant}</td>
                  <td style={{border:"1px solid var(--line)", padding:4}}>
                    <select value={c.volume||"Periodic"} onChange={e=>updateCat(i,"volume",e.target.value)} style={{width:"100%", padding:"3px", border:"1px solid var(--line)", borderRadius:4, background:"#fff", color:"var(--ink)", fontSize:11}}>
                      <option value="One-off">One-off</option><option value="Periodic">Periodic/project</option><option value="Continuous">Continuous</option>
                    </select>
                  </td>
                  <td style={{border:"1px solid var(--line)", padding:4}}>
                    <select value={c.specialization||"Moderate"} onChange={e=>updateCat(i,"specialization",e.target.value)} onFocus={()=>{ if(c.specSource!=="user") setCats(list=>list.map((x,idx)=>idx===i?{...x,specSource:"user"}:x)); }} style={{width:"100%", padding:"3px", border:"1px solid var(--line)", borderRadius:4, background:"#fff", color:"var(--ink)", fontSize:11}}>
                      <option value="Commodity">Commodity</option><option value="Moderate">Moderate</option><option value="Scarce">Scarce</option>
                    </select>
                    {c.specSource==="ai" && <div style={{fontSize:9.5, color:"var(--slate)", fontStyle:"italic"}}>AI-estimated · click to confirm</div>}
                  </td>
                  <td style={{border:"1px solid var(--line)", padding:4}}>
                    <select value={c.coverage||"None"} onChange={e=>updateCat(i,"coverage",e.target.value)} style={{width:"100%", padding:"3px", border:"1px solid var(--line)", borderRadius:4, background:"#fff", color:"var(--ink)", fontSize:11}}>
                      <option value="None">None</option><option value="Partial">Partial</option><option value="Yes">Yes</option>
                    </select>
                  </td>
                  <td style={{border:"1px solid var(--line)", padding:4}}><input type="number" min="0" value={c.supplierCount===undefined?"":c.supplierCount} onChange={e=>updateCat(i,"supplierCount",e.target.value)} placeholder="?" style={{width:"100%", padding:"3px 4px", border:"1px solid var(--line)", borderRadius:4, background:"#fff", color:"var(--ink)", fontSize:11}}/></td>
                  <td style={{border:"1px solid var(--line)", padding:4}}>
                    <div style={{fontSize:10, color:"var(--slate)"}} title={ranked.map(r=>r.short+": "+r.rationale).join(" · ")}>Suggested: <b style={{color:"var(--petrol)"}}>{top.short}</b> ({top.score})</div>
                    <select value={c.channel||""} onChange={e=>{ const v=e.target.value; setCats(list=>list.map((x,idx)=>idx===i?{...x,channel:v,channelSource:v?"user":""}:x)); if(v) logDeclaration(setPortfolioDetails,"Route-to-market channel chosen for \""+c.name+"\": "+(channelLibrary()[v]||{}).name, "User choice ("+ranked.find(r=>r.id===v)?.short+(v===top.id?" · top suggestion":" · overrode the top suggestion")+")"); }} style={{width:"100%", padding:"3px", marginTop:2, border:"1px solid var(--petrol)", borderRadius:4, background:"#fff", color:"var(--ink)", fontSize:11, fontWeight:700}}>
                      <option value="">— choose —</option>
                      {ranked.map(r=><option key={r.id} value={r.id}>{r.short} ({r.score})</option>)}
                    </select>
                  </td>
                  <td style={{border:"1px solid var(--line)", padding:4, fontSize:10.5}} title={gov.note}><b>{gov.tier}</b><div style={{color:"var(--slate)"}}>value {gov.value.toFixed(1)} · effort {gov.effort.toFixed(1)}</div></td>
                </tr>
              );
            })}

      </div>

      <div style={{marginTop:20, display:"flex", justifyContent:"space-between", alignItems:"center", gap:10, flexWrap:"wrap"}}>

        <div style={{display:"flex", gap:8}}>
          {nextCategory && <button className="btn" onClick={nextCategory} title="Skip the portfolio track and build a standalone category strategy.">Standalone category →</button>}
          <button className="btn primary" onClick={next} title="Continue the independent portfolio track: strategic options next.">Continue to Strategic Options →</button>
        </div>
      </div>
    </div>
  );
}


/* ================= v2.0.0-p1 PORTFOLIO STRATEGIC OPTIONS =================
   Portfolio management = balancing internal demand with external supply.
   "Optimal" = the right balance of (1) value earned by the business,
   (2) value earned by suppliers, (3) risk, and (4) compliant, ethical,
   collaborative delivery. This module turns that philosophy into 2-3
   named strategic options — AI-suggested where a provider is available,
   rule-based otherwise — each scored 1-5 on the four balances. The user
   adopts one, edits freely, and the choice flows into the consolidated
   portfolio report with full source declarations. Fully independent of
   any category strategy. */
/* v2.5.0 — Stage 4 strategic questions (standard set, used verbatim as the
   offline fallback; AI tailors them to the actual portfolio when available)
   and the Stage 6 weighted assessment criteria with default weights. */
const STRATEGIC_QUESTION_SET=[
  ["Business","What capability model will best support the organisation over the next five years?"],
  ["Business","What would success look like for this portfolio?"],
  ["Business","Are we buying people, capability or outcomes?"],
  ["Business","Are current services still required?"],
  ["Market","Is the supplier market changing?"],
  ["Market","Is consolidation occurring among suppliers?"],
  ["Market","Are new entrants emerging?"],
  ["Market","Are niche suppliers essential to any part of the portfolio?"],
  ["Market","Is there sufficient competition?"],
  ["Delivery","Should services remain fragmented?"],
  ["Delivery","Which services naturally belong together?"],
  ["Delivery","Which services require specialist providers?"],
  ["Delivery","Which services should remain independent?"],
  ["Commercial","Are current pricing models appropriate?"],
  ["Commercial","Can outcomes replace day rates?"],
  ["Commercial","Could managed services reduce cost?"],
  ["Commercial","Can AI reduce effort?"],
  ["Procurement","Should requirements be competed together?"],
  ["Procurement","Should they be competed separately?"],
  ["Procurement","Should a framework be used?"],
  ["Procurement","Should there be multiple suppliers?"],
  ["Procurement","Should supplier competition continue throughout the contract?"]
];
/* v2.7.0 — Stage 7 risk dimensions: every option carries a risk heat profile
   (1 = low risk, 5 = high risk). */
const RISK_DIMS=[
  ["business","Business"],["commercial","Commercial"],["supply","Supply"],["operational","Operational"],["transition","Transition"],
  ["financial","Financial"],["technology","Technology & AI disruption"],["cyber","Cyber"],["regulatory","Regulatory"],["esg","ESG"]
];
function riskColor(v){ return v>=4?"#E4B4B4":v>=3?"#F2DFAE":"#CDE3D3"; }

const MATRIX_CRITERIA=[
  ["businessValue","Business Value",20],["cost","Cost",15],["risk","Risk",20],["capability","Capability",15],
  ["supplierMarket","Supplier Market",10],["innovation","Innovation",10],["aiReadiness","AI Readiness",5],["compliance","Regulatory / PA23 Compliance",5]
];
function weightedScore(opt, weights){
  let tw=0, ts=0;
  MATRIX_CRITERIA.forEach(([k])=>{
    const w=Number(weights?.[k] ?? MATRIX_CRITERIA.find(c=>c[0]===k)[2])||0;
    const s=Number(opt.matrixScores?.[k])||3;
    tw+=w; ts+=w*s;
  });
  return tw? ts/tw : 0;
}

const FOUR_BALANCES=[
  ["valueBusiness","Value to the business","Savings, capability, continuity, outcomes"],
  ["valueSupplier","Value to suppliers","Fair margin, pipeline visibility, partnership"],
  ["riskBalance","Risk balance","Continuity, transition, market and delivery risk shared sensibly"],
  ["compliance","Compliance & ethics","Regulation, law, social value, responsible AI"]
];
function fallbackPortfolioOptions(portfolioDetails, cats, cur){
  const totalSpend = cats.reduce((s,c)=>s+(Number(c.spend)||0),0);
  const stratSpend = cats.filter(c=>c.quadrant==="Strategic").reduce((s,c)=>s+(Number(c.spend)||0),0);
  const stratShare = totalSpend ? stratSpend/totalSpend : 0.5;
  const now = new Date().toISOString();
  const mk=(name,summary,pros,cons,scores,matrixScores,riskProfile)=>({

    riskProfile: riskProfile||Object.fromEntries(RISK_DIMS.map(([k])=>[k,3])),
    source:"template",
    sourceDetail:"Rule-based option template — scores derived from the portfolio composition ("+Math.round(stratShare*100)+"% of spend in Strategic quadrant lines) and generic quadrant heuristics. No AI model called. [B3][B5]",

  });
  return [
    mk("Consolidate & Partner",

      {valueBusiness: stratShare>0.5?4:3, valueSupplier:5, riskBalance: stratShare>0.5?3:2, compliance:4},
      {businessValue:4,cost:3,risk:stratShare>0.5?3:2,capability:4,supplierMarket:2,innovation:3,aiReadiness:3,compliance:4},
      {business:2,commercial:3,supply:4,operational:2,transition:2,financial:3,technology:3,cyber:3,regulatory:2,esg:2}),
    mk("Lot & Compete",
      "Split the portfolio into competitive lots by service line, run parallel sourcing events, and keep at least two capable suppliers per lot to sustain tension.",
      ["Maximum competitive tension and price discovery","Easier supplier substitution per lot","Market intelligence stays fresh"],
      ["Higher sourcing and management effort","Thinner supplier margins can erode service","Integration seams between lots"],
      {valueBusiness:4, valueSupplier:2, riskBalance:3, compliance:4},
      {businessValue:3,cost:4,risk:3,capability:3,supplierMarket:4,innovation:2,aiReadiness:3,compliance:4},
      {business:3,commercial:2,supply:2,operational:3,transition:4,financial:2,technology:3,cyber:3,regulatory:3,esg:3}),
    mk("Hybrid / Phased Transition",
      "Partner on the most critical (Strategic/Bottleneck) lines while competing the Leverage and Non-critical lines; phase transitions so knowledge transfer completes before switchover.",
      ["Risk-weighted: protection where it matters, tension where it pays","Transition sequenced around continuity","Balances value for both sides by design"],
      ["Two operating rhythms to govern","Longer overall programme","Requires disciplined segmentation"],
      {valueBusiness:4, valueSupplier:4, riskBalance:4, compliance:4},
      {businessValue:4,cost:3,risk:4,capability:4,supplierMarket:3,innovation:3,aiReadiness:3,compliance:4},
      {business:2,commercial:3,supply:3,operational:2,transition:3,financial:3,technology:3,cyber:3,regulatory:2,esg:2}),
    mk("Capability-Based Model",
      "Procure business capabilities (e.g. engineering delivery, digital delivery, professional advice, innovation) rather than spend categories — aligning contracts with outcomes and letting suppliers assemble the resources behind each capability.",
      ["Aligns procurement to business outcomes, not inputs","Suits outcome-based commercial models and AI-enabled delivery","Future-proofs against category boundaries shifting"],
      ["Requires mature outcome definition and measurement","Harder to benchmark against traditional rates","Bigger change for budget holders and governance"],
      {valueBusiness:4, valueSupplier:4, riskBalance:3, compliance:3},
      {businessValue:5,cost:3,risk:3,capability:4,supplierMarket:3,innovation:4,aiReadiness:4,compliance:3},
      {business:3,commercial:4,supply:3,operational:3,transition:4,financial:3,technology:2,cyber:3,regulatory:4,esg:2})
  ];
}
function StepPortfolioOptions({portfolioId, portfolioDetails, setPortfolioDetails, next}){
  const [busy,setBusy]=useState(false);
  const [qBusy,setQBusy]=useState(false);
  const [err,setErr]=useState("");
  const cats = activePortfolioCats(portfolioDetails, portfolioId);
  /* v2.5.0 — Stage 4 strategic questions */
  const questions = Array.isArray(portfolioDetails.strategicQuestions)?portfolioDetails.strategicQuestions:[];
  const answeredQ = questions.filter(q=>q.a&&q.a.trim());
  const setQuestions=(qs)=>setPortfolioDetails(prev=>({...prev, strategicQuestions:qs}));
  async function generateQuestions(){
    setQBusy(true); setErr("");
    try{
      const charterBrief={portfolio:portfolioDetails.name, objectives:portfolioDetails.objectives, futureDemand:portfolioDetails.futureDemand, suppliers:portfolioDetails.suppliersText, digitalStrategy:portfolioDetails.digitalStrategy, assessment:portfolioDetails.assessment||undefined};
      const ai=await askAI(
        `You are an experienced procurement portfolio strategist. Before proposing options, CHALLENGE the assumptions behind this portfolio with pointed strategic questions across five groups: Business, Market, Delivery, Commercial, Procurement.\n`+
        `Charter: ${JSON.stringify(charterBrief)}\nComposition: ${JSON.stringify(cats.map(c=>({name:c.name,spend:Number(c.spend)||0,kraljic:c.quadrant})))}\n`+
        `Return STRICT JSON only: {"questions":[{"group":"Business|Market|Delivery|Commercial|Procurement","q":"a specific, challenging question tailored to THIS portfolio"}]} — 10 to 14 questions, at least two per group, referencing actual service lines or charter facts where possible. Cover the practitioner canon: capability model, success definition, people-vs-capability-vs-outcomes, service necessity; market change, consolidation, entrants, niche dependence, competition; fragmentation vs natural groupings vs specialist vs independent; pricing models, outcomes-vs-day-rates, managed services, AI effort reduction; compete together vs separately, frameworks, supplier plurality, in-contract competition.`,
        {json:true}
      );
      if(ai&&Array.isArray(ai.questions)&&ai.questions.length){
        setQuestions(ai.questions.slice(0,14).map(x=>({group:String(x.group||"Business"), q:String(x.q||"").slice(0,300), a:"", source:"AI-tailored by "+aiSourceLabel()})));
        logDeclaration(setPortfolioDetails, "Strategic questions generated ("+Math.min(ai.questions.length,14)+") — assumption-challenging, tailored to the portfolio", "AI: "+aiSourceLabel());
      } else throw new Error("no usable questions JSON");
    }catch(e){
      setQuestions(STRATEGIC_QUESTION_SET.map(([group,q])=>({group,q,a:"",source:"Standard question set (practitioner methodology) — AI tailoring unavailable"})));
      logDeclaration(setPortfolioDetails, "Strategic questions loaded from the standard practitioner set (AI unavailable)", "Built-in question set");
    }finally{ setQBusy(false); }
  }
  const answerQ=(i,val)=>setQuestions(questions.map((x,idx)=>idx===i?{...x,a:val}:x));
  /* v2.5.0 — Stage 6 weighted matrix */
  const weights = portfolioDetails.matrixWeights || Object.fromEntries(MATRIX_CRITERIA.map(([k,,w])=>[k,w]));
  const setWeight=(k,v)=>setPortfolioDetails(prev=>({...prev, matrixWeights:{...(prev.matrixWeights||Object.fromEntries(MATRIX_CRITERIA.map(([kk,,w])=>[kk,w]))), [k]:Math.max(0,Number(v)||0)}}));
  const setMatrixScore=(id,k,v)=>{
    const o=options.find(x=>x.id===id); if(!o) return;
    updateOption(id,{matrixScores:{...(o.matrixScores||{}),[k]:Number(v)},edited:true});
  };
  /* totalWeight/matrixLeader are declared AFTER `options` below — computing
     them here crashed the screen (TDZ: options not yet initialised). */
  const cur = portfolioDetails.currency || "£";
  const pName = portfolioDisplayName(portfolioDetails, portfolioId);
  const options = Array.isArray(portfolioDetails.options)?portfolioDetails.options:[];
  /* multiple options can be adopted (e.g. different directions for different
     portfolio segments); migrates the earlier single chosenOption transparently */
  const chosenIds = Array.isArray(portfolioDetails.chosenOptions) ? portfolioDetails.chosenOptions
    : (portfolioDetails.chosenOption ? [portfolioDetails.chosenOption] : []);
  const setPd = (patch)=>setPortfolioDetails(prev=>({...prev, ...patch}));
  const setOptions = (opts)=>setPd({options:opts});
  const updateOption = (id, patch)=>setOptions(options.map(o=>o.id===id?{...o,...patch}:o));
  const toggleAdopt = (id)=>setPd({chosenOptions: chosenIds.includes(id)?chosenIds.filter(x=>x!==id):[...chosenIds,id], chosenOption:null});
  const setScore = (id, key, v)=>{
    const o = options.find(x=>x.id===id); if(!o) return;
    updateOption(id, {scores:{...o.scores,[key]:Number(v)}, edited:true});
  };
  const addAttr = (id)=>{
    const o = options.find(x=>x.id===id); if(!o) return;
    const label = prompt("Attribute name for \""+o.name+"\" (e.g. Transition effort, Innovation upside, Social value):");
    if(!label||!label.trim()) return;
    updateOption(id,{customScores:[...(o.customScores||[]),{label:label.trim(),v:3}],edited:true});
  };
  const setAttr = (id, idx, patchAttr)=>{
    const o = options.find(x=>x.id===id); if(!o) return;
    updateOption(id,{customScores:(o.customScores||[]).map((a,i)=>i===idx?{...a,...patchAttr}:a),edited:true});
  };
  const removeAttr = (id, idx)=>{
    const o = options.find(x=>x.id===id); if(!o) return;
    updateOption(id,{customScores:(o.customScores||[]).filter((_,i)=>i!==idx)});
  };
  const totalWeight=MATRIX_CRITERIA.reduce((s,[k])=>s+(Number(weights[k])||0),0);
  const matrixLeader = options.length ? options.reduce((best,o)=> weightedScore(o,weights)>weightedScore(best,weights)?o:best, options[0]) : null;
  const setRiskScore=(id,k,v)=>{
    const o=options.find(x=>x.id===id); if(!o) return;
    updateOption(id,{riskProfile:{...(o.riskProfile||{}),[k]:Number(v)},edited:true});
  };

  async function generate(){
    setBusy(true); setErr("");
    const fallback = fallbackPortfolioOptions(portfolioDetails, cats, cur);
    try{
      const charter = {
        portfolio:pName, description:portfolioDetails.description||undefined,
        objectives:portfolioDetails.objectives||undefined, outcomes:portfolioDetails.outcomes||undefined,
        operatingModel:portfolioDetails.operatingModel||undefined, governance:portfolioDetails.governance||undefined,
        sustainability:portfolioDetails.sustainability||undefined, aiDigitalStrategy:portfolioDetails.digitalStrategy||undefined,
        riskAppetite:portfolioDetails.riskAppetite||undefined, suppliers:portfolioDetails.suppliersText||undefined,

      };
      const comp = cats.map(c=>({name:c.name, spend:Number(c.spend)||0, risk:c.risk, kraljic:c.quadrant, notes:c.notes||undefined}));
      const factBase = portfolioDetails.assessment ? `Portfolio assessment fact base (Stage 3, user/AI positions): ${JSON.stringify(portfolioDetails.assessment)}\n` : "";
      const ai = await askAI(
        factBase+
        `You are a procurement portfolio strategist. Category/portfolio management means balancing internal demand with external supply; "optimal" means the right balance of value earned by BOTH the business and its suppliers, a sensible sharing of risk, and collaborative delivery compliant with ethics, regulation and law.\n`+

        `Portfolio composition: ${JSON.stringify(comp)}\n`+
        (answeredQ.length?`The user has answered these strategic questions — treat the answers as constraints and signals:\n${answeredQ.map(x=>"["+x.group+"] "+x.q+" — ANSWER: "+x.a.slice(0,300)).join("\n")}\n`:"")+
        ((portfolioDetails.strategicQuestions||[]).filter(q=>!(q.a&&q.a.trim())).length?`These strategic questions are UNANSWERED — treat each as an unknown: do not assume an answer; where an option depends on one, state it as an explicit assumption in that option's summary or cons:\n${(portfolioDetails.strategicQuestions||[]).filter(q=>!(q.a&&q.a.trim())).map(x=>"["+x.group+"] "+x.q).join("\n")}\n`:"")+
        `The portfolio strategy determines the best MIX of commercial models, sourcing approaches and market structures — not "one contract or six". Propose as many strategic OPTIONS as are GENUINELY DISTINCT AND VIABLE for this portfolio — typically 3-4, minimum 2, maximum 5; do not pad with near-duplicates for the portfolio as a whole (typically spanning: independent category strategies; integrated portfolio procurement; a hybrid; and where sensible a CAPABILITY-BASED model that procures business capabilities rather than spend categories) — tailor names and content to THIS portfolio. Respond with STRICT JSON only:\n`+
        `{"options":[{"name":"short option name","summary":"2-3 sentence description tailored to this portfolio","pros":["2-4 items"],"cons":["2-4 items"],"scores":{"valueBusiness":1-5,"valueSupplier":1-5,"riskBalance":1-5,"compliance":1-5},"matrixScores":{"businessValue":1-5,"cost":1-5,"risk":1-5,"capability":1-5,"supplierMarket":1-5,"innovation":1-5,"aiReadiness":1-5,"compliance":1-5},"riskProfile":{"business":1-5,"commercial":1-5,"supply":1-5,"operational":1-5,"transition":1-5,"financial":1-5,"technology":1-5,"cyber":1-5,"regulatory":1-5,"esg":1-5} (1=low risk, 5=high risk)}],`+
        `"recommendation":{"name":"name of the option you would recommend","why":"1-2 sentences citing the trade-offs and key assumptions"}}`,
        {json:true}
      );
      if(ai && Array.isArray(ai.options) && ai.options.length){
        const now=new Date().toISOString();
        const opts = ai.options.slice(0,5).map((o,i)=>({
          id:(o.name||("option-"+(i+1))).toLowerCase().replace(/[^a-z0-9]+/g,"-")||("option-"+(i+1)),
          name:o.name||("Option "+(i+1)),
          summary:o.summary||"",
          pros:Array.isArray(o.pros)?o.pros:[], cons:Array.isArray(o.cons)?o.cons:[],
          scores:{
            valueBusiness:Math.min(5,Math.max(1,Number(o.scores?.valueBusiness)||3)),
            valueSupplier:Math.min(5,Math.max(1,Number(o.scores?.valueSupplier)||3)),
            riskBalance:Math.min(5,Math.max(1,Number(o.scores?.riskBalance)||3)),
            compliance:Math.min(5,Math.max(1,Number(o.scores?.compliance)||3))
          },
          matrixScores:Object.fromEntries(MATRIX_CRITERIA.map(([k])=>[k, Math.min(5,Math.max(1,Number(o.matrixScores?.[k])||3))])),
          riskProfile:Object.fromEntries(RISK_DIMS.map(([k])=>[k, Math.min(5,Math.max(1,Number(o.riskProfile?.[k])||3))])),
          source:"ai",
          sourceDetail:"AI-generated by "+aiSourceLabel()+" from the Step P1 charter and composition ("+cats.length+" service lines). AI-inferred — review, edit and confirm before adoption. [B1][B3]",
          generatedAt:now, edited:false
        }));
        logDeclaration(setPortfolioDetails, "Strategic options generated ("+opts.length+") from the P1 charter and composition", "AI: "+aiSourceLabel());
        setPd({options:opts, chosenOption:null, chosenOptions:[], optionRecommendation: ai.recommendation ? {name:ai.recommendation.name, why:ai.recommendation.why, source:"ai", by:aiSourceLabel(), when:now} : null});
      } else { throw new Error("AI returned no usable options JSON"); }
    }catch(e){
      logDeclaration(setPortfolioDetails, "Strategic options loaded from rule-based templates (AI unavailable)", "Built-in option templates");
      setPd({options:fallback, chosenOption:null, chosenOptions:[], optionRecommendation:null});
      setErr("AI generation unavailable ("+((e&&e.message)||"error")+") — rule-based option templates loaded instead, and labelled as such.");
    }finally{ setBusy(false); }
  }
  const removeOption=(id)=>{
    const o=options.find(x=>x.id===id); if(!o) return;
    if(!confirm("Remove option \""+o.name+"\" from the set?")) return;
    setPd({options:options.filter(x=>x.id!==id), chosenOptions:chosenIds.filter(x=>x!==id), chosenOption:null});
    logDeclaration(setPortfolioDetails, "Strategic option \""+o.name+"\" removed from the option set", "User decision");
  };
  function addBlankOption(){
    const n = options.length+1;
    setOptions([...options,{id:"user-option-"+Date.now(), name:"My option "+n, summary:"", pros:[], cons:[],
      scores:{valueBusiness:3,valueSupplier:3,riskBalance:3,compliance:3},
      source:"user", sourceDetail:"User-defined option — authored directly in P2.", generatedAt:new Date().toISOString(), edited:true}]);
  }
  /* editable slider: drag 1-5; the option is marked user-modified on change */
  const ScoreBar=({label,hint,v,onChange,onRemove})=>(
    <div style={{display:"grid",gridTemplateColumns:onRemove?"140px 1fr 18px 16px":"150px 1fr 18px",gap:8,alignItems:"center",fontSize:11}} title={hint+" — drag to rescore (1-5); your change is recorded as user-modified."}>
      <span style={{color:"var(--slate)",fontWeight:700}}>{label}</span>
      <input type="range" min={1} max={5} step={1} value={v} onChange={e=>onChange(Number(e.target.value))}
        style={{width:"100%",accentColor:v>=4?"#1E8E5A":v>=3?"var(--petrol)":"var(--amber)",cursor:"pointer",height:14}}/>
      <b>{v}</b>
      {onRemove && <button className="btn ghost" style={{border:"none",color:"var(--red)",padding:0,fontSize:11}} title="Remove this attribute" onClick={onRemove}>✕</button>}
    </div>
  );
  return (
    <div className="card">
      <h2 className="display">⚖️ Portfolio Strategic Options<Tip t="2-3 named ways of sourcing and managing this portfolio as a whole, each scored on the four balances. Adopt one, edit freely — your choice and its provenance flow into the consolidated Portfolio Strategy report. Independent of any category strategy."/></h2>
      <p className="hint" style={{maxWidth:880}}><b>Purpose:</b> the portfolio strategy determines the <b>best mix of commercial models, sourcing approaches and market structures</b> for the business objectives — it answers "what is the optimal delivery and commercial model?", <i>not</i> "one contract or six?". Sometimes the answer is one integrated procurement, sometimes several coordinated ones. <b>There is no fixed number of options</b> — generate as many as are genuinely distinct (typically 3–4); the four offline archetypes (independent / integrated / hybrid / capability-based) are classic frames, not a rule — ✕ delete any that don't apply and add your own. Work the stages below: challenge assumptions with the strategic questions, generate options (including a capability-based model where sensible), score them on the weighted matrix, then adopt with a rationale. Balancing lens throughout: value to the business <i>and</i> to suppliers, risk shared sensibly, compliant and ethical delivery. <span style={{fontSize:10.5,fontStyle:"italic"}}>Refs [B1][B3] — bibliography in P3.</span></p>

      <Collapse title={"❓ Stage 1 · Strategic questions — challenge assumptions before choosing"} defaultOpen={questions.length===0} right={<span style={{fontSize:10.5,color:"var(--slate)"}}>{answeredQ.length} / {questions.length} answered</span>}>
        <p className="hint" style={{marginTop:8}}><b>From:</b> AI-tailored to your P1 charter, fact base and composition (standard practitioner set offline). <b>Feeds:</b> your answers become constraints for Stage-2 option generation; unanswered questions are documented honestly as "Open questions" in the P3 report.</p>
        <p className="hint" style={{marginTop:6}}>Before options, the method demands hard questions across Business, Market, Delivery, Commercial and Procurement — are we buying people, capability or outcomes? which services belong together? can outcomes replace day rates? Answer what you can. <b>Nothing blocks if you skip:</b> answered questions become constraints for the option generation; <b>unanswered questions are treated as unknowns</b> — the AI surfaces them as assumptions in the options, and the report lists them as "Open questions — assumptions to validate", so a skipped question is documented, never silently dropped.</p>
        <div style={{display:"flex", gap:8, flexWrap:"wrap", margin:"6px 0"}}>
          <button className="btn primary" disabled={qBusy} onClick={generateQuestions}>{qBusy?"Generating…":questions.length?"↻ Re-generate questions":"❓ Generate strategic questions"}</button>
        </div>
        {questions.length===0 && <p style={{fontSize:12, color:"var(--slate)", fontStyle:"italic"}}>Click to generate — AI tailors the questions to your portfolio; offline you get the standard practitioner set.</p>}
        {questions.map((x,i)=>(
          <div key={i} style={{border:"1px solid var(--line)", borderRadius:8, padding:"8px 12px", marginTop:6, background:"var(--card)"}}>
            <div style={{fontSize:12}}><span style={{fontWeight:800, color:"var(--petrol)", fontSize:10.5, textTransform:"uppercase"}}>{x.group}</span> · {x.q}</div>
            <textarea rows={2} value={x.a||""} onChange={e=>answerQ(i,e.target.value)} placeholder="Your position (optional — blank questions are simply not used)..." style={{width:"100%", padding:"5px 8px", marginTop:5, border:"1px solid var(--line)", borderRadius:6, background:"#fff", color:"var(--ink)", fontFamily:"inherit", fontSize:12}}/>
          </div>
        ))}
        {questions.length>0 && <SourceNote>{questions[0].source}. Answers: user input — they feed the option generation and the report's options section.</SourceNote>}
      </Collapse>
      <p className="hint">Portfolio: <b>{pName}</b> · {cats.length} service line(s) · {cur}{cats.reduce((s,c)=>s+(Number(c.spend)||0),0).toLocaleString()} total spend{usingTemplateCats(portfolioDetails)?<span style={{color:"var(--amber)",fontWeight:700}}> · template composition — define your own in P1</span>:null}</p>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",margin:"10px 0"}}>
        <button className="btn primary" disabled={busy} onClick={generate} title={answeredQ.length?"Generates 3-4 options (incl. a capability-based model where sensible) using your "+answeredQ.length+" answered strategic question(s) as constraints.":"Generates 3-4 options (incl. a capability-based model where sensible). Tip: answer some strategic questions above first — they become constraints."}>{busy?"Generating…":options.length?"⚡ Re-generate options":"⚡ Generate options (AI-first)"}</button>
        <button className="btn" onClick={addBlankOption}>+ Add my own option</button>
      </div>
      {err && <div className="banner" style={{background:"var(--amberSoft)",borderColor:"var(--amber)"}}>{err}</div>}
      <div style={{marginTop:14, paddingTop:10, borderTop:"2px solid var(--line)"}}>
        <b style={{fontSize:13.5, color:"var(--petrol)"}}>🧭 Stage 2 · Strategic options (2–5)</b>
        <p className="hint" style={{margin:"4px 0 0"}}><b>From:</b> generated against your P1 charter, fact base, composition and Stage-1 answers (or authored by you). Each card is a genuinely different direction, incl. a capability-based model where sensible. <b>Feeds:</b> the adopted option(s) drive Stage 3 (scored rows), Stage 4 (risk rows) and the report's Chosen Direction — <b>adoption is always yours</b>, one or several.</p>
      </div>
      {portfolioDetails.optionRecommendation && (
        <div className="banner" style={{background:"var(--petrolSoft)",borderColor:"var(--petrol)"}}>
          <b>AI recommendation:</b> {portfolioDetails.optionRecommendation.name} — {portfolioDetails.optionRecommendation.why}
          <SourceNote>AI-inferred recommendation by {portfolioDetails.optionRecommendation.by}, {new Date(portfolioDetails.optionRecommendation.when).toLocaleString()}. The decision is yours — adopt one or several options below; your adoption overrides this.</SourceNote>
        </div>
      )}
      {options.length===0 && !busy && (
        <div className="banner">No options yet. Generate AI-suggested options from your P1 charter and composition, or author your own.</div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:14,marginTop:6}}>
        {options.map(o=>(
          <div key={o.id} style={{border:"2px solid "+(chosenIds.includes(o.id)?"var(--petrol)":"var(--line)"),borderRadius:10,padding:14,background:chosenIds.includes(o.id)?"var(--petrolSoft)":"var(--card)",display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              <input type="text" value={o.name} onChange={e=>updateOption(o.id,{name:e.target.value,edited:true})} style={{fontWeight:800,fontSize:14,color:"var(--petrol)",border:"none",background:"transparent",width:"100%"}}/>
              <label style={{fontSize:11,fontWeight:800,whiteSpace:"nowrap",cursor:"pointer",color:chosenIds.includes(o.id)?"var(--petrol)":"var(--slate)"}} title="Adopt one or several options — e.g. different directions for different portfolio segments. All adopted options appear in the report's Chosen Direction section.">
                <input type="checkbox" checked={chosenIds.includes(o.id)} onChange={()=>toggleAdopt(o.id)} style={{marginRight:4}}/>{chosenIds.includes(o.id)?"✓ Adopted":"Adopt"}
              </label>
              <button className="btn ghost" style={{border:"none", color:"var(--red)", padding:"0 2px", fontSize:12}} title="Remove this option from the set (options are frames, not a fixed list — logged in declarations)." onClick={()=>removeOption(o.id)}>✕</button>
            </div>
            <textarea rows={3} value={o.summary} onChange={e=>updateOption(o.id,{summary:e.target.value,edited:true})} placeholder="Describe this option…" style={{width:"100%",padding:"6px 8px",border:"1px solid var(--line)",borderRadius:6,background:"#fff",color:"var(--ink)",fontFamily:"inherit",fontSize:12}}/>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {FOUR_BALANCES.map(([k,label,hint])=><ScoreBar key={k} label={label} hint={hint} v={o.scores?.[k]||3} onChange={v=>setScore(o.id,k,v)}/>)}
              {(o.customScores||[]).map((a,i)=><ScoreBar key={"c"+i} label={a.label} hint={"Custom attribute for this option only"} v={a.v} onChange={v=>setAttr(o.id,i,{v})} onRemove={()=>removeAttr(o.id,i)}/>)}
              <button className="btn ghost" style={{alignSelf:"flex-start",border:"none",color:"var(--petrol)",fontSize:11,padding:"2px 0"}} onClick={()=>addAttr(o.id)} title="Add an attribute specific to this option (options don't have to share attributes) — e.g. Transition effort, Innovation upside, Social value. Scored 1-5 with its own slider.">+ attribute</button>
            </div>
            {(o.pros?.length||o.cons?.length)?(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:11}}>
                <div><b style={{color:"#1E8E5A"}}>Pros</b><ul style={{margin:"2px 0 0",paddingLeft:14}}>{(o.pros||[]).map((x,i)=><li key={i}>{x}</li>)}</ul></div>
                <div><b style={{color:"var(--red)"}}>Cons</b><ul style={{margin:"2px 0 0",paddingLeft:14}}>{(o.cons||[]).map((x,i)=><li key={i}>{x}</li>)}</ul></div>
              </div>
            ):null}
            <SourceNote>{o.edited && o.source!=="user" ? o.sourceDetail.replace("AI-generated","AI-generated, user-modified").replace("Rule-based option template","Rule-based template, user-modified") : o.sourceDetail}</SourceNote>
          </div>
        ))}
      </div>
      {options.length>0 && (
        <Collapse title="📊 Stage 3 · Weighted option assessment — scores the Stage-2 options" defaultOpen={false} right={matrixLeader?<span style={{fontSize:10.5,color:"#1E8E5A",fontWeight:700}}>leader: {matrixLeader.name} ({weightedScore(matrixLeader,weights).toFixed(2)}/5)</span>:null}>
          <p className="hint" style={{marginTop:8}}><b>From:</b> one column per <b>Stage-2 option</b>; rows are the 8 weighted criteria (weights editable — they are the practitioner defaults). Scores are auto-assessed against your charter + fact base when generated (AI-first, rule fallback) and <b>every cell is editable</b>. <b>Feeds:</b> the weighted leader is advisory input to your Stage-2 adoption and appears in the report's evaluation section — it never adopts for you.</p>
          <p className="hint" style={{marginTop:6}}>Standard criteria with editable weights (defaults per practitioner methodology). Scores 1–5 per option — AI-populated where options were AI-generated, editable here (edits mark the option user-modified). The weighted totals produce an <b>automatic assessment</b>; adoption above remains your decision.</p>
          <div style={{overflowX:"auto"}}>
          <table style={{width:"100%", borderCollapse:"collapse", fontSize:11.5, marginTop:6}}>
            <thead>
              <tr style={{background:"var(--card)"}}>
                <th style={{border:"1px solid var(--line)", padding:6, textAlign:"left"}}>Criteria</th>
                <th style={{border:"1px solid var(--line)", padding:6, width:70}}>Weight %</th>
                {options.map(o=><th key={o.id} style={{border:"1px solid var(--line)", padding:6}}>{o.name}</th>)}
              </tr>
            </thead>
            <tbody>
              {MATRIX_CRITERIA.map(([k,label])=>(
                <tr key={k}>
                  <td style={{border:"1px solid var(--line)", padding:6, fontWeight:700}}>{label}</td>
                  <td style={{border:"1px solid var(--line)", padding:4, textAlign:"center"}}>
                    <input type="number" min={0} max={100} value={weights[k]} onChange={e=>setWeight(k,e.target.value)} style={{width:54, padding:"3px 4px", border:"1px solid var(--line)", borderRadius:4, background:"#fff", color:"var(--ink)", fontSize:11.5, textAlign:"center"}}/>
                  </td>
                  {options.map(o=>(
                    <td key={o.id} style={{border:"1px solid var(--line)", padding:4, textAlign:"center"}}>
                      <select value={Number(o.matrixScores?.[k])||3} onChange={e=>setMatrixScore(o.id,k,e.target.value)} style={{padding:"3px 4px", border:"1px solid var(--line)", borderRadius:4, background:"#fff", color:"var(--ink)", fontSize:11.5}}>
                        {[1,2,3,4,5].map(v=><option key={v} value={v}>{v}</option>)}
                      </select>
                    </td>
                  ))}
                </tr>
              ))}
              <tr style={{background:"var(--petrolSoft)", fontWeight:800}}>
                <td style={{border:"1px solid var(--line)", padding:6}}>Weighted total</td>
                <td style={{border:"1px solid var(--line)", padding:6, textAlign:"center", color: totalWeight===100?"var(--petrol)":"var(--amber)"}}>{totalWeight}{totalWeight!==100?" ⚠":""}</td>
                {options.map(o=><td key={o.id} style={{border:"1px solid var(--line)", padding:6, textAlign:"center", color:matrixLeader&&o.id===matrixLeader.id?"#1E8E5A":"var(--ink)"}}>{weightedScore(o,weights).toFixed(2)}</td>)}
              </tr>
            </tbody>
          </table>
          </div>
          {totalWeight!==100 && <p style={{fontSize:11, color:"var(--amber)", marginTop:4}}>Weights sum to {totalWeight}% — totals still compute (normalised), but 100% reads better in the report.</p>}
          {matrixLeader && <div className="banner" style={{marginTop:8, background:"#E4F0EA", borderColor:"#7FB89F", fontSize:12}}>
            <b>Automatic assessment:</b> <b>{matrixLeader.name}</b> scores highest ({weightedScore(matrixLeader,weights).toFixed(2)}/5) on the current weights. Generated automatically from the matrix — review the assumptions behind the scores; the adoption decision above is yours.
          </div>}
          <SourceNote>Criteria & default weights: practitioner methodology (see bibliography). Scores: as declared per option (AI-generated options carry AI-suggested scores; any edit marks the option user-modified). Weights: user-set.</SourceNote>
        </Collapse>
      )}

      {options.length>0 && (
        <Collapse title="🔥 Stage 4 · Option risk heat — stress-tests the Stage-2 options" defaultOpen={false}>
          <p className="hint" style={{marginTop:8}}><b>From:</b> one row per <b>Stage-2 option</b> across 10 risk dimensions (delivery, market, supplier, compliance…), colour = exposure. <b>Feeds:</b> use it to stress-test the Stage-3 leader before adopting; the profile of adopted options goes into the report's evaluation and the risk register discussion.</p>
          <p className="hint" style={{marginTop:6}}>Every option carries a risk profile across ten dimensions (<b>1 = low risk, 5 = high risk</b>) — AI-suggested for AI-generated options, editable here (edits mark the option user-modified). Read it against the parent risk appetite{portfolioDetails.riskAppetite?<> (<i>{String(portfolioDetails.riskAppetite).slice(0,80)}…</i>)</>:null}; the heat map renders in the report next to the matrix.</p>
          <div style={{overflowX:"auto"}}>
          <table style={{width:"100%", borderCollapse:"collapse", fontSize:11.5, marginTop:6}}>
            <thead><tr style={{background:"var(--card)"}}>
              <th style={{border:"1px solid var(--line)", padding:6, textAlign:"left"}}>Risk dimension</th>
              {options.map(o=><th key={o.id} style={{border:"1px solid var(--line)", padding:6}}>{o.name}</th>)}
            </tr></thead>
            <tbody>
              {RISK_DIMS.map(([k,label])=>(
                <tr key={k}>
                  <td style={{border:"1px solid var(--line)", padding:6, fontWeight:700}}>{label}</td>
                  {options.map(o=>{
                    const v=Number(o.riskProfile?.[k])||3;
                    return (
                      <td key={o.id} style={{border:"1px solid var(--line)", padding:4, textAlign:"center", background:riskColor(v)}}>
                        <select value={v} onChange={e=>setRiskScore(o.id,k,e.target.value)} style={{padding:"3px 4px", border:"1px solid var(--line)", borderRadius:4, background:"transparent", color:"var(--ink)", fontSize:11.5}}>
                          {[1,2,3,4,5].map(x=><option key={x} value={x}>{x}</option>)}
                        </select>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
          </div>
          <SourceNote>Risk dimensions: practitioner methodology (business, commercial, supply, operational, transition, financial, technology & AI disruption, cyber, regulatory, ESG). Ratings: as declared per option; edits are user decisions and mark the option user-modified.</SourceNote>
        </Collapse>
      )}

      {chosenIds.length>0 && (()=>{ /* v2.8.0 — Stage 8 recommended future-state chain */
        const fsc=portfolioDetails.futureStateChain||{};
        const setFsc=(f,v)=>setPortfolioDetails(prev=>({...prev, futureStateChain:{...(prev.futureStateChain||{}),[f]:v}}));
        const deriveChain=()=>{
          const adoptedNames=chosenIds.map(id=>options.find(o=>o.id===id)?.name).filter(Boolean).join(" + ");
          const lotting=String((portfolioDetails.plans||{}).lottingStrategy||"");
          const lotCount=(lotting.match(/Lot \d+/g)||[]).length;
          const capable=String(((portfolioDetails.assessment||{}).market||{}).capableSuppliers||"");
          setPortfolioDetails(prev=>({...prev, futureStateChain:{
            deliveryModel:adoptedNames||"(adopt an option first)",
            governance:"Integrated portfolio governance",
            procurements:lotCount? lotCount+" procurement exercises (from lotting strategy)":"(set — e.g. 3 procurement exercises)",
            suppliers:capable? capable.slice(0,60):"(set — e.g. 8 suppliers)"
          }}));
          logDeclaration(setPortfolioDetails,"Future-state chain derived (delivery model from adopted option(s); exercises from lotting; supplier depth from assessment) — edit freely","Rule-based derivation, user-editable");
        };
        const chain=[pName||"Portfolio", fsc.deliveryModel, fsc.governance, fsc.procurements, fsc.suppliers, "Strategic supplier management"].filter(x=>x&&String(x).trim());
        return (
        <div>
        <Collapse title="🧭 Stage 5 · Recommended future state — the chain" defaultOpen={false}>
          <p className="hint" style={{marginTop:6}}>The strategy shouldn't end at "run a tender" — it should state the chain: portfolio → delivery model → governance → how many procurement exercises → how many suppliers → strategic supplier management. Derive it from your adopted option(s), lotting and assessment, then edit; it renders in the report's chosen-direction section.</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",margin:"6px 0"}}>
            <button className="btn" onClick={deriveChain} title="Fills the chain from the adopted option(s), the lotting strategy's lot count, and the assessment's capable-supplier position — labelled rule-based, fully editable.">⚙ Derive from adopted option(s)</button>
          </div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))", gap:8}}>
            {[["deliveryModel","Delivery model"],["governance","Governance"],["procurements","Procurement exercises"],["suppliers","Supplier base"]].map(([f,label])=>(
              <label key={f} style={{fontSize:11.5, fontWeight:700}}>{label}
                <input type="text" value={fsc[f]||""} onChange={e=>setFsc(f,e.target.value)} placeholder={label+"..."} style={{width:"100%",padding:"5px 8px",marginTop:3,border:"1px solid var(--line)",borderRadius:5,background:"#fff",color:"var(--ink)",fontSize:11.5,fontWeight:400}}/>
              </label>
            ))}
          </div>
          {chain.length>2 && (
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",fontSize:11.5,fontWeight:700,color:"var(--petrol)",marginTop:10}}>
