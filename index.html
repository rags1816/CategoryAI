              {chain.map((x,i)=>(<React.Fragment key={i}>{i>0&&<span style={{color:"var(--amber)"}}>→</span>}<span style={{background:"var(--petrolSoft)",border:"1px solid var(--line)",borderRadius:99,padding:"3px 10px"}}>{x}</span></React.Fragment>))}
            </div>
          )}
          <SourceNote>Chain: derived rule-based from your adopted option(s), lotting and assessment where the ⚙ button was used; all fields user-editable. "Strategic supplier management" is the standing end-state.</SourceNote>
        </Collapse>
        <div style={{marginTop:14,background:"var(--paper)",border:"1px solid var(--line)",borderRadius:8,padding:14}}>
          <b style={{fontSize:13,color:"var(--petrol)"}}>Rationale for the adopted option{chosenIds.length>1?"s":""}</b>
          <textarea rows={2} value={portfolioDetails.optionRationale||""} onChange={e=>setPd({optionRationale:e.target.value})} placeholder="Why this option — for the report's decision record…" style={{width:"100%",padding:"6px 8px",marginTop:6,border:"1px solid var(--line)",borderRadius:6,background:"var(--card)",color:"var(--ink)",fontFamily:"inherit",fontSize:12}}/>
          <SourceNote>User decision record — appears in the Portfolio Strategy report alongside the option's own source declaration.</SourceNote>
        </div>
        </div>
        );
      })()}
      <Collapse title="📚 Benchmarks & good practice consulted (indicative)" defaultOpen={false}>
        <ul style={{margin:"6px 0 0",paddingLeft:16,fontSize:12}}>
          {BENCHMARKS.map(b=><li key={b.id} style={{margin:"4px 0"}}><b>[{b.id}]</b> {b.cite} — <span style={{color:"var(--slate)"}}>{b.note}</span></li>)}
        </ul>
        <SourceNote>Directional references only — verify figures against your licensed benchmark source before board use. Cited items appear in the References & Bibliography of the portfolio report.</SourceNote>
      </Collapse>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:16}}>
        <span style={{fontSize:12,color:"var(--slate)"}}>{chosenIds.length?"Adopted ("+chosenIds.length+"): "+chosenIds.map(id=>options.find(o=>o.id===id)?.name).filter(Boolean).join(" · "):"No option adopted yet — adopt one or several (e.g. per portfolio segment), or continue and decide later."}</span>
        <button className="btn primary" onClick={next}>Continue to Roll-up & Report →</button>
      </div>
    </div>
  );
}

function StepPortfolioWorkflow({
  portfolioId, 
  next,
  portfolioDetails,
  setPortfolioDetails,
  portfolioActiveCategory,
  setPortfolioActiveCategory,
  activeProfileName,
  setStep,
  setProfile,
  setVars,
  setSuppliers,
  setRisks,
  setCl,
  setNego,
  setExec,
  setStrategy
}){
  const [activeSubTab, setActiveSubTab] = useState("rollUp"); // "rollUp" or "reportPreview" (v2.0.2: case-study tab removed — it was hardcoded illustrative content with no data source)
  /* v1.2.0 — the roll-up now reads the user-defined composition from Step 0
     (portfolioDetails.categories); archetype templates are only a fallback. */
  const getCats = () => activePortfolioCats(portfolioDetails, portfolioId);
  const isTemplateCats = usingTemplateCats(portfolioDetails);
  const pName = portfolioDisplayName(portfolioDetails, portfolioId);
  const [running, setRunning] = useState({}); // { [catName]: stepIndex }
  const [selectedStrategy, setSelectedStrategy] = useState(null);
  const [strategies, setStrategies] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem("categoryai_portfolio_strategies") || "{}");
    } catch(e) { return {}; }
  });

  const customizeCategoryInWizard = (catName) => {
    setPortfolioActiveCategory(catName);
    if (setPortfolioDetails) logDeclaration(setPortfolioDetails, "Deep-dive started for line \"" + catName + "\" — charter inherited into the Category track (Steps 1–14)", "User action");
    const catDetails = getCats().find(c => c.name === catName) || {};
    const parentSuppliers = (portfolioDetails.suppliersText || "").split(/[,;\n]/).map(s=>s.trim()).filter(Boolean);
    const inheritedNotes = [
      `Parent portfolio: ${pName}`,
      portfolioDetails.description ? `Parent scope: ${portfolioDetails.description}` : "",
      portfolioDetails.objectives ? `Inherited objectives: ${portfolioDetails.objectives}` : "",
      portfolioDetails.governance ? `Inherited governance: ${portfolioDetails.governance}` : "",
      portfolioDetails.sustainability ? `Inherited sustainability/social value: ${portfolioDetails.sustainability}` : "",
      portfolioDetails.digitalStrategy ? `Inherited AI/digital strategy: ${portfolioDetails.digitalStrategy}` : "",
      portfolioDetails.riskAppetite ? `Inherited risk appetite: ${portfolioDetails.riskAppetite}` : "",
      catDetails.notes ? `Service-line note: ${catDetails.notes}` : ""
    ].filter(Boolean).join("\n\n");

    setProfile({
      name: catName,
      sector: portfolioId === "ess" ? "Utilities & Infrastructure" : "General Technology",
      region: portfolioId === "ess" ? "United Kingdom" : "Global",
      notes: inheritedNotes,
      suppliers: parentSuppliers.length ? parentSuppliers : (portfolioId === "ess" ? ["Accenture", "Avanade", "Specialist power system engineering consultancies", "Data/AI services providers"] : ["Strategic Vendor A", "Niche Supplier B"]),
      pains: [
        catDetails.risk ? `${catDetails.risk} service-line risk` : "",
        portfolioDetails.riskAppetite ? "Must align to parent risk appetite" : "",
        portfolioDetails.futureDemand ? "Demand forecast to validate with stakeholders" : ""
      ].filter(Boolean)
    });

    setVars(initVars());
    setSuppliers([]);
    setRisks([]);
    setCl({drivers:{},levers:[],demandDrivers:[],risks:[],savings:[],kpis:[],notes:"",source:""});
    setNego(null);
    setExec(null);
    setStrategy(null);

    setStep("profile");
  };

  useEffect(() => {
    localStorage.setItem("categoryai_portfolio_strategies", JSON.stringify(strategies));
  }, [strategies]);

  /* v1.2.0 — local PORTFOLIO_CATEGORIES removed; templates hoisted to module
     scope and superseded by the user-defined list in Step 0. */

  /* v2.0.2 — hardcoded benchmark caseStudy object removed (no data source;
     replaced by the live bibliography and honest maturity derivations). */

  function generateStrategyData(name, details) {
    const quad = details?.quadrant || "Strategic";
    const spend = details?.spend || 500000;
    const risk = details?.risk || "Medium";
    const cur = portfolioDetails.currency || (portfolioId === "ess" ? "£" : "$");
    
    const levers = quad === "Strategic" ? ["Value Partnership", "Supplier Development", "Long-term Contracting"]
                 : quad === "Leverage" ? ["Volume Aggregation", "Competitive Bidding", "Global Sourcing"]
                 : quad === "Bottleneck" ? ["Risk Mitigation", "Securing Supply", "Substitution"]
                 : ["Process Automation", "Tail Consolidation", "Catalogue Buying"];

    return {
      name,
      spend,
      quadrant: quad,
      risk: risk,
      projects: [
        { name: `${name} Sourcing Consolidation Event`, timeline: "Q3-Q4", status: "Planned" },
        { name: `AI Process Automation Integration`, timeline: "Q1-Q2", status: "Proposed" }
      ],
      contracts: [
        { supplier: `${name} Lead Consultancy`, type: "Master Service Agreement (MSA)", term: "3 Years", value: Math.round(spend * 0.75) },
        { supplier: `${name} Niche Backup Provider`, type: "SLA Rate Card Agreement", term: "1 Year", value: Math.round(spend * 0.25) }
      ],
      swot: {
        strengths: [`Consolidated demand worth ${cur}${(spend/1000000).toFixed(1)}M`, portfolioDetails.governance ? "Parent governance already defined" : "Clear SLA metrics established"],
        weaknesses: ["Incumbent dependency and knowledge-transfer risk", "Scarce specialist capacity"],
        opportunities: [portfolioDetails.digitalStrategy ? "AI/automation opportunity aligned to parent digital strategy" : "Process automation", "Lotting and competitive tension by service line"],
        threats: ["Transition risk if knowledge transfer starts too late", "Skills scarcity and rate pressure"]
      },
      chessboard: {
        quadrant: quad,
        recommendedLevers: levers
      },
      negotiation: {
        batna: portfolioId === "ess" ? "Use a phased transition with incumbent knowledge transfer while qualifying specialist providers or framework alternatives." : "Transition to a regional backup vendor over a 3-month cycle",
        objectives: portfolioId === "ess" ? ["Protect continuity through transition", "Secure knowledge-transfer obligations", "Create credible service-line competition", "Define automation and AI assurance controls"] : ["Reduce base rates by 8%", "Secure resource guarantees", "Incorporate service credit SLAs"]
      },
      savings: {
        initiative: `${name} Sourcing Event`,
        expectedPercent: quad === "Leverage" ? 12 : (quad === "Strategic" ? 8 : 5),
        plannedSavings: Math.round(spend * (quad === "Leverage" ? 0.12 : (quad === "Strategic" ? 0.08 : 0.05)))
      },
      /* v1.2.0 provenance — every generated strategy records its source */
      source: "template",
      sourceDetail: "Rule-based archetype template — SWOT, levers, BATNA and savings % derived from the Kraljic quadrant heuristics built into the app. No AI model was called. Treat as a starting draft only.",
      basis: [
        `Category row (Step 0): ${name} · spend ${cur}${(spend||0).toLocaleString()} · risk ${risk} · Kraljic ${quad}`,
        details?.notes ? `Service-line notes: ${details.notes}` : "",
        portfolioDetails.governance ? "Parent charter: governance" : "",
        portfolioDetails.digitalStrategy ? "Parent charter: AI & digital strategy" : "",
        portfolioDetails.riskAppetite ? "Parent charter: risk appetite" : ""
      ].filter(Boolean),
      generatedAt: new Date().toISOString()
    };
  }

  const runStrategy = async (catName) => {
    const catDetails = getCats().find(c => c.name === catName);
    setRunning(prev => ({...prev, [catName]: 1}));
    const stageTimer = setInterval(() => {
      setRunning(prev => prev[catName] ? ({...prev, [catName]: Math.min((prev[catName] || 1) + 1, 5)}) : prev);
    }, 700);
    const finish = (generated) => {
      clearInterval(stageTimer);
      setStrategies(prev => ({...prev, [catName]: generated}));
      setRunning(prev => { const n = {...prev}; delete n[catName]; return n; });
      if (setPortfolioDetails) logDeclaration(setPortfolioDetails, "Line strategy generated for \"" + catName + "\"", generated.source === "ai" ? "AI: " + aiSourceLabel() : "Rule-based template (AI unavailable)");
    };
    const base = generateStrategyData(catName, catDetails);
    /* v1.2.0 — try a genuine AI generation first (Step 0 charter + service-line
       row as inputs); fall back to the rule-based template if the AI is
       unreachable. The source of the output is recorded either way. */
    try {
      const charter = {
        portfolio: pName,
        description: portfolioDetails.description || undefined,
        objectives: portfolioDetails.objectives || undefined,
        outcomes: portfolioDetails.outcomes || undefined,
        operatingModel: portfolioDetails.operatingModel || undefined,
        governance: portfolioDetails.governance || undefined,
        sustainability: portfolioDetails.sustainability || undefined,
        aiDigitalStrategy: portfolioDetails.digitalStrategy || undefined,
        riskAppetite: portfolioDetails.riskAppetite || undefined,
        suppliers: portfolioDetails.suppliersText || undefined,
        futureDemand: portfolioDetails.futureDemand || undefined,
        regulatory: portfolioDetails.regulatory || undefined
      };
      const ai = await askAI(
        `You are a procurement category strategist. Draft a concise sourcing strategy for one category (service line) inside a parent portfolio.\n` +
        `Parent portfolio charter (buyer-side): ${JSON.stringify(charter)}\n` +
        `Category / service line: ${JSON.stringify({name: catName, spend: catDetails?.spend, risk: catDetails?.risk, kraljicQuadrant: catDetails?.quadrant, archetype: catDetails?.archetype, notes: catDetails?.notes})}\n` +
        `Respond with STRICT JSON only, no prose, exactly this shape:\n` +
        `{"swot":{"strengths":["...","...","..."],"weaknesses":["...","..."],"opportunities":["...","..."],"threats":["...","..."]},` +
        `"recommendedLevers":["3-5 purchasing-chessboard style levers appropriate to the Kraljic quadrant"],` +
        `"batna":"one-sentence best alternative to negotiated agreement",` +
        `"objectives":["3-5 negotiation objectives"],` +
        `"expectedPercent":number (realistic savings % for this quadrant and archetype),` +
        `"rationale":"1-2 sentences on how the parent charter shaped this strategy"}`,
        {json: true}
      );
      if (ai && ai.swot && (ai.swot.strengths || ai.swot.weaknesses)) {
        const pct = Number(ai.expectedPercent) > 0 && Number(ai.expectedPercent) <= 60 ? Number(ai.expectedPercent) : base.savings.expectedPercent;
        const spend = Number(catDetails?.spend) || base.spend;
        finish({
          ...base,
          swot: {
            strengths: ai.swot.strengths?.length ? ai.swot.strengths : base.swot.strengths,
            weaknesses: ai.swot.weaknesses?.length ? ai.swot.weaknesses : base.swot.weaknesses,
            opportunities: ai.swot.opportunities?.length ? ai.swot.opportunities : base.swot.opportunities,
            threats: ai.swot.threats?.length ? ai.swot.threats : base.swot.threats
          },
          chessboard: {...base.chessboard, recommendedLevers: (ai.recommendedLevers?.length ? ai.recommendedLevers : base.chessboard.recommendedLevers)},
          negotiation: {
            batna: ai.batna || base.negotiation.batna,
            objectives: (ai.objectives?.length ? ai.objectives : base.negotiation.objectives)
          },
          savings: {...base.savings, expectedPercent: pct, plannedSavings: Math.round(spend * pct / 100)},
          source: "ai",
          sourceDetail: "AI-generated by " + aiSourceLabel() + " from the Step 0 parent portfolio charter and this service line's Step 0 row." + (ai.rationale ? " Model rationale: " + ai.rationale : "") + " AI-inferred content — review and confirm with stakeholders before use.",
          generatedAt: new Date().toISOString()
        });
        return;
      }
      throw new Error("AI returned no usable JSON");
    } catch (e) {
      finish({
        ...base,
        sourceDetail: base.sourceDetail + " (AI generation was attempted but unavailable: " + ((e && e.message) || "error") + ".)"
      });
    }
  };

  const runAllStrategies = () => {
    getCats().forEach((c, i) => {
      setTimeout(() => { runStrategy(c.name); }, i * 900);
    });
  };

  const clearAllStrategies = () => {
    if (confirm("Reset and clear all generated category strategies for this portfolio?")) {
      setStrategies({});
    }
  };

  /* v1.2.0 — shared builders so the HTML report, the Word report and the
     on-screen preview all carry the same parent charter and provenance. */
  const charterRows = () => {
    const d = portfolioDetails || {};
    return [
      ["Portfolio", pName],
      ["Business unit", d.businessUnit],
      ["Owner", d.owner],
      ["Description / scope", d.description],
      ["Strategic objectives", d.objectives],
      ["Business outcomes", d.outcomes],
      ["Current spend", d.currentSpend ? (d.currency || "£") + Number(d.currentSpend).toLocaleString() : ""],
      ["Future demand", d.futureDemand],
      ["Operating model", d.operatingModel],
      ["Current suppliers", d.suppliersText],
      ["Technology landscape", d.technologyLandscape],
      ["Regulatory environment", d.regulatory],
      ["Sustainability & social value", d.sustainability],
      ["AI & digital strategy", d.digitalStrategy],
      ["Risk appetite", d.riskAppetite],
      ["Governance", d.governance],
      ["Stakeholders", d.stakeholders],
      ["KPIs", d.kpis],
      ["Benefits framework", d.benefitsFramework]
    ].filter(r => r[1] && String(r[1]).trim());
  };
  const sourceLine = (strat) => {
    if (!strat) return "Pending — no strategy generated yet.";
    if (strat.isCustomSourced || strat.source === "custom") return "User-built via the detailed Steps 1–14 wizard (per-field confidence flags travel with the category's own strategy document).";
    if (strat.source === "ai") return strat.sourceDetail || ("AI-generated by " + aiSourceLabel() + " — review before use.");
    return strat.sourceDetail || "Rule-based archetype template (no AI model called).";
  };
  const provenanceRows = (catList) => catList.map(c => {
    const strat = strategies[c.name];
    const status = !strat ? "Pending" : (strat.isCustomSourced || strat.source === "custom") ? "Custom (deep-dived, Steps 1–14)" : strat.source === "ai" ? "AI draft" : "Template draft";
    return {name: c.name, status, detail: sourceLine(strat), basis: (strat?.basis || []).join("; "), when: strat?.generatedAt ? new Date(strat.generatedAt).toLocaleString() : ""};
  });

  /* v2.9.0 — board-format decision paper (12 sections).
     Contents per the Portfolio & Category document; running order per the
     Portfolio Management document: context -> evidence -> questions ->
     options -> evaluation -> recommendation -> delivery -> appendices. */
  const buildPortfolioMarkdown = () => {
    const d = portfolioDetails || {};
    const catList = getCats();
    const sourcedCats = catList.filter(c => strategies[c.name]);
    const totalSpend = catList.reduce((s, c) => s + (Number(c.spend) || 0), 0);
    const totalSavings = sourcedCats.reduce((s, c) => s + (strategies[c.name]?.savings?.plannedSavings || 0), 0);
    const plans = d.plans || {};
    const planSources = d.planSources || {};
    const L = [];
    const val = (x) => x && String(x).trim();
    const pushField = (label, x, srcTxt) => { if (val(x)) { L.push(`**${label}.** ${String(x).replace(/\n/g, " ")}`); if (srcTxt) L.push(`_${srcTxt}_`); L.push(""); } };
    const planSrcTxt = (k) => { const s = planSources[k]; if (!s) return null; return "Source: " + (s.mode === "user" ? "user input" : (s.mode === "ai" ? "AI-drafted by " + s.by : s.by)) + (s.edited ? ", user-modified since" : "") + "."; };
    const pushPlan = (label, k) => pushField(label, plans[k], planSrcTxt(k));

    /* ---- title ---- */
    L.push(`# Portfolio Strategy — ${pName}`);
    L.push(`_${[d.businessUnit, d.owner ? "Owner: " + d.owner : null, new Date().toLocaleDateString(), "CATEGORYAI consolidated portfolio strategy"].filter(Boolean).join(" · ")}_`);
    L.push("");

    /* ---- 1. Executive summary ---- */
    L.push("## 1. Executive Summary");
    if (d.execSummary && val(d.execSummary.text)) {
      L.push(d.execSummary.text);
      L.push(`_Source: ${d.execSummary.source}${d.execSummary.edited ? " — user-modified since" : ""}._`);
    } else {
      L.push("_Not yet drafted — use 📝 Executive summary on the Report Preview tab (P3)._");
    }
    L.push("");

    /* ---- 2. Strategic context & business drivers ---- */
    L.push("## 2. Strategic Context & Business Drivers");
    pushField("Description & scope", d.description);
    pushField("Strategic objectives", d.objectives);
    pushField("Business outcomes", d.outcomes);
    pushField("Future demand", d.futureDemand);
    pushField("Stakeholders", d.stakeholders);
    if (!val(d.description) && !val(d.objectives) && !val(d.outcomes)) L.push("_Charter context not yet written — see P1._\n");

    /* ---- 3. Portfolio definition & composition ---- */
    L.push("## 3. Portfolio Definition & Composition");
    L.push("| | |");
    L.push("|---|---|");
    [["Business unit", d.businessUnit], ["Portfolio owner", d.owner], ["Current annual spend", d.currentSpend ? cur + Number(d.currentSpend).toLocaleString() : ""], ["Operating model", d.operatingModel], ["Service lines", catList.length + " (defined in P1)"]].forEach(([k, v]) => { if (val(String(v || ""))) L.push(`| **${k}** | ${v} |`); });
    L.push("");
    L.push("| Category / service line | Annual spend | Risk | Kraljic | Target savings | Strategy source |");
    L.push("|---|---|---|---|---|---|");
    catList.forEach(c => {
      const strat = strategies[c.name];
      const sav = strat?.savings?.plannedSavings !== undefined ? `${cur}${strat.savings.plannedSavings.toLocaleString()} (${strat.savings.expectedPercent}%)` : "Pending";
      const stat = !strat ? "Pending" : (strat.isCustomSourced || strat.source === "custom") ? "Custom (deep-dived, Steps 1–14)" : strat.source === "ai" ? "AI draft (review before use)" : "Template draft";
      L.push(`| ${c.name} | ${cur}${(Number(c.spend) || 0).toLocaleString()} | ${c.risk || "Medium"} | ${c.quadrant || "Strategic"} | ${sav} | ${stat} |`);
    });
    L.push(`**Total portfolio spend:** ${cur}${totalSpend.toLocaleString()} · **Lines covered (draft or deep-dived):** ${sourcedCats.length} of ${catList.length} · **Expected savings (covered lines):** ${cur}${totalSavings.toLocaleString()}`);
    L.push("");
    if (catList.length) { L.push("@@CHART:composition@@"); L.push("@@CHART:kraljic@@"); L.push(""); }

    /* v2.25 — Route to market: Kraljic-quadrant-led channel choice per line,
       with the Value/Effort governance tier alongside (a separate signal). */
    if (catList.some(c => c.channel)) {
      L.push("### Route to market — channel by service line");
      L.push("_Kraljic quadrant is the primary lens; specialization, volume, panel coverage and supplier depth refine the ranked suggestions. The category manager's chosen channel is shown; a blank means not yet decided._");
      L.push("| Line | Kraljic | Chosen channel | Basis |");
      L.push("|---|---|---|---|");
      const lib = channelLibrary();
      catList.forEach(c => {
        if (!c.channel) return;
        const chosen = (lib[c.channel] || {}).name || c.channel;
        const basis = c.channelSource === "user" ? "User choice" : "Suggested";
        L.push(`| ${c.name} | ${c.quadrant || "Strategic"} | **${chosen}** | ${basis} |`);
      });
      L.push("");
    }

    /* ---- 4. Portfolio assessment — fact base ---- */
    L.push("## 4. Portfolio Assessment — Fact Base");
    {
      const a = d.assessment || {};
      const aSrc = d.assessmentSources || {};
      let anyA = false;
      ASSESSMENT_GROUPS.forEach(([g, glabel, fields]) => {
        const rows = fields.filter(([f]) => (a[g] || {})[f] && String((a[g] || {})[f]).trim());
        if (!rows.length) return;
        anyA = true;
        L.push(`**${glabel.replace(/^\S+\s/, "")}**`);
        L.push("| Dimension | Position |");
        L.push("|---|---|");
        rows.forEach(([f, label]) => L.push(`| ${label} | ${String((a[g] || {})[f]).replace(/\|/g, "/")} |`));
        if (aSrc[g]) L.push(`_Block source: ${(aSrc[g].fields || []).length} field(s) AI-drafted (empty-only) by ${aSrc[g].by}; the rest user input._`);
        L.push("");
      });
      if (!anyA) L.push("_Fact base not yet assessed — see P1 · Portfolio Assessment._\n");
    }
    pushPlan("PESTLE (portfolio level)", "pestle");
    pushPlan("Five Forces (portfolio level)", "fiveForces");
    pushField("Technology landscape", d.technologyLandscape);
    pushField("Regulatory environment", d.regulatory);
    pushField("Current suppliers & delivery model", d.suppliersText);

    /* ---- 5. Strategic questions & positions ---- */
    L.push("## 5. Strategic Questions & Positions");
    {
      const allQ = Array.isArray(d.strategicQuestions) ? d.strategicQuestions : [];
      const qs = allQ.filter(x => x.a && x.a.trim());
      const openQ = allQ.filter(x => !(x.a && x.a.trim()));
      if (!allQ.length) L.push("_Not yet generated — see P2 · Stage 1._");
      if (qs.length) {
        L.push("**Positions taken (user):**");
        qs.forEach(x => L.push(`- _[${x.group}]_ ${x.q} — **${x.a.trim()}**`));
      }
      if (openQ.length) {
        L.push("");
        L.push("**Open questions — unanswered, treated as assumptions to validate:**");
        openQ.forEach(x => L.push(`- _[${x.group}]_ ${x.q}`));
      }
      L.push("");
    }

    /* ---- 6. Strategic options & evaluation ---- */
    const opts = Array.isArray(d.options) ? d.options : [];
    const adoptedIds = Array.isArray(d.chosenOptions) ? d.chosenOptions : (d.chosenOption ? [d.chosenOption] : []);
    const adoptedOpts = opts.filter(o => adoptedIds.includes(o.id));
    L.push("## 6. Strategic Options & Evaluation");
    L.push("_The portfolio strategy determines the best mix of commercial models, sourcing approaches and market structures — not a binary one-contract-or-six answer. [B1][B3]_");
    L.push("");
    if (!opts.length) {
      L.push("_No strategic options generated yet — see P2._\n");
    } else {
      opts.forEach(o => {
        L.push(`**${o.name}**${adoptedIds.includes(o.id) ? " — **ADOPTED**" : ""}. ${o.summary || ""}`);
        if (o.pros?.length) L.push(`_Pros:_ ${o.pros.join("; ")}`);
        if (o.cons?.length) L.push(`_Cons / watch-items:_ ${o.cons.join("; ")}`);
        L.push(`_Source: ${o.edited && o.source !== "user" ? o.sourceDetail.replace("AI-generated", "AI-generated, user-modified").replace("Rule-based option template", "Rule-based template, user-modified") : o.sourceDetail}_`);
        L.push("");
      });
      {
        const w = d.matrixWeights || Object.fromEntries(MATRIX_CRITERIA.map(([k,,dw]) => [k, dw]));
        L.push("**Weighted option assessment matrix** _(criteria & default weights per practitioner methodology; automatic assessment — adoption is the user's decision)_");
        L.push("");
        L.push("| Criteria | Weight % | " + opts.map(o => o.name).join(" | ") + " |");
        L.push("|---|---|" + opts.map(() => "---").join("|") + "|");
        MATRIX_CRITERIA.forEach(([k, label]) => L.push(`| ${label} | ${w[k] ?? "-"} | ` + opts.map(o => o.matrixScores?.[k] ?? 3).join(" | ") + " |"));
        L.push(`| **Weighted total** | ${MATRIX_CRITERIA.reduce((s, [k]) => s + (Number(w[k]) || 0), 0)} | ` + opts.map(o => "**" + weightedScore(o, w).toFixed(2) + "**").join(" | ") + " |");
        const leader = opts.reduce((b, o) => weightedScore(o, w) > weightedScore(b, w) ? o : b, opts[0]);
        L.push("");
        L.push(`_Automatic assessment: **${leader.name}** scores highest (${weightedScore(leader, w).toFixed(2)}/5) on the current weights._`);
        L.push("");
        L.push("@@CHART:options@@");
        L.push("");
        L.push("**Option risk heat map** _(1 = low risk, 5 = high risk; read against the parent risk appetite)_");
        L.push("");
        L.push("| Risk dimension | " + opts.map(o => o.name).join(" | ") + " |");
        L.push("|---|" + opts.map(() => "---").join("|") + "|");
        RISK_DIMS.forEach(([k, label]) => L.push(`| ${label} | ` + opts.map(o => o.riskProfile?.[k] ?? 3).join(" | ") + " |"));
        L.push("");
      }
      if (d.optionRecommendation) L.push(`_AI recommendation on record: ${d.optionRecommendation.name} — ${d.optionRecommendation.why} (by ${d.optionRecommendation.by}; the adopted direction is the user's decision)._\n`);
    }

    /* ---- 7. Recommended strategy & future state ---- */
    L.push("## 7. Recommended Strategy & Future State");
    if (adoptedOpts.length) {
      adoptedOpts.forEach(o => {
        L.push(`### Adopted direction: ${o.name}`);
        L.push(o.summary || "");
        (o.customScores || []).forEach(a => L.push(`- Attribute — ${a.label}: ${a.v}/5`));
        L.push("");
      });
      if (val(d.optionRationale)) L.push(`**Decision rationale (user):** ${d.optionRationale}\n`);
      {
        const fsc = d.futureStateChain || {};
        const chain = [pName || "Portfolio", fsc.deliveryModel, fsc.governance, fsc.procurements, fsc.suppliers, "Strategic supplier management"].filter(x => x && String(x).trim() && !String(x).startsWith("("));
        if (chain.length > 3) L.push(`**Recommended future state:** ${chain.join(" → ")}\n`);
      }
    } else {
      L.push("_No option adopted yet — the options in Section 6 remain open._\n");
    }
    pushPlan("Current state", "currentState");
    pushPlan("Future state", "futureState");
    pushPlan("Commercial model", "commercialModel");
    pushPlan("Lotting strategy", "lottingStrategy");
    pushPlan("Transition strategy", "transitionStrategy");
    pushPlan("Capability & skills gap", "capabilityGap");
    pushPlan("Supplier dependency", "supplierDependency");
    pushPlan("Innovation assessment", "innovationAssessment");

    /* ---- 8. Delivery — roadmap, governance & KPIs ---- */
    L.push("## 8. Delivery — Roadmap, Governance & KPIs");
    L.push("**Indicative roadmap** _(rule-based phasing from Kraljic placement — defer to the transition strategy's sequencing where written)_");
    L.push("| Phase | Focus | Lines |");
    L.push("|---|---|---|");
    {
      const phaseOf = q => (q === "Bottleneck" || q === "Strategic") ? 1 : q === "Leverage" ? 2 : 3;
      [[1, "Secure continuity & establish partnerships"], [2, "Run competitive events for leverage lines"], [3, "Consolidate & catalogue non-critical lines"]].forEach(([ph, focus]) => {
        const lines = catList.filter(c => phaseOf(c.quadrant || "Strategic") === ph).map(c => c.name);
        if (lines.length) L.push(`| Phase ${ph} | ${focus} | ${lines.join(", ")} |`);
      });
    }
    L.push("");
    pushField("Governance & approval gates", d.governance);
    pushField("KPIs", d.kpis);
    pushField("Sustainability & social value", d.sustainability);
    pushField("AI & digital strategy", d.digitalStrategy);
    pushField("Risk appetite", d.riskAppetite);

    /* ---- 9. Registers ---- */
    L.push("## 9. Registers");
    {
      const fw = String(d.benefitsFramework || "").split(/[,;]+/).map(x => x.trim()).filter(Boolean);
      if (sourcedCats.length || fw.length) {
        L.push("### Benefits register");
        L.push("| Benefit | Type | Value / status | Source |");
        L.push("|---|---|---|---|");
        sourcedCats.forEach(c => {
          const s = strategies[c.name];
          L.push(`| ${s.savings?.initiative || c.name + " savings"} | Financial | ${cur}${(s.savings?.plannedSavings || 0).toLocaleString()} (${s.savings?.expectedPercent || 0}%) | Roll-up (${(s.isCustomSourced || s.source === "custom") ? "deep-dived" : "draft — directional"}) |`);
        });
        fw.filter(x => !/^cash|savings?$/i.test(x)).forEach(b => L.push(`| ${b.charAt(0).toUpperCase() + b.slice(1)} | Non-financial | Framework-defined — quantify at line level | P1 charter (benefits framework) |`));
        L.push("_Rule-based assembly; quantify and evidence each before board use._");
        L.push("");
      }
      L.push("### Savings register");
      if (sourcedCats.length) {
        L.push("| Initiative | Line | Planned savings | % | Strategy source |");
        L.push("|---|---|---|---|---|");
        sourcedCats.forEach(c => {
          const s = strategies[c.name];
          L.push(`| ${s.savings?.initiative || c.name + " initiative"} | ${c.name} | ${cur}${(s.savings?.plannedSavings || 0).toLocaleString()} | ${s.savings?.expectedPercent || 0}% | ${(s.isCustomSourced || s.source === "custom") ? "Deep-dived" : s.source === "ai" ? "AI draft" : "Template draft"} |`);
        });
        L.push("_Draft-sourced figures are directional until the line is deep-dived or validated._");
      } else L.push("_No lines covered yet — see P3 · Roll-up._");
      L.push("");
      L.push("### Risk register");
      const reg = Array.isArray(d.riskRegister) ? d.riskRegister.filter(r => r.risk && r.risk.trim()) : [];
      if (reg.length) {
        L.push("| Risk | Dimension | L | I | Score | Owner | Mitigation |");
        L.push("|---|---|---|---|---|---|---|");
        reg.forEach(r => L.push(`| ${r.risk.replace(/\|/g, "/")} | ${r.dimension} | ${r.likelihood} | ${r.impact} | ${r.likelihood * r.impact} | ${r.owner || "TBC"} | ${(r.mitigation || "To define").replace(/\|/g, "/")} |`));
        L.push("_Score = likelihood × impact (max 25)._");
        L.push("");
        L.push("@@CHART:risk@@");
      } else L.push("_Not yet drafted — see P3 · Portfolio risk register._");
      L.push("");
      L.push("**Line risk levels (P1):** " + catList.map(c => `${c.name} — ${c.risk || "Medium"} (${c.quadrant || "Strategic"})`).join(" · "));
      if (val(d.riskAppetite)) L.push(`**Parent risk appetite:** ${d.riskAppetite}`);
      L.push("");
    }

    /* ---- 10. Service-line strategy summaries ---- */
    L.push("## 10. Service-Line Strategy Summaries");
    if (!sourcedCats.length) L.push("_No lines covered yet — run the P3 roll-up or deep-dive lines via the Category track._");
    sourcedCats.forEach(c => {
      const s = strategies[c.name];
      L.push(`### ${c.name} — ${cur}${(Number(c.spend) || 0).toLocaleString()} · ${s.quadrant || c.quadrant}`);
      L.push(`_Source: ${sourceLine(s)}_`);
      { const inh = (s.isCustomSourced || s.source === "custom") ? inheritanceSummary(portfolioDetails, c.name) : null;
        if (inh) L.push(`_${inh}_`); }
      { /* SWOT as a 2x2 quadrant table instead of a bullet wall */
        const cell = (arr) => (arr || []).map(x => String(x).replace(/\|/g, "/")).join(" · ") || "—";
        L.push("| **Strengths** | **Weaknesses** |");
        L.push("|---|---|");
        L.push(`| ${cell(s.swot?.strengths)} | ${cell(s.swot?.weaknesses)} |`);
        L.push(`| **Opportunities** | **Threats** |`);
        L.push(`| ${cell(s.swot?.opportunities)} | ${cell(s.swot?.threats)} |`);
      }
      L.push(`**Recommended levers:** ${(s.chessboard?.recommendedLevers || []).join(", ") || "n/a"}`);
      L.push(`**BATNA:** ${s.negotiation?.batna || "n/a"}`);
      (s.negotiation?.objectives || []).forEach(o => L.push(`- Objective: ${o}`));
      if (s.projects?.length) { L.push("**Projects**"); s.projects.forEach(pr => L.push(`- ${pr.name} (${pr.timeline}) — ${pr.status}`)); }
      if (s.contracts?.length) { L.push("**Target contracts**"); s.contracts.forEach(ct => L.push(`- ${ct.supplier} — ${ct.type}, ${ct.term}, ${cur}${(ct.value || 0).toLocaleString()}`)); }
      L.push(`**Expected savings:** ${cur}${(s.savings?.plannedSavings || 0).toLocaleString()} (${s.savings?.expectedPercent || 0}%)`);
      L.push("");
    });

    /* ---- 11. Assumptions, open questions & declarations ---- */
    L.push("## 11. Assumptions, Open Questions & Declarations");
    L.push("_Open questions from Section 5 stand as assumptions to validate. Every strategy line and generated input records how it was produced; AI-inferred content should be reviewed before circulation._");
    L.push("");
    L.push("| Category | Status | Source & basis | Generated |");
    L.push("|---|---|---|---|");
    provenanceRows(catList).forEach(r => L.push(`| ${r.name} | ${r.status} | ${r.detail}${r.basis ? " Inputs: " + r.basis : ""} | ${r.when || "—"} |`));
    L.push("");
    const srcDocs = Array.isArray(d.sourceDocs) ? d.sourceDocs : [];
    if (srcDocs.length) {
      L.push("**Source documents:** " + srcDocs.map(x => `${x.name} (ingested ${new Date(x.when).toLocaleDateString()}; ${x.mode === "ai" ? "AI-summarised" : "raw excerpt"})`).join(" · "));
      L.push("");
    }
    const decls = Array.isArray(d.declarations) ? d.declarations : [];
    if (decls.length) {
      L.push("**Declarations log (most recent " + Math.min(decls.length, 15) + " of " + decls.length + "):**");
      decls.slice(-15).reverse().forEach(x => L.push(`- ${new Date(x.when).toLocaleString()} — ${x.what} _(source: ${x.source})_`));
      L.push("");
    }
    L.push("- **Charter & fact base:** user input in P1 (AI assists append or fill empty fields only, as declared).");
    L.push("- **AI-generated content:** produced by " + aiSourceLabel() + " from the declared inputs only.");
    L.push("- **Custom line strategies:** built via Steps 1–14; per-field User / AI-inferred / Assumed confidence flags live in each line's own document.");
    L.push("");

    /* ---- 12. References & bibliography ---- */
    L.push("## 12. References & Bibliography");
    BENCHMARKS.forEach(b => L.push(`- **[${b.id}]** ${b.cite} — ${b.note}`));
    L.push("_Benchmark figures are directional; verify against your licensed source before board use._");
    return L.join("\n");
  };

  /* v2.9.0 — executive summary drafting (Section 1 of the board paper) */
  const [execBusy, setExecBusy] = useState(false);
  const draftExecSummary = async () => {
    setExecBusy(true);
    const d = portfolioDetails;
    const adopted = (Array.isArray(d.options) ? d.options : []).filter(o => (d.chosenOptions || []).includes(o.id));
    const catList = getCats();
    const totalSpend = catList.reduce((s, c) => s + (Number(c.spend) || 0), 0);
    const totalSavings = catList.filter(c => strategies[c.name]).reduce((s, c) => s + (strategies[c.name]?.savings?.plannedSavings || 0), 0);
    try {
      const text = await askAI(
        `Write the Executive Summary of a board-level portfolio strategy paper. Max 180 words, plain prose in short paragraphs, covering: purpose; current position; recommended direction; value & benefits headline; key risks; the ask. Ground everything in these inputs only — no invented facts:\n` +
        `Portfolio: ${pName} · spend ${cur}${totalSpend.toLocaleString()} across ${catList.length} lines · expected savings ${cur}${totalSavings.toLocaleString()}\n` +
        `Objectives: ${(d.objectives || "").slice(0, 400)}\nCurrent state: ${((d.plans || {}).currentState || "").slice(0, 400)}\nFuture state: ${((d.plans || {}).futureState || "").slice(0, 400)}\n` +
        (adopted.length ? `Adopted direction(s): ${adopted.map(o => o.name + " — " + (o.summary || "").slice(0, 200)).join("; ")}\nRationale: ${(d.optionRationale || "").slice(0, 300)}\n` : "No option adopted yet — say the options remain under evaluation.\n"),
        {json: false}
      );
      setPortfolioDetails(prev => ({...prev, execSummary: {text: String(text).slice(0, 2500), source: "AI-drafted by " + aiSourceLabel() + " from the charter, plans, roll-up totals and adopted direction", when: new Date().toISOString(), edited: false}}));
      logDeclaration(setPortfolioDetails, "Executive summary AI-drafted for the board paper", "AI: " + aiSourceLabel());
    } catch (e) {
      const parts = [
        `This paper sets the strategy for the ${pName} portfolio (${cur}${totalSpend.toLocaleString()} across ${catList.length} service lines).`,
        ((portfolioDetails.plans || {}).currentState || "").split(/(?<=\.)\s/)[0],
        adopted.length ? `Recommended direction: ${adopted.map(o => o.name).join(" + ")}.` : "Strategic options remain under evaluation (Section 6).",
        totalSavings ? `Expected savings across covered lines: ${cur}${totalSavings.toLocaleString()} (directional until validated).` : "",
        "Approval is sought for the recommended direction, the procurement roadmap and the governance arrangements set out in this paper."
      ].filter(Boolean);
      setPortfolioDetails(prev => ({...prev, execSummary: {text: parts.join(" "), source: "Assembled rule-based from existing sections (AI unavailable) — edit before circulation", when: new Date().toISOString(), edited: false}}));
      logDeclaration(setPortfolioDetails, "Executive summary assembled rule-based (AI unavailable) — flagged for editing", "Built-in fallback");
    } finally { setExecBusy(false); }
  };

  /* v2.4.0 — editable, confirmable report: the confirmed text becomes the
     .docx of record; the on-screen preview stays a live view of the data. */
  const [editingReport, setEditingReport] = useState(false);
  const [draftMd, setDraftMd] = useState("");
  const confirmedReport = portfolioDetails.confirmedReport || null;
  const startEditReport = () => { setDraftMd(confirmedReport ? confirmedReport.md : buildPortfolioMarkdown()); setEditingReport(true); };
  const confirmReport = () => {
    if (setPortfolioDetails) {
      setPortfolioDetails(prev => ({...prev, confirmedReport: {md: draftMd, when: new Date().toISOString()}}));
      logDeclaration(setPortfolioDetails, "Portfolio Strategy report text edited and CONFIRMED — this version is now the .docx of record", "User-confirmed");
    }
    setEditingReport(false);
  };
  const discardConfirmed = () => {
    if (!confirm("Discard the confirmed version and go back to generating the report live from the current data?")) return;
    if (setPortfolioDetails) {
      setPortfolioDetails(prev => { const n = {...prev}; delete n.confirmedReport; return n; });
      logDeclaration(setPortfolioDetails, "Confirmed report version discarded — downloads revert to live-generated content", "User action");
    }
  };
  /* v2.11 — SINGLE-SOURCE report pipeline: both downloads (.docx and HTML)
     render the same markdown (confirmed text if one exists, else live),
     with the same charts. */
  const renderPortfolioCharts = () => {
    try {
      window.__docxCharts = {};
      const catList = getCats();
      if (catList.length) {
        window.__docxCharts.composition = buildCompositionChart(catList, cur);
        window.__docxCharts.kraljic = buildKraljicChart(catList, cur);
      }
      const optsNow = Array.isArray(portfolioDetails.options) ? portfolioDetails.options : [];
      if (optsNow.length) {
        const w = portfolioDetails.matrixWeights || Object.fromEntries(MATRIX_CRITERIA.map(([k,,dw]) => [k, dw]));
        window.__docxCharts.options = buildOptionsChart(optsNow, w);
      }
      const regNow = Array.isArray(portfolioDetails.riskRegister) ? portfolioDetails.riskRegister.filter(r => r.risk && r.risk.trim()) : [];
      if (regNow.length) window.__docxCharts.risk = buildRiskMatrixChart(regNow);
    } catch (e) { window.__docxCharts = {}; }
  };
  /* Confirmed texts saved before the charts feature contain no @@CHART tokens.
     Offer to append the charts to THIS download only — never edit saved text. */
  const ensureChartTokens = (md, useConfirmed) => {
    const reg = window.__docxCharts || {};
    const ids = ["composition", "kraljic", "options", "risk"].filter(id => reg[id] && reg[id].dataUrl);
    if (!ids.length || /@@CHART:/.test(md)) return md;
    if (useConfirmed && !confirm("Your confirmed report text contains no chart placeholders (it was saved before the charts feature, or they were removed).\n\nAppend the charts as an appendix to THIS DOWNLOAD only? Your saved confirmed text stays unchanged.")) return md;
    return md + "\n\n## Appendix — Charts\n\n" + ids.map(id => "@@CHART:" + id + "@@").join("\n\n") + "\n";
  };
  const reportMarkdownForExport = () => {
    const useConfirmed = !!confirmedReport;
    renderPortfolioCharts();
    return {md: ensureChartTokens(useConfirmed ? confirmedReport.md : buildPortfolioMarkdown(), useConfirmed), useConfirmed};
  };
  const downloadPortfolioWord = async () => {
    const slug = pName.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "portfolio";
    const {md, useConfirmed} = reportMarkdownForExport();
    await downloadAsWord(md, slug + "-portfolio-strategy");
    if (setPortfolioDetails) logDeclaration(setPortfolioDetails, "Consolidated Portfolio Strategy downloaded (.docx) — " + (useConfirmed ? "user-confirmed version of " + new Date(confirmedReport.when).toLocaleString() : "generated live from current data"), "User action");
  };

  const downloadPortfolioReport = () => {
    /* v2.11 — the HTML download is now the SAME document as the .docx:
       identical markdown source (confirmed or live), identical charts
       (embedded as images). It exists only as a no-Word-needed rendering. */
    const {md, useConfirmed} = reportMarkdownForExport();
    let body = mdToHtml(md);
    body = body.replace(/@@CHART:([a-z0-9]+)@@/g, (m, id) => {
      const ch = (window.__docxCharts || {})[id];
      return ch && ch.dataUrl ? `<img src="${ch.dataUrl}" style="max-width:100%;width:${ch.width * 1.4}px;display:block;margin:12px 0;" alt="${id} chart"/>` : "";
    });
    const html = `<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Portfolio Strategy — ${pName}</title>
      <style>body{font-family:Calibri,Segoe UI,Arial,sans-serif;max-width:920px;margin:24px auto;padding:0 18px;color:#2E2A26;line-height:1.45}h1{color:#0F5E56}h2{color:#0F5E56;border-bottom:1px solid #E3E1DA;padding-bottom:4px}table{border-collapse:collapse;margin:8px 0}td{border:1px solid #D8D5CC;padding:5px 8px;font-size:11pt}</style></head>
      <body>${body}<p style="font-size:10px;color:#5A6068;font-style:italic;">Rendered ${new Date().toLocaleString()} · identical content to the .docx download (single source: ${useConfirmed ? "user-confirmed text of " + new Date(confirmedReport.when).toLocaleString() : "live-generated from current data"}).</p></body></html>`;
    const blob = new Blob([html], {type: "text/html"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${pName.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "portfolio"}-strategy-report.html`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    if (setPortfolioDetails) logDeclaration(setPortfolioDetails, "Portfolio Strategy downloaded as HTML — same content as the .docx (" + (useConfirmed ? "confirmed text" : "live-generated") + ")", "User action");
  };

  const cats = getCats();
  const cur = portfolioDetails.currency || (portfolioId === "ess" ? "£" : "$");

  return (
    <div className="card">
      <h2 className="display">💼 P3 · Portfolio Roll-up, Report & Bibliography<Tip t="Two tabs: the Portfolio Roll-up — the strategy engine that generates a strategy per service line and supplies Sections 2 & 4 of the report — and the Report Preview: the consolidated strategy on screen in collapsible sections, ending with the References & Bibliography. Downloads: Word (.docx) and HTML."/></h2>
      <p className="hint">Active Portfolio: <b>{pName}</b>{isTemplateCats ? <span style={{color:"var(--amber)", fontWeight:700}}> · showing template service lines — define your own in Step 0</span> : <span style={{color:"#1E8E5A", fontWeight:700}}> · {getCats().length} user-defined service line(s)</span>}</p>
      
      {/* Sub-tabs */}
      <div style={{display:"flex", background:"var(--paper)", padding:4, borderRadius:8, gap:4, marginBottom:20, border:"1px solid var(--line)", maxWidth:680}}>
        <button 
          style={{
            flex: 1,
            border: "none",
            background: activeSubTab === "rollUp" ? "var(--petrol)" : "transparent",
            color: activeSubTab === "rollUp" ? "#fff" : "var(--ink)",
            fontWeight: 700,
            borderRadius: 6,
            padding: "8px 12px",
            cursor: "pointer",
            fontSize: 12.5,
            transition: "all 0.2s"
          }}
          onClick={()=>setActiveSubTab("rollUp")}
          title="The strategy engine: generates a sourcing strategy per service line from your P1 composition (AI-first, template fallback, or Custom via a Steps 1–14 deep-dive). These line strategies populate Sections 2 & 4 of the Portfolio Strategy report."
        >
          💼 Portfolio Roll-up (engine)
        </button>
        <button 
          style={{
            flex: 1,
            border: "none",
            background: activeSubTab === "reportPreview" ? "var(--petrol)" : "transparent",
            color: activeSubTab === "reportPreview" ? "#fff" : "var(--ink)",
            fontWeight: 700,
            borderRadius: 6,
            padding: "8px 12px",
            cursor: "pointer",
            fontSize: 12.5,
            transition: "all 0.2s"
          }}
          onClick={()=>setActiveSubTab("reportPreview")}
          title="The consolidated Portfolio Strategy on screen, in collapsible sections: charter, roll-up, strategic options & adopted direction(s), line sheets, References & Bibliography. What you see here is what the Word/HTML downloads contain."
        >
          📄 Report Preview
        </button>
      </div>

      {activeSubTab === "rollUp" && (
        <div className="animate-fade" style={{marginTop: 10}}>
          <div className="banner" style={{background:"var(--petrolSoft)", borderColor:"var(--petrol)", marginBottom:14, fontSize:12.5}}>
            <b>How this panel works — read once:</b>
            <ul style={{margin:"6px 0 0", paddingLeft:18}}>
              <li><b>Where the rows come from:</b> these are the categories/service lines you defined in <b>P1 · Composition</b> (name, spend, risk, Kraljic). Edit them there — this panel reads, never invents, your composition.</li>
              <li><b>What "⚡ Draft strategy" does — and does NOT do:</b> it generates a <b>first-draft line strategy</b> from just two inputs: that line's P1 row and the parent charter. <b>No category assessment has been performed</b> — no market analysis, no supplier scoring, no negotiation planning. That is why every draft is labelled with its source and marked for review.</li>
              <li><b>When a draft is enough vs. not:</b> a draft is a reasonable placeholder for lower-value or lower-risk lines in the consolidated report. For high-value, critical or complex lines, click <b>✏️ Deep-dive</b>: it opens the Category track (Steps 1–14) with the parent charter inherited, you perform the real assessment, and your custom strategy <b>replaces the draft</b> in the report (🎯 badge).</li>
              <li><b>How it connects:</b> Portfolio (P1 charter + composition) → line strategies here (draft or deep-dived) → <b>Sections 2 & 4</b> of the Portfolio Strategy report, with every line's origin in the bibliography. Deep-dive lessons flow back into your P1 assumptions — that is the management cycle.</li>
            </ul>
            <div style={{fontSize:11, marginTop:8, paddingTop:6, borderTop:"1px dashed var(--petrol)"}}><b>Actions legend:</b> <b>⚡ AI draft / ↻ Re-draft (AI)</b> — the machine writes it, you review it · <b>✏️ Deep-dive (manual · 1–14)</b> — you do the 14-step assessment yourself (charter inherited); while deep-diving, a pinned banner and a sidebar chip keep reminding you the work updates <i>this portfolio's</i> strategy.</div>
          </div>
          {isTemplateCats && (
            <div className="banner" style={{background:"var(--amberSoft)", borderColor:"var(--amber)", marginBottom:14}}>
              <span>⚠️ <b>Template composition in use.</b> You have not defined this portfolio's service lines yet, so the rows below are the built-in {portfolioId === "ess" ? "ESS" : "demo"} template. Go to <b>Step 0 · Portfolio Setup</b> to define your own categories/service lines — they will replace this list everywhere, including the consolidated report.</span>
            </div>
          )}
          
          {(() => {
            const sourcedCount = cats.filter(c => strategies[c.name]).length;
            const readinessPct = Math.round((sourcedCount / cats.length) * 100) || 0;
            const maturityLevel = readinessPct >= 80 ? "Level 3: Optimized"
                                : readinessPct >= 40 ? "Level 2: Managed & Defined"
                                : "Level 1: Initial";
            const maturityColor = readinessPct >= 80 ? "#1E8E5A"
                                 : readinessPct >= 40 ? "var(--amber)"
                                 : "var(--red)";
            return (
              <div style={{display:"grid", gridTemplateColumns:"1.2fr 2fr", gap:14, marginBottom:20, background:"var(--paper)", padding:16, borderRadius:8, border:"1px solid var(--line)"}}>
                <div>
                  <h4 style={{margin:"0 0 6px", fontSize:12.5, color:"var(--slate)", textTransform:"uppercase", letterSpacing:"0.05em"}}>Portfolio Strategy Coverage<Tip t="Lines with a strategy ÷ total lines in your P1 composition. A line counts as covered once it has a draft (AI or template) or a deep-dived custom strategy — hover its status badge to see which. Maturity level: ≥80% = Optimized, ≥40% = Managed & Defined, below = Initial."/></h4>
                  <div style={{display:"flex", alignItems:"baseline", gap:8}}>
                    <span style={{fontSize:28, fontWeight:800, color:"var(--petrol)"}}>{readinessPct}%</span>
                    <span style={{fontSize:11, color:"var(--slate)"}}>{sourcedCount} of {cats.length} lines covered</span>
                  </div>
                  <div style={{height:6, background:"var(--line)", borderRadius:3, marginTop:6, overflow:"hidden"}}>
                    <div style={{height:"100%", width:readinessPct+"%", background:"var(--petrol)", transition:"width 0.4s"}}/>
                  </div>
                  <div style={{fontSize:11.5, marginTop:10, fontWeight:700, color:maturityColor}}>
                    🏆 Maturity: {maturityLevel}
                  </div>
                </div>
                
                <div style={{borderLeft:"1px solid var(--line)", paddingLeft:14}}>
                  <h4 style={{margin:"0 0 8px", fontSize:12.5, color:"var(--slate)", textTransform:"uppercase", letterSpacing:"0.05em"}}>Maturity Heatmap Dimensions<Tip t="Each cell derives live from your own data — hover a cell for its exact basis. Spend Visibility ← how many P1 lines have an annual spend entered. SRM Alignment ← how many lines were deep-dived through Steps 1–14 (custom sourced). Savings Capture ← how many lines have a generated savings estimate."/></h4>
                  {(() => {
                    const spendDefined = cats.filter(c => Number(c.spend) > 0).length;
                    const customN = cats.filter(c => strategies[c.name]?.isCustomSourced || strategies[c.name]?.source === "custom").length;
                    const savingsN = cats.filter(c => strategies[c.name]?.savings?.plannedSavings > 0).length;
                    const spendLvl = spendDefined === cats.length ? ["High", "#1E8E5A"] : spendDefined >= cats.length / 2 ? ["Partial", "var(--amber)"] : ["Low", "var(--red)"];
                    const srmLvl = customN === 0 ? ["Not started", "var(--slate)"] : customN >= cats.length / 2 ? ["Aligned", "#1E8E5A"] : ["Improving", "var(--amber)"];

  /* v2.14 — one builder for wizard->portfolio strategies, used by both the
     deep-dive live sync and the end-of-flow "update portfolio" action. */
  function buildWizardStrategy(lineName, sourceNote){
        const d = deriveScores(vars, generic && !internal.spend);
        const spendValue = internal?.spend?.total || Number(portfolioDetails.currentSpend || 0) || 500000;
        const sw = models?.swot || {};

          threats: sw.threats || sw.Threats?.text?.split("\n").filter(Boolean) || sw.Threats || ["See detailed category risks"]
        };
        const keptChess = (chess?.methods || []).filter(m => m.keep !== false).map(m => m.name || m.method || m.approach).filter(Boolean);
        const plannedPct = value?.pipeline?.reduce((s,p)=>s+(+p.pct||0),0) || 8;
        return {
          name: lineName,
          spend: spendValue,
          quadrant: d.quadrant,
          risk: d.supplyRisk >= 3.6 ? "High" : d.supplyRisk >= 2.4 ? "Medium" : "Low",
          projects: exec?.gantt?.map(g => ({ name: g.workstream, timeline: `Q${g.startQ}-Q${g.endQ}`, status: g.owner })) || [
            { name: `${profile.name} Sourcing Consolidation Event`, timeline: "Q3-Q4", status: "Planned" },

          <div style={{margin:"0 12px 6px", padding:"6px 8px", background:"var(--card)", border:"1px solid var(--line)", borderRadius:6, fontSize:10}}>
            <b style={{color:"var(--petrol)"}}>👤 Workspace</b> <span style={{color:"var(--slate)"}}>(this browser only)</span>
            <input type="text" value={wsOwner} onChange={e=>saveWsOwner(e.target.value)} placeholder="Your name — shows on exports" title="Names THIS browser's workspace. Everything in the app lives in this browser profile on this device — a different user, profile or device is a different (empty) workspace. The name stamps your exported .json files so handoffs between laptop and mobile stay unambiguous." style={{width:"100%", marginTop:3, padding:"3px 6px", border:"1px solid var(--line)", borderRadius:4, background:"#fff", color:"var(--ink)", fontSize:10.5}}/>
          </div>
          {(()=>{ /* v2.0.0-p1 data hygiene — everything lives in browser storage, so downloading
                     a .json backup regularly is the recommended practice (keeps the store light
                     and gives you a restorable file). */
            const kb=Math.round(((storageGet("categoryai_session")||"").length + (storageGet("categoryai_portfolio_strategies")||"").length + (storageGet("categoryai_portfolio_library")||"").length)/1024);
            const heavy=kb>400;
            return (
              <div style={{padding:"6px 12px 10px", borderBottom:"1px solid var(--line)", marginBottom:8}}>
                <div style={{fontSize:9.5, fontWeight:800, color:heavy?"var(--amber)":"var(--slate)", textTransform:"uppercase", letterSpacing:"0.05em"}}>Session on this device: {kb} KB{heavy?" — getting heavy":""}</div>
                <button className="btn" style={{width:"100%", marginTop:5, fontSize:11, padding:"4px 8px"}} onClick={exportSession} title="Good practice: download a .json backup after significant work — it round-trips fully via import (Strategy step → Load session), and lets you Start fresh so the browser store stays light. Note: .json is a MACHINE format for re-import, not for reading — if opened, it opens in a text editor (Notepad/VS Code), never Word or Excel; the OS decides the default app, not the browser. Human-readable outputs are the .docx/HTML reports; human-fillable input is the Excel template in P1.">⬇ Backup session (.json)</button>
                {heavy && <div style={{fontSize:9.5, color:"var(--amber)", marginTop:4}}>Download a backup, then Start fresh to lighten the browser store.</div>}
              </div>
            );
          })()}
          {(()=>{ /* v1.1.0: grouped, collapsible nav — the group holding the active step is always open */
            const groups=[]; let cur=null; let curWb=null;
            STEPS.forEach(s=>{ if(s.wb){curWb=s.wb; groups.push({wb:s.wb}); cur=null;} else if(s.g){cur={g:s.g,items:[],wbP:curWb};groups.push(cur);} else if(cur) cur.items.push(s); });
            const wbHome={"💼 PORTFOLIO WORKBENCH":"portfolio_setup","📦 CATEGORY WORKBENCH":"profile"};
            const wbSteps={};
            groups.forEach(g2=>{ if(g2.items) (g2.items||[]).forEach(it=>{ if(g2.wbP) wbSteps[it[0]]=g2.wbP; }); });
            return groups.map(gr=>{
              if(gr.wb){
                const collapsed=!!wbCollapsed[gr.wb];
                const isActiveWb=wbSteps[step]===gr.wb;
                return (
                  <div key={gr.wb} style={{padding:"8px 12px 3px", borderTop:"2px solid var(--line)", marginTop:8, background:isActiveWb?"var(--petrolSoft)":"transparent", display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:6}}>
                    <div style={{cursor:"pointer"}} title="Open this workbench (its home screen + its minimum-path strip)" onClick={()=>{ setWbCollapsed(x=>({...x,[gr.wb]:false})); setStep(wbHome[gr.wb]||step); }}>
                      <div style={{fontSize:10.5, fontWeight:900, letterSpacing:"0.08em", color:"var(--petrol)", textTransform:"uppercase"}}>{gr.wb}</div>
                      <div style={{fontSize:9, color:"var(--slate)"}}>works standalone — connect only if you choose</div>
                    </div>
                    <button className="btn ghost" style={{border:"none", padding:"0 2px", fontSize:11, color:"var(--slate)"}} title={collapsed?"Expand this workbench's menu":"Collapse this workbench's menu"} onClick={(e)=>{ e.stopPropagation(); setWbCollapsed(x=>({...x,[gr.wb]:!collapsed})); }}>{collapsed?"▸":"▾"}</button>
                  </div>
                );
              }
              if(gr.wbP && wbCollapsed[gr.wbP]) return null;
              const hasActive=gr.items.some(it=>it[0]===step);
              /* v2.10: an explicit user collapse overrides "active stays open" */
              const open=openGroups[gr.g]===undefined ? hasActive : !!openGroups[gr.g];
              const done=gr.items.filter(it=>STEP_DONE[it[0]]).length;
              return (<div key={gr.g}>
                <button className="nav-group" aria-expanded={open}
                  title={open?"Click to collapse this phase":"Click to expand this phase"}
                  onClick={()=>setOpenGroups(og=>({...og,[gr.g]:!(og[gr.g]===undefined?hasActive:og[gr.g])}))}>
                  <span>{open?"▾":"▸"} {gr.g}</span>
                  <span className="mono" style={{fontSize:9.5,color:done===gr.items.length?"#1E8E5A":"var(--slate)"}}>{done}/{gr.items.length}{done===gr.items.length?" ✓":""}</span>
                </button>
                {open && gr.items.map(s=>
                  <button key={s[0]} className={"step-btn"+(step===s[0]?" active":"")}
                    disabled={!["portfolio_setup","portfolio_options","ess","profile"].includes(s[0]) && !profile.name.trim()}
                    title={(STEP_HELP[s[0]]||"")+" · "+(STEP_DONE[s[0]]?"Complete":(OPTIONAL_STEP[s[0]]?"Optional":"Pending"))}
                    onClick={()=>{ if(s[0]==="strategy"&&!internalTouched) setGeneric(true); setStep(s[0]); }}>
                    <span style={{display:"inline-block",width:8,height:8,borderRadius:99,marginRight:6,verticalAlign:"middle",
                      background:STEP_DONE[s[0]]?"#1E8E5A":"transparent",
                      border:"2px solid "+(STEP_DONE[s[0]]?"#1E8E5A":"var(--amber)")}}/>
                    {s[1]}
                  </button>)}
              </div>);});})()}
        </nav>
        <main style={{padding:18,maxWidth:900}}>
          {step==="about" && <AboutScreen setStep={setStep} startDemoTour={startDemoTour} setAiOpen={setAiOpen} profileNamed={!!profile.name.trim()} onClose={()=>setStep(aboutReturn)}/>}
          {(()=>{ /* v2.21 — persistent minimum-path strip, per workbench */
            const PSTEPS=["portfolio_setup","portfolio_options","ess"];
            const CSTEPS=["profile","internal","market","assess","forces","kraljic","suppliers","risk","chess","costlevers","nego","exec","value","strategy"];
            const chip=(label,done,current,tip,go,dashed)=>(
              <button key={label} title={tip} onClick={go} style={{cursor:"pointer", fontSize:11, fontWeight:700, padding:"2px 10px", borderRadius:99,
                border:(dashed?"1px dashed ":"1px solid ")+(current?"var(--petrol)":done?"#7FB89F":"var(--line)"),
                background:current?"var(--petrol)":done?"#E4F0EA":"#fff",
                color:current?"#fff":done?"#1E8E5A":"var(--slate)"}}>{done?"✓ ":""}{label}</button>
            );
            const wrap=(title,children)=>(
              <div style={{display:"flex", gap:5, alignItems:"center", flexWrap:"wrap", margin:"0 0 12px", padding:"7px 10px", background:"var(--paper)", border:"1px dashed var(--line)", borderRadius:8}}>
                <b style={{fontSize:10.5, textTransform:"uppercase", letterSpacing:"0.05em", color:"var(--slate)"}}>{title}</b>
                {children}
              </div>
            );
            const goP1=(id)=>()=>{ if(step!=="portfolio_setup"){ setStep("portfolio_setup"); setTimeout(()=>{ const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:"smooth", block:"start"}); },250); } else { const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:"smooth", block:"start"}); } };
            if(PSTEPS.includes(step)){
              const cats=Array.isArray(portfolioDetails.categories)?portfolioDetails.categories:[];
              const factDone=(()=>{ const a=portfolioDetails.assessment||{}; return Object.values(a).some(g2=>g2&&Object.values(g2).some(v=>v&&String(v).trim())); })();
              return wrap("Minimum path — Portfolio:", [
                chip("1 · Charter", !!((portfolioDetails.name||"").trim()&&(portfolioDetails.objectives||"").trim()), step==="portfolio_setup", "P1 — name + strategic objectives are the minimum; click to go", goP1("p1-charter"), false),
                chip("2 · Composition", cats.length>0, step==="portfolio_setup", "P1 — at least one category / service line; click to go", goP1("p1-composition"), false),
                chip("+ Deepen · Fact base & Plans", factDone, step==="portfolio_setup", "P1 — optional deepening (any order); click to go", goP1("p1-factbase"), true),
                chip("3 · Options (P2)", (portfolioDetails.chosenOptions||[]).length>0, step==="portfolio_options", "P2 — four stages: questions → options → weighted assessment → risk heat; adopt at least one option", ()=>setStep("portfolio_options"), false),
                chip("4 · Report (P3)", !!(portfolioDetails.confirmedReport||(portfolioDetails.execSummary&&portfolioDetails.execSummary.text)), step==="ess", "P3 — roll-up, executive summary, edit-&-confirm, board paper", ()=>setStep("ess"), false),
                <span key="x" style={{fontSize:10, color:"var(--slate)"}}>— deepen chips are optional.</span>
              ]);
            }
            if(CSTEPS.includes(step)||step==="sevenps"){
              const items=STEPS.filter(s2=>Array.isArray(s2)&&CSTEPS.includes(s2[0]));
              return wrap("Minimum path — Category (1–14):", [
                ...items.map(([key,title])=>{
                  const num=title.split(" · ")[0];
                  return chip(num, !!STEP_DONE[key], step===key, title+(STEP_DONE[key]?" — complete":" — pending")+"; click to open", ()=>setStep(key), false);
                }),
                <span key="x" style={{fontSize:10, color:"var(--slate)"}}>7Ps is an optional add-on outside the path.</span>
              ]);
            }
            return null;
          })()}
          {step==="portfolio_setup" && <StepPortfolioSetup portfolioId={portfolio} setPortfolio={setPortfolio} portfolioDetails={portfolioDetails} setPortfolioDetails={setPortfolioDetails} next={()=>setStep("portfolio_options")} nextCategory={()=>setStep("profile")} goEss={()=>setStep("ess")}/>}
          {step==="portfolio_options" && <StepPortfolioOptions portfolioId={portfolio} portfolioDetails={portfolioDetails} setPortfolioDetails={setPortfolioDetails} next={()=>setStep("ess")}/>}
          {(()=>{ /* v2.19 — guided entry for fresh sessions */
            const fresh=!(profile.name||"").trim() && !((portfolioDetails&&portfolioDetails.name)||"").trim() && !(portfolioDetails&&(portfolioDetails.categories||[]).length) && storageGet("categoryai_start_dismissed")!=="1";
            if(!fresh) return null;
            const card=(icon,title,body,btn,go)=>(
              <div style={{flex:"1 1 220px", border:"1px solid var(--line)", borderRadius:8, padding:"10px 12px", background:"var(--card)"}}>
                <div style={{fontWeight:800, fontSize:13, color:"var(--petrol)"}}>{icon} {title}</div>
                <div style={{fontSize:11.5, color:"var(--slate)", margin:"4px 0 8px"}}>{body}</div>
                <button className="btn primary" style={{fontSize:11.5}} onClick={go}>{btn}</button>
              </div>
            );
            return (
              <div className="banner" style={{background:"var(--petrolSoft)", borderColor:"var(--petrol)", marginBottom:12}}>
                <b style={{fontSize:14}}>🚦 Start here — what are you building today?</b>
                <div style={{display:"flex", gap:10, flexWrap:"wrap", marginTop:8}}>
                  {card("💼","A portfolio strategy","Several categories/service lines under one charter — options, roll-up and a board paper. Categories can be deep-dived later.","Start the Portfolio (P1) →",()=>{storageSet("categoryai_start_dismissed","1"); setStep("portfolio_setup");})}
                  {card("📦","A single category strategy","One category end-to-end: market, models, suppliers, risk, levers, negotiation, execution — strategy document and business case.","Start a Category (Step 1) →",()=>{storageSet("categoryai_start_dismissed","1"); setStep("profile");})}
                  {card("▶","See it working first","A 19-stop two-part guided tour on a full simulated Cloud Services category — no key, no network, everything labelled simulated.","Use ▶ Demo tour in the header",()=>{storageSet("categoryai_start_dismissed","1");})}
                </div>
                <div style={{fontSize:10.5, color:"var(--slate)", marginTop:6}}>Both tracks stand alone; they connect only when you want them to (a category can update or join a portfolio at the end of its build). <button className="btn ghost" style={{border:"none", fontSize:10.5, padding:0, marginLeft:6}} onClick={()=>{storageSet("categoryai_start_dismissed","1"); setStep(step);}}>Dismiss</button></div>
              </div>
            );
          })()}
          {step==="profile" && !portfolioActiveCategory && dupDismissed!==(profile.name||"").trim().toLowerCase() && (()=>{
            const matches=findPortfolioLineMatches(profile.name, portfolioDetails);
            if(!matches.length) return null;
            return (
              <div className="banner" style={{background:"#FBF3DC", borderColor:"var(--amber)", marginBottom:12, fontSize:12.5}}>
                <b>ℹ Reminder: this category is already part of a portfolio.</b>
                <ul style={{margin:"6px 0", paddingLeft:18}}>
                  {matches.slice(0,4).map((m,i)=>(
                    <li key={i}><b>{m.line}</b> — service line in <b>{m.portfolio}</b>{m.isActive?" (active portfolio)":" (library)"} · current status: <i>{m.status}</i>.</li>
                  ))}
                </ul>
                You can absolutely continue here — for example if you now have <b>more information</b> on this category. It's worth reviewing the existing line strategy first so you build on it rather than redo it. <b>At the end of Steps 1–14 you'll be asked whether to update the portfolio's deep-dive for this line</b> — say yes and this new work replaces it, with a note and timestamp.
                {matches.map((m,i)=>{
                  const s=(()=>{ try{ return m.isActive ? JSON.parse(storageGet("categoryai_portfolio_strategies")||"{}")[m.line] : JSON.parse((loadPortfolioLibrary()[m.libKey]||{}).strategies||"{}")[m.line]; }catch(e){ return null; } })();
                  if(!s) return null;
                  return (
                    <details key={i} style={{marginTop:6}}>
                      <summary style={{cursor:"pointer", fontWeight:700, fontSize:11.5}}>👁 View the existing strategy for "{m.line}" ({m.portfolio})</summary>
                      <div style={{fontSize:11.5, marginTop:4, padding:"6px 10px", background:"#fff", border:"1px solid var(--line)", borderRadius:6}}>
                        <div><b>Source:</b> {s.sourceDetail||s.source} · <b>generated:</b> {s.generatedAt?new Date(s.generatedAt).toLocaleString():"—"}</div>
                        {s.savings && <div><b>Savings:</b> {(s.savings.plannedSavings||0).toLocaleString()} ({s.savings.expectedPercent||0}%) — {s.savings.initiative}</div>}
                        {s.chessboard&&s.chessboard.recommendedLevers&&s.chessboard.recommendedLevers.length>0 && <div><b>Levers:</b> {s.chessboard.recommendedLevers.join(", ")}</div>}
                        {s.negotiation&&s.negotiation.batna && <div><b>BATNA:</b> {s.negotiation.batna}</div>}
                        {s.swot&&s.swot.strengths&&s.swot.strengths.length>0 && <div><b>Strengths:</b> {s.swot.strengths.slice(0,3).join(" · ")}</div>}
                        {s.quadrant && <div><b>Kraljic:</b> {s.quadrant}</div>}
                      </div>
                    </details>
                  );
                })}
                <div style={{display:"flex", gap:8, marginTop:8, flexWrap:"wrap"}}>
                  <button className="btn primary" onClick={()=>setDupDismissed((profile.name||"").trim().toLowerCase())}>Continue here — I'll decide about the portfolio at the end</button>
                  <button className="btn" onClick={()=>setStep("ess")}>Open the Portfolio (P3) instead →</button>
                </div>
              </div>
            );
          })()}
          {step==="profile" && <Step1 profile={profile} setProfile={setProfile} next={()=>setStep("internal")}/>}
          {step==="internal" && <Step3 vars={vars} setVar={setVar} internal={internal} setInternal={setInternal}
            next={()=>{setGeneric(false);setStep("market");}} skip={()=>{setGeneric(true);setStep("market");}}/>}
          {step==="market" && <div>
            <Step2 profile={profile} vars={vars} setVar={setVar} marketBrief={marketBrief} setMarketBrief={setMarketBrief} next={()=>setStep("assess")}/>
            <ResearchCard profile={profile} research={research} setResearch={setResearch}/>
          </div>}
          {step==="assess" && <Step4 mode="assess" profile={profile} vars={vars} generic={generic&&!internalTouched} internal={internal}
            marketBrief={marketBrief} models={models} setModels={setModels} research={research} next={()=>setStep("forces")}/>}
          {step==="forces" && <Step4 mode="forces" profile={profile} vars={vars} generic={generic&&!internalTouched} internal={internal}
            marketBrief={marketBrief} models={models} setModels={setModels} research={research} next={()=>setStep("kraljic")}/>}
          {step==="kraljic" && <Step4 mode="kraljic" profile={profile} vars={vars} generic={generic&&!internalTouched} internal={internal}
            marketBrief={marketBrief} models={models} setModels={setModels} research={research} next={()=>setStep("suppliers")}/>}
          {step==="suppliers" && <StepSuppliers profile={profile} internal={internal} suppliers={suppliers} setSuppliers={setSuppliers} tierScheme={tierScheme} setTierScheme={setTierScheme} srmReviews={srmReviews} setSrmReviews={setSrmReviews} next={()=>setStep("risk")}/>}
          {step==="risk" && <StepRisk profile={profile} research={research} risks={risks} setRisks={setRisks} esgOps={esgOps} setEsgOps={setEsgOps} next={()=>setStep("chess")}/>}
          {step==="chess" && <StepChess profile={profile} vars={vars} generic={generic&&!internalTouched} chess={chess} setChess={setChess} next={()=>setStep("costlevers")}/>}
          {step==="costlevers" && <StepCostLevers profile={profile} cl={cl} setCl={setCl} next={()=>setStep("nego")}/>}
          {step==="nego" && <StepNego profile={profile} vars={vars} generic={generic&&!internalTouched} cl={cl} chess={chess} nego={nego} setNego={setNego} next={()=>setStep("exec")}/>}
          {step==="exec" && <StepExec profile={profile} strategy={strategy} cl={cl} exec={exec} setExec={setExec} next={()=>setStep("ess")}/>}
          {(step==="ess" || step==="portfolio_workflow") && (
            <StepPortfolioWorkflow 
              portfolioId={portfolio} 
              next={()=>setStep("value")}
              portfolioDetails={portfolioDetails}
              setPortfolioDetails={setPortfolioDetails}
              portfolioActiveCategory={portfolioActiveCategory}
              setPortfolioActiveCategory={setPortfolioActiveCategory}
              activeProfileName={profile.name}
              setStep={setStep}
              setProfile={setProfile}
              setVars={setVars}
              setSuppliers={setSuppliers}
              setRisks={setRisks}
              setCl={setCl}
              setNego={setNego}
              setExec={setExec}
              setStrategy={setStrategy}
            />
          )}
          {step==="value" && <StepValue profile={profile} cl={cl} internal={internal} value={value} setValue={setValue} benefits={benefits} setBenefits={setBenefits} esgOps={esgOps} matCheck={matCheck} setMatCheck={setMatCheck} next={()=>setStep("sevenps")}/>}
          {step==="sevenps" && <StepSevenPs profile={profile} sp={sevenPs} setSp={setSevenPs} next={()=>setStep("strategy")}/>}
          {step==="strategy" && !portfolioActiveCategory && (()=>{
            const matches=findPortfolioLineMatches(profile.name, portfolioDetails);
            const hasPortfolio=!!(portfolioDetails&&(((portfolioDetails.name||"").trim())||(portfolioDetails.categories||[]).length));
            if(!matches.length && hasPortfolio && (profile.name||"").trim()){
              return (
                <div className="banner" style={{background:"var(--card)", borderColor:"var(--line)", marginBottom:12, fontSize:12.5}}>
                  <b>➕ Make this category part of your portfolio?</b> "{profile.name}" isn't a line in "{(portfolioDetails.name||"").trim()||"your active portfolio"}" yet. You can add it as a new service line — a composition row is created and this strategy becomes the line's deep-dive of record, flowing into the portfolio report. Entirely optional: standalone is a valid end state.
                  <div style={{display:"flex", gap:8, marginTop:8}}>
                    <button className="btn" onClick={addAsNewLine}>➕ Add "{profile.name}" as a new line</button>
                  </div>
                  {lineSyncMsg && <div style={{marginTop:8, padding:"6px 10px", borderRadius:6, background:lineSyncMsg.ok?"#E4F0EA":"#F7E4E1", border:"1px solid "+(lineSyncMsg.ok?"#7FB89F":"#D8A69E"), fontSize:11.5}}>{lineSyncMsg.msg}</div>}
                </div>
              );
            }
            if(!matches.length) return null;
            return (
              <div className="banner" style={{background:"var(--petrolSoft)", borderColor:"var(--petrol)", marginBottom:12, fontSize:12.5}}>
                <b>🔗 Update the portfolio with this strategy?</b> "{profile.name}" matches {matches.length===1?"a service line":"service lines"} in your portfolio{matches.length>1?"s":""}. Saying yes makes this the line's <b>deep-dived strategy of record</b> — replacing its current one, with a note and timestamp, and flowing into that portfolio's board report.
                <div style={{display:"flex", gap:8, marginTop:8, flexWrap:"wrap"}}>
                  {matches.slice(0,4).map((m,i)=>(
                    <button key={i} className="btn primary" onClick={()=>updatePortfolioLine(m)}>✓ Update "{m.line}" in {m.portfolio}</button>
                  ))}
                </div>
                {lineSyncMsg && <div style={{marginTop:8, padding:"6px 10px", borderRadius:6, background:lineSyncMsg.ok?"#E4F0EA":"#F7E4E1", border:"1px solid "+(lineSyncMsg.ok?"#7FB89F":"#D8A69E"), fontSize:11.5}}>{lineSyncMsg.msg}</div>}
              </div>
            );
          })()}
          {step==="strategy" && <Step5 tierScheme={tierScheme} profile={profile} vars={vars} setVar={setVar} generic={generic&&!internalTouched} internal={internal} opps={opps} setOpps={setOpps}
            marketBrief={marketBrief} strategy={strategy} setStrategy={setStrategy} sevenPs={sevenPs} cl={cl} setCl={setCl} models={models}
            research={research} suppliers={suppliers} srmReviews={srmReviews} matCheck={matCheck} risks={risks} chess={chess} nego={nego} exec={exec} value={value}
            esgOps={esgOps} benefits={benefits} pitch={pitch} setPitch={setPitch}
            saveSessionNow={saveSessionNow} exportSession={exportSession} importSession={importSession}/>}
          <ModuleReview step={step} profile={profile} vars={vars} generic={generic&&!internalTouched} models={models}
            research={research} suppliers={suppliers} risks={risks} esgOps={esgOps} chess={chess} cl={cl} nego={nego}
            exec={exec} value={value} benefits={benefits} sevenPs={sevenPs} strategy={strategy} pitch={pitch}
            internal={internal} tierScheme={tierScheme}/>
        </main>
      </div>
      <ReferenceLibraryChat step={step}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
