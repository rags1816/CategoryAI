const SUPPLIER_ATTR_HELP={
  capability:"Can they actually do the job at scale? Consider: technical depth, capacity, geographic coverage, financial stability, track record in THIS category. 1 = struggles to deliver, 5 = best-in-class.",
  alignment:"Do they want to work with a buyer like us, our way? Consider: cultural fit, responsiveness, willingness to invest in the relationship, how important our business is to them. 1 = we're a nuisance to them, 5 = they treat us as a core account.",
  quality:"Defect rates, rework, spec conformance, complaint history. 1 = frequent failures, 5 = consistently exceeds spec.",
  delivery:"On-time-in-full performance, lead-time reliability, flexibility on urgent asks. 1 = chronically late, 5 = always on time.",
  cost:"Competitiveness vs market benchmarks and transparency of pricing. 1 = expensive & opaque, 5 = market-leading value.",
  innovation:"Do they bring ideas, improvements, new technology proactively? 1 = never, 5 = regular source of innovation.",
  esg:"Sustainability, ethics, compliance posture: certifications, carbon reporting, labour standards, incident history. 1 = red flags, 5 = leader.",
};
const TIER_SCHEMES={standard:["Tier 1","Tier 2","Tier 3"], gsb:["🥇 Gold","🥈 Silver","🥉 Bronze"]};
const TIER_GOV={
  "Tier 1":"Quarterly exec QBRs · joint account plan · named SRM manager · innovation agenda",
  "Tier 2":"Bi-annual reviews · scorecard tracked · escalation route defined",
  "Tier 3":"Annual light-touch review · catalogue / P2P channel · no formal governance",
};
/* Tier scoring calculator (v1.0, adapted from the GA build): score any
   contract on three dimensions → a suggested tier under the chosen naming
   scheme (Gold/Silver/Bronze remains the public-procurement standard).   */
function TierCalculator({tierLabel}){
  const [val,setVal]=useState(3),[risk,setRisk]=useState(3),[cx,setCx]=useState(2);
  const score=0.5*val+0.3*risk+0.2*cx;
  const tier=score>=3.8?"Tier 1":score>=2.6?"Tier 2":"Tier 3";
  const Sl=({label,v,set,help})=>(
    <div style={{flex:"1 1 180px"}}>
      <div style={{fontSize:12,fontWeight:600}}>{label}<Tip t={help}/> <span className="mono" style={{color:"var(--petrol)"}}>{v}/5</span></div>
      <input type="range" min="1" max="5" step="1" value={v} style={{width:"100%"}} onChange={e=>set(+e.target.value)}/>
    </div>);
  return (
    <div style={{border:"1px dashed var(--line)",borderRadius:8,padding:"10px 12px",margin:"10px 0"}}>
      <div style={{fontSize:12.5,fontWeight:700,marginBottom:4}}>🧮 Tier calculator — score any contract<Tip t="A quick governance-tier check for a single contract or supplier, independent of the table above. Weighted: value 50%, supply risk 30%, contract complexity 20%. The suggestion follows your chosen naming scheme — Gold/Silver/Bronze is the recognised public-procurement (GCF) terminology."/></div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
        <Sl label="Value / criticality" v={val} set={setVal} help="How much the contract matters: spend size, business criticality, dependence on outcomes. 1 = minor, 5 = mission-critical."/>
        <Sl label="Supply risk" v={risk} set={setRisk} help="Likelihood and impact of supply failure: market concentration, switching difficulty, continuity exposure. 1 = easily replaced, 5 = severe exposure."/>
        <Sl label="Contract complexity" v={cx} set={setCx} help="How demanding the contract is to manage: bespoke terms, integration, regulatory burden, change volume. 1 = simple catalogue, 5 = highly complex."/>
      </div>
      <div style={{marginTop:8,fontSize:12.5}}>Weighted score <span className="mono"><b>{score.toFixed(1)}</b>/5</span> → suggested tier: <b style={{color:"var(--petrol)"}}>{tierLabel(tier)}</b> <span style={{color:"var(--slate)"}}>— {TIER_GOV[tier]}</span></div>
      <div className="hint" style={{margin:"4px 0 0"}}>A decision aid, not a rule — the table above (segment + spend share) remains the primary basis; use this to sense-check borderline cases or tier a contract that isn't in the supplier list.</div>
    </div>
  );
}

function StepSuppliers({profile,internal,suppliers,setSuppliers,tierScheme,setTierScheme,next}){
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const tierNames=TIER_SCHEMES[tierScheme]||TIER_SCHEMES.standard;
  const tierLabel=t=>tierNames[["Tier 1","Tier 2","Tier 3"].indexOf(t)];
  const names=useMemo(()=>{
    const fromCsv=(internal.spend?internal.spend.suppliers.map(s=>s.supplier):[]);
    return [...new Set([...(profile.suppliers||[]),...fromCsv])];
  },[profile.suppliers,internal.spend]);
  function spendShare(n){
    const s=internal.spend&&internal.spend.suppliers.find(x=>x.supplier===n);
    return s?s.share:0;
  }
  function loadBlank(){
    setSuppliers(names.map(n=>({name:n,capability:3,alignment:3,accountAttractiveness:3,relativeValue:3,conf:"assumed",rationale:"Defaults — not yet assessed.",
      scorecard:Object.fromEntries(SCORECARD_DIMS.map(d=>[d,3])), share:spendShare(n)})));
  }
  async function aiAssess(){
    if(!names.length){ setErr("Add incumbent suppliers on the Category profile step (or upload a spend CSV) first."); return; }
    setBusy(true); setErr("");
    try{
      const out=await askClaude(
        `You are a supplier relationship analyst. Category: "${profile.name}" (sector ${profile.sector||"unspecified"}). For each supplier below, score 1-5: capability (technical/delivery capability in this category), alignment (strategic/cultural alignment to a buyer like us), accountAttractiveness (how attractive a typical mid-size buyer's account is TO THIS SUPPLIER: ease, prestige, growth), relativeValue (how big such a buyer's spend likely is relative to the supplier's total revenue: 1=rounding error, 5=material), plus a scorecard of quality, delivery, cost, innovation, esg (1-5, use 3 where unknown), and a one-sentence rationale. Suppliers: ${names.join(", ")}.
Respond ONLY with JSON, no fences: {"suppliers":[{"name":"","capability":n,"alignment":n,"accountAttractiveness":n,"relativeValue":n,"scorecard":{"quality":n,"delivery":n,"cost":n,"innovation":n,"esg":n},"rationale":""}]}`);
      setSuppliers((out.suppliers||[]).filter(s=>s.name).map(s=>({accountAttractiveness:3,relativeValue:3,...s,conf:"ai",share:spendShare(s.name)})));
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }
  const upd=(i,patch)=>setSuppliers(ss=>ss.map((s,j)=>j===i?{...s,...patch,conf:"user"}:s));
  const tierOf=s=>{
    const seg=segmentOf(s.capability,s.alignment);
    if(seg==="Strategic partner"||s.share>0.15) return "Tier 1";
    if(seg==="Develop"||s.share>0.05) return "Tier 2";
    return "Tier 3";
  };
  return (
    <div>
      <div className="card">
        <h2 className="display">Supplier segmentation<Tip t="Positions each supplier by capability vs strategic alignment — decides who you partner with, develop, contract tightly, or phase out. Contract tier & governance are derived from segment + spend share."/></h2>
        <p className="hint">Suppliers come from the Category profile chips and the spend CSV. AI scores each on capability & alignment plus a five-dimension scorecard — edit anything (flips to User). Segment and contract tier are derived live.</p>
        <div className="banner"><b>How are these scored?</b> The AI scores from its general market knowledge of each supplier (reputation, scale, track record in this category) plus your category context — it's an informed <b>starting point, not a verified rating</b>, which is why every AI score is flagged <span className="badge ai">AI-inferred</span>. For unknown or niche suppliers it defaults to 3. Replace with your own SRM/performance data wherever you have it (edits flip to <span className="badge user">User</span>). <b>Manual scoring basis:</b> hover any column heading for what a 1 vs a 5 means on that attribute.</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button className="btn dark" disabled={busy} onClick={aiAssess}>{busy?"Assessing…":"⚡ AI-assess suppliers"}</button>
          <button className="btn" onClick={loadBlank} disabled={!names.length}>Load suppliers for manual scoring</button>
        </div>
        {!names.length && <div className="banner" style={{marginTop:10}}>No suppliers yet — add incumbents on <b>1 · Category profile</b> or upload a spend CSV on <b>2 · Spend profile</b>. You can also skip this step.</div>}
        {busy && <Spinner label="Scoring suppliers…"/>}
        {err && <div className="err">{err}</div>}
      </div>
      {suppliers.length>0 && (
      <div className="card">
        <div style={{display:"flex",gap:20,flexWrap:"wrap",alignItems:"flex-start"}}>
          <svg viewBox="0 0 320 300" style={{flex:"0 1 340px",width:"100%",maxWidth:360}}>
            <rect x="40" y="12" width="130" height="127" fill="#EAF1F8"/><rect x="170" y="12" width="130" height="127" fill="var(--petrolSoft)"/>
            <rect x="40" y="139" width="130" height="127" fill="#F3F2EE"/><rect x="170" y="139" width="130" height="127" fill="var(--amberSoft)"/>
            <text x="46" y="26" fontSize="9" fontWeight="700" fill="#2E6FB3">DEVELOP</text>
            <text x="296" y="26" fontSize="9" fontWeight="700" fill="var(--petrol)" textAnchor="end">STRATEGIC PARTNER</text>
            <text x="46" y="260" fontSize="9" fontWeight="700" fill="var(--slate)">TACTICAL / PHASE OUT</text>
            <text x="296" y="260" fontSize="9" fontWeight="700" fill="var(--amber)" textAnchor="end">TRANSACTIONAL</text>
            {suppliers.map((s,i)=>{
              const x=40+((s.capability-1)/4)*260, y=266-((s.alignment-1)/4)*254;
              return (<g key={i}><circle cx={x} cy={y} r={5+s.share*30} fill="var(--mulberry)" opacity=".75"/>
                <text x={x+8} y={y+3} fontSize="8.5" fill="var(--ink)">{s.name.slice(0,14)}</text></g>);
            })}
            <text x="160" y="292" fontSize="10" fill="var(--slate)" textAnchor="middle">Capability →</text>
            <text x="14" y="150" fontSize="10" fill="var(--slate)" textAnchor="middle" transform="rotate(-90 14 150)">Alignment →</text>
          </svg>
          <div style={{flex:"1 1 260px"}}>
            {Object.entries(SEGMENTS).map(([k,v])=>(
              <div key={k} className="hint" style={{margin:"0 0 6px"}}><b style={{color:v.color}}>{k}:</b> {v.advice}</div>))}
          </div>
        </div>
        <h3>Supplier scorecard & tiering<Tip t="Score 1-5 per dimension. Tier is derived: Tier 1 = strategic partners or >15% of spend; Tier 2 = develop segment or >5%; Tier 3 = the rest. Governance follows the tier."/></h3>
        <div style={{overflowX:"auto"}}>
        <table><thead><tr><th>Supplier</th>
          <th title={SUPPLIER_ATTR_HELP.capability}>Cap. ⓘ</th>
          <th title={SUPPLIER_ATTR_HELP.alignment}>Align. ⓘ</th>
          {SCORECARD_DIMS.map(dd=><th key={dd} style={{textTransform:"capitalize"}} title={SUPPLIER_ATTR_HELP[dd]}>{dd} ⓘ</th>)}
          <th>Segment</th><th>Tier</th><ConfHeader/></tr></thead><tbody>
          {suppliers.map((s,i)=>(
            <tr key={i}>
              <td><b>{s.name}</b>{s.share>0&&<div style={{fontSize:10,color:"var(--slate)"}}>{(s.share*100).toFixed(0)}% spend</div>}</td>
              <td><input type="number" min="1" max="5" value={s.capability} style={{width:44,padding:"3px 4px",fontSize:12}} onChange={e=>upd(i,{capability:Math.max(1,Math.min(5,+e.target.value||1))})}/></td>
              <td><input type="number" min="1" max="5" value={s.alignment} style={{width:44,padding:"3px 4px",fontSize:12}} onChange={e=>upd(i,{alignment:Math.max(1,Math.min(5,+e.target.value||1))})}/></td>
              {SCORECARD_DIMS.map(dd=>(
                <td key={dd}><input type="number" min="1" max="5" value={s.scorecard[dd]} style={{width:44,padding:"3px 4px",fontSize:12}}
                  onChange={e=>upd(i,{scorecard:{...s.scorecard,[dd]:Math.max(1,Math.min(5,+e.target.value||1))}})}/></td>))}
              <td style={{fontSize:11.5,color:SEGMENTS[segmentOf(s.capability,s.alignment)].color,fontWeight:700}}>{segmentOf(s.capability,s.alignment)}</td>
              <td className="mono" style={{fontSize:11.5}}>{tierLabel(tierOf(s))}</td>
              <ConfCell conf={s.conf} onChange={c=>setSuppliers(ss=>ss.map((x,j)=>j===i?{...x,conf:c}:x))}/>
            </tr>))}
        </tbody></table>
        </div>
        <h3>Contract tiering & governance<Tip t="Tiers decide how much management attention each supplier gets — heavyweight governance for the few that matter, light touch for the tail. The basis is spend share + relationship segment."/></h3>
        <div className="banner"><b>What is this and what's the basis?</b> Not every supplier deserves the same management effort — tiering matches governance to importance. The rules here: <b>{tierNames[0]}</b> = Strategic-partner segment <b>or</b> &gt;15% of category spend (your success depends on them — heavyweight governance). <b>{tierNames[1]}</b> = Develop segment <b>or</b> &gt;5% of spend (important — regular reviews). <b>{tierNames[2]}</b> = everyone else (manage for efficiency, not relationship). Adjust a supplier's capability/alignment or spend and its tier moves automatically.</div>
        <div style={{display:"flex",gap:8,alignItems:"center",margin:"6px 0 10px"}}>
          <span style={{fontSize:12.5,fontWeight:600}}>Naming scheme:</span>
          <select value={tierScheme} style={{maxWidth:260}} onChange={e=>setTierScheme(e.target.value)}>
            <option value="standard">Tier 1 / Tier 2 / Tier 3</option>
            <option value="gsb">Gold / Silver / Bronze (GCF style)</option>
          </select>
        </div>
        {["Tier 1","Tier 2","Tier 3"].map(t=>(
          <div key={t} className="hint" style={{margin:"0 0 5px"}}><b>{tierLabel(t)}</b> ({suppliers.filter(s=>tierOf(s)===t).map(s=>s.name).join(", ")||"none"}): {TIER_GOV[t]}</div>))}
        <TierCalculator tierLabel={tierLabel}/>
        <h3 style={{marginTop:18}}>Supplier preferencing — how THEY see US<Tip t="Flips the lens: our segmentation is our view of them; preferencing is their likely view of our account. Axes: how attractive our account is to them × how big our business is relative to their revenue. Core = they invest in us; Development = they want to grow us; Exploitable = they harvest margin; Nuisance = expect their worst service."/></h3>
        <div className="banner"><b>Why this matters:</b> a supplier you call "Strategic partner" that sees you as a <b>Nuisance</b> will never behave like a partner — that mismatch is one of the most common reasons category strategies fail. Score their likely view below and watch the alerts.</div>
        <div className="banner" style={{background:"#EEF4F1",borderColor:"#9FBFB4"}}><b>What are these scores based on?</b> Two inputs, both 1–5: <b>Account attractiveness</b> = how appealing <i>your</i> business is to that supplier (do you pay on time, easy to serve, prestigious to reference, growing?) and <b>Relative value</b> = your spend as a share of <i>their</i> total revenue (a rounding error, or material to them?). When AI assesses, it estimates these from the supplier's likely size and typical buyer profile for your category. <b>Be clear what this is: a subjective judgement, not a measurement.</b> Preferencing is inherently a view of how the <i>supplier</i> perceives you — the AI's placement is its best suggestion from outside signals, flagged <span className="badge ai">AI-inferred</span>, and it is the category manager's call to sharpen or overrule it. <b>Sharpen it with what you actually know:</b> your relationship history and, for Relative value, the supplier's published revenue vs your annual spend on them (from your spend file). Override the two numbers and the quadrant + alerts update; the value flips to <span className="badge user">User</span>.</div>
        <div style={{display:"flex",gap:20,flexWrap:"wrap",alignItems:"flex-start"}}>
          <svg viewBox="0 0 320 300" style={{flex:"0 1 340px",width:"100%",maxWidth:360}}>
            <rect x="40" y="12" width="130" height="127" fill="#EAF1F8"/><rect x="170" y="12" width="130" height="127" fill="var(--petrolSoft)"/>
            <rect x="40" y="139" width="130" height="127" fill="#F6E3DE"/><rect x="170" y="139" width="130" height="127" fill="var(--amberSoft)"/>
            <text x="46" y="26" fontSize="9" fontWeight="700" fill="#2E6FB3">DEVELOPMENT</text>
            <text x="296" y="26" fontSize="9" fontWeight="700" fill="var(--petrol)" textAnchor="end">CORE</text>
            <text x="46" y="260" fontSize="9" fontWeight="700" fill="var(--red)">NUISANCE</text>
            <text x="296" y="260" fontSize="9" fontWeight="700" fill="var(--amber)" textAnchor="end">EXPLOITABLE</text>
            {suppliers.map((s,i)=>{
              const x=40+(((s.relativeValue||3)-1)/4)*260, y=266-(((s.accountAttractiveness||3)-1)/4)*254;
              return (<g key={i}><circle cx={x} cy={y} r={5+s.share*30} fill="var(--ink)" opacity=".7"/>
                <text x={x+8} y={y+3} fontSize="8.5" fill="var(--ink)">{s.name.slice(0,14)}</text></g>);
            })}
            <text x="160" y="292" fontSize="10" fill="var(--slate)" textAnchor="middle">Relative value of our business to them →</text>
            <text x="14" y="150" fontSize="10" fill="var(--slate)" textAnchor="middle" transform="rotate(-90 14 150)">Attractiveness of our account →</text>
          </svg>
          <div style={{flex:"1 1 280px"}}>
            <div style={{overflowX:"auto"}}>
            <table><thead><tr><th>Supplier</th>
              <th title={PREF_ATTR_HELP.accountAttractiveness}>Att. ⓘ</th>
              <th title={PREF_ATTR_HELP.relativeValue}>Val. ⓘ</th>
              <th>Their view</th></tr></thead><tbody>
              {suppliers.map((s,i)=>{
                const p=prefOf(s.accountAttractiveness||3,s.relativeValue||3);
                return (
                <tr key={i}>
                  <td><b>{s.name}</b></td>
                  <td><input type="number" min="1" max="5" value={s.accountAttractiveness||3} style={{width:44,padding:"3px 4px",fontSize:12}} onChange={e=>upd(i,{accountAttractiveness:Math.max(1,Math.min(5,+e.target.value||1))})}/></td>
                  <td><input type="number" min="1" max="5" value={s.relativeValue||3} style={{width:44,padding:"3px 4px",fontSize:12}} onChange={e=>upd(i,{relativeValue:Math.max(1,Math.min(5,+e.target.value||1))})}/></td>
                  <td style={{fontSize:11.5,fontWeight:700,color:PREF_QUADS[p].color}}>{p}</td>
                </tr>);})}
            </tbody></table>
            </div>
            {Object.entries(PREF_QUADS).map(([k,v])=>(
              <div key={k} className="hint" style={{margin:"6px 0 0"}}><b style={{color:v.color}}>{k}:</b> {v.advice}</div>))}
          </div>
        </div>
        {suppliers.filter(s=>segmentOf(s.capability,s.alignment)==="Strategic partner"&&["Nuisance","Exploitable"].includes(prefOf(s.accountAttractiveness||3,s.relativeValue||3))).map(s=>(
          <div key={s.name} className="err" style={{marginTop:10}}>⚠ <b>Mismatch:</b> you treat <b>{s.name}</b> as a Strategic partner but they likely see you as <b>{prefOf(s.accountAttractiveness||3,s.relativeValue||3)}</b> — partnership behaviours won't materialise until you raise your attractiveness (easier to serve, faster payment, growth story) or reduce dependency.</div>))}
      </div>
      )}
      <div className="card"><button className="btn primary" onClick={next}>Continue to risk heatmap →</button></div>
    </div>
  );
}

/* ---------- 8. Risk heatmap 5x5 ---------- */
function StepRisk({profile,research,risks,setRisks,esgOps,setEsgOps,next}){
  const [busy,setBusy]=useState("");
  const [err,setErr]=useState("");
  async function gen(){
    setBusy("risks"); setErr("");
    try{
      const out=await askClaude(
        `You are a procurement risk analyst. Category: "${profile.name}" (sector ${profile.sector||"unspecified"}, region ${profile.region||"Global"}).${research?" Recent research findings: "+(research.disruptions||[]).map(d=>d.disruption).join("; ")+".":""}
Produce 6-8 category risks. For each: risk (short name), detail (one sentence), likelihood 1-5, impact 1-5, mitigation (one specific action).
Respond ONLY with JSON, no fences: {"risks":[{"risk":"","detail":"","likelihood":n,"impact":n,"mitigation":""}]}`);
      setRisks((out.risks||[]).map(r=>({...r,conf:"ai"})));
    }catch(e){ setErr(e.message); }
    setBusy("");
  }
  async function genEsg(){
    setBusy("esg"); setErr("");
    try{
      const out=await askClaude(
        `You are a sustainable-procurement specialist. Category: "${profile.name}" (sector ${profile.sector||"unspecified"}, region ${profile.region||"Global"}). Identify 5-7 ESG & social value OPPORTUNITIES (not risks) a buyer can pursue through this category. Cover a mix of types: Environmental (carbon, circularity, waste), Social (labour standards, diversity, community), Governance (transparency, ethics), Social value (local employment, SME/social-enterprise spend, skills). For each: opportunity (short), type, action (one specific step), benefit (what it delivers).
Respond ONLY with JSON, no fences: {"opportunities":[{"opportunity":"","type":"Environmental|Social|Governance|Social value","action":"","benefit":""}]}`);
      setEsgOps((out.opportunities||[]).map(o=>({...o,conf:"ai"})));
    }catch(e){ setErr(e.message); }
    setBusy("");
  }
  const upd=(i,patch)=>setRisks(rs=>rs.map((r,j)=>j===i?{...r,...patch,conf:"user"}:r));
  const updE=(i,patch)=>setEsgOps(es=>es.map((o,j)=>j===i?{...o,...patch,conf:"user"}:o));
  const ESG_COLORS={Environmental:"var(--petrol)",Social:"#2E6FB3",Governance:"var(--mulberry)","Social value":"var(--amber)"};
  const cellColor=(l,im)=>{const s=l*im; return s>=15?"#E2A69B":s>=8?"#F3DCA8":"#CFE3DC";};
  return (
    <div>
      <div className="card">
        <h2 className="display">Risk heatmap (5×5)<Tip t="Likelihood × impact for each category risk. Score ≥15 = red (act now), 8-14 = amber (mitigate & monitor), <8 = green (accept & watch). Feeds the risk register in the strategy document."/></h2>
        <button className="btn dark" disabled={busy==="risks"} onClick={gen}>{busy==="risks"?"Generating…":risks.length?"↻ Regenerate risks":"⚡ AI-generate risk register"}</button>
        {busy && <Spinner label="Identifying category risks…"/>}
        {err && <div className="err">{err}</div>}
        {risks.length>0 && (<div style={{display:"flex",gap:20,flexWrap:"wrap",alignItems:"flex-start",marginTop:14}}>
          <svg viewBox="0 0 300 300" style={{flex:"0 1 320px",width:"100%",maxWidth:340}}>
            {[1,2,3,4,5].map(l=>[1,2,3,4,5].map(im=>(
              <rect key={l+"-"+im} x={40+(l-1)*50} y={250-(im)*48+8} width="50" height="48" fill={cellColor(l,im)} stroke="#fff"/>)))}
            {risks.map((r,i)=>(
              <g key={i}>
                <circle cx={40+(r.likelihood-1)*50+25+((i%3)-1)*11} cy={250-r.impact*48+8+24+(Math.floor(i/3)%2)*12} r="10" fill="var(--ink)"/>
                <text x={40+(r.likelihood-1)*50+25+((i%3)-1)*11} y={250-r.impact*48+8+28+(Math.floor(i/3)%2)*12} fontSize="10" fill="#fff" textAnchor="middle" fontWeight="700">{i+1}</text>
              </g>))}
            <text x="165" y="292" fontSize="11" fill="var(--slate)" textAnchor="middle">Likelihood →</text>
            <text x="14" y="150" fontSize="11" fill="var(--slate)" textAnchor="middle" transform="rotate(-90 14 150)">Impact →</text>
          </svg>
          <div style={{flex:"1 1 320px",overflowX:"auto"}}>
            <table><thead><tr><th>#</th><th>Risk</th><th>L</th><th>I</th><th>Mitigation</th><ConfHeader/></tr></thead><tbody>
              {risks.map((r,i)=>(
                <tr key={i}>
                  <td className="mono">{i+1}</td>
                  <td><b>{r.risk}</b><div style={{fontSize:11,color:"var(--slate)"}}>{r.detail}</div></td>
                  <td><input type="number" min="1" max="5" value={r.likelihood} style={{width:42,padding:"3px 4px",fontSize:12}} onChange={e=>upd(i,{likelihood:Math.max(1,Math.min(5,+e.target.value||1))})}/></td>
                  <td><input type="number" min="1" max="5" value={r.impact} style={{width:42,padding:"3px 4px",fontSize:12}} onChange={e=>upd(i,{impact:Math.max(1,Math.min(5,+e.target.value||1))})}/></td>
                  <td><textarea rows={1} style={{fontSize:11.5,minHeight:30}} value={r.mitigation} onChange={e=>upd(i,{mitigation:e.target.value})}/></td>
                  <ConfCell conf={r.conf} onChange={c=>setRisks(rs=>rs.map((x,j)=>j===i?{...x,conf:c}:x))}/>
                </tr>))}
            </tbody></table>
          </div>
        </div>)}
        <h3 style={{marginTop:18}}>🌱 ESG & social value opportunities<Tip t="The upside twin of the risk register: what this category can deliver for sustainability and society — carbon reduction, circularity, labour standards, SME/social-enterprise spend, local skills. AI-suggested, fully editable, exported alongside the risk register."/></h3>
        <p className="hint">Risks tell you what to defend against; this section is what the category can <b>positively deliver</b> — increasingly a board-level requirement alongside savings. Each opportunity carries a type, a concrete action, and the benefit it produces. <b>To take ownership of an AI-generated row</b>, edit the action text (auto-flips to User), or use the <b>Confidence</b> column: pick "User" from the dropdown, or click the green ✓ to confirm the AI's suggestion as reviewed and owned by you.</p>
        <button className="btn" style={{background:"var(--petrolSoft)",color:"var(--petrol)",border:"none"}} disabled={busy==="esg"} onClick={genEsg}>{busy==="esg"?"Generating…":esgOps.length?"↻ Regenerate ESG opportunities":"⚡ AI-generate ESG & social value opportunities"}</button>
        {busy==="esg" && <Spinner label="Identifying ESG & social value opportunities…"/>}
        {esgOps.length>0 && (
          <div style={{overflowX:"auto",marginTop:10}}>
          <table><thead><tr><th>Opportunity</th><th>Type</th><th>Action</th><th>Benefit</th><ConfHeader/></tr></thead><tbody>
            {esgOps.map((o,i)=>(
              <tr key={i}>
                <td><b>{o.opportunity}</b></td>
                <td><span style={{fontSize:11,fontWeight:700,color:ESG_COLORS[o.type]||"var(--slate)"}}>{o.type}</span></td>
                <td><textarea rows={1} style={{fontSize:11.5,minHeight:30}} value={o.action} onChange={e=>updE(i,{action:e.target.value})}/></td>
                <td style={{fontSize:11.5}}>{o.benefit}</td>
                <ConfCell conf={o.conf} onChange={c=>setEsgOps(es=>es.map((x,j)=>j===i?{...x,conf:c}:x))}/>
              </tr>))}
          </tbody></table>
          </div>
        )}
        <div style={{marginTop:12}}><button className="btn primary" onClick={next}>Continue to chessboard levers →</button></div>
      </div>
    </div>
  );
}

/* ---------- 9. Purchasing chessboard: full 64-method board ----------
   4 base strategies × 4 approaches × 4 methods = 64. This is ProcureAI's
   OPEN board (own naming, standard practice) — orgs licensing the A.T.
   Kearney Purchasing Chessboard can paste the official 64 via 🛠 Admin →
   Chessboard, which replaces this master data.                        */
const CHESSBOARD_64_DEFAULT={
  "Manage spend":{when:"Your demand power LOW · supplier power LOW",approaches:{
    "Demand management":["Demand challenge & approval gates","Consumption monitoring","Buying-policy tightening","Specification discipline"],
    "Volume bundling":["Cross-site bundling","Multi-category bundling","Buying consortium","Framework participation"],
    "Commercial data mining":["Spend-cube analytics","Price benchmarking","Contract-compliance mining","Tail-spend analysis"],
    "Co-sourcing":["Shared category teams","Group purchasing organisation","Outsourced tail management","Peer benchmarking clubs"]}},
  "Leverage competition among suppliers":{when:"Your demand power HIGH · supplier power LOW",approaches:{
    "Tendering":["Structured RFP","Reverse auction","Dutch auction","Dynamic bidding events"],
    "Target pricing":["Should-cost modelling","Linear performance pricing","Price-index alignment","Open-book negotiation"],
    "Globalisation":["Global sourcing","Low-cost-country sourcing","Best-shore mix","Import substitution"],
    "Supplier pricing review":["Price unbundling","Discount structure redesign","Payment-terms trading","Rebate & volume-break design"]}},
  "Seek joint advantage with supplier":{when:"Your demand power HIGH · supplier power HIGH",approaches:{
    "Value partnership":["Joint business plans","Executive alignment","Gain-share agreements","Long-term capacity partnerships"],
    "Integrated operations":["Collaborative planning & forecasting","Vendor-managed inventory","Process integration","Joint quality programmes"],
    "Value-chain reconfiguration":["Make-vs-buy rebalance","Vertical integration options","Joint ventures","Supplier development investment"],
    "Innovation partnership":["Joint product development","Early supplier involvement","Technology roadmap sharing","IP co-ownership models"]}},
  "Change the nature of demand":{when:"Your demand power LOW · supplier power HIGH",approaches:{
    "Innovation breakthrough":["Substitute development","Design-to-cost","Technical re-specification","Function-based sourcing"],
    "Risk management":["Dual-sourcing build-up","Hedging & indexation","Inventory buffers","Contractual risk transfer"],
    "Demand reduction":["Requirement elimination","Lifetime extension","Re-use & refurbishment","Sharing / pooling models"],
    "Attractiveness raising":["Volume concentration on one supplier","Longer commitments","Simplified doing-business terms","Growth-story selling"]}},
};
function getChessboard(){ return (typeof CUSTOM!=="undefined"&&CUSTOM.chessboard&&Object.keys(CUSTOM.chessboard).length)?CUSTOM.chessboard:CHESSBOARD_64_DEFAULT; }
const CHESS_QUADS={
  "Leverage competition among suppliers":{when:"Your demand power HIGH · supplier power LOW"},
  "Seek joint advantage with supplier":{when:"Your demand power HIGH · supplier power HIGH"},
  "Change the nature of demand":{when:"Your demand power LOW · supplier power HIGH"},
  "Manage spend":{when:"Your demand power LOW · supplier power LOW"},
};
/* The literal 8×8 board (v1.0, inspired by the GA build): each strategy is a
   4×4 quadrant, each approach a 2×2 block, each cell one method. Axes: our
   demand power → right, supplier power → up. Cells in the shortlist light up
   amber; clicking a cell adds it to / removes it from the shortlist.       */
const QUAD_TINTS=["#EEF4F1","#F5EEF4","#FBF6E9","#EFF1F4"];
function quadSlot(when,idx){
  const w=(when||"").toLowerCase();
  const dHigh=/demand power\s*high/.test(w), dLow=/demand power\s*low/.test(w);
  const sHigh=/supplier power\s*high/.test(w), sLow=/supplier power\s*low/.test(w);
  if((dHigh||dLow)&&(sHigh||sLow)) return {qr:sHigh?0:1, qc:dHigh?1:0};
  return {qr:Math.floor(idx/2), qc:idx%2}; // fallback: insertion order TL,TR,BL,BR
}
function Chessboard64({board,quad,shortlist,onToggle,cap}){
  const inList=n=>shortlist.some(m=>(m.name||"").toLowerCase()===n.toLowerCase());
  const kept=n=>shortlist.some(m=>(m.name||"").toLowerCase()===n.toLowerCase()&&m.keep!==false);
  const cells=[]; const quadMeta=[];
  Object.entries(board).forEach(([strat,v],idx)=>{
    const {qr,qc}=quadSlot(v.when,idx);
    quadMeta.push({strat,qr,qc,home:strat===quad,tint:QUAD_TINTS[idx%4]});
    Object.entries(v.approaches).forEach(([app,ms],a)=>{
      const br=Math.floor(a/2),bc=a%2;
      ms.forEach((mname,mi)=>{
        const mr=Math.floor(mi/2),mc=mi%2;
        cells.push({row:qr*4+br*2+mr, col:qc*4+bc*2+mc, strat, app, name:mname, home:strat===quad, tint:QUAD_TINTS[idx%4]});
      });
    });
  });
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6,marginBottom:6}}>
        {quadMeta.sort((a,b)=>(a.qr-b.qr)||(a.qc-b.qc)).map(q=>(
          <div key={q.strat} style={{fontSize:11.5,fontWeight:700,textAlign:"center",padding:"3px 4px",borderRadius:6,
            color:q.home?"#fff":"var(--ink)",background:q.home?"var(--petrol)":q.tint,border:"1px solid "+(q.home?"var(--petrol)":"var(--line)")}}>
            {q.strat}{q.home?" ★ (home)":""}</div>))}
      </div>
      <div style={{display:"flex",gap:6}}>
        <div style={{writingMode:"vertical-rl",transform:"rotate(180deg)",fontSize:10.5,color:"var(--slate)",textAlign:"center",fontWeight:600}}>Supplier power →</div>
        <div style={{flex:1}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:3}}>
            {cells.sort((a,b)=>(a.row-b.row)||(a.col-b.col)).map(c=>{
              const sel=inList(c.name), isKept=kept(c.name);
              return (
                <div key={c.row+"-"+c.col}
                  title={c.strat+" › "+c.app+" › "+c.name+(sel?"  — in shortlist (click to remove)":"  — click to add to shortlist")}
                  onClick={()=>onToggle(c)}
                  style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center",
                    padding:3,fontSize:8.5,lineHeight:1.15,fontWeight:sel?800:500,cursor:"pointer",borderRadius:4,overflow:"hidden",
                    background:sel?(isKept?"var(--amber)":"#F4E3B2"):c.tint,
                    color:sel?"#3A2E10":"var(--ink)",
                    border:c.home?"1.5px solid var(--petrol)":"1px solid var(--line)",
                    boxShadow:sel?"0 0 6px rgba(216,164,65,.7)":"none"}}>
                  {c.name}
                </div>);
            })}
          </div>
          <div style={{fontSize:10.5,color:"var(--slate)",textAlign:"center",fontWeight:600,marginTop:3}}>Our demand power →</div>
        </div>
      </div>
      <div className="hint" style={{marginTop:6}}>■ Home-strategy cells carry a petrol border · <span style={{background:"var(--amber)",padding:"0 6px",borderRadius:3}}>amber</span> = in your shortlist (paler amber = shortlisted but not ticked "Keep") · hover any cell for Strategy › Approach › Method · <b>click a cell</b> to add or remove it yourself — manual picks arrive marked User and ticked{cap?` (shortlist capped at ${cap})`:""}.</div>
    </div>
  );
}
function StepChess({profile,vars,generic,chess,setChess,next}){
  const d=deriveScores(vars,generic);
  const supplierPower=d.porter["Supplier power"], demandPower=d.porter["Buyer power (yours)"];
  const quad = demandPower>=3
    ? (supplierPower>=3?"Seek joint advantage with supplier":"Leverage competition among suppliers")
    : (supplierPower>=3?"Change the nature of demand":"Manage spend");
  const board=getChessboard();
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const CHESS_CAP=15;
  const shortlist=chess?.methods||[];
  const keptCount=shortlist.filter(m=>m.keep!==false).length;
  const atCap=shortlist.length>=CHESS_CAP;
  async function gen(){
    setBusy(true); setErr("");
    try{
      const boardDump=Object.entries(board).map(([strat,v])=>strat+": "+Object.entries(v.approaches).map(([a,ms])=>a+" ("+ms.join(", ")+")").join("; ")).join("\n");
      const already=shortlist.map(m=>m.name);
      const out=await askClaude(
        `Purchasing-chessboard lever selection. Category: "${profile.name}" (sector ${profile.sector||"unspecified"}). Power balance: our demand power ${demandPower.toFixed(1)}/5, supplier power ${supplierPower.toFixed(1)}/5 → base strategy "${quad}".
The full 64-method board (pick methods primarily from the base strategy, but you may borrow 1-2 from an adjacent strategy if clearly justified):\n${boardDump}
${already.length?`ALREADY SHORTLISTED — do NOT repeat any of these; recommend DIFFERENT methods that are the next-best fits: ${already.join(", ")}.`:""}
Recommend the ${already.length?"next ":""}4-6 best specific methods for this category. For each give: a one-sentence rationale, expected effort Low/Med/High, and fit "High" (clearly right for this category) or "Medium" (credible alternative worth considering).
Respond ONLY with JSON, no fences: {"methods":[{"name":"exact method name from the board","approach":"its approach","rationale":"","effort":"Low|Med|High","fit":"High|Medium"}]}`);
      const firstBatch=shortlist.length===0;
      const seen=new Set(shortlist.map(m=>(m.name||"").toLowerCase()));
      const add=(out.methods||[])
        .filter(m=>m.name&&!seen.has(m.name.toLowerCase()))
        .slice(0,Math.max(0,CHESS_CAP-shortlist.length))
        .map(m=>({...m,fit:m.fit==="High"?"High":"Medium",conf:"ai",keep:firstBatch}));
      if(!add.length&&!firstBatch) setErr("No new distinct methods returned — the shortlist already covers the strongest fits for this quadrant.");
      setChess({quad,methods:[...shortlist,...add]});
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }
  const isCustom=board!==CHESSBOARD_64_DEFAULT;
  return (
    <div className="card">
      <h2 className="display">Purchasing chessboard <span className="mono" style={{fontSize:11,color:"var(--slate)"}}>· 64 methods</span><Tip t="The full power-balance board: 4 base strategies × 4 approaches × 4 methods = 64 sourcing methods. Your demand power vs supplier power (from Five Forces) picks the home strategy; AI recommends specific methods from the whole board. Licensed orgs can replace this open board with the official A.T. Kearney data via 🛠 Admin → Chessboard."/></h2>
      <div className="banner">Power balance derived from Five Forces: <b>your demand power {demandPower.toFixed(1)}/5</b> · <b>supplier power {supplierPower.toFixed(1)}/5</b> → home strategy: <b>{quad}</b> <span style={{color:"var(--slate)"}}>({board[quad]?.when||CHESS_QUADS[quad].when})</span>{isCustom&&<b> · using your organisation's licensed board</b>}</div>
      <div className="banner" style={{background:"#EEF4F1",borderColor:"#9FBFB4"}}><b>Reading this board.</b> There are four base strategies, one per power-balance quadrant. The <b style={{color:"var(--petrol)"}}>green box marked ★</b> is <b>your</b> home strategy — the one your demand-power-vs-supplier-power position lands you in; the other three are shown for context (and for borrowing a method if justified). <b>"⚡ AI-recommend"</b> reads the whole 64-method board and picks the handful best suited to <i>this</i> category, with a rationale, effort rating and fit ranking each. <b>Exploring more options never loses your list:</b> "＋ Recommend more" <i>adds</i> the next-best distinct methods to a growing shortlist (capped at 15) — the AI is told what's already shown and asked for different ones, so each run explores more of the board instead of overwriting it. You then <b>tick "Keep"</b> on the methods you judge right: only ticked methods flow into the strategy document, the negotiation context and the assumption register. The first batch arrives pre-ticked as a strong default; later batches arrive unticked for you to cherry-pick. Your home strategy (the green box) is fixed by the power balance and never changes — only the method shortlist grows.</div>
      <p className="hint">The full board, one cell per method — the 64 are master data, identical across categories, so selections stay comparable. {!isCustom&&"This is ProcureAI's open board (own naming, standard practice); the licensed ATK board can be plugged in via Admin."}</p>
      <Chessboard64 board={board} quad={quad} shortlist={shortlist} cap={CHESS_CAP}
        onToggle={c=>{
          const i=shortlist.findIndex(m=>(m.name||"").toLowerCase()===c.name.toLowerCase());
          if(i>=0){ setChess({quad,methods:shortlist.filter((_,j)=>j!==i)}); }
          else{
            if(shortlist.length>=CHESS_CAP) return;
            setChess({quad,methods:[...shortlist,{name:c.name,approach:c.app,rationale:"Manually selected from the board.",effort:"—",fit:"Manual",conf:"user",keep:true}]});
          }
        }}/>
      <div style={{marginTop:12,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <button className="btn dark" disabled={busy||atCap} onClick={gen}>{busy?"Selecting…":shortlist.length?(atCap?"Shortlist full (15 methods)":`＋ Recommend more methods (${shortlist.length} of ${CHESS_CAP} shown)`):"⚡ AI-recommend the best methods from all 64"}</button>
        {shortlist.length>0 && <button className="btn" disabled={busy} onClick={()=>{if(confirm("Clear the whole shortlist and start over?")) setChess(null);}}>🗑 Start over</button>}
        {shortlist.length>0 && <span className="hint" style={{margin:0}}><b>{keptCount}</b> of {shortlist.length} ticked to keep — only ticked methods flow downstream.</span>}
      </div>
      {busy && <Spinner label="Selecting from the 64-method board…"/>}
      {err && <div className="err">{err}</div>}
      {chess && (
        <table style={{marginTop:12}}><thead><tr><th>Keep<Tip t="Tick the methods you judge right for this category. Only ticked methods flow into the strategy document, negotiation context, pitch facts and assumption register. The first AI batch is pre-ticked as a default; methods added by '＋ Recommend more' arrive unticked for you to cherry-pick."/></th><th>Recommended method</th><th>Approach</th><th>Fit<Tip t="AI's fit ranking: High = clearly right for this category; Medium = credible alternative worth considering."/></th><th>Why</th><th>Effort</th><ConfHeader/></tr></thead><tbody>
          {chess.methods.map((m,i)=>(
            <tr key={i} style={m.keep===false?{opacity:.55}:null}>
              <td style={{textAlign:"center",whiteSpace:"nowrap"}}>
                <input type="checkbox" checked={m.keep!==false} onChange={e=>setChess(c=>({...c,methods:c.methods.map((x,j)=>j===i?{...x,keep:e.target.checked}:x)}))}/>
                <button title="Remove from shortlist" onClick={()=>setChess(c=>({...c,methods:c.methods.filter((x,j)=>j!==i)}))} style={{border:"none",background:"none",cursor:"pointer",color:"var(--slate)",fontSize:11,marginLeft:4}}>✕</button>
              </td>
              <td><b>{m.name}</b></td><td style={{fontSize:11.5,color:"var(--mulberry)"}}>{m.approach||""}</td>
              <td><span className="mono" style={{fontSize:11,fontWeight:700,color:m.fit==="High"?"var(--petrol)":m.fit==="Manual"?"var(--mulberry)":"var(--slate)"}}>{m.fit||"—"}</span></td>
              <td><textarea rows={1} style={{fontSize:11.5,minHeight:30}} value={m.rationale} onChange={e=>setChess(c=>({...c,methods:c.methods.map((x,j)=>j===i?{...x,rationale:e.target.value,conf:"user"}:x)}))}/></td>
              <td className="mono">{m.effort}</td>
              <ConfCell conf={m.conf} onChange={cf=>setChess(c=>({...c,methods:c.methods.map((x,j)=>j===i?{...x,conf:cf}:x)}))}/></tr>))}
        </tbody></table>
      )}
      {chess&&keptCount===0 && <div className="err" style={{marginTop:8}}>No methods ticked to keep — the strategy document will show the base strategy only. Tick at least the plays you intend to run.</div>}
      <div style={{marginTop:12}}><button className="btn primary" onClick={next}>Continue to cost drivers & levers →</button></div>
    </div>
  );
}

/* ---------- 11. Negotiation plan (Huthwaite-style structure) ---------- */
function StepNego({profile,vars,generic,cl,chess,nego,setNego,next}){
  const d=deriveScores(vars,generic);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  async function gen(){
    setBusy(true); setErr("");
    try{
      const out=await askClaude(
        `You are a negotiation strategist (Huthwaite-style planning). Category: "${profile.name}". Kraljic: ${d.quadrant}. Supplier power ${d.porter["Supplier power"].toFixed(1)}/5, our power ${d.porter["Buyer power (yours)"].toFixed(1)}/5.${cl.levers.length?" Selected levers: "+cl.levers.map(l=>LEVER_LIBRARY[l.id]?.label).filter(Boolean).join(", ")+".":""}${profile.pains?.length?" Pain points to address: "+profile.pains.join("; ")+".":""}
Respond ONLY with JSON, no fences:
{"objectivesUs":"our target outcomes, 2 sentences","objectivesThem":"their likely objectives, 2 sentences",
 "batnaUs":"our best alternative to a deal, 1-2 sentences","batnaThem":"their best alternative, 1-2 sentences",
 "issues":[{"issue":"negotiable issue","opening":"our opening position","target":"realistic target","walkAway":"walk-away limit","priority":"High|Med|Low","concessionCost":"cost to us of conceding, one phrase"}],
 "trades":["specific low-cost-to-us / high-value-to-them trades, 3-5 items"],
 "behaviours":{"scene":"how to set the scene, 1-2 sentences","exchange":"what info to seek/share and withhold","bargain":"bargaining behaviours to use (conditional proposals, labelling)","conclude":"how to close and document"}}
Give 5-7 issues covering price, terms, service and risk.`);
      setNego({...out,conf:"ai"});
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }
  const updIssue=(i,k,v)=>setNego(n=>({...n,conf:"user",issues:n.issues.map((x,j)=>j===i?{...x,[k]:v}:x)}));
  const TA=({v,onC,rows=1})=><textarea rows={rows} style={{fontSize:11.5,minHeight:30}} value={v} onChange={e=>onC(e.target.value)}/>;
  return (
    <div className="card">
      <h2 className="display">Negotiation plan<Tip t="Huthwaite-style preparation: objectives & BATNAs for both sides, a negotiable-issues matrix (opening / target / walk-away / concession cost), a trading board, and a four-phase behaviours plan. Everything editable."/></h2>
      <button className="btn dark" disabled={busy} onClick={gen}>{busy?"Preparing…":nego?"↻ Regenerate plan":"⚡ AI-prepare negotiation plan"}</button>
      {busy && <Spinner label="Building the negotiation plan…"/>}
      {err && <div className="err">{err}</div>}
      {nego && (<div style={{marginTop:12}}>
        <span className={"badge "+CONF[nego.conf].cls}>{CONF[nego.conf].label}</span>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:8}}>
          <div className="rationale"><b>Our objectives:</b> <TA v={nego.objectivesUs} rows={2} onC={v=>setNego(n=>({...n,objectivesUs:v,conf:"user"}))}/></div>
          <div className="rationale"><b>Their objectives:</b> <TA v={nego.objectivesThem} rows={2} onC={v=>setNego(n=>({...n,objectivesThem:v,conf:"user"}))}/></div>
          <div className="rationale"><b>Our BATNA:</b> <TA v={nego.batnaUs} rows={2} onC={v=>setNego(n=>({...n,batnaUs:v,conf:"user"}))}/></div>
          <div className="rationale"><b>Their BATNA:</b> <TA v={nego.batnaThem} rows={2} onC={v=>setNego(n=>({...n,batnaThem:v,conf:"user"}))}/></div>
        </div>
        <h3>Negotiable issues matrix</h3>
        <div style={{overflowX:"auto"}}>
        <table><thead><tr><th>Issue</th><th>Opening</th><th>Target</th><th>Walk-away</th><th>Priority</th><th>Concession cost</th></tr></thead><tbody>
          {nego.issues.map((x,i)=>(
            <tr key={i}>
              <td style={{minWidth:110}}><b>{x.issue}</b></td>
              <td><TA v={x.opening} onC={v=>updIssue(i,"opening",v)}/></td>
              <td><TA v={x.target} onC={v=>updIssue(i,"target",v)}/></td>
              <td><TA v={x.walkAway} onC={v=>updIssue(i,"walkAway",v)}/></td>
              <td><select value={x.priority} style={{padding:"3px 4px",fontSize:11.5}} onChange={e=>updIssue(i,"priority",e.target.value)}>
                <option>High</option><option>Med</option><option>Low</option></select></td>
              <td><TA v={x.concessionCost} onC={v=>updIssue(i,"concessionCost",v)}/></td>
            </tr>))}
        </tbody></table>
        </div>
        <h3>Trading board<Tip t="Things cheap for you to give but valuable to them (and vice versa) — the currency of the negotiation."/></h3>
        {nego.trades.map((t,i)=><div key={i} className="hint" style={{margin:"0 0 4px"}}>⇄ {t}</div>)}
        <h3>Behaviours roadmap</h3>
        {[["scene","1 · Setting the scene"],["exchange","2 · Exchanging information"],["bargain","3 · Bargaining"],["conclude","4 · Concluding"]].map(([k,label])=>(
          <div key={k} className="hint" style={{margin:"0 0 6px"}}><b>{label}:</b> {nego.behaviours[k]}</div>))}
      </div>)}
      <div style={{marginTop:12}}><button className="btn primary" onClick={next}>Continue to execution plan →</button></div>
    </div>
  );
}

/* ---------- 12. Execution plan: Gantt + RACI ---------- */
function StepExec({profile,strategy,cl,exec,setExec,next}){
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  async function gen(){
    setBusy(true); setErr("");
    try{
      const out=await askClaude(
        `Build a category execution plan for "${profile.name}".${strategy?" Strategy roadmap: "+strategy.roadmap.map(p=>p.phase+": "+p.actions.join(", ")).join(" | ")+".":""}${cl.levers.length?" Levers: "+cl.levers.map(l=>LEVER_LIBRARY[l.id]?.label).filter(Boolean).join(", ")+".":""}
12-quarter (3-year) Gantt of 6-8 workstreams with start and end quarter (1-12) and an owner role, plus a RACI for 6-8 key activities across roles: Category Manager, Procurement Director, Business Owner, Finance, Legal, Supplier.
Respond ONLY with JSON, no fences: {"gantt":[{"workstream":"","startQ":n,"endQ":n,"owner":""}],"raci":[{"activity":"","R":"role","A":"role","C":"roles","I":"roles"}]}`);
      setExec({...out,conf:"ai"});
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }
  return (
    <div className="card">
      <h2 className="display">Category execution plan<Tip t="3-year Gantt of workstreams plus a RACI matrix — who is Responsible, Accountable, Consulted and Informed for each key activity."/></h2>
      <button className="btn dark" disabled={busy} onClick={gen}>{busy?"Planning…":exec?"↻ Regenerate plan":"⚡ AI-build execution plan"}</button>
      {busy && <Spinner label="Building the Gantt and RACI…"/>}
      {err && <div className="err">{err}</div>}
      {exec && (<div style={{marginTop:12}}>
        <h3>3-year Gantt (quarters)</h3>
        <svg viewBox={"0 0 700 "+(exec.gantt.length*30+40)} style={{width:"100%",maxWidth:760}}>

              <text x={180+q*43+21} y={exec.gantt.length*30+28} fontSize="9" fill="var(--slate)" textAnchor="middle">Q{q+1}</text></g>))}
          {exec.gantt.map((g,i)=>(
            <g key={i}>
              <text x="0" y={i*30+20} fontSize="10.5" fill="var(--ink)" fontWeight="600">{g.workstream.slice(0,26)}</text>
              <rect x={180+(g.startQ-1)*43} y={i*30+8} width={Math.max(1,(g.endQ-g.startQ+1))*43-4} height="15" rx="7"
                fill={["var(--petrol)","var(--mulberry)","var(--amber)","#2E6FB3"][i%4]} opacity=".85"/>
              <text x={180+(g.startQ-1)*43+6} y={i*30+19} fontSize="8.5" fill="#fff">{g.owner}</text>

        <h3>RACI matrix</h3>
        <div style={{overflowX:"auto"}}>
        <table><thead><tr><th>Activity</th><th>R</th><th>A</th><th>C</th><th>I</th></tr></thead><tbody>
          {exec.raci.map((r,i)=>(
            <tr key={i}><td><b>{r.activity}</b></td><td>{r.R}</td><td>{r.A}</td><td>{r.C}</td><td>{r.I}</td></tr>))}
        </tbody></table>

      <div style={{marginTop:12}}><button className="btn primary" onClick={next}>Continue to savings & maturity →</button></div>

/* ---------- 13. Savings pipeline + Maturity & KPI dashboard ---------- */
const MATURITY_DIMS=["Strategy & planning","Data & market intelligence","Supplier management","Talent & skills","Process & digital"];
const BENEFIT_TYPES={
  "Cash":{color:"var(--petrol)",help:"Hard savings that hit the P&L — lower prices, removed spend."},
  "Cost avoidance":{color:"#2E6FB3",help:"Prevented increases — negotiated away an announced rise, avoided a premium. Real but doesn't reduce budget."},
  "Efficiency":{color:"var(--mulberry)",help:"Time and process gains — automation, fewer transactions, faster cycle times."},
  "Carbon":{color:"#3E8E7E",help:"Emissions reduction (tCO2e) from the category — logistics, materials, energy choices."},
  "Social value":{color:"var(--amber)",help:"Local employment, SME/social-enterprise spend, skills and community benefit."},
};
function StepValue({profile,cl,internal,value,setValue,benefits,setBenefits,esgOps,next}){
  const [busy,setBusy]=useState("");
  const [err,setErr]=useState("");
  const spend=internal.spend?internal.spend.total:null;
  async function genBenefits(){
    setBusy("ben"); setErr("");
    try{
      const out=await askClaude(
        `Category: "${profile.name}".${value?" Savings pipeline: "+value.pipeline.map(p=>p.initiative+" ("+p.pct+"%, "+p.horizon+")").join("; ")+".":""}${esgOps&&esgOps.length?" ESG opportunities: "+esgOps.map(o=>o.opportunity+" ["+o.type+"]").join("; ")+".":""}
Build a benefits-tracking register of 6-10 rows across ALL FIVE benefit types (Cash, Cost avoidance, Efficiency, Carbon, Social value) — derive from the pipeline and ESG opportunities where given, otherwise typical for this category. For each: benefit (short name), type, metric (unit: currency %, hours, tCO2e, jobs…), planned (target value as short string), delivered ("0" to start), quarter (delivery quarter Q1-Q12), owner (role).
Respond ONLY with JSON, no fences: {"benefits":[{"benefit":"","type":"Cash|Cost avoidance|Efficiency|Carbon|Social value","metric":"","planned":"","delivered":"0","quarter":"","owner":""}]}`);
      setBenefits((out.benefits||[]).map(b=>({...b,conf:"ai"})));
    }catch(e){ setErr(e.message); }
    setBusy("");
  }
  const updB=(i,patch)=>setBenefits(bs=>bs.map((b,j)=>j===i?{...b,...patch,conf:"user"}:b));
  async function gen(){
    setBusy("value"); setErr("");
    try{
      const out=await askClaude(
        `Category: "${profile.name}".${cl.savings?.length?" Savings opportunities: "+cl.savings.join("; ")+".":""}${cl.levers.length?" Levers: "+cl.levers.map(l=>LEVER_LIBRARY[l.id]?.label).filter(Boolean).join(", ")+".":""}${spend?" Annual spend: "+spend.toLocaleString()+".":""}
Build: (1) a savings pipeline of 5-7 initiatives, each with lever, estimated saving % of category spend (conservative), horizon (0-3m|3-6m|6-12m|12m+), status "Idea"; (2) a 3-year KPI tracker for ${cl.kpis?.length?cl.kpis.join(", "):"3-5 sensible category KPIs"} with baseline and Y1/Y2/Y3 targets (short strings); (3) a category maturity self-assessment score 1-5 with one-line rationale for each dimension: ${MATURITY_DIMS.join(", ")}.
Respond ONLY with JSON, no fences: {"pipeline":[{"initiative":"","lever":"","pct":n,"horizon":"","status":"Idea"}],"kpis":[{"kpi":"","baseline":"","y1":"","y2":"","y3":""}],"maturity":[{"dim":"","score":n,"note":""}]}`);
      setValue({...out,conf:"ai"});
    }catch(e){ setErr(e.message); }
    setBusy("");
  }
  const updP=(i,k,v)=>setValue(x=>({...x,conf:"user",pipeline:x.pipeline.map((p,j)=>j===i?{...p,[k]:v}:p)}));
  const totalPct=value?value.pipeline.reduce((s,p)=>s+(+p.pct||0),0):0;
  return (
    <div>
      <div className="card">
        <h2 className="display">💰 Savings pipeline<Tip t="Every savings initiative with its lever, estimated % saving, horizon and status. Totals shown as % of category spend (and value where spend is uploaded)."/></h2>
        <button className="btn dark" disabled={busy==="value"} onClick={gen}>{busy==="value"?"Building…":value?"↻ Regenerate":"⚡ AI-build pipeline, KPIs & maturity"}</button>
        {busy && <Spinner label="Building the value plan…"/>}
        {err && <div className="err">{err}</div>}
        {value && (<div style={{marginTop:12,overflowX:"auto"}}>
          <table><thead><tr><th>Initiative</th><th>Lever</th><th>Planned %</th>{spend&&<th>Planned value</th>}<th>Delivered %<Tip t="Actual realised saving. Editable only once status = Delivered — moving an initiative out of Delivered resets it to 0, so realised value can never outrun the pipeline's status. Finance-friendly: planned is the promise, delivered is the fact."/></th>{spend&&<th>Delivered value</th>}<th>Horizon</th><th>Status</th></tr></thead><tbody>
            {value.pipeline.map((p,i)=>(
              <tr key={i}>
                <td><b>{p.initiative}</b></td><td style={{fontSize:11.5}}>{p.lever}</td>
                <td><input type="number" min="0" max="60" value={p.pct} style={{width:56,padding:"3px 4px",fontSize:12}} onChange={e=>updP(i,"pct",+e.target.value||0)}/>%</td>
                {spend&&<td className="mono">{Math.round(spend*(+p.pct||0)/100).toLocaleString()}</td>}
                <td>{p.status==="Delivered"
                  ? <span><input type="number" min="0" max="60" value={p.delivered||0} style={{width:56,padding:"3px 4px",fontSize:12}} onChange={e=>updP(i,"delivered",+e.target.value||0)}/>%</span>
                  : <span className="mono" style={{color:"var(--slate)",fontSize:11.5}} title="Set status to Delivered to record realised savings">—</span>}</td>
                {spend&&<td className="mono">{p.status==="Delivered"?Math.round(spend*(+p.delivered||0)/100).toLocaleString():"—"}</td>}
                <td className="mono" style={{fontSize:11.5}}>{p.horizon}</td>
                <td><select value={p.status} style={{padding:"3px 4px",fontSize:11.5}} onChange={e=>{const v=e.target.value; setValue(x=>({...x,conf:"user",pipeline:x.pipeline.map((q,j)=>j===i?{...q,status:v,delivered:v==="Delivered"?(q.delivered||0):0}:q)}));}}>
                  <option>Idea</option><option>Validated</option><option>In delivery</option><option>Delivered</option></select></td>
              </tr>))}
            <tr><td><b>Total pipeline</b></td><td/><td className="mono"><b>{totalPct.toFixed(0)}%</b></td>{spend&&<td className="mono"><b>{Math.round(spend*totalPct/100).toLocaleString()}</b></td>}<td className="mono"><b>{value.pipeline.reduce((s,p)=>s+(p.status==="Delivered"?(+p.delivered||0):0),0).toFixed(0)}%</b></td>{spend&&<td className="mono"><b>{Math.round(spend*value.pipeline.reduce((s,p)=>s+(p.status==="Delivered"?(+p.delivered||0):0),0)/100).toLocaleString()}</b></td>}<td/><td/></tr>
          </tbody></table>
        </div>)}
      </div>
      {value && (
      <div className="card">
        <h2 className="display">📏 Maturity & KPI dashboard<Tip t="3-year KPI tracker plus a five-dimension category maturity self-assessment — the senior metrics view of this category."/></h2>
        <h3>3-year KPI tracker</h3>
        <table><thead><tr><th>KPI</th><th>Baseline</th><th>Year 1</th><th>Year 2</th><th>Year 3</th></tr></thead><tbody>
          {value.kpis.map((k,i)=>(
            <tr key={i}><td><b>{k.kpi}</b></td>
              {["baseline","y1","y2","y3"].map(f=>(
                <td key={f}><input type="text" value={k[f]} style={{width:90,padding:"3px 5px",fontSize:11.5}}
                  onChange={e=>setValue(x=>({...x,conf:"user",kpis:x.kpis.map((kk,j)=>j===i?{...kk,[f]:e.target.value}:kk)}))}/></td>))}
            </tr>))}
        </tbody></table>
        <h3>Category maturity (1–5)</h3>
        {value.maturity.map((m,i)=>(
          <div key={i} className="varrow">
            <div className="vartop"><span className="varlabel">{m.dim}</span>
              <span className="mono" style={{fontSize:13,fontWeight:600}}>{m.score}/5</span></div>
            <ScalePicker value={m.score} lo="Ad hoc" hi="Leading practice"
              onChange={v=>setValue(x=>({...x,conf:"user",maturity:x.maturity.map((mm,j)=>j===i?{...mm,score:v}:mm)}))}/>
            <div className="hint" style={{margin:0}}>{m.note}</div>
          </div>))}
      </div>)}
      <div className="card">
        <h2 className="display">🎯 Benefits tracking<Tip t="Tracks what the strategy actually delivers across five benefit types: Cash (hits the P&L), Cost avoidance (prevented increases), Efficiency (time/process), Carbon (tCO2e) and Social value. Planned vs delivered per benefit, with owner and quarter. The portfolio roll-up across categories arrives with the server phase."/></h2>
        <p className="hint">Savings are only one kind of value. This register tracks <b>five benefit types</b> — hover each tile for the definition — with planned vs delivered, owner and quarter. Seeded from your pipeline and ESG opportunities; update "delivered" as the plan executes and re-save the session.</p>
        <div className="banner" style={{background:"#EEF4F1",borderColor:"#9FBFB4"}}><b>Why track benefits, and where do these rows come from?</b> Finance and the board judge a category strategy on delivered value, not activity — this register is how you evidence it. The AI builds it <b>from your own upstream work</b>: each <b>Cash / Cost-avoidance</b> row is derived from a <b>savings-pipeline</b> initiative (step 13 above), each <b>Carbon / Social-value</b> row from an <b>ESG opportunity</b> (step 8), and Efficiency rows from the selected levers; where a source is thin it fills sector-typical examples. <b>"Planned" values are AI estimates</b> — treat them as a first cut. <b>Making it yours:</b> the numbers only become credible once you replace planned figures with business-case-agreed targets and set real owners — edit any cell (flips to <span className="badge user">User</span>) or use the Confidence column's ✓ to confirm a row. Unconfirmed rows stay flagged AI-inferred in the document so reviewers see what's still to be validated.</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:8,marginBottom:10}}>
          {Object.entries(BENEFIT_TYPES).map(([t,v])=>{
            const rows=benefits.filter(b=>b.type===t);
            return (<div key={t} title={v.help} style={{border:"2px solid "+v.color,borderRadius:8,padding:"8px 10px",cursor:"help"}}>
              <div style={{fontSize:11.5,fontWeight:700,color:v.color}}>{t}</div>
              <div className="mono" style={{fontSize:16,fontWeight:600}}>{rows.length}</div>
              <div style={{fontSize:10,color:"var(--slate)"}}>initiative{rows.length===1?"":"s"} tracked</div>
            </div>);})}
        </div>
        <button className="btn dark" disabled={busy==="ben"} onClick={genBenefits}>{busy==="ben"?"Building…":benefits.length?"↻ Regenerate benefits register":"⚡ AI-build benefits register"}</button>
        {busy==="ben" && <Spinner label="Building the benefits register…"/>}
        {benefits.length>0 && (
          <div style={{overflowX:"auto",marginTop:10}}>
          <table><thead><tr><th>Benefit</th><th>Type</th><th>Metric</th><th>Planned</th><th>Delivered</th><th>Qtr</th><th>Owner</th><ConfHeader/></tr></thead><tbody>
            {benefits.map((b,i)=>(
              <tr key={i}>
                <td><b>{b.benefit}</b></td>
                <td><select value={b.type} style={{padding:"3px 4px",fontSize:11}} onChange={e=>updB(i,{type:e.target.value})}>
                  {Object.keys(BENEFIT_TYPES).map(t=><option key={t}>{t}</option>)}</select></td>
                <td style={{fontSize:11.5}}>{b.metric}</td>
                <td><input type="text" value={b.planned} style={{width:76,padding:"3px 5px",fontSize:11.5}} onChange={e=>updB(i,{planned:e.target.value})}/></td>
                <td><input type="text" value={b.delivered} style={{width:76,padding:"3px 5px",fontSize:11.5}} onChange={e=>updB(i,{delivered:e.target.value})}/></td>
                <td className="mono" style={{fontSize:11.5}}>{b.quarter}</td>
                <td><input type="text" value={b.owner} style={{width:90,padding:"3px 5px",fontSize:11.5}} onChange={e=>updB(i,{owner:e.target.value})}/></td>
                <ConfCell conf={b.conf} onChange={c=>setBenefits(bs=>bs.map((x,j)=>j===i?{...x,conf:c}:x))}/>
              </tr>))}
          </tbody></table>
          </div>
        )}
        <p className="hint" style={{marginTop:8}}>📌 The cross-category <b>portfolio roll-up and approval workflow</b> for these benefits lands with the server phase — this register exports into the document and the session file so nothing is lost meanwhile.</p>
      </div>
      <div className="card"><button className="btn primary" onClick={next}>Continue to commercial 7Ps (optional) →</button></div>
    </div>
  );
}

/* ================= 7Ps COMMERCIAL MODULE (from pilot) ================= */
const SECTORS = ["SaaS / Technology","Retail & CPG","Manufacturing / Industrial B2B","Healthcare & Pharma","Financial Services","Professional Services","Hospitality & Consumer"];
const PS = ["Product","Price","Place","Promotion","People","Process","Physical evidence"];

function StepSevenPs({profile, sp, setSp, next}){
  const [busy,setBusy]=useState("");
  const [err,setErr]=useState("");
  const set=(patch)=>setSp(p=>({...p,...patch}));

  async function genQuestions(){
    setBusy("questions"); setErr("");
    try{
      const j=await askClaude(
        `Generate a 7Ps marketing-mix questionnaire for a "${sp.sector}" business named "${profile.name}". For each of these Ps: ${PS.join(", ")} — write exactly 2 sharp, sector-specific input questions a strategist would ask. Respond ONLY with JSON, no markdown fences, shaped as {"Product":["q1","q2"],"Price":["q1","q2"],"Place":["q1","q2"],"Promotion":["q1","q2"],"People":["q1","q2"],"Process":["q1","q2"],"Physical evidence":["q1","q2"]} using exactly those keys.`);
      set({questions:j});
    }catch(e){ setErr("Question generation failed — tap to retry."); }
    setBusy("");
  }
  async function aiDraft(p,i){
    const key=p+"-"+i;
    setBusy(key);
    try{
      const text=await askClaude(
        `Business: "${profile.name}", sector: ${sp.sector}. Question: "${sp.questions[p][i]}". Draft a plausible 1-2 sentence answer a typical company in this sector might give. Answer only, no preamble.`,false,false);
      set({answers:{...sp.answers,[key]:{value:text,conf:"ai"}}});
    }catch(e){ setErr("Draft failed — retry."); }
    setBusy("");
  }
  async function genCanvas(){
    setBusy("canvas"); setErr("");
    try{
      const qa=PS.map(p=>(sp.questions[p]||[]).map((q,i)=>{
        const a=sp.answers[p+"-"+i];
        return p+" — "+q+": "+(a&&a.value ? a.value+" ["+a.conf+"]" : "[no answer — assume typical]");
      }).join("\n")).join("\n");
      const j=await askClaude(
        `You are a marketing strategist. Sector: ${sp.sector}. Business: "${profile.name}". Inputs:\n${qa}\n\nRespond ONLY with JSON (no fences): {"canvas":{"Product":"one crisp strategic statement","Price":"...","Place":"...","Promotion":"...","People":"...","Process":"...","Physical evidence":"..."},"narrative":"a 180-220 word integrated commercial strategy narrative in plain prose"}`);
      set({canvas:j.canvas,narrative:j.narrative});
    }catch(e){ setErr("Canvas generation failed — tap to retry."); }
    setBusy("");
  }

  return (
    <div>
      <div className="card">
        <h2 className="display">Commercial 7Ps <span style={{fontSize:12,color:"var(--slate)",fontWeight:400}}>· optional</span><Tip t="The 7Ps marketing mix: Product, Price, Place, Promotion, People, Process, Physical evidence. It defines a COMMERCIAL (sell-side) strategy."/></h2>
        <div className="banner"><b>What is this and why is it optional?</b> The procurement category strategy you're building is a <b>buy-side</b> document — it's complete without this step. Use the 7Ps only if you also want a <b>sell-side / commercial strategy</b> for this category or business (brand, pricing, channels, promotion) — common when the category IS the business (e.g. you're strategising a product line, not just buying inputs). If that's not you, press "Skip to strategy & plan".</div>
        <p className="hint">"⚡ Generate AI questions" asks the AI to write a sector-specific 7Ps questionnaire (2 questions per P). You then answer each yourself (<span className="badge user">User</span>) or press "AI draft" per answer (<span className="badge ai">AI-inferred</span>). If generation fails, it's almost always the AI connection — see ⚙ AI settings in the header.</p>
        <h3>Sector pack<Tip t="Adapts the questions to your industry — a SaaS 7Ps asks different things than a hospitality 7Ps."/></h3>
        <select value={sp.sector} onChange={e=>set({sector:e.target.value,questions:null,canvas:null,narrative:""})}>
          {SECTORS.map(s=><option key={s}>{s}</option>)}
        </select>
        <div style={{marginTop:10,display:"flex",gap:10,flexWrap:"wrap"}}>
          <button className="btn dark" onClick={genQuestions} disabled={busy==="questions"}>
            {busy==="questions"?"Generating…":sp.questions?"↻ Regenerate questions":"⚡ Generate AI questions"}</button>
          <button className="btn" onClick={next}>Skip to strategy & plan →</button>
        </div>
        {err && <div className="err">{err}</div>}
      </div>
      {sp.questions && (
        <div className="card">
          <h3 style={{marginTop:0}}>Answer (or let AI draft)</h3>
          {PS.map(p=>(
            <div key={p} style={{marginBottom:14}}>
              <div className="display" style={{fontSize:12,textTransform:"uppercase",letterSpacing:".07em",color:"var(--mulberry)",marginBottom:6}}>{p}</div>
              {(sp.questions[p]||[]).map((qq,i)=>{
                const key=p+"-"+i;
                const a=sp.answers[key]||{value:"",conf:"assumed"};
                return (
                  <div key={key} style={{marginBottom:10}}>
                    <div className="vartop">
                      <span style={{fontSize:13,fontWeight:600}}>{qq}</span>
                      <span className={"badge "+CONF[a.value?a.conf:"assumed"].cls}>{CONF[a.value?a.conf:"assumed"].label}</span>
                    </div>
                    <textarea rows={2} value={a.value} placeholder="Type your answer…" style={{marginTop:4}}
                      onChange={e=>set({answers:{...sp.answers,[key]:{value:e.target.value,conf:"user"}}})}/>
                    <button className="btn" style={{background:"var(--amberSoft)",color:"var(--ai)",border:"none",padding:"5px 11px",fontSize:12,marginTop:4}}
                      onClick={()=>aiDraft(p,i)} disabled={busy===key}>{busy===key?"Drafting…":"AI draft (flagged)"}</button>
                  </div>
                );
              })}
            </div>
          ))}
          <button className="btn" style={{background:"var(--mulberry)",borderColor:"var(--mulberry)",color:"#fff"}} onClick={genCanvas} disabled={busy==="canvas"}>
            {busy==="canvas"?"Generating…":"Generate 7P canvas + narrative"}</button>
        </div>
      )}
      {sp.canvas && (
        <div className="card">
          <h3 style={{marginTop:0}}>7P Canvas</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
            {PS.map(p=>(
              <div key={p} style={{background:"var(--mulberrySoft)",borderRadius:8,padding:12}}>
                <div className="display" style={{fontSize:12,textTransform:"uppercase",color:"var(--mulberry)"}}>{p}</div>
                <div style={{fontSize:13,marginTop:4,lineHeight:1.45}}>{sp.canvas[p]}</div>
              </div>
            ))}
          </div>
          <p style={{fontSize:14,lineHeight:1.55,background:"var(--paper)",borderRadius:8,padding:14,marginTop:12}}>{sp.narrative}</p>
          <button className="btn primary" onClick={next}>Continue to strategy & plan →</button>
        </div>
      )}
    </div>
  );
}
