    kb:"SCREEN: Internal data (optional). Useful data: "+INTERNAL_DATA_CHECKLIST.map(d=>d.item+" — "+d.what+" (sharpens: "+d.feeds+")").join("; ")+". Skipping = generic mode: strategy built from market data only with assumptions flagged. The spend CSV needs supplier + spend columns; it auto-infers supplier concentration and puts top suppliers on the Kraljic chart."},
  models:{intro:"You're on Positioning models. Ask what Five Forces, Kraljic, SWOT or PESTLE mean, or what your scores imply.",
    kb:"SCREEN: Positioning models. PORTER'S FIVE FORCES analyses industry structure; each force derived from Market Intelligence variables: "+Object.entries(FORCE_SOURCES).map(([k,s])=>k+" from "+s.join("+")).join("; ")+". Meanings: high supplier power = price resistance, secure supply first; high buyer power = tender aggressively; high substitutes = negotiation leverage; high new entrants = market stays competitive; high rivalry = auctions produce sharp pricing. KRALJIC positions category by supply risk vs business impact: Strategic (create advantage — harness relationships, share risk); Leverage (minimise TCO — short commitments, generic specs); Bottleneck (minimise risk — secure supply, contingencies); Non-critical (simplify purchasing — standardise, consolidate). SWOT = buyer's position (AI-drafted, editable). PESTLE = macro forces on the supply market (Political Economic Social Technological Legal Environmental)."},
  costlevers:{intro:"You're on Cost drivers & levers. Ask about any driver, lever, savings range or archetype.",
    kb:""},
  assess:{intro:"You're on SWOT & PESTLE. Ask what they are or how to use the AI-drafted output.",
    kb:"SCREEN: SWOT & PESTLE. SWOT = buyer's position (Strengths/Weaknesses internal, Opportunities/Threats external), AI-drafted and editable per quadrant. PESTLE = macro forces on the supply market, one editable sentence per factor. Both feed the strategy document."},
  forces:{intro:"You're on Five Forces. Ask what a force means or why it's scored that way.",
    kb:"SCREEN: Porter's Five Forces, shown as cross diagram and radar. Derived live from Market Info Hub variables: "+Object.entries(FORCE_SOURCES).map(([k,s])=>k+" from "+s.join("+")).join("; ")+". High supplier power = secure supply before negotiating; high buyer power = tender aggressively; high substitutes = leverage; high new entrants = market stays competitive; high rivalry = auctions work."},
  kraljic:{intro:"You're on the Kraljic matrix. Ask what your quadrant means or how the placement is calculated.",
    kb:"SCREEN: Kraljic. Supply risk (from market variables) vs business impact (from internal variables, assumed midpoint in generic mode). Strategic = create advantage via relationships; Leverage = minimise TCO, short commitments; Bottleneck = minimise risk, secure supply; Non-critical = simplify purchasing."},
  suppliers:{intro:"You're on Supplier segmentation. Ask about segments, the scorecard or contract tiers.",
    kb:"SCREEN: Supplier segmentation & tiering. Each supplier scored on capability vs alignment → segments: Strategic partner (partner, joint plans), Develop (invest, grow carefully), Transactional expert (contract tightly), Tactical/phase out (consolidate away). Scorecard: quality, delivery, cost, innovation, ESG (1-5). Contract tier: Tier 1/Gold = strategic or >15% spend (quarterly exec QBRs); Tier 2/Silver = develop or >5% (bi-annual reviews); Tier 3/Bronze = rest (annual light touch). Gold/Silver/Bronze is the recognised public-procurement (GCF) naming. Also a TIER CALCULATOR: score any single contract on value/criticality (50%), supply risk (30%) and contract complexity (20%) → weighted score → suggested tier under the chosen naming scheme, with its governance regime; a decision aid for borderline cases, the segment+spend table stays the primary basis. Also SUPPLIER PREFERENCING — their view of US: account attractiveness × our share of their revenue → Core (they invest in us), Development (they grow us), Exploitable (they harvest margin), Nuisance (worst service — consolidate away or raise our attractiveness)."},
  risk:{intro:"You're on the Risk heatmap. Ask how scoring works or what to do with red risks.",
    kb:"SCREEN: 5×5 risk heatmap. Likelihood × impact; score ≥15 red (act now), 8-14 amber (mitigate & monitor), <8 green (accept & watch). AI generates 6-8 risks with mitigations; all editable. Feeds the risk register in the document. Below it: ESG & social value opportunities — the upside twin of the register (carbon, circularity, labour standards, SME/social spend), each with type, action and benefit."},
  chess:{intro:"You're on Chessboard levers. Ask about the four base strategies or the recommended plays.",
    kb:"SCREEN: Purchasing chessboard (power-balance lever board). Your demand power vs supplier power picks a base strategy: Leverage competition (you strong, they weak — tender, global sourcing, target pricing); Seek joint advantage (both strong — partnership, integrated planning); Change nature of demand (they strong — innovation, re-specification, risk management); Manage spend (both weak — bundling, demand management, compliance). AI recommends the best methods from the full 64-method board (4 strategies × 4 approaches × 4 methods). Recommendations ACCUMULATE: '+ Recommend more' adds the next-best distinct methods (AI is told which are already shown) up to a 15-method cap — it never overwrites the list. The manager ticks 'Keep' on the methods to adopt; only ticked methods flow into the strategy document, pitch facts and assumption register. First batch arrives pre-ticked as a default; later batches unticked for cherry-picking. Each method carries a High/Medium fit ranking (Manual = hand-picked). The board is drawn as a literal 8×8 grid — each strategy a 4×4 quadrant, each approach a 2×2 block, one cell per method; shortlisted cells light up amber and clicking any cell adds or removes it manually (marked User). The home strategy is fixed by the power balance and never changes. The built-in board is ProcureAI's open version; a licensed ATK board can be loaded via Admin."},
  nego:{intro:"You're on the Negotiation plan. Ask about BATNAs, the issues matrix or the behaviours phases.",
    kb:"SCREEN: Negotiation plan (Huthwaite-style). BATNA = best alternative to a negotiated agreement — your walk-away power. Issues matrix: per issue an opening position, realistic target, walk-away limit, priority and cost of concession. Trading board = low-cost-to-you/high-value-to-them trades. Behaviours: 1 setting the scene, 2 exchanging information, 3 bargaining (conditional proposals: 'if you… then we…'), 4 concluding."},
  exec:{intro:"You're on the Execution plan. Ask about the Gantt or RACI.",
    kb:"SCREEN: Execution plan. 3-year (12-quarter) Gantt of workstreams with owners, plus RACI matrix: Responsible does the work, Accountable owns the outcome (one per activity), Consulted gives input, Informed is kept up to date."},
  value:{intro:"You're on Savings & maturity. Ask about the pipeline, KPI targets or maturity dimensions.",
    kb:"SCREEN: Savings pipeline (initiative, lever, est. % saving, horizon, status Idea→Validated→In delivery→Delivered; a Delivered % column records realised savings and is editable ONLY when status = Delivered — moving out of Delivered resets it to 0; totals show planned AND delivered, as % of spend and value where a spend CSV was uploaded) + 3-year KPI tracker (baseline, Y1-Y3 targets) + category maturity self-assessment across: "+MATURITY_DIMS.join(", ")+" (1 = ad hoc, 5 = leading practice) + BENEFITS TRACKING register across five benefit types: Cash (bankable savings), Cost avoidance (prevented increases), Efficiency (time/process), Carbon (tCO2e), Social value (jobs, SME spend) — each with metric, planned vs delivered, quarter and owner."},
  sevenps:{intro:"You're on Commercial 7Ps. Ask what the 7Ps are, when to use them, or what a good answer looks like.",
    kb:"SCREEN: Commercial 7Ps (optional, sell-side). The 7Ps marketing mix — Product, Price, Place, Promotion, People, Process, Physical evidence — defines a commercial strategy. Only needed when the category IS the business (product line / service you sell), not for pure buy-side category strategy. AI generates 2 sector-specific questions per P; answers can be typed (User) or AI-drafted (AI-inferred); a canvas + narrative is then synthesised."},
  strategy:{intro:"You're on Strategy & plan. Ask what the assumption register is, what the downloads contain, or how confidence works.",
    kb:"SCREEN: Strategy & plan. The AI synthesises everything into: executive summary, objectives, sourcing levers with horizons, negotiation approach, 0-3/3-6/6-12 month roadmap, risk register, data gaps. ASSUMPTION REGISTER = audit trail of every input with its source: User (you set/confirmed), AI-inferred (generated, awaiting review), Assumed (untouched default). Values and confidence are editable directly in the table — converting AI/Assumed to User after checking makes the strategy more defensible. Downloads: a real Word .docx (proper heading styles and tables, generated in-browser via the open-source docx library loaded from a CDN; if offline it falls back to legacy .doc automatically) for circulating; Markdown (.md) for wikis. Also here: the 🎤 Elevator pitch (2-minute stakeholder summary: situation → complication → recommendation → value → ask), fillable master templates, and session save/download/load."},
};

function ReferenceLibraryChat({step}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const [msgs,setMsgs]=useState([]);
  const [busy,setBusy]=useState(false);
  useEffect(()=>{ setOpen(false); setMsgs([]); },[step]); // auto-close & reset when the screen changes
  const guide=STEP_GUIDE[step]||STEP_GUIDE.profile;
  const libraryContext = `COST DRIVER LIBRARY:\n${Object.entries(COST_DRIVER_LIBRARY).map(([id,d])=>"- "+id+": "+d).join("\n")}
PURCHASING LEVER LIBRARY:\n${Object.entries(LEVER_LIBRARY).map(([id,l])=>"- "+l.label+": "+l.desc+" (typical saving "+l.saving+")").join("\n")}
CATEGORY ARCHETYPES:\n${Object.entries(CATEGORY_ARCHETYPES).map(([k,a])=>{const x=ARCHETYPE_EXTRAS[k]||{}; return "- "+k+": drivers="+Object.keys(a.costDrivers).join("/")+"; top levers="+a.levers.slice(0,3).join("/")+"; savings="+(x.savings||[]).slice(0,2).join(" & ")+"; KPIs="+(x.kpis||[]).join(", ")+"; tip: "+a.notes;}).join("\n")}`;

  async function ask(){
    if(!q.trim()) return;
    const question=q.trim();
    setMsgs(m=>[...m,{role:"user",text:question}]);
    setQ(""); setBusy(true);
    try{
      const text=await askClaude(
        `You are the in-app guide for a procurement category-strategy tool. The user is currently on this screen — prioritise its context:\n${guide.kb}\n\nMaster reference library (for cost driver / lever / archetype questions):\n${libraryContext}\n\nAPP-WIDE CONTEXT (v1.0): This is ProcureAI Strategic Category Suite v1.0. AI providers (header ⚙): Claude in-app (no key inside Claude.ai), Claude with API key, Gemini with API key, or Sandbox mode — offline simulated demo data from the built-in archetype library, no key, all outputs labelled [Sandbox — simulated]. Word downloads produce a real .docx (docx library via CDN; offline falls back to .doc). The Purchasing Chessboard is drawn as a literal 8x8 grid (strategy=4x4 quadrant, approach=2x2 block, cell=method; click a cell to add/remove it, amber = shortlisted); recommendations accumulate up to 15 and only 'Keep'-ticked methods flow downstream. The savings pipeline has a Delivered % column editable only at status Delivered. The tiering screen has a 3-dimension tier calculator (Gold/Silver/Bronze = GCF public-procurement naming). NEW in this build: (1) ▶ Demo tour button in the header — a 16-stop guided walkthrough on a full simulated Cloud Services dataset (loads instantly via Sandbox, replaces current screen data after a confirm); (2) progress tracking — the left rail shows a green dot per completed module and amber for pending, with an X/13 core modules progress bar at the top; (3) a Module review card at the bottom of every screen — Complete/Pending badge, an SVG chart of the module's output where chartable (market bars, five-forces bars, supplier scatter, risk bars, driver weights, planned-vs-delivered savings, workstream timeline) and a one-click Word report of just that module; (4) ⬇ PowerPoint deck download on the Strategy screen — a widescreen board deck with native charts, one slide per module (pptxgenjs via CDN).\n\nAnswer using only this material plus standard category-management knowledge consistent with it. Be concise — 3-5 sentences, plain prose, no headers.\n\nQuestion: ${question}`,
        false, false);
      setMsgs(m=>[...m,{role:"assistant",text}]);
    }catch(e){ setMsgs(m=>[...m,{role:"assistant",text:e.message}]); }
    setBusy(false);
  }

  return (
    <div style={{position:"fixed",right:18,bottom:18,zIndex:50}}>
      {open && (
        <div className="card" style={{width:340,maxHeight:460,display:"flex",flexDirection:"column",marginBottom:10,boxShadow:"0 8px 28px rgba(0,0,0,.18)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <h3 style={{margin:0}}>📚 Guide — this screen</h3>
            <button className="btn ghost" style={{border:"none",padding:"2px 8px"}} onClick={()=>setOpen(false)}>✕</button>
          </div>
          <p className="hint" style={{margin:"0 0 8px"}}>{guide.intro}</p>
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,marginBottom:8}}>
            {msgs.length===0 && <div className="hint">No questions yet — ask anything about this screen, or about cost drivers, levers and category archetypes.</div>}
            {msgs.map((m,i)=>(
              <div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"88%",
                background:m.role==="user"?"var(--petrol)":"var(--paper)", color:m.role==="user"?"#fff":"var(--ink)",
                borderRadius:10,padding:"8px 11px",fontSize:12.5,lineHeight:1.45}}>{m.text}</div>
            ))}
            {busy && <div className="hint">⏳ thinking…</div>}
          </div>
          <div style={{display:"flex",gap:6}}>
            <input type="text" placeholder="Ask about this screen…" value={q}
              onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter") ask();}}/>
            <button className="btn primary" onClick={ask} disabled={busy||!q.trim()}>Ask</button>
          </div>
        </div>
      )}
      <button className="btn dark" style={{borderRadius:99,padding:"12px 18px",boxShadow:"0 6px 18px rgba(0,0,0,.2)"}} onClick={()=>setOpen(o=>!o)}>
        {open?"Close guide":"📚 Guide"}
      </button>
    </div>
  );
}

const SAVED=(function(){ try{ return JSON.parse(storageGet("procureai_session")||"null"); }catch(e){ return null; } })();
const sv=(k,d)=> (SAVED&&SAVED[k]!==undefined&&SAVED[k]!==null)?SAVED[k]:d;

function App(){
  const [step,setStep]=useState(sv("step","profile"));
  const [profile,setProfile]=useState(sv("profile",{name:"",sector:"",region:"",notes:"",suppliers:[],pains:[]}));
  const [vars,setVars]=useState(sv("vars",initVars()));
  const [models,setModels]=useState(sv("models",{swot:null,pestle:null}));
  const [research,setResearch]=useState(sv("research",null));
  const [suppliers,setSuppliers]=useState(sv("suppliers",[]));
  const [risks,setRisks]=useState(sv("risks",[]));
  const [chess,setChess]=useState(sv("chess",null));
  const [nego,setNego]=useState(sv("nego",null));
  const [exec,setExec]=useState(sv("exec",null));
  const [value,setValue]=useState(sv("value",null));
  const [esgOps,setEsgOps]=useState(sv("esgOps",[]));
  const [benefits,setBenefits]=useState(sv("benefits",[]));
  const [pitch,setPitch]=useState(sv("pitch",null));
  const [tierScheme,setTierScheme]=useState(sv("tierScheme","standard"));
  const [aiOpen,setAiOpen]=useState(false);
  const [adminOpen,setAdminOpen]=useState(false);
  const [restored,setRestored]=useState(!!(SAVED&&SAVED.profile&&SAVED.profile.name));
  const [marketBrief,setMarketBrief]=useState(sv("marketBrief",{summary:"",priceOutlook:"",suppliers:[]}));
  const [internal,setInternal]=useState(sv("internal",{spend:null}));
  const [generic,setGeneric]=useState(sv("generic",false));
  const [strategy,setStrategy]=useState(sv("strategy",null));
  const [sevenPs,setSevenPs]=useState(sv("sevenPs",{sector:SECTORS[0],questions:null,answers:{},canvas:null,narrative:""}));
  const [cl,setCl]=useState(sv("cl",{drivers:{},levers:[],demandDrivers:[],risks:[],savings:[],kpis:[],notes:"",source:""}));
  useEffect(()=>{
    const t=setTimeout(()=>{
      storageSet("procureai_session",JSON.stringify({step,profile,vars,models,research,suppliers,risks,chess,nego,exec,value,esgOps,benefits,pitch,tierScheme,marketBrief,internal,generic,strategy,sevenPs,cl,when:new Date().toISOString()}));
    },600);
    return ()=>clearTimeout(t);
  },[step,profile,vars,models,research,suppliers,risks,chess,nego,exec,value,esgOps,benefits,pitch,tierScheme,marketBrief,internal,generic,strategy,sevenPs,cl]);
  function startFresh(){ storageDel("procureai_session"); window.location.reload(); }
  function sessionPayload(){
    return {version:"procureai-session-v1",when:new Date().toISOString(),
      step,profile,vars,models,research,suppliers,risks,chess,nego,exec,value,esgOps,benefits,pitch,tierScheme,marketBrief,internal,generic,strategy,sevenPs,cl};
  }
  function saveSessionNow(){ return storageSet("procureai_session",JSON.stringify(sessionPayload())); }
  function exportSession(){
    const blob=new Blob([JSON.stringify(sessionPayload(),null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=(profile.name||"category").replace(/\s+/g,"-").toLowerCase()+"-session.json"; a.click();
  }
  function importSession(file){
    const r=new FileReader();
    r.onload=()=>{ try{
      const j=JSON.parse(r.result);
      if(!j||!j.version||!String(j.version).startsWith("procureai-session")) throw new Error("Not a ProcureAI session file");
      storageSet("procureai_session",JSON.stringify(j));
      window.location.reload();
    }catch(e){ alert("Couldn't load session file: "+e.message); } };
    r.readAsText(file);
  }
  const setVar=(id,entry)=>setVars(v=>({...v,[id]:entry}));
  const internalTouched = INTERNAL_VARS.some(v=>vars[v.id].conf!=="assumed") || !!internal.spend;
  const [tour,setTour]=useState(null);
  const keptChessN=chess?(chess.methods||[]).filter(m=>m.keep!==false).length:0;
  const STEP_DONE={
    profile:!!profile.name.trim(),
    internal:internalTouched,
    market:MARKET_VARS.some(v=>vars[v.id].conf!=="assumed"),
    assess:!!(models.swot&&models.pestle),
    forces:MARKET_VARS.some(v=>vars[v.id].conf!=="assumed"),
    kraljic:MARKET_VARS.some(v=>vars[v.id].conf!=="assumed"),
    suppliers:suppliers.length>0,
    risk:risks.length>0,
    chess:keptChessN>0,
    costlevers:Object.keys(cl.drivers||{}).length>0||cl.levers.length>0,
    nego:!!nego,
    exec:!!exec,
    value:!!value,
    sevenps:!!sevenPs.canvas,
    strategy:!!strategy,
  };
  const OPTIONAL_STEP={internal:true,sevenps:true};
  const coreKeys=Object.keys(STEP_DONE).filter(k=>!OPTIONAL_STEP[k]);
  const coreDone=coreKeys.filter(k=>STEP_DONE[k]).length;
  function startDemoTour(){
    if(profile.name.trim() && !profile.name.includes("(Demo)") && !confirm("Start the guided demo tour?\n\nThis loads a full simulated 'Cloud Services' dataset and switches the AI provider to Sandbox — your current in-progress category will be replaced on screen (download your session first from the Strategy step if you want to keep it).")) return;
    AI_SETTINGS.provider="sandbox";
    const D=buildDemoState();
    setProfile(D.profile); setVars(D.vars); setModels(D.models); setResearch(D.research);
    setSuppliers(D.suppliers); setRisks(D.risks); setEsgOps(D.esgOps); setChess(D.chess);
    setCl(D.cl); setNego(D.nego); setExec(D.exec); setValue(D.value); setBenefits(D.benefits);
    setStrategy(D.strategy); setPitch(D.pitch); setMarketBrief(D.marketBrief); setSevenPs(D.sevenPs);
    setGeneric(true); setInternal({spend:null}); setTierScheme("gsb");
    setStep("profile"); setTour(0);
  }
  const clLedgerEntries = {
    ...Object.fromEntries(Object.entries(cl.drivers).map(([id,d])=>["cd-"+id,d])),
    ...Object.fromEntries(cl.levers.map(l=>["lv-"+l.id,l])),
  };
  const extraLedger={};
  suppliers.forEach((s,i)=>extraLedger["sup-"+i]=s);
  risks.forEach((r,i)=>extraLedger["risk-"+i]=r);
  if(chess) chess.methods.forEach((mm,i)=>extraLedger["chess-"+i]=mm);
  if(nego) extraLedger["nego"]=nego;
  if(exec) extraLedger["exec"]=exec;
  if(value) extraLedger["value"]=value;
  if(research) extraLedger["research"]={conf:"ai"};
  esgOps.forEach((o,i)=>extraLedger["esg-"+i]=o);
  benefits.forEach((b,i)=>extraLedger["ben-"+i]=b);
  if(pitch) extraLedger["pitch"]=pitch;
  const ledgerVars = {...vars, ...clLedgerEntries, ...extraLedger, ...Object.fromEntries(Object.entries(sevenPs.answers).filter(([,a])=>a.value).map(([k,a])=>["7p-"+k,a]))};

  return (
    <div>
      <header style={{background:"var(--ink)",color:"#fff",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div>
          <div className="display" style={{fontSize:18}}>PROCUREAI <span style={{color:"var(--amber)"}}>· STRATEGIC CATEGORY SUITE</span> <span className="mono" style={{fontSize:11,background:"#2A2F37",border:"1px solid #4A4F57",borderRadius:99,padding:"2px 8px",verticalAlign:"middle"}}>v1.0</span></div>
          <div style={{fontSize:12,color:"#B9BDC2",marginTop:2}}>v1.0 release candidate — freeze after testing · external-first workflow · every input carries a confidence flag</div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <AIStatusChip/>
          <Ledger vars={ledgerVars}/>
          <button className="btn" style={{background:"var(--amber)",color:"#2A2004",borderColor:"var(--amber)",fontWeight:800}} onClick={startDemoTour} title="Guided walkthrough of all 15 modules on a full simulated Cloud Services dataset — offline, no key, everything labelled simulated.">▶ Demo tour</button>
          <button className="btn" style={{background:"transparent",color:"#fff",borderColor:"#4A4F57"}} onClick={()=>setAiOpen(o=>!o)} title="Choose the AI provider (Claude or Gemini), paste a key, Save or Clear.">⚙ AI settings</button>
          <button className="btn" style={{background:"transparent",color:"#fff",borderColor:"#4A4F57"}} onClick={()=>setAdminOpen(true)} title="API keys, local users, custom templates and custom category archetypes.">🛠 Admin</button>
        </div>
      </header>
      <AISettings open={aiOpen} setOpen={setAiOpen}/>
      <AdminPanel open={adminOpen} setOpen={setAdminOpen}/>
      <TourOverlay tour={tour} setTour={setTour} setStep={setStep}/>
      {restored && (
        <div className="banner" style={{margin:"10px 16px 0",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span>💾 <b>Session restored</b> from your last save{SAVED&&SAVED.when?" ("+SAVED.when.slice(0,16).replace("T"," ")+")":""} — work autosaves on this device as you go. <span style={{color:"var(--slate)"}}>(Autosave needs a normal browser; inside the Claude.ai preview it may not persist.)</span></span>
          <span style={{display:"flex",gap:8}}>
            <button className="btn" onClick={()=>setRestored(false)}>Continue</button>
            <button className="btn" onClick={startFresh}>Start fresh</button>
          </span>
        </div>
      )}
      <div className="layout" style={{display:"grid",gridTemplateColumns:"210px 1fr",minHeight:"calc(100vh - 70px)"}}>
        <nav className="rail" style={{borderRight:"1px solid var(--line)",paddingTop:14}}>
          <div style={{padding:"0 12px 6px"}}>
            <div style={{fontSize:11,fontWeight:800,color:coreDone===coreKeys.length?"#1E8E5A":"var(--ink)"}}>{coreDone} / {coreKeys.length} core modules complete</div>
            <div style={{height:5,background:"#F0E7D2",borderRadius:3,marginTop:4,border:"1px solid var(--line)"}}>
              <div style={{height:"100%",width:(coreDone/coreKeys.length*100)+"%",background:coreDone===coreKeys.length?"#1E8E5A":"var(--amber)",borderRadius:3,transition:"width .3s"}}/>
            </div>
            <div style={{fontSize:9.5,color:"var(--slate)",marginTop:4}}><span style={{color:"#1E8E5A"}}>●</span> complete · <span style={{color:"var(--amber)"}}>○</span> pending</div>
          </div>
          {STEPS.map((s,i)=> s.g
            ? <div key={"g"+i} style={{fontSize:9.5,letterSpacing:".14em",color:"var(--slate)",padding:"12px 12px 4px",fontWeight:700}}>{s.g}</div>
            : <button key={s[0]} className={"step-btn"+(step===s[0]?" active":"")}
                disabled={s[0]!=="profile" && !profile.name.trim()}
                title={STEP_DONE[s[0]]?"Complete — this module has produced its output":(OPTIONAL_STEP[s[0]]?"Optional — amber until used":"Pending — this module hasn't produced its output yet")}
                onClick={()=>{ if(s[0]==="strategy"&&!internalTouched) setGeneric(true); setStep(s[0]); }}>
                <span style={{display:"inline-block",width:8,height:8,borderRadius:99,marginRight:6,verticalAlign:"middle",
                  background:STEP_DONE[s[0]]?"#1E8E5A":"transparent",
                  border:"2px solid "+(STEP_DONE[s[0]]?"#1E8E5A":"var(--amber)")}}/>
                {s[1]}
              </button>
          )}
        </nav>
        <main style={{padding:18,maxWidth:900}}>
          {step==="profile" && <Step1 profile={profile} setProfile={setProfile} next={()=>setStep("internal")}/>}
          {step==="internal" && <Step3 vars={vars} setVar={setVar} internal={internal} setInternal={setInternal}
            next={()=>{setGeneric(false);setStep("market");}} skip={()=>{setGeneric(true);setStep("market");}}/>}
          {step==="market" && <div>
            <Step2 profile={profile} vars={vars} setVar={setVar} marketBrief={marketBrief} setMarketBrief={setMarketBrief} next={()=>setStep("assess")}/>
            <ResearchCard profile={profile} research={research} setResearch={setResearch}/>
          </div>}
          {step==="assess" && <Step4 mode="assess" profile={profile} vars={vars} generic={generic&&!internalTouched} internal={internal}
            marketBrief={marketBrief} models={models} setModels={setModels} next={()=>setStep("forces")}/>}
          {step==="forces" && <Step4 mode="forces" profile={profile} vars={vars} generic={generic&&!internalTouched} internal={internal}
            marketBrief={marketBrief} models={models} setModels={setModels} next={()=>setStep("kraljic")}/>}
          {step==="kraljic" && <Step4 mode="kraljic" profile={profile} vars={vars} generic={generic&&!internalTouched} internal={internal}
            marketBrief={marketBrief} models={models} setModels={setModels} next={()=>setStep("suppliers")}/>}
          {step==="suppliers" && <StepSuppliers profile={profile} internal={internal} suppliers={suppliers} setSuppliers={setSuppliers} tierScheme={tierScheme} setTierScheme={setTierScheme} next={()=>setStep("risk")}/>}
          {step==="risk" && <StepRisk profile={profile} research={research} risks={risks} setRisks={setRisks} esgOps={esgOps} setEsgOps={setEsgOps} next={()=>setStep("chess")}/>}
          {step==="chess" && <StepChess profile={profile} vars={vars} generic={generic&&!internalTouched} chess={chess} setChess={setChess} next={()=>setStep("costlevers")}/>}
          {step==="costlevers" && <StepCostLevers profile={profile} cl={cl} setCl={setCl} next={()=>setStep("nego")}/>}
          {step==="nego" && <StepNego profile={profile} vars={vars} generic={generic&&!internalTouched} cl={cl} chess={chess} nego={nego} setNego={setNego} next={()=>setStep("exec")}/>}
          {step==="exec" && <StepExec profile={profile} strategy={strategy} cl={cl} exec={exec} setExec={setExec} next={()=>setStep("value")}/>}
          {step==="value" && <StepValue profile={profile} cl={cl} internal={internal} value={value} setValue={setValue} benefits={benefits} setBenefits={setBenefits} esgOps={esgOps} next={()=>setStep("sevenps")}/>}
          {step==="sevenps" && <StepSevenPs profile={profile} sp={sevenPs} setSp={setSevenPs} next={()=>setStep("strategy")}/>}
          {step==="strategy" && <Step5 tierScheme={tierScheme} profile={profile} vars={vars} setVar={setVar} generic={generic&&!internalTouched} internal={internal}
            marketBrief={marketBrief} strategy={strategy} setStrategy={setStrategy} sevenPs={sevenPs} cl={cl} setCl={setCl} models={models}
            research={research} suppliers={suppliers} risks={risks} chess={chess} nego={nego} exec={exec} value={value}
            esgOps={esgOps} benefits={benefits} pitch={pitch} setPitch={setPitch}
            saveSessionNow={saveSessionNow} exportSession={exportSession} importSession={importSession}/>}
          <ModuleReview step={step} profile={profile} vars={vars} generic={generic&&!internalTouched} models={models}
            research={research} suppliers={suppliers} risks={risks} esgOps={esgOps} chess={chess} cl={cl} nego={nego}
            exec={exec} value={value} benefits={benefits} sevenPs={sevenPs} strategy={strategy} pitch={pitch}
            internal={internal} tierScheme={tierScheme}/>
        </main>
      </div>
      <ReferenceLibraryChat step={step}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
