<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProcureAI · Strategic Category Suite · v1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
:root{
  --ink:#1B2026; --paper:#F7F6F2; --card:#FFFFFF; --line:#E3E1DA;
  --petrol:#0F5E56; --petrolSoft:#E4EFED; --mulberry:#7D3B5E; --mulberrySoft:#F2E7ED;
  --amber:#C98A12; --amberSoft:#F8EED8; --slate:#5A6068; --red:#B3402E;
  --user:#0F5E56; --ai:#C98A12; --assumed:#B3402E;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:'Archivo',system-ui,sans-serif;font-variation-settings:'wdth' 100;}
.display{font-variation-settings:'wdth' 118;font-weight:800;letter-spacing:.01em}
.mono{font-family:'IBM Plex Mono',monospace}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
.btn{font-family:inherit;font-size:13px;font-weight:600;border:1px solid var(--line);
  border-radius:8px;padding:9px 16px;cursor:pointer;background:var(--card);color:var(--ink)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn:focus-visible{outline:3px solid var(--amber);outline-offset:2px}
@media (prefers-reduced-motion: reduce){*{transition:none !important}}
.btn.primary{background:var(--petrol);border-color:var(--petrol);color:#fff}
.btn.dark{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.ghost{background:transparent}
input[type=text],textarea,select{font-family:inherit;font-size:14px;width:100%;padding:10px 12px;
  border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
textarea{resize:vertical;min-height:64px}
input[type=range]{width:100%;accent-color:var(--petrol)}
.badge{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.06em;
  padding:2px 7px;border-radius:99px;color:#fff;text-transform:uppercase;white-space:nowrap}
.badge.user{background:var(--user)} .badge.ai{background:var(--ai)} .badge.assumed{background:var(--assumed)}
.step-btn{display:flex;gap:10px;align-items:center;width:100%;text-align:left;background:transparent;
  border:none;border-left:3px solid transparent;padding:10px 12px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--slate)}
.step-btn.active{border-left-color:var(--amber);color:var(--ink);font-weight:700;background:#fff}
.step-btn:disabled{opacity:.4;cursor:not-allowed}
.step-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--slate)}
h2{font-size:17px;margin:0 0 4px} h3{font-size:14px;margin:14px 0 6px}
.hint{font-size:12.5px;color:var(--slate);margin:2px 0 12px;line-height:1.45}
.varrow{display:grid;grid-template-columns:1fr;gap:4px;padding:12px 0;border-bottom:1px dashed var(--line)}
.varrow:last-child{border-bottom:none}
.vartop{display:flex;justify-content:space-between;gap:8px;align-items:baseline;flex-wrap:wrap}
.varlabel{font-size:13.5px;font-weight:600}
.varends{display:flex;justify-content:space-between;font-size:11px;color:var(--slate)}
.rationale{font-size:12px;color:var(--slate);background:var(--paper);border-radius:6px;padding:8px 10px;margin-top:4px;line-height:1.45}
.banner{background:#FBF3DC;border:1px solid var(--amber);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.err{background:#F9E8EC;border:1px solid var(--mulberry);border-radius:8px;padding:10px 14px;font-size:13px;margin:10px 0;color:var(--mulberry)}
table{border-collapse:collapse;width:100%;font-size:12.5px}
th,td{border:1px solid var(--line);padding:6px 9px;text-align:left;vertical-align:top}
th{background:var(--paper);font-weight:700}
.ledger{display:flex;gap:14px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:11px}
.ledger b{font-size:15px}
.info{cursor:help;color:var(--slate);font-size:11px;border:1px solid var(--line);border-radius:99px;padding:0 5px;margin-left:5px;background:#fff;display:inline-block;line-height:1.5}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--petrolSoft);color:var(--petrol);border-radius:99px;padding:3px 10px;font-size:12px;font-weight:600;margin:0 6px 6px 0}
.chip button{border:none;background:none;cursor:pointer;color:var(--petrol);font-size:12px;padding:0}
.seg{flex:1;padding:8px 0;border-radius:6px;border:1px solid var(--line);cursor:pointer;font-family:inherit;font-weight:600;font-size:12.5px;background:#fff;color:var(--ink)}
.seg.on{background:var(--petrol);border-color:var(--petrol);color:#fff}
@media(max-width:820px){.layout{grid-template-columns:1fr !important}.rail{display:flex;overflow-x:auto;border-right:none !important;border-bottom:1px solid var(--line)}.step-btn{border-left:none;border-bottom:3px solid transparent;white-space:nowrap}.step-btn.active{border-bottom-color:var(--amber)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const {useState,useMemo,useRef,useEffect} = React;

/* ================= SHARED VARIABLE REGISTRY =================
   Every variable carries: value (1–5), conf (user|ai|assumed), rationale.
   Market variables can be scored from external data alone.
   Internal variables are optional — when skipped, the suite runs in
   GENERIC MODE using assumed sector-typical defaults.               */

const MARKET_VARS = [
  {id:"supplierConcentration", label:"Supplier market concentration", lo:"Fragmented, many players", hi:"Few dominant suppliers", help:"How consolidated is the supply market?"},
  {id:"switchingDifficulty",   label:"Switching difficulty",          lo:"Easy to re-source",        hi:"Locked in",              help:"Cost, time and risk of changing supplier."},
  {id:"geoRisk",               label:"Geographic / geopolitical exposure", lo:"Local, stable",       hi:"Concentrated in risky regions", help:"Exposure of the supply chain to geography and politics."},
  {id:"substituteScarcity",    label:"Substitute scarcity",           lo:"Many alternatives",        hi:"No real substitutes",    help:"Availability of alternative specs, materials or services."},
  {id:"priceVolatility",       label:"Price volatility",              lo:"Stable pricing",           hi:"Highly volatile",        help:"Input-cost and market-price swings."},
  {id:"capacityTightness",     label:"Capacity tightness",            lo:"Surplus capacity",         hi:"Severely constrained",   help:"Supply/demand balance in the market."},
  {id:"regulatoryIntensity",   label:"Regulatory intensity",          lo:"Light-touch",              hi:"Heavily regulated",      help:"Compliance, ESG, trade and safety burden."},
  {id:"techDisruption",        label:"Technology disruption pace",    lo:"Mature, static",           hi:"Rapidly evolving",       help:"Innovation reshaping the category."},
  {id:"entryBarriers",         label:"Barriers to entry",             lo:"New suppliers enter easily", hi:"Very hard to enter",  help:"Capital, IP, certification hurdles for new entrants."},
];

const INTERNAL_VARS = [
  {id:"spendShare",     label:"Share of addressable spend", lo:"Marginal", hi:"Top category", help:"This category's weight in your total spend."},
  {id:"criticality",    label:"Criticality to operations",  lo:"Nice to have", hi:"Line-stopping", help:"Impact on product quality / service continuity."},
  {id:"demandOutlook",  label:"Internal demand outlook",    lo:"Declining", hi:"Growing fast", help:"Where your own demand is heading."},
  {id:"visibility",     label:"Stakeholder / regulator visibility", lo:"Invisible", hi:"Board-level", help:"Who is watching this category."},
  {id:"valuePotential", label:"Value-improvement potential", lo:"Squeezed dry", hi:"Large headroom", help:"Savings, innovation or risk-reduction headroom."},
];

const ALL_VARS = [...MARKET_VARS, ...INTERNAL_VARS];
const CONF = {user:{label:"User",cls:"user"}, ai:{label:"AI-inferred",cls:"ai"}, assumed:{label:"Assumed",cls:"assumed"}};
const initVars = () => Object.fromEntries(ALL_VARS.map(v=>[v.id,{value:3,conf:"assumed",rationale:"Default midpoint — not yet assessed."}]));

/* ================= COST DRIVER & PURCHASING LEVER LIBRARY =================
   Master data, sourced from the category-management reference guide.
   Cost drivers explain WHY a category costs what it does (market-driven,
   mostly outside procurement's control). Purchasing levers explain HOW
   procurement can influence that cost (strategy-driven, in procurement's
   control). Kept as separate master lists so category archetypes below
   just reference IDs — single source of truth, easy to extend.          */

const COST_DRIVER_LIBRARY = {
  labour:        "Salaries, wages, day rates",
  materials:      "Raw materials — steel, copper, silicon, resin",
  inflation:      "CPI/RPI applied to labour and materials",
  fx:             "Exchange rates (USD/GBP, EUR/GBP etc.)",
  energy:         "Electricity, gas, fuel prices",
  logistics:      "Shipping, freight, distribution",
  taxDuty:        "Import taxes, tariffs, duties",
  commodity:      "Oil, metals and other traded commodity prices",
  technology:     "Software licences, platform/API fees",
  volume:         "Quantity purchased — economies of scale",
  complexity:     "Bespoke specifications, customisation",
  supplierMargin: "Supplier profit margin",
  compliance:     "Regulatory, certification, ESG costs",
  maintenance:    "Ongoing support and maintenance costs",
  warranty:       "Service obligations, warranty cover",
  riskPremium:    "Supply risk priced into the quote",
};

const LEVER_LIBRARY = {
  demandManagement:    {label:"Demand management",           desc:"Reduce unnecessary demand — buy less",                     saving:"5–30%"},
  specOptimisation:     {label:"Specification optimisation",  desc:"Buy only what is actually needed",                         saving:"5–20%"},
  standardisation:      {label:"Standardisation",             desc:"Reduce variants and bespoke specs",                        saving:"5–15%"},
  supplierConsolidation:{label:"Supplier consolidation",      desc:"Reduce the number of suppliers used",                      saving:"3–10%"},
  volumeAggregation:    {label:"Volume aggregation",          desc:"Combine demand across sites/entities",                     saving:"3–15%"},
  competitiveTender:    {label:"Competitive tender",          desc:"Increase competitive tension",                             saving:"5–20%"},
  reverseAuction:       {label:"Reverse auction",             desc:"Live competitive price discovery",                         saving:"5–15%"},
  negotiation:          {label:"Negotiation",                 desc:"Direct commercial and price negotiation",                  saving:"3–15%"},
  frameworkAgreements:  {label:"Framework agreements",        desc:"Pre-negotiated rates via a framework/panel",               saving:"2–10%"},
  longTermContracts:    {label:"Long-term contracts",         desc:"Multi-year commitments for volume discounts",              saving:"3–12%"},
  tco:                  {label:"Total cost of ownership",     desc:"Optimise lifecycle cost, not just purchase price",         saving:"10–30%"},
  processAutomation:    {label:"Process automation",          desc:"Reduce transactional / P2P cost",                          saving:"20–70%"},
  inventoryOptimisation:{label:"Inventory optimisation",      desc:"Lower stock holding cost",                                 saving:"5–20%"},
  makeVsBuy:            {label:"Make vs buy",                 desc:"Outsource or insource the activity",                       saving:"Variable"},
  supplierCollaboration:{label:"Supplier collaboration",      desc:"Joint innovation and co-development",                      saving:"High, long-term"},
  valueEngineering:     {label:"Value engineering",           desc:"Redesign the product/service/spec for lower cost",         saving:"10–40%"},
  paymentTerms:         {label:"Payment terms",               desc:"Improve cashflow via extended/early-payment terms",        saving:"Cashflow"},
  contractCompliance:   {label:"Contract compliance",         desc:"Increase usage of agreed contracts, reduce maverick spend",saving:"5–15%"},
  demandForecasting:    {label:"Demand forecasting",          desc:"Better planning reduces rush-buy premiums",                saving:"Variable"},
  shouldCostModelling:  {label:"Should-cost modelling",       desc:"Negotiate from the supplier's underlying cost structure",  saving:"5–25%"},
  digitalProcurement:   {label:"Digital procurement",         desc:"Self-service and automation for the long tail",            saving:"High"},
};

/* Category archetypes: costDrivers = {driverId: weight%} (weights are
   illustrative starting points, always AI-inferred/editable, not fact).
   demandDrivers/risks are free text. levers = ranked LEVER_LIBRARY ids. */
const CATEGORY_ARCHETYPES = {

    demandDrivers:["Refresh cycles","Headcount growth","New site rollouts"],

    notes:"Standardise the build spec across the business — configuration variety is a hidden cost driver.",

    demandDrivers:["Fleet size growth","EV transition mandates","Mileage patterns"],
    risks:["Residual value risk","Fuel/energy price volatility","Driver safety/compliance"],
    levers:["tco","standardisation","frameworkAgreements","volumeAggregation","negotiation"],
    notes:"Residual value assumptions at lease-end are a frequently overlooked cost driver — model TCO, not just monthly rental.",
  },
  "travel": {
    aliases:["business travel","corporate travel","t&e"],
    costDrivers:{fx:15,energy:15,supplierMargin:20,volume:25,inflation:25},

    costDrivers:{labour:30,inflation:20,energy:15,materials:15,compliance:10,complexity:10},
    demandDrivers:["Portfolio growth/shrinkage","Cleaning/service frequency changes","Site consolidation"],
    risks:["Health & safety compliance","Single-site dependency","Labour availability"],
    levers:["tco","supplierConsolidation","frameworkAgreements","valueEngineering","negotiation"],

/* Savings opportunities & KPIs per archetype (doc examples where given,
   standard practice elsewhere). Kept separate so the archetype table
   stays readable; merged in at apply time. */
const ARCHETYPE_EXTRAS = {
  "management consultancy": {
    savings:["Reduce partner utilisation in team mix","Standardise rate cards across firms","Convert T&M to fixed-price deliverables","Cap and audit expenses"],

function matchArchetype(name, sector){
  const q=((name||"")+" "+(sector||"")).toLowerCase();
  let best=null, bestLen=0;
  const merged={...CATEGORY_ARCHETYPES,...(typeof CUSTOM!=="undefined"?CUSTOM.archetypes:{})};
  Object.entries(merged).forEach(([key,def])=>{
    [key,...(def.aliases||[])].forEach(term=>{
      if(q.includes(term.toLowerCase()) && term.length>bestLen){ best=key; bestLen=term.length; }
    });
  });
  return best;
}
function getArchetype(key){ return CATEGORY_ARCHETYPES[key]||(typeof CUSTOM!=="undefined"?CUSTOM.archetypes[key]:null); }

/* ================= DERIVED SCORES ================= */
const avg = a => a.reduce((s,x)=>s+x,0)/a.length;
function deriveScores(vars, generic){
  const g = id => vars[id].value;
  const supplyRisk = avg([g("supplierConcentration"),g("switchingDifficulty"),g("geoRisk"),g("substituteScarcity"),g("capacityTightness")]);
  const businessImpact = generic ? 3 : avg([g("spendShare"),g("criticality"),g("visibility"),g("valuePotential")]);
  const porter = {
    "Supplier power":     avg([g("supplierConcentration"),g("switchingDifficulty"),g("capacityTightness")]),
    "Buyer power (yours)": avg([6-g("supplierConcentration"),6-g("switchingDifficulty"), generic?3:g("spendShare")]),
    "Threat of substitutes": 6-g("substituteScarcity"),
    "Threat of new entrants": 6-g("entryBarriers"),
    "Competitive rivalry": avg([6-g("supplierConcentration"),g("techDisruption"),6-g("capacityTightness")]),
  };
  const quadrant = supplyRisk>=3
    ? (businessImpact>=3 ? "Strategic" : "Bottleneck")
    : (businessImpact>=3 ? "Leverage"  : "Non-critical");
  return {supplyRisk,businessImpact,porter,quadrant};
}

/* ================= AI PROVIDER LAYER =================
   Four modes: (a) claude-app — works when this file runs inside Claude.ai;
   (b) claude-key — direct browser call to the Anthropic API with a user key;
   (c) gemini — Google Gemini with a user key; (d) sandbox — offline simulated
   demo data, no key. Keys are held in memory only
   for this session — never saved to disk or sent anywhere else.          */
const AI_SETTINGS = {provider:"claude-app", claudeKey:"", geminiKey:"", geminiModel:"gemini-2.5-flash"};
const GEMINI_FALLBACKS=["gemini-2.5-flash","gemini-2.5-pro","gemini-2.0-flash","gemini-flash-latest"];
function storageGet(k){ try{ return window.localStorage.getItem(k); }catch(e){ return null; } }
function storageSet(k,v){ try{ window.localStorage.setItem(k,v); return true; }catch(e){ return false; } }
function storageDel(k){ try{ window.localStorage.removeItem(k); }catch(e){} }
(function loadKeys(){ try{ const s=JSON.parse(storageGet("procureai_keys")||"{}"); Object.assign(AI_SETTINGS,s); }catch(e){} })();

function parseAIJson(text){
  const clean=text.replace(/```json|```/g,"").trim();
  const a=clean.indexOf("{"), b=clean.lastIndexOf("}");
  if(a===-1||b===-1) throw new Error("The AI reply didn't contain valid JSON — please retry.");
  return JSON.parse(clean.slice(a,b+1));
}
function friendlyAIError(e){
  const m=e.message||String(e);
  if(m.includes("Failed to fetch")||m.includes("NetworkError"))
    return "Couldn't reach the AI service. This usually means: (1) you're offline, or (2) you opened this file outside Claude.ai — click ⚙ AI settings in the header and add a Claude or Gemini API key to use AI features standalone.";
  if(m.includes("api key")||m.includes("API key")||m.includes("x-api-key")||m.includes("401")||m.includes("API_KEY"))
    return "The AI service rejected the key — check ⚙ AI settings in the header.";
  return m;
}
async function geminiCall(prompt,json,model){
  const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+encodeURIComponent(AI_SETTINGS.geminiKey),{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
      generationConfig: json?{responseMimeType:"application/json"}:{}})});
  const data=await res.json();
  if(data.error) throw Object.assign(new Error(data.error.message||"Gemini error"),{code:data.error.code,status:data.error.status});
  return (data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||"").join("\n");
}
async function askAI(prompt,{search=false,json=true}={}){
  const s=AI_SETTINGS;
  if(s.provider==="sandbox"){
    await new Promise(r=>setTimeout(r,600)); // brief pause so the UI reads naturally
    return sandboxAnswer(prompt,json);
  }
  if(s.provider==="gemini"){
    if(!s.geminiKey) throw new Error("No Gemini API key set — open ⚙ AI settings in the header.");
    const tried=[s.geminiModel,...GEMINI_FALLBACKS.filter(m=>m!==s.geminiModel)];
    let lastErr=null;
    for(const model of tried){
      try{
        const text=await geminiCall(prompt,json,model);
        return json?parseAIJson(text):text.trim();
      }catch(e){
        lastErr=e;
        const msg=(e.message||"")+"";
        if(e.code===404||msg.includes("not found")||msg.includes("NOT_FOUND")) continue; // try next model
        throw e;
      }
    }
    throw lastErr||new Error("No Gemini model available");
  }
  const headers={"Content-Type":"application/json"};
  if(s.provider==="claude-key"){
    if(!s.claudeKey) throw new Error("No Claude API key set — open ⚙ AI settings in the header.");
    headers["x-api-key"]=s.claudeKey;
    headers["anthropic-version"]="2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"]="true";
  }
  const body={model:"claude-sonnet-4-6",max_tokens:1500,messages:[{role:"user",content:prompt}]};
  if(search && s.provider!=="gemini") body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers,body:JSON.stringify(body)});
  const data=await res.json();
  if(data.error) throw new Error(data.error.message||"Claude error");
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  return json?parseAIJson(text):text.trim();
}
async function askClaude(prompt,useSearch,expectJson=true){
  try{ return await askAI(prompt,{search:useSearch,json:expectJson}); }
  catch(e){ throw new Error(friendlyAIError(e)); }
}

/* ================= REAL .DOCX EXPORT (v1.0) =================
   Loads the open-source `docx` library on demand from a CDN and converts
   our markdown into a genuine Word .docx with proper heading styles and
   tables. If no CDN is reachable (fully offline), downloads fall back to
   the legacy HTML-in-.doc format automatically.                        */
const DOCX_CDNS=[
  "https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/index.umd.min.js",
  "https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/index.umd.js",
  "https://unpkg.com/docx@8.5.0/build/index.umd.js",
  "https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"
];
let _docxLoading=null;
function ensureDocx(){
  if(window.docx&&window.docx.Document) return Promise.resolve(window.docx);
  if(_docxLoading) return _docxLoading;
  _docxLoading=(async()=>{
    for(const url of DOCX_CDNS){
      try{
        await new Promise((res,rej)=>{
          const s=document.createElement("script"); s.src=url;
          s.onload=res; s.onerror=()=>{s.remove();rej(new Error("load failed"))};
          document.head.appendChild(s);
          setTimeout(()=>rej(new Error("timeout")),8000);
        });
        if(window.docx&&window.docx.Document) return window.docx;
      }catch(e){/* try next CDN */}
    }
    return null;
  })();
  return _docxLoading;
}
function docxInline(dx,text,extra={}){
  // Split **bold** runs within a line
  const runs=[]; let rest=String(text||"");
  const re=/\*\*([^*]+)\*\*/;
  while(true){
    const m=rest.match(re);
    if(!m){ if(rest) runs.push(new dx.TextRun({text:rest,...extra})); break; }
    if(m.index>0) runs.push(new dx.TextRun({text:rest.slice(0,m.index),...extra}));
    runs.push(new dx.TextRun({text:m[1],bold:true,...extra}));
    rest=rest.slice(m.index+m[0].length);
  }
  if(!runs.length) runs.push(new dx.TextRun({text:"",...extra}));
  return runs;
}
function mdToDocxChildren(dx,md){
  const children=[]; const lines=md.split("\n");
  let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(/^\s*\|.*\|\s*$/.test(line)){ // table block
      const tblLines=[];
      while(i<lines.length&&/^\s*\|.*\|\s*$/.test(lines[i])){ tblLines.push(lines[i]); i++; }
      const rows=tblLines.filter(l=>!/^\s*\|[\s\-:|]+\|\s*$/.test(l))
        .map(l=>l.replace(/^\s*\||\|\s*$/g,"").split("|").map(c=>c.trim()));
      if(rows.length){
        const width=Math.max(...rows.map(r=>r.length));
        children.push(new dx.Table({
          width:{size:100,type:dx.WidthType.PERCENTAGE},
          rows:rows.map((r,ri)=>new dx.TableRow({children:
            Array.from({length:width},(_,ci)=>new dx.TableCell({
              children:[new dx.Paragraph({children:docxInline(dx,r[ci]||"",ri===0?{bold:true}:{}) })],
              shading:ri===0?{fill:"E8ECEF"}:undefined,
            }))
          }))
        }));
        children.push(new dx.Paragraph({text:""}));
      }
      continue;
    }
    let m;
    if((m=line.match(/^(#{1,4})\s+(.*)$/))){
      const lvl=m[1].length;
      children.push(new dx.Paragraph({heading:[dx.HeadingLevel.HEADING_1,dx.HeadingLevel.HEADING_2,dx.HeadingLevel.HEADING_3,dx.HeadingLevel.HEADING_4][lvl-1],children:docxInline(dx,m[2].replace(/\*\*/g,""))}));
    }else if((m=line.match(/^\s*[-•]\s+(.*)$/))){
      children.push(new dx.Paragraph({children:docxInline(dx,m[1]),bullet:{level:0}}));
    }else if((m=line.match(/^_(.*)_$/))){
      children.push(new dx.Paragraph({children:[new dx.TextRun({text:m[1],italics:true,color:"6B7280"})]}));
    }else if(line.trim()===""){
      children.push(new dx.Paragraph({text:""}));
    }else{
      children.push(new dx.Paragraph({children:docxInline(dx,line)}));
    }
    i++;
  }
  return children;
}
async function downloadAsWord(md,baseName){
  // Try real .docx first; fall back to legacy HTML-in-.doc
  try{
    const dx=await ensureDocx();
    if(dx){
      const doc=new dx.Document({
        styles:{default:{document:{run:{font:"Calibri",size:22}}}},
        sections:[{children:mdToDocxChildren(dx,md)}]
      });
      const blob=await dx.Packer.toBlob(doc);
      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob); a.download=baseName+".docx"; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),4000);
      return "docx";
    }
  }catch(e){ console.warn("docx generation failed, falling back to .doc:",e); }
  const blob=new Blob([mdToHtml(md)],{type:"application/msword"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=baseName+".doc"; a.click();
  return "doc";
}

    return {suppliers:names.map((n,i)=>({name:n,capability:2+(i%3),alignment:2+((i+1)%3),accountAttractiveness:2+(i%3),relativeValue:1+((i+1)%3),scorecard:{quality:3,delivery:3,cost:3,innovation:2+(i%2),esg:3},rationale:"Simulated assessment for demonstration. "+SB_NOTE}))};
  }
  if(p.includes("risk analyst")){
    const base=(A&&A.risks)||[];
    const extra=["Supplier concentration","Input-cost inflation","Delivery capacity constraints","Compliance exposure","Key-person dependency","Contract lock-in"].filter(x=>!base.some(b=>b.toLowerCase()===x.toLowerCase()));
    return {risks:base.concat(extra).slice(0,6).map((r,i)=>({risk:r,detail:"Simulated risk detail for demonstration.",likelihood:2+(i%3),impact:2+((i+1)%3),mitigation:"Simulated mitigation — validate before use."}))};
  }
  if(p.includes("sustainable-procurement"))
    return {opportunities:[["Supplier carbon reporting","Environmental"],["Circular / re-use options","Environmental"],["SME & local supplier inclusion","Social value"],["Fair-work standards in contracts","Social"],["Governance & transparency clauses","Governance"]].map(([o,t])=>({opportunity:o,type:t,action:"Simulated action for demonstration.",benefit:"Simulated benefit."}))};
  if(p.includes("chessboard lever selection")){
    const qm=p.match(/base strategy "([^"]+)"/); const quad=qm?qm[1]:Object.keys(getChessboard())[0];
    const already=(p.match(/do NOT repeat any of these[^:]*:\s*([^\n]+)\./)||[])[1];
    const excl=new Set((already?already.split(","):[]).map(s=>s.trim().toLowerCase()));
    const board=getChessboard(); const out=[];
    Object.entries(board[quad]?.approaches||{}).forEach(([app,ms])=>ms.forEach(mname=>{
      if(out.length<5&&!excl.has(mname.toLowerCase())) out.push({name:mname,approach:app,rationale:"Simulated pick from the home strategy (sandbox).",effort:["Low","Med","High"][out.length%3],fit:out.length<3?"High":"Medium"});
    }));
    return {methods:out};
  }
  if(p.includes("negotiation strategist"))
    return {objectivesUs:"Secure improved commercial terms while protecting service continuity. Simulated objectives for demonstration.",objectivesThem:"Defend margin and lock in a longer term. Simulated.",batnaUs:"Award to the credible alternative qualified during sourcing (simulated).",batnaThem:"Redeploy capacity to other clients at similar margin (simulated).",
      issues:["Price / rates","Payment terms","Contract length","Service levels","Volume commitment","Liability & risk"].map((iss,i)=>({issue:iss,opening:"Simulated opening position",target:"Simulated realistic target",walkAway:"Simulated walk-away",priority:["High","High","Med","Med","Low","Med"][i],concessionCost:"Simulated cost of conceding"})),
      trades:["Longer term for lower rates (simulated)","Faster payment for a discount (simulated)","Case-study rights for service credits (simulated)"],
      behaviours:{scene:"Open with the bundled-demand story and shared objectives (simulated).",exchange:"Seek their capacity and margin pressures; hold our budget ceiling (simulated).",bargain:"Use conditional proposals — every concession priced and traded (simulated).",conclude:"Summarise agreements in writing within 24 hours (simulated)."}};
  if(p.includes("execution plan")&&p.includes('"gantt"'))
    return {gantt:["Baseline & stakeholder engagement","Market approach / sourcing event","Negotiation & award","Transition & implementation","Supplier governance (SRM)","Savings tracking & reporting"].map((w,i)=>({workstream:w,startQ:1+i*2>9?9:1+i*2,endQ:Math.min(12,3+i*2),owner:["Category Manager","Category Manager","Procurement Director","Business Owner","Category Manager","Finance"][i]})),
      raci:["Approve strategy","Run sourcing event","Sign contract","Manage transition","Own supplier relationship","Report savings"].map((a,i)=>({activity:a,R:"Category Manager",A:["Procurement Director","Category Manager","Procurement Director","Business Owner","Category Manager","Finance"][i],C:"Legal, Finance",I:"Supplier"}))};
  if(p.includes("benefits-tracking register"))
    return {benefits:[["Negotiated unit-cost reduction","Cash"],["Avoided renewal uplift","Cost avoidance"],["Process time saved via catalogue buying","Efficiency"],["Supplier carbon reduction plan","Carbon"],["Local SME spend share","Social value"],["Demand reduction programme","Cash"]].map(([b,t],i)=>({benefit:b,type:t,metric:"Simulated metric",planned:"TBC (simulated)",delivered:"0",quarter:"Q"+(1+(i%4)),owner:"Category Manager"}))};
  if(p.includes("savings pipeline of 5-7 initiatives"))
    return {pipeline:sbPick((A&&A.savings)||["Consolidate volumes across units","Standardise specifications","Competitive renewal event","Demand management gates","Payment-terms trade"],5).map((s,i)=>({initiative:s,lever:((A&&A.rankedLevers&&LEVER_LIBRARY[A.rankedLevers[i]])||{}).label||"Volume bundling",pct:[3,2,4,1,2][i%5],horizon:["0-3m","3-6m","6-12m","3-6m","12m+"][i%5],status:"Idea"})),
      kpis:sbPick((A&&A.kpis)||["Cost vs baseline","Contract compliance","Supplier OTIF"],4).map(k=>({kpi:k,baseline:"TBC",y1:"−2% (sim)",y2:"−4% (sim)",y3:"−6% (sim)"})),
      maturity:MATURITY_DIMS.map((d,i)=>({dim:d,score:2+(i%2),note:"Simulated self-assessment."}))};
  if(p.includes("7Ps marketing-mix questionnaire"))
    return Object.fromEntries(PS.map(x=>[x,[`How does the business define its ${x.toLowerCase()} today? (simulated)`,`What would best-in-class ${x.toLowerCase()} look like in this sector? (simulated)`]]));
  if(p.includes("marketing strategist"))
    return {canvas:Object.fromEntries(PS.map(x=>[x,`Simulated ${x} statement for demonstration.`])),narrative:"Simulated 7Ps narrative — connect a live AI provider for the real synthesis. "+SB_NOTE};
  // generic fallback
  return {note:"Simulated sandbox response — prompt signature not recognised. "+SB_NOTE};
}


/* ================= POWERPOINT EXPORT (v1.0) =================
   Loads pptxgenjs on demand from a CDN (three fallbacks). Builds a
   widescreen board deck from the session — one slide per module.   */
const PPTX_CDNS=[
  "https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.min.js",
  "https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js",
  "https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"
];
let _pptxLoading=null;
function ensurePptx(){
  if(window.PptxGenJS) return Promise.resolve(window.PptxGenJS);
  if(_pptxLoading) return _pptxLoading;
  _pptxLoading=(async()=>{
    for(const url of PPTX_CDNS){
      try{
        await new Promise((res,rej)=>{
          const s=document.createElement("script"); s.src=url;
          s.onload=res; s.onerror=()=>{s.remove();rej(new Error("load failed"))};
          document.head.appendChild(s);
          setTimeout(()=>rej(new Error("timeout")),9000);
        });
        if(window.PptxGenJS) return window.PptxGenJS;
      }catch(e){/* next CDN */}
    }
    _pptxLoading=null;
    return null;
  })();
  return _pptxLoading;
}

/* ================= MINI SVG CHARTS (module review) ================= */
function MiniBars({items,max=5,height=null,dual=false,legend=null}){
  // items: [{label, value, value2?, color?}] — horizontal bars, optional paired second bar
  const rowH=dual?30:20, labelW=190, W=560, chartW=W-labelW-46;
  const H=items.length*rowH+6;
  const mx=Math.max(max,...items.map(i=>Math.max(i.value||0,i.value2||0)));
  return (
    <svg viewBox={"0 0 "+W+" "+(H+(legend?18:0))} style={{width:"100%",maxWidth:620,display:"block"}} role="img">
      {legend&&<g>
        <rect x={labelW} y={2} width={10} height={8} fill="var(--petrol)"/><text x={labelW+14} y={10} fontSize="9" fill="var(--slate)">{legend[0]}</text>
        <rect x={labelW+90} y={2} width={10} height={8} fill="var(--amber)"/><text x={labelW+104} y={10} fontSize="9" fill="var(--slate)">{legend[1]}</text>
      </g>}
      {items.map((it,i)=>{
        const y=i*rowH+(legend?18:0);
        const w1=Math.max(2,(it.value||0)/mx*chartW);
        const w2=Math.max(2,(it.value2||0)/mx*chartW);
        return (<g key={i}>
          <text x={labelW-6} y={y+(dual?12:14)} fontSize="10" fill="var(--ink)" textAnchor="end">{String(it.label).slice(0,34)}</text>
          <rect x={labelW} y={y+4} width={w1} height={dual?9:12} rx="2" fill={it.color||"var(--petrol)"}/>
          {dual&&<rect x={labelW} y={y+15} width={w2} height={9} rx="2" fill="var(--amber)"/>}
          <text x={labelW+Math.max(w1,dual?w2:0)+5} y={y+(dual?14:14)} fontSize="9.5" fill="var(--slate)">{dual?`${it.value}% / ${it.value2}%`:it.valueText||it.value}</text>
        </g>);
      })}
    </svg>
  );
}
function MiniScatter({points,xLabel,yLabel}){
  // points: [{x(1-5), y(1-5), label}]
  const S=250,pad=30;
  const px=v=>pad+(v-1)/4*(S-2*pad), py=v=>S-pad-(v-1)/4*(S-2*pad);
  return (
    <svg viewBox={"0 0 "+(S+150)+" "+S} style={{width:"100%",maxWidth:430,display:"block"}} role="img">
      <rect x={pad} y={pad} width={S-2*pad} height={S-2*pad} fill="none" stroke="var(--line)"/>
      <line x1={px(3)} y1={pad} x2={px(3)} y2={S-pad} stroke="var(--line)" strokeDasharray="3 3"/>
      <line x1={pad} y1={py(3)} x2={S-pad} y2={py(3)} stroke="var(--line)" strokeDasharray="3 3"/>
      <text x={S/2} y={S-8} fontSize="9.5" fill="var(--slate)" textAnchor="middle">{xLabel} →</text>
      <text x={10} y={S/2} fontSize="9.5" fill="var(--slate)" textAnchor="middle" transform={"rotate(-90 10 "+(S/2)+")"}>{yLabel} →</text>
      {points.map((p,i)=>(<g key={i}>
        <circle cx={px(p.x)} cy={py(p.y)} r="5" fill="var(--petrol)" opacity="0.85"/>
        <text x={px(p.x)+7} y={py(p.y)+3} fontSize="8.5" fill="var(--ink)">{String(p.label).slice(0,16)}</text>
      </g>))}
    </svg>
  );
}

/* ================= MODULE REVIEW CARD (v1.0) =================
   One card, rendered under every step: the module's output at a glance
   (chart where chartable) + a per-module Word report download.        */
function ModuleReview(props){
  const {step,profile,vars,generic,models,research,suppliers,risks,esgOps,chess,cl,nego,exec,value,benefits,sevenPs,strategy,pitch,internal,tierScheme}=props;
  const d=deriveScores(vars,generic);
  const confTxt=c=>({user:"User",ai:"AI-inferred",assumed:"Assumed"})[c]||c;
  const keptM=chess?(chess.methods||[]).filter(m=>m.keep!==false):[];
  const tierNames=TIER_SCHEMES[tierScheme]||TIER_SCHEMES.standard;
  const tl=t=>tierNames[["Tier 1","Tier 2","Tier 3"].indexOf(t)]||t;
  function segOf(s){ return (s.capability>=3?(s.alignment>=3?"Strategic partner":"Transactional expert"):(s.alignment>=3?"Develop":"Tactical / phase out")); }
  function tierOfS(s){ const seg=segOf(s); if(seg==="Strategic partner"||(s.share||0)>0.15) return "Tier 1"; if(seg==="Develop"||(s.share||0)>0.05) return "Tier 2"; return "Tier 3"; }

  const R={};
  R.profile={ready:!!profile.name.trim(),chart:null,md:()=>`# Module report — Category profile\n\n| Field | Value |\n|---|---|\n| Category | ${profile.name} |\n| Sector | ${profile.sector||"—"} |\n| Region | ${profile.region||"Global"} |\n| Incumbent suppliers | ${(profile.suppliers||[]).join(", ")||"—"} |\n| Pain points | ${(profile.pains||[]).join("; ")||"—"} |\n\n**Scope & context:** ${profile.notes||"—"}\n`};
  R.internal={ready:!!internal.spend||INTERNAL_VARS.some(v=>vars[v.id].conf!=="assumed"),chart:null,md:()=>`# Module report — Spend profile (internal)\n\n${internal.spend?`Annual spend loaded: ${(+internal.spend.total||0).toLocaleString()} across ${internal.spend.rows||"?"} rows.`:"No spend file — running in generic (external-data-only) mode."}\n\n| Internal variable | Score | Confidence |\n|---|---|---|\n`+INTERNAL_VARS.map(v=>`| ${v.label} | ${vars[v.id].value}/5 | ${confTxt(vars[v.id].conf)} |`).join("\n")+"\n"};
  R.market={ready:MARKET_VARS.some(v=>vars[v.id].conf!=="assumed"),
    chart:<MiniBars items={MARKET_VARS.map(v=>({label:v.label,value:vars[v.id].value,color:vars[v.id].conf==="user"?"var(--petrol)":vars[v.id].conf==="ai"?"var(--mulberry)":"var(--slate)"}))} max={5}/>,
    md:()=>`# Module report — Market info hub\n\n| Variable | Score | Confidence | Rationale |\n|---|---|---|---|\n`+MARKET_VARS.map(v=>`| ${v.label} | ${vars[v.id].value}/5 | ${confTxt(vars[v.id].conf)} | ${vars[v.id].rationale||""} |`).join("\n")+"\n"};
  R.assess={ready:!!(models.swot&&models.pestle),chart:null,md:()=>{
    let md=`# Module report — SWOT & PESTLE\n\n`;
    if(models.swot){md+=`## SWOT\n`;["Strengths","Weaknesses","Opportunities","Threats"].forEach(k=>{md+=`**${k}**\n`+(models.swot[k]||[]).map(x=>`- ${x}`).join("\n")+"\n\n";});}
    if(models.pestle){md+=`## PESTLE\n| Factor | Assessment |\n|---|---|\n`+Object.entries(models.pestle).map(([k,v])=>`| ${k} | ${v} |`).join("\n")+"\n";}
    return md;}};
  R.forces={ready:MARKET_VARS.some(v=>vars[v.id].conf!=="assumed"),
    chart:<MiniBars items={Object.entries(d.porter).map(([k,v])=>({label:k,value:+v.toFixed(1),color:v>=3.6?"var(--mulberry)":v>=2.4?"var(--amber)":"var(--petrol)",valueText:v.toFixed(1)+"/5"}))} max={5}/>,
    md:()=>`# Module report — Five Forces\n\n| Force | Score | Level |\n|---|---|---|\n`+Object.entries(d.porter).map(([k,v])=>`| ${k} | ${v.toFixed(1)}/5 | ${v>=3.6?"High":v>=2.4?"Moderate":"Low"} |`).join("\n")+"\n\n_Derived live from the Market Info Hub variables._\n"};
  R.kraljic={ready:R.forces.ready,chart:null,md:()=>`# Module report — Kraljic positioning\n\nSupply risk **${d.supplyRisk.toFixed(1)}/5** × business impact **${d.businessImpact.toFixed(1)}/5** → **${d.quadrant}**.\n\nRecommended levers for this quadrant:\n`+(LEVERS[d.quadrant]||[]).map(l=>`- ${l}`).join("\n")+"\n"};
  R.suppliers={ready:suppliers.length>0,
    chart:suppliers.length?<MiniScatter points={suppliers.map(s=>({x:s.alignment,y:s.capability,label:s.name}))} xLabel="Alignment" yLabel="Capability"/>:null,
    md:()=>`# Module report — Supplier segmentation & tiering\n\n| Supplier | Capability | Alignment | Segment | Tier | Confidence |\n|---|---|---|---|---|---|\n`+suppliers.map(s=>`| ${s.name} | ${s.capability}/5 | ${s.alignment}/5 | ${segOf(s)} | ${tl(tierOfS(s))} | ${confTxt(s.conf)} |`).join("\n")+"\n\n_Preferencing (their view of us) is a subjective judgement — sharpen with relationship history and supplier revenue vs your spend._\n"};
  R.risk={ready:risks.length>0,
    chart:risks.length?<MiniBars items={[...risks].sort((a,b)=>b.likelihood*b.impact-a.likelihood*a.impact).slice(0,7).map(r=>({label:r.risk,value:r.likelihood*r.impact,color:r.likelihood*r.impact>=15?"var(--mulberry)":r.likelihood*r.impact>=8?"var(--amber)":"var(--petrol)",valueText:"L"+r.likelihood+"×I"+r.impact}))} max={25}/>:null,
    md:()=>`# Module report — Risk & ESG\n\n| Risk | L | I | Mitigation |\n|---|---|---|---|\n`+risks.map(r=>`| ${r.risk} | ${r.likelihood} | ${r.impact} | ${r.mitigation} |`).join("\n")+(esgOps&&esgOps.length?`\n\n## ESG opportunities\n`+esgOps.map(o=>`- **${o.opportunity}** (${o.type}) — ${o.action}`).join("\n"):"")+"\n"};
  R.chess={ready:keptM.length>0,chart:null,
    md:()=>`# Module report — Purchasing chessboard\n\nBase strategy: **${chess?chess.quad:"—"}** (demand ${d.porter["Buyer power (yours)"].toFixed(1)}/5 vs supplier ${d.porter["Supplier power"].toFixed(1)}/5)\n\nKept methods (${keptM.length}):\n`+keptM.map(m=>`- **${m.name}** — ${m.approach||""} (${m.fit||"—"} fit, ${m.effort} effort) · ${m.rationale}`).join("\n")+"\n"};
  R.costlevers={ready:Object.keys(cl.drivers||{}).length>0||cl.levers.length>0,
    chart:Object.keys(cl.drivers||{}).length?<MiniBars items={Object.entries(cl.drivers).sort((a,b)=>b[1].weight-a[1].weight).map(([id,dd])=>({label:COST_DRIVER_LIBRARY[id]||id,value:dd.weight,valueText:dd.weight+"%"}))} max={50}/>:null,
    md:()=>`# Module report — Cost drivers & levers\n\n## Cost drivers\n| Driver | Weight | Confidence |\n|---|---|---|\n`+Object.entries(cl.drivers||{}).map(([id,dd])=>`| ${COST_DRIVER_LIBRARY[id]||id} | ${dd.weight}% | ${confTxt(dd.conf)} |`).join("\n")+`\n\n## Levers\n`+cl.levers.map(l=>`- **${LEVER_LIBRARY[l.id]?LEVER_LIBRARY[l.id].label:l.id}** — ${l.rationale||""}`).join("\n")+(cl.kpis&&cl.kpis.length?`\n\nKPIs: ${cl.kpis.join(" · ")}`:"")+"\n"};
  R.nego={ready:!!nego,chart:null,md:()=>nego?`# Module report — Negotiation plan\n\n**Our objectives:** ${nego.objectivesUs}\n\n**Their objectives:** ${nego.objectivesThem}\n\n**Our BATNA:** ${nego.batnaUs}\n\n| Issue | Opening | Target | Walk-away | Priority |\n|---|---|---|---|---|\n`+(nego.issues||[]).map(i=>`| ${i.issue} | ${i.opening} | ${i.target} | ${i.walkAway} | ${i.priority} |`).join("\n")+"\n":""};
  R.exec={ready:!!exec,
    chart:exec?<MiniBars items={(exec.gantt||[]).map(g=>({label:g.workstream,value:(g.endQ-g.startQ+1),valueText:"Q"+g.startQ+"–Q"+g.endQ}))} max={12}/>:null,
    md:()=>exec?`# Module report — Execution plan\n\n| Workstream | Quarters | Owner |\n|---|---|---|\n`+(exec.gantt||[]).map(g=>`| ${g.workstream} | Q${g.startQ}–Q${g.endQ} | ${g.owner} |`).join("\n")+`\n\n## RACI\n| Activity | R | A | C | I |\n|---|---|---|---|---|\n`+(exec.raci||[]).map(r=>`| ${r.activity} | ${r.R} | ${r.A} | ${r.C} | ${r.I} |`).join("\n")+"\n":""};
  R.value={ready:!!value,
    chart:value?<MiniBars dual legend={["Planned %","Delivered %"]} items={(value.pipeline||[]).map(p=>({label:p.initiative,value:+p.pct||0,value2:p.status==="Delivered"?(+p.delivered||0):0}))} max={10}/>:null,
    md:()=>value?`# Module report — Savings & value\n\n| Initiative | Lever | Planned % | Delivered % | Status |\n|---|---|---|---|---|\n`+(value.pipeline||[]).map(p=>`| ${p.initiative} | ${p.lever} | ${p.pct}% | ${p.status==="Delivered"?(p.delivered||0)+"%":"—"} | ${p.status} |`).join("\n")+(benefits&&benefits.length?`\n\n## Benefits register\n| Benefit | Type | Planned | Delivered | Owner |\n|---|---|---|---|---|\n`+benefits.map(b=>`| ${b.benefit} | ${b.type} | ${b.planned} | ${b.delivered} | ${b.owner} |`).join("\n"):"")+"\n":""};
  R.sevenps={ready:!!sevenPs.canvas,chart:null,md:()=>sevenPs.canvas?`# Module report — Commercial 7Ps\n\n| P | Strategic statement |\n|---|---|\n`+Object.entries(sevenPs.canvas).map(([k,v])=>`| ${k} | ${v} |`).join("\n")+(sevenPs.narrative?`\n\n${sevenPs.narrative}`:"")+"\n":""};
  R.strategy={ready:!!strategy,chart:null,md:()=>strategy?`# Module report — Strategy synthesis\n\n${strategy.executiveSummary||""}\n\nObjectives:\n`+(strategy.objectives||[]).map(o=>`- ${o}`).join("\n")+(pitch?`\n\n## Elevator pitch\n${pitch.pitch||""}`:"")+"\n":""};

  const r=R[step];
  if(!r) return null;
  const base=(profile.name||"module").replace(/\s+/g,"-").toLowerCase();
  return (
    <div className="card" style={{borderLeft:"4px solid "+(r.ready?"#1E8E5A":"var(--amber)")}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <h3 style={{margin:0}}>📊 Module review — output at a glance<Tip t="Each module produces a reviewable output: a chart of what this screen has generated (where chartable) and a one-click Word report of just this module — for circulating a single piece of the analysis without the full document."/></h3>
        <span style={{fontSize:11.5,fontWeight:700,padding:"2px 10px",borderRadius:99,background:r.ready?"#E4F0EA":"#FBF3DC",color:r.ready?"#1E8E5A":"#8A6D1F",border:"1px solid "+(r.ready?"#7FB89F":"var(--amber)")}}>{r.ready?"✓ Complete":"⏳ Pending"}</span>
      </div>
      {r.ready
        ? (<div style={{marginTop:8}}>
            {r.chart}
            <button className="btn" style={{marginTop:8}} onClick={()=>downloadAsWord(r.md(),base+"-"+step+"-report")}>⬇ Module report (Word)</button>
          </div>)
        : <p className="hint" style={{marginTop:6}}>This module hasn't produced its output yet — complete the step above (the step list on the left shows amber until it's done).</p>}
    </div>
  );
}

/* ================= DEMO DATA + GUIDED TOUR (v1.0) =================
   MarketAI-style guided walkthrough: loads a full simulated dataset
   (via the Sandbox engine, so it's archetype-grounded) and walks
   through every module with narration. No key, no network.         */
function buildDemoState(){
  const name="Cloud Services (Demo)";
  const sb=(sig,json=true)=>sandboxAnswer(sig.replace("%N",'"'+name+'"'),json);
  const mv=sb('Assess %N ... "variables":{"<id>"');
  const vars=initVars();
  MARKET_VARS.forEach(v=>{const r=mv.variables[v.id]; if(r) vars[v.id]={value:Math.round(r.score),conf:"ai",rationale:r.rationale};});
  const swot=sb('SWOT analysis %N'), pestle=sb('PESTLE analysis %N');
  const research=sb('You are a procurement research analyst with web search %N');
  const supNames=(mv.typicalSuppliers||[]).slice(0,5);
  const sup=sb('You are a supplier relationship analyst. Category: %N. Suppliers: '+supNames.join(", ")+'.');
  const suppliers=(sup.suppliers||[]).map(s=>({...s,conf:"ai",share:0}));
  const risksOut=sb('You are a procurement risk analyst. Category: %N');
  const risks=(risksOut.risks||[]).map(r=>({...r,conf:"ai"}));
  const esg=sb('You are a sustainable-procurement specialist %N');
  const esgOps=(esg.opportunities||[]).map(o=>({...o,conf:"ai"}));
  const dd=deriveScores(vars,true);
  const demandPower=dd.porter["Buyer power (yours)"], supplierPower=dd.porter["Supplier power"];
  const quad=demandPower>=3?(supplierPower>=3?"Seek joint advantage with supplier":"Leverage competition among suppliers"):(supplierPower>=3?"Change the nature of demand":"Manage spend");
  const ch=sb('Purchasing-chessboard lever selection. Category: %N base strategy "'+quad+'".');

function TourOverlay({tour,setTour,setStep}){
  if(tour===null) return null;
  const t=TOUR[tour];
  const go=n=>{ if(n<0||n>=TOUR.length){ setTour(null); return; } setTour(n); setStep(TOUR[n].step); };
  return (
    <div style={{position:"fixed",right:16,bottom:16,width:400,maxWidth:"calc(100vw - 32px)",zIndex:1000,
      background:"#fff",border:"2px solid var(--petrol)",borderRadius:12,boxShadow:"0 12px 40px rgba(0,0,0,.25)",padding:"14px 16px"}}>

      </div>

        <div style={{height:"100%",width:((tour+1)/TOUR.length*100)+"%",background:"var(--petrol)",borderRadius:2,transition:"width .3s"}}/>
      </div>
      <div style={{fontWeight:800,fontSize:14,margin:"4px 0 6px"}}>{t.title}</div>
      <div style={{fontSize:12.5,lineHeight:1.5,color:"var(--ink)"}}>{t.text}</div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
        <button className="btn" disabled={tour===0} onClick={()=>go(tour-1)}>← Back</button>

          : <button className="btn primary" onClick={()=>setTour(null)}>Finish ✓</button>}
      </div>
    </div>
  );
}

  if(s.provider==="claude-app") return {ready:true,label:"Claude · in-app"};

function ConfCell({conf,onChange}){

function ChipInput({items,onChange,placeholder,tip}){
  const [t,setT]=useState("");
  const add=()=>{ if(t.trim()&&!items.includes(t.trim())){onChange([...items,t.trim()]);} setT(""); };
  return (
    <div>
      <div>{items.map(it=>(
        <span key={it} className="chip">{it}<button onClick={()=>onChange(items.filter(x=>x!==it))}>✕</button></span>))}</div>
      <div style={{display:"flex",gap:6}}>
        <input type="text" placeholder={placeholder} title={tip} value={t}
          onChange={e=>setT(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")add();}}/>
        <button className="btn" onClick={add} disabled={!t.trim()}>Add</button>
      </div>
    </div>
  );
}

function ScalePicker({value,onChange,lo,hi}){
  return (
    <div>
      <div style={{display:"flex",gap:5,marginTop:6}}>
        {[1,2,3,4,5].map(n=>(
          <button key={n} className={"seg"+(n===value?" on":"")}
            title={n===1?lo : n===2?"Leaning: "+lo : n===3?"Moderate / balanced" : n===4?"Leaning: "+hi : hi}
            onClick={()=>onChange(n)}>{n}</button>
        ))}
      </div>
      <div className="varends"><span>◀ {lo}</span><span>{hi} ▶</span></div>
    </div>
  );
}

function EditableAdd({placeholder,onAdd}){
  const [t,setT]=useState("");
  return (
    <div style={{display:"flex",gap:6,marginTop:6}}>

        onClick={()=>{onAdd(t.trim());setT("");}}>Add</button>

  );
}

const QUADRANT_META = {
  Strategic:      {advice:"Create an advantage — harness relationships for competitive advantage, share risks and opportunities, keep a route back to Leverage open", color:"var(--petrol)"},
  Leverage:       {advice:"Minimise TCO — maximise profit, retain flexibility, short-term commitments, generic specifications", color:"#2E6FB3"},
  Bottleneck:     {advice:"Minimise risk — secure supply, bundle to increase your attractiveness, develop contingencies and substitutes", color:"var(--amber)"},
  "Non-critical": {advice:"Simplify purchasing — standardise, consolidate suppliers, cut transaction costs", color:"var(--slate)"},
};

/* Which Market Intelligence variables feed each force — shown to the user
   so the derivation is transparent (point: 'derived from what?'). */
const FORCE_SOURCES={
  "Supplier power":["Supplier market concentration","Switching difficulty","Capacity tightness"],
  "Buyer power (yours)":["Supplier market concentration (inverted)","Switching difficulty (inverted)","Share of addressable spend (internal)"],
  "Threat of substitutes":["Substitute scarcity (inverted)"],
  "Threat of new entrants":["Barriers to entry (inverted)"],
  "Competitive rivalry":["Supplier concentration (inverted)","Technology disruption pace","Capacity tightness (inverted)"],
};
const FORCE_MEANING={
  "Supplier power":{High:"Suppliers hold the cards — expect price resistance at renewal. Secure supply and reduce dependency before you negotiate hard.",Moderate:"Power is balanced — credible alternatives give you real room to negotiate.",Low:"You hold the leverage — competitive tension, short contracts and tendering will pay off."},
  "Buyer power (yours)":{High:"Your spend matters to this market — use volume aggregation and competitive tendering aggressively.",Moderate:"You have some leverage — bundle volumes to increase your attractiveness as a customer.",Low:"You're a small buyer here — consider buying consortiums, frameworks, or aligning to supplier standards rather than bespoke demands."},
  "Threat of substitutes":{High:"Real alternatives exist — use them as live negotiation leverage and qualify at least one substitute.",Moderate:"Partial substitutes exist — worth qualifying one as a plan B.",Low:"No real alternatives — treat like a bottleneck: continuity first, price second."},
  "Threat of new entrants":{High:"New suppliers keep entering — the market will stay competitive; avoid long lock-ins that stop you benefiting.",Moderate:"Some new entry — re-scan the supplier market every strategy cycle.",Low:"A closed market — incumbents are entrenched, so relationships and contract craft matter more than tendering."},
  "Competitive rivalry":{High:"Suppliers are fighting for share — tenders and auctions will produce sharp pricing.",Moderate:"Some rivalry — keep 2–3 credible bidders warm.",Low:"A cosy market — benchmarks and should-cost models are your best defence against tacit price alignment."},
};
const forceLevel=v=>v>=3.6?"High":v>=2.4?"Moderate":"Low";
const forceColor=v=>v>=3.6?"var(--mulberry)":v>=2.4?"var(--amber)":"var(--petrol)";

      {arrow(205,215,225,215)}

function KraljicMatrix({supplyRisk,businessImpact,suppliers,generic,quadrant}){
  const W=320,H=300,pad=34;
  const x=v=>pad+((v-1)/4)*(W-pad-12);
  const y=v=>H-pad-((v-1)/4)*(H-pad-12);
  const halfW=(W-pad-12)/2, halfH=(H-pad-12)/2;
  const maxSpend=Math.max(1,...(suppliers||[]).map(s=>s.spend||0));
  const qc=(QUADRANT_META[quadrant]||QUADRANT_META.Strategic).color;
  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",maxWidth:460,display:"block"}} role="img" aria-label="Kraljic matrix">
      <rect x={pad} y={12} width={halfW} height={halfH} fill="#EAF1F8"/>
      <rect x={pad+halfW} y={12} width={halfW} height={halfH} fill="var(--petrolSoft)"/>
      <rect x={pad} y={12+halfH} width={halfW} height={halfH} fill="#F3F2EE"/>
      <rect x={pad+halfW} y={12+halfH} width={halfW} height={halfH} fill="var(--amberSoft)"/>
      <text x={pad+6} y={26} fontSize="10" fill="#2E6FB3" fontWeight="700">LEVERAGE</text>
      <text x={W-12} y={26} fontSize="10" fill="var(--petrol)" fontWeight="700" textAnchor="end">STRATEGIC</text>
      <text x={pad+6} y={H-pad-6} fontSize="10" fill="var(--slate)" fontWeight="700">NON-CRITICAL</text>
      <text x={W-12} y={H-pad-6} fontSize="10" fill="var(--amber)" fontWeight="700" textAnchor="end">BOTTLENECK</text>
      {(suppliers||[]).slice(0,6).map((s,i)=>(
        <circle key={i} cx={x(Math.min(5,Math.max(1,supplyRisk+(i%3)*0.25-0.25)))}
          cy={y(1+((s.spend||0)/maxSpend)*(businessImpact-1))}
          r={5+((s.spend||0)/maxSpend)*9} fill="var(--ink)" opacity="0.18"/>
      ))}
      <circle cx={x(supplyRisk)} cy={y(businessImpact)} r="11" fill={qc} stroke="#fff" strokeWidth="2.5"/>
      <text x={W/2} y={H-8} fontSize="11" fill="var(--slate)" textAnchor="middle">Supply risk →</text>
      <text x="12" y={H/2} fontSize="11" fill="var(--slate)" textAnchor="middle" transform={"rotate(-90 12 "+(H/2)+")"}>Business impact{generic?" (assumed)":""} →</text>
    </svg>
  );
}

const SECTOR_OPTIONS=["Automotive","FMCG / Consumer Goods","Banking / Financial Services","Insurance","Pharma / Healthcare","Energy & Utilities","Telecoms","Technology / SaaS","Public Sector","Retail","Manufacturing / Industrial","Professional Services","Logistics & Transport","Construction / Real Estate","Mining & Resources","Hospitality & Leisure"];
const REGION_OPTIONS=["Global","EMEA","Americas","APAC","Europe","UK & Ireland","North America","India","Middle East","Latin America","Africa","Australia & NZ"];

function SelectOrOther({value,onChange,options,placeholder}){
  const inList = value==="" || options.includes(value);
  const [other,setOther]=useState(!inList);
  return (
    <div>
      <select value={other?"__other":(value||"")} onChange={e=>{
        if(e.target.value==="__other"){ setOther(true); onChange(""); }
        else { setOther(false); onChange(e.target.value); }}}>
        <option value="">— select —</option>
        {options.map(o=><option key={o} value={o}>{o}</option>)}
        <option value="__other">Other (type below)…</option>
      </select>
      {other && <input type="text" style={{marginTop:6}} placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)}/>}
    </div>
  );
}

function Step1({profile,setProfile,next}){
  const set=(k,v)=>setProfile(p=>({...p,[k]:v}));
  const [busy,setBusy]=useState("");
  const [err,setErr]=useState("");
  const categorySuggestions=[...Object.keys(CATEGORY_ARCHETYPES).map(k=>k.replace(/\b\w/g,c=>c.toUpperCase())),"Ocean Freight","Road Freight","Marketing Agencies","MRO","Office Supplies","Utilities","Insurance","Security Services","Catering","Waste Management"];
  async function draftNotes(){
    setBusy("notes"); setErr("");
    try{
      const text=await askClaude(
        `Write a 3-4 sentence scope & context note for a procurement category strategy. Category: "${profile.name}". Sector: ${profile.sector||"unspecified"}. Region: ${profile.region||"Global"}. Incumbent suppliers: ${profile.suppliers.length?profile.suppliers.join(", "):"not stated"}. Known pain points: ${profile.pains.length?profile.pains.join("; "):"not stated"}. Plain prose covering what's in scope, current arrangement, and what the strategy needs to address. No preamble.`,
        false,false);
      set("notes",text);
    }catch(e){ setErr(e.message); }
    setBusy("");
  }
  async function suggest(kind){
    setBusy(kind); setErr("");
    try{
      const out=await askClaude(kind==="suppliers"
        ? `List 4-6 typical supplier names or archetypes for the procurement category "${profile.name}" (sector ${profile.sector||"any"}, region ${profile.region||"Global"}). Respond ONLY with JSON, no fences: {"items":["..."]}`
        : `List 4-6 typical pain points buyers face in the procurement category "${profile.name}" (sector ${profile.sector||"any"}) — short phrases like "prices rise at every renewal" or "single-source dependency". Respond ONLY with JSON, no fences: {"items":["..."]}`);
      const items=(out.items||[]).filter(x=>x&&typeof x==="string");
      set(kind, [...new Set([...(profile[kind]||[]),...items])]);
    }catch(e){ setErr(e.message); }
    setBusy("");
  }
  return (
    <div className="card">
      <h2 className="display">Category profile</h2>
      <p className="hint">Everything downstream is grounded in this profile. Fields marked <b style={{color:"var(--mulberry)"}}>*</b> are required — everything else is optional and can be AI-suggested. Hover any <span className="info">i</span> for help.</p>
      <h3>Category name <b style={{color:"var(--mulberry)"}}>*</b><Tip t="The spend category you're building a strategy for. Pick a suggestion from the list (matches the archetype library) or type your own."/></h3>
      <input type="text" list="catList" placeholder="Pick from suggestions or type your own…" value={profile.name} onChange={e=>set("name",e.target.value)}/>
      <datalist id="catList">{categorySuggestions.map(c=><option key={c} value={c}/>)}</datalist>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div><h3>Industry / sector <span style={{fontWeight:400,fontSize:11,color:"var(--slate)"}}>(optional)</span><Tip t="Your organisation's industry. Adapts AI questions, benchmarks and the 7Ps sector pack."/></h3>
          <SelectOrOther value={profile.sector} onChange={v=>set("sector",v)} options={SECTOR_OPTIONS} placeholder="Type your sector…"/></div>
        <div><h3>Region of supply <span style={{fontWeight:400,fontSize:11,color:"var(--slate)"}}>(optional)</span><Tip t="Where the supply market operates — not where your HQ is. Drives geopolitical risk assessment. Defaults to Global."/></h3>
          <SelectOrOther value={profile.region} onChange={v=>set("region",v)} options={REGION_OPTIONS} placeholder="Type a region…"/></div>
      </div>
      <h3>Incumbent suppliers <span style={{fontWeight:400,fontSize:11,color:"var(--slate)"}}>(optional)</span><Tip t="Who supplies this today, if known. For a brand-new category, press AI suggest to get typical suppliers in this market — delete any that don't fit."/></h3>
      <ChipInput items={profile.suppliers} onChange={v=>set("suppliers",v)} placeholder="Type a supplier name, press Enter…" tip="Add incumbents one at a time"/>
      <button className="btn" style={{background:"var(--amberSoft)",color:"var(--ai)",border:"none",marginTop:4}} disabled={busy==="suppliers"||!profile.name.trim()} onClick={()=>suggest("suppliers")}>
        {busy==="suppliers"?"Suggesting…":"⚡ AI-suggest typical suppliers"}</button>
      <h3>Current pain points <span style={{fontWeight:400,fontSize:11,color:"var(--slate)"}}>(optional)</span><Tip t="What's not working today, if you know. For a new category or sub-category you won't — press AI suggest for the typical pain points buyers hit in this market, and keep the ones that ring true."/></h3>
      <ChipInput items={profile.pains} onChange={v=>set("pains",v)} placeholder="Type a pain point, press Enter…" tip="Add pain points one at a time"/>
      <button className="btn" style={{background:"var(--amberSoft)",color:"var(--ai)",border:"none",marginTop:4}} disabled={busy==="pains"||!profile.name.trim()} onClick={()=>suggest("pains")}>
        {busy==="pains"?"Suggesting…":"⚡ AI-suggest typical pain points"}</button>
      <h3>Scope & context notes <span style={{fontWeight:400,fontSize:11,color:"var(--slate)"}}>(optional)</span><Tip t="Free-text context: sub-categories in scope, constraints, contract situation. Fill it yourself, or press the AI draft button and it writes one from the fields above — then edit."/></h3>
      <textarea placeholder="Sub-categories in scope, known constraints, contract situation… (or press AI draft below)" value={profile.notes} onChange={e=>set("notes",e.target.value)}/>
      <div style={{display:"flex",gap:10,marginTop:6,flexWrap:"wrap"}}>
        <button className="btn" style={{background:"var(--amberSoft)",color:"var(--ai)",border:"none"}} disabled={busy==="notes"||!profile.name.trim()} onClick={draftNotes}>
          {busy==="notes"?"Drafting…":"⚡ AI draft the notes from the fields above"}</button>
      </div>
      {err && <div className="err">{err}</div>}
      <div style={{marginTop:14}}>
        <button className="btn primary" disabled={!profile.name.trim()} onClick={next}>Continue to spend profile →</button>
      </div>
    </div>
  );
}

function Step2({profile,vars,setVar,setMarketBrief,marketBrief,next}){
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [useSearch,setUseSearch]=useState(false);
  async function assess(){
    setBusy(true); setErr("");
    try{
      const prompt = `You are a procurement market analyst. Category: "${profile.name}". Sector: "${profile.sector||"unspecified"}". Region of supply: "${profile.region||"Global"}". Incumbent suppliers: ${profile.suppliers?.length?profile.suppliers.join(", "):"not stated"}. Known pain points: ${profile.pains?.length?profile.pains.join("; "):"not stated"}. Context: "${profile.notes||"none"}".
Score each variable 1–5 (5 = high) with a one-sentence rationale grounded in the actual supply market for this category:
${MARKET_VARS.map(v=>`- ${v.id}: ${v.label} (1=${v.lo}, 5=${v.hi})`).join("\n")}
Also give a 3-sentence market summary, a one-sentence 12-month price outlook, and 3–6 typical supplier names or archetypes.
Respond ONLY with JSON, no markdown fences: {"variables":{"<id>":{"score":n,"rationale":"..."}},"marketSummary":"...","priceOutlook":"...","typicalSuppliers":["..."]}`;
      const out = await askClaude(prompt,useSearch);
      MARKET_VARS.forEach(v=>{
        const r=out.variables&&out.variables[v.id];
        if(r&&r.score>=1&&r.score<=5) setVar(v.id,{value:Math.round(r.score),conf:"ai",rationale:r.rationale||"AI-inferred."});
      });
      setMarketBrief({summary:out.marketSummary||"",priceOutlook:out.priceOutlook||"",suppliers:out.typicalSuppliers||[]});
    }catch(e){ setErr("AI market assessment failed — you can retry, or score the sliders manually. ("+e.message+")"); }
    setBusy(false);
  }
  return (
    <div className="card">
      <h2 className="display">Market intelligence <span style={{fontSize:12,color:"var(--slate)",fontWeight:400}}>· external data</span></h2>
      <p className="hint">These nine variables describe the <b>supply market itself</b> — they need no internal data, so a full category strategy can be built from this step alone. Generate them with AI, then override any score you disagree with (it flips to <span className="badge user">User</span>).</p>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <button className="btn dark" disabled={busy} onClick={assess}>{busy?"Assessing…":"⚡ AI market assessment"}</button>
        <label style={{fontSize:12.5,display:"flex",gap:6,alignItems:"center",color:"var(--slate)"}} title="Live web research uses Claude's web-search tool — it needs the Claude provider (in-app or with a Claude API key). On Gemini this toggle is disabled; the assessment still works from the model's knowledge.">
          <input type="checkbox" checked={useSearch&&AI_SETTINGS.provider!=="gemini"} disabled={AI_SETTINGS.provider==="gemini"} onChange={e=>setUseSearch(e.target.checked)}/> use live web research <b>(needs Claude AI)</b>
        </label>
      </div>
      {busy && <Spinner label="Claude is scoring the supply market…"/>}
      {err && <div className="err">{err}</div>}
      {marketBrief.summary && (
        <div className="rationale" style={{marginTop:10}}>
          <b>Market summary:</b> {marketBrief.summary}<br/>
          <b>Price outlook:</b> {marketBrief.priceOutlook}<br/>
          {marketBrief.suppliers.length>0 && <span><b>Typical suppliers:</b> {marketBrief.suppliers.join(", ")}</span>}

      )}
      <div style={{marginTop:8}}>
        {MARKET_VARS.map(v=><VarRow key={v.id} def={v} entry={vars[v.id]} onChange={e=>setVar(v.id,e)}/>)}
      </div>
      <button className="btn primary" style={{marginTop:12}} onClick={next}>Continue to SWOT & PESTLE →</button>
    </div>
  );
}

function Step3({vars,setVar,internal,setInternal,next,skip}){
  const fileRef=useRef();
  const [err,setErr]=useState("");
  function onCSV(e){
    const f=e.target.files[0]; if(!f) return;
    Papa.parse(f,{header:true,skipEmptyLines:true,complete:(res)=>{
      try{
        const rows=res.data.map(r=>{
          const keys=Object.keys(r);
          const sk=keys.find(k=>/supplier|vendor|name/i.test(k));
          const vk=keys.find(k=>/spend|amount|value|total/i.test(k));
          return {supplier:(r[sk]||"").trim(), spend:parseFloat(String(r[vk]||"").replace(/[^0-9.\-]/g,""))||0};
        }).filter(r=>r.supplier&&r.spend>0);
        if(!rows.length) throw new Error("Need columns like 'Supplier' and 'Spend'.");
        const total=rows.reduce((s,r)=>s+r.spend,0);
        const sorted=[...rows].sort((a,b)=>b.spend-a.spend);
        const suppliers=sorted.slice(0,10).map(r=>({supplier:r.supplier,spend:r.spend,share:r.spend/total}));
        const top3=suppliers.slice(0,3).reduce((s,r)=>s+r.share,0);
        const conc=top3>0.85?5:top3>0.65?4:top3>0.45?3:top3>0.25?2:1;
        setInternal(p=>({...p,spend:{total,suppliers,top3Share:top3,file:f.name}}));
        setVar("supplierConcentration",{value:conc,conf:"ai",
          rationale:`Inferred from your spend file: top-3 suppliers hold ${(top3*100).toFixed(0)}% of ${rows.length}-supplier spend.`});
        setErr("");
      }catch(ex){ setErr(ex.message); }
    }});
  }
  return (
    <div className="card">
      <h2 className="display">Internal data <span style={{fontSize:12,color:"var(--slate)",fontWeight:400}}>· optional</span></h2>
      <div className="banner">No internal data to hand? <b>Skip this step</b> — the strategy will be generated in <b>generic mode</b> from market data alone, using sector-typical assumptions that are flagged in the assumption register.</div>
      <h3 style={{marginTop:4}}>What internal data is useful here?<Tip t="You don't need all of it — each item sharpens specific variables below. The spend cube (CSV upload) gives the biggest single uplift."/></h3>
      <table style={{marginBottom:14}}>
        <thead><tr><th>Data item</th><th>What it is</th><th>Sharpens</th></tr></thead>
        <tbody>{INTERNAL_DATA_CHECKLIST.map(d=>(
          <tr key={d.item}><td><b>{d.item}</b></td><td>{d.what}</td><td style={{fontSize:11.5,color:"var(--slate)"}}>{d.feeds}</td></tr>))}
        </tbody>
      </table>
      <h3>Spend file (CSV)</h3>
      <p className="hint">Columns: supplier name + spend. Supplier concentration is auto-inferred (flagged AI-inferred) and top suppliers appear as bubbles on the Kraljic matrix.</p>
      <input type="file" accept=".csv" ref={fileRef} onChange={onCSV}/>
      {err && <div className="err">{err}</div>}
      {internal.spend && (
        <div className="rationale" style={{marginTop:8}}>
          <b>{internal.spend.file}</b> · total spend {internal.spend.total.toLocaleString()} · top-3 share {(internal.spend.top3Share*100).toFixed(0)}%
          <table style={{marginTop:8}}><thead><tr><th>Supplier</th><th>Spend</th><th>Share</th></tr></thead><tbody>
            {internal.spend.suppliers.slice(0,5).map(s=>(
              <tr key={s.supplier}><td>{s.supplier}</td><td className="mono">{s.spend.toLocaleString()}</td><td className="mono">{(s.share*100).toFixed(1)}%</td></tr>
            ))}
          </tbody></table>
        </div>
      )}
      <h3 style={{marginTop:18}}>Internal assessment<Tip t="Five 1-5 judgements about YOUR organisation's relationship with this category (not the market): how big it is in your spend, how critical to your operations, where your demand is heading, who's watching it, and how much value headroom is left. Together they form the 'business impact' axis of the Kraljic matrix."/></h3>
      <p className="hint">These five questions are about <b>your organisation</b>, not the supply market: how much this category matters to you. They set the vertical (business impact) axis of the Kraljic matrix — the market questions on the next step set the horizontal (supply risk) axis. Answer what you know; leave the rest and they stay flagged Assumed.</p>
      {INTERNAL_VARS.map(v=><VarRow key={v.id} def={v} entry={vars[v.id]} onChange={e=>setVar(v.id,e)}/>)}
      <div style={{display:"flex",gap:10,marginTop:12,flexWrap:"wrap"}}>
        <button className="btn primary" onClick={next}>Continue to market info hub →</button>
        <button className="btn" onClick={skip}>Skip — continue in generic mode (market data only)</button>
      </div>
      <p className="hint" style={{marginTop:8}}><b>What's the difference?</b> Both take you to the Market info hub. <b>Continue</b> means your answers above count — the Kraljic business-impact axis and the strategy use your internal picture. <b>Skip</b> means you have no internal data (e.g. a brand-new category): business impact is assumed at midpoint, the strategy is written as a sector-typical playbook, and every step shows a "generic mode" banner so nobody mistakes it for a data-backed view. You can come back and fill this in later — the strategy upgrades automatically.</p>
    </div>
  );
}

function mdToHtml(md){
  const lines=md.split("\n"); let html=""; let inTable=false;
  const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inline=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/_(.+?)_/g,"<i>$1</i>");
  lines.forEach(l=>{
    if(l.startsWith("|")){
      const cells=l.split("|").slice(1,-1).map(c=>c.trim());
      if(cells.every(c=>/^-+$/.test(c))) return;
      if(!inTable){html+="<table border='1' cellspacing='0' cellpadding='5' style='border-collapse:collapse;font-size:11pt'>";inTable=true;}
      html+="<tr>"+cells.map(c=>"<td>"+inline(c)+"</td>").join("")+"</tr>"; return;
    }
    if(inTable){html+="</table>";inTable=false;}
    if(l.startsWith("### ")) html+="<h3>"+inline(l.slice(4))+"</h3>";
    else if(l.startsWith("## ")) html+="<h2 style='color:#0F5E56'>"+inline(l.slice(3))+"</h2>";
    else if(l.startsWith("# ")) html+="<h1>"+inline(l.slice(2))+"</h1>";
    else if(l.startsWith("- ")) html+="<p style='margin:2px 0 2px 18px'>• "+inline(l.slice(2))+"</p>";
    else if(l.trim()==="") html+="";
    else html+="<p>"+inline(l)+"</p>";
  });
  if(inTable) html+="</table>";
  return "<html><head><meta charset='utf-8'></head><body style='font-family:Calibri,Arial,sans-serif;font-size:11pt'>"+html+"</body></html>";
}

function fillTemplate(name,ctx){

  md=md.replace(/\[Category Name\]|\[Category \/ RFX Name\]|\[Supplier \/ Deal\]/g,profile.name||"[Category]");
  const seg=s=>segmentOf(s.capability,s.alignment);
  if(name==="Category_Management_Plan_Master_Template"){
    md=md.replace("| Annual spend | |","| Annual spend | "+(internal.spend?internal.spend.total.toLocaleString():"")+" |")
         .replace("| Number of suppliers | |","| Number of suppliers | "+(internal.spend?internal.spend.suppliers.length+"+ (top shown)":(suppliers.length||""))+" |")

         .replace("_Supply risk vs business impact placement and rationale._",`Placement: **${d.quadrant}** (supply risk ${d.supplyRisk.toFixed(1)}/5, business impact ${d.businessImpact.toFixed(1)}/5). ${QUADRANT_META[d.quadrant].advice}.`)

    }
    if(risks.length){
      md=md.replace("| 1 | | | | | |",risks.map((r,i)=>`| ${i+1} | ${r.risk} | ${r.likelihood} | ${r.impact} | ${r.mitigation} | |`).join("\n"));
    }
    if(cl.levers.length){
      md=md.replace("| Lever | Rationale | Est. value | Horizon |\n|---|---|---|---|\n| | | | |","| Lever | Rationale | Est. value | Horizon |\n|---|---|---|---|\n"+cl.levers.map(l=>{const def=LEVER_LIBRARY[l.id];return def?`| ${def.label} | ${(l.rationale||def.desc)} | ${def.saving} | |`:"";}).filter(Boolean).join("\n"));
    }
    if(exec){
      md=md.replace("| Workstream | Y1 | Y2 | Y3 | Owner |\n|---|---|---|---|---|\n| | | | | |","| Workstream | Y1 | Y2 | Y3 | Owner |\n|---|---|---|---|---|\n"+exec.gantt.map(g=>`| ${g.workstream} | ${g.startQ<=4?"█":""} | ${(g.startQ<=8&&g.endQ>=5)?"█":""} | ${g.endQ>=9?"█":""} | ${g.owner} |`).join("\n"));
    }
  }
  if(name==="Category_Sourcing_Strategy_Master_Template" && chess){
    md=md.replace("_Power balance (our demand power vs supplier power), chosen base strategy and specific plays._",`Our demand power ${d.porter["Buyer power (yours)"].toFixed(1)}/5 vs supplier power ${d.porter["Supplier power"].toFixed(1)}/5 → base strategy: **${chess.quad}**.`)
         .replace("| Play | Rationale | Effort |\n|---|---|---|\n| | | |","| Play | Rationale | Effort |\n|---|---|---|\n"+chess.methods.map(m0=>`| ${m0.name} | ${m0.rationale} | ${m0.effort} |`).join("\n"));
  }
  if(name==="Negotiation_Strategy_Plan_Master_Template" && nego){
    md=md.replace("| Target objectives | | |",`| Target objectives | ${nego.objectivesUs} | ${nego.objectivesThem} |`)
         .replace("| BATNA (best alternative) | | |",`| BATNA (best alternative) | ${nego.batnaUs} | ${nego.batnaThem} |`)
         .replace(/\| Price \| \| \| \| \| \|[\s\S]*?\| Risk allocation \| \| \| \| \| \|/,
           nego.issues.map(x=>`| ${x.issue} | ${x.opening} | ${x.target} | ${x.walkAway} | ${x.priority} | ${x.concessionCost} |`).join("\n"))
         .replace("| 1. Setting the scene | |",`| 1. Setting the scene | ${nego.behaviours.scene} |`)
         .replace("| 2. Exchanging information | |",`| 2. Exchanging information | ${nego.behaviours.exchange} |`)
         .replace("| 3. Bargaining | |",`| 3. Bargaining | ${nego.behaviours.bargain} |`)
         .replace("| 4. Concluding | |",`| 4. Concluding | ${nego.behaviours.conclude} |`);
    if(nego.trades.length) md=md.replace("| We give (low cost to us) | They value it because | We want in return |\n|---|---|---|\n| | | |","| We give (low cost to us) | They value it because | We want in return |\n|---|---|---|\n"+nego.trades.map(t=>`| ${t} | | |`).join("\n"));
  }
  if(name==="Category_Execution_Plan_Master_Template"){
    if(internal.spend) md=md.replace("| Annual spend | | |",`| Annual spend | ${internal.spend.total.toLocaleString()} | |`);
    if(suppliers.length){
      const t1=suppliers.filter(s=>seg(s)==="Strategic partner").map(s=>s.name).join(", ");
      const t2=suppliers.filter(s=>seg(s)==="Develop"||seg(s)==="Transactional expert").map(s=>s.name).join(", ");
      const t3=suppliers.filter(s=>seg(s)==="Tactical / phase out").map(s=>s.name).join(", ");
      md=md.replace("| Tier 1 (strategic / strategy houses) | | Quarterly exec QBR, joint plan |",`| Tier 1 (strategic / strategy houses) | ${t1} | Quarterly exec QBR, joint plan |`)
           .replace("| Tier 2 (important / niche) | | Bi-annual review, scorecard |",`| Tier 2 (important / niche) | ${t2} | Bi-annual review, scorecard |`)
           .replace("| Tier 3 (tail) | | Annual light-touch, P2P channel |",`| Tier 3 (tail) | ${t3} | Annual light-touch, P2P channel |`)
           .replace("| Supplier | Quality | Delivery | Cost | Innovation | ESG | Overall |\n|---|---|---|---|---|---|---|\n| | | | | | | |","| Supplier | Quality | Delivery | Cost | Innovation | ESG | Overall |\n|---|---|---|---|---|---|---|\n"+suppliers.map(s=>`| ${s.name} | ${s.scorecard.quality} | ${s.scorecard.delivery} | ${s.scorecard.cost} | ${s.scorecard.innovation} | ${s.scorecard.esg} | ${(SCORECARD_DIMS.reduce((a,dd)=>a+s.scorecard[dd],0)/5).toFixed(1)} |`).join("\n"));
    }
    if(value){
      md=md.replace("| Initiative | Lever | Est. value | Status |\n|---|---|---|---|\n| | | | |","| Initiative | Lever | Est. value | Status |\n|---|---|---|---|\n"+value.pipeline.map(p=>`| ${p.initiative} | ${p.lever} | ${p.pct}% | ${p.status} |`).join("\n"));
    }
    if(ctx.research){
      md=md.replace("| Disruptor (e.g. AI automation, regulation, sustainability) | Impact | Horizon | Response |\n|---|---|---|---|\n| | | | |","| Disruptor (e.g. AI automation, regulation, sustainability) | Impact | Horizon | Response |\n|---|---|---|---|\n"+(ctx.research.disruptions||[]).map(r=>`| ${r.disruption} | ${r.impact} | | |`).join("\n"));
    }
  }
  return md;
}
