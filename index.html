function Step3({vars,setVar,internal,setInternal,next,skip}){
  const fileRef=useRef();
  const [err,setErr]=useState("");
  function onCSV(e){
    const f=e.target.files[0]; if(!f) return;
    Papa.parse(f,{header:true,skipEmptyLines:true,complete:(res)=>{
      try{
        const rows=res.data.map(r=>{
          const keys=Object.keys(r);
          const sk=keys.find(k=>/supplier|vendor|name/i.test(k));
          const vk=keys.find(k=>/spend|amount|value|total/i.test(k));
          return {supplier:(r[sk]||"").trim(), spend:parseFloat(String(r[vk]||"").replace(/[^0-9.\-]/g,""))||0};
        }).filter(r=>r.supplier&&r.spend>0);
        if(!rows.length) throw new Error("Need columns like 'Supplier' and 'Spend'.");
        const total=rows.reduce((s,r)=>s+r.spend,0);
        const sorted=[...rows].sort((a,b)=>b.spend-a.spend);
        const suppliers=sorted.slice(0,10).map(r=>({supplier:r.supplier,spend:r.spend,share:r.spend/total}));
        const top3=suppliers.slice(0,3).reduce((s,r)=>s+r.share,0);
        const conc=top3>0.85?5:top3>0.65?4:top3>0.45?3:top3>0.25?2:1;
        setInternal(p=>({...p,spend:{total,suppliers,top3Share:top3,file:f.name}}));
        setVar("supplierConcentration",{value:conc,conf:"ai",
          rationale:`Inferred from your spend file: top-3 suppliers hold ${(top3*100).toFixed(0)}% of ${rows.length}-supplier spend.`});
        setErr("");
      }catch(ex){ setErr(ex.message); }
    }});
  }
  return (
    <div className="card">
      <h2 className="display">Internal data <span style={{fontSize:12,color:"var(--slate)",fontWeight:400}}>· optional</span></h2>
      <div className="banner">No internal data to hand? <b>Skip this step</b> — the strategy will be generated in <b>generic mode</b> from market data alone, using sector-typical assumptions that are flagged in the assumption register.</div>
      <h3 style={{marginTop:4}}>What internal data is useful here?<Tip t="You don't need all of it — each item sharpens specific variables below. The spend cube (CSV upload) gives the biggest single uplift."/></h3>
      <table style={{marginBottom:14}}>
        <thead><tr><th>Data item</th><th>What it is</th><th>Sharpens</th></tr></thead>
        <tbody>{INTERNAL_DATA_CHECKLIST.map(d=>(
          <tr key={d.item}><td><b>{d.item}</b></td><td>{d.what}</td><td style={{fontSize:11.5,color:"var(--slate)"}}>{d.feeds}</td></tr>))}
        </tbody>
      </table>
      <h3>Spend file (CSV)</h3>
      <p className="hint">Columns: supplier name + spend. Supplier concentration is auto-inferred (flagged AI-inferred) and top suppliers appear as bubbles on the Kraljic matrix.</p>
      <input type="file" accept=".csv" ref={fileRef} onChange={onCSV}/>
      {err && <div className="err">{err}</div>}
      {internal.spend && (
        <div className="rationale" style={{marginTop:8}}>
          <b>{internal.spend.file}</b> · total spend {internal.spend.total.toLocaleString()} · top-3 share {(internal.spend.top3Share*100).toFixed(0)}%
          <table style={{marginTop:8}}><thead><tr><th>Supplier</th><th>Spend</th><th>Share</th></tr></thead><tbody>
            {internal.spend.suppliers.slice(0,5).map(s=>(
              <tr key={s.supplier}><td>{s.supplier}</td><td className="mono">{s.spend.toLocaleString()}</td><td className="mono">{(s.share*100).toFixed(1)}%</td></tr>
            ))}
          </tbody></table>
        </div>
      )}
      <h3 style={{marginTop:18}}>Internal assessment<Tip t="Five 1-5 judgements about YOUR organisation's relationship with this category (not the market): how big it is in your spend, how critical to your operations, where your demand is heading, who's watching it, and how much value headroom is left. Together they form the 'business impact' axis of the Kraljic matrix."/></h3>
      <p className="hint">These five questions are about <b>your organisation</b>, not the supply market: how much this category matters to you. They set the vertical (business impact) axis of the Kraljic matrix — the market questions on the next step set the horizontal (supply risk) axis. Answer what you know; leave the rest and they stay flagged Assumed.</p>
      {INTERNAL_VARS.map(v=><VarRow key={v.id} def={v} entry={vars[v.id]} onChange={e=>setVar(v.id,e)}/>)}
      <div style={{display:"flex",gap:10,marginTop:12,flexWrap:"wrap"}}>
        <button className="btn primary" onClick={next}>Continue to market info hub →</button>
        <button className="btn" onClick={skip}>Skip — continue in generic mode (market data only)</button>
      </div>
      <p className="hint" style={{marginTop:8}}><b>What's the difference?</b> Both take you to the Market info hub. <b>Continue</b> means your answers above count — the Kraljic business-impact axis and the strategy use your internal picture. <b>Skip</b> means you have no internal data (e.g. a brand-new category): business impact is assumed at midpoint, the strategy is written as a sector-typical playbook, and every step shows a "generic mode" banner so nobody mistakes it for a data-backed view. You can come back and fill this in later — the strategy upgrades automatically.</p>
    </div>
  );
}

                <span className={"badge "+CONF[models.pestle[k].conf].cls}>{CONF[models.pestle[k].conf].label}</span>
              </div>
            ))}

        )}
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:14}}>
          <button className="btn primary" onClick={next}>Continue to Five Forces →</button>
        </div>
      </div>}
    </div>
  );
}

function mdToHtml(md){
  const lines=md.split("\n"); let html=""; let inTable=false;
  const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inline=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/_(.+?)_/g,"<i>$1</i>");
  lines.forEach(l=>{
    if(l.startsWith("|")){
      const cells=l.split("|").slice(1,-1).map(c=>c.trim());
      if(cells.every(c=>/^-+$/.test(c))) return;
      if(!inTable){html+="<table border='1' cellspacing='0' cellpadding='5' style='border-collapse:collapse;font-size:11pt'>";inTable=true;}
      html+="<tr>"+cells.map(c=>"<td>"+inline(c)+"</td>").join("")+"</tr>"; return;
    }
    if(inTable){html+="</table>";inTable=false;}
    if(l.startsWith("### ")) html+="<h3>"+inline(l.slice(4))+"</h3>";
    else if(l.startsWith("## ")) html+="<h2 style='color:#0F5E56'>"+inline(l.slice(3))+"</h2>";
    else if(l.startsWith("# ")) html+="<h1>"+inline(l.slice(2))+"</h1>";
    else if(l.startsWith("- ")) html+="<p style='margin:2px 0 2px 18px'>• "+inline(l.slice(2))+"</p>";
    else if(l.trim()==="") html+="";
    else html+="<p>"+inline(l)+"</p>";
  });
  if(inTable) html+="</table>";
  return "<html><head><meta charset='utf-8'></head><body style='font-family:Calibri,Arial,sans-serif;font-size:11pt'>"+html+"</body></html>";
}

  const seg=s=>segmentOf(s.capability,s.alignment);
  if(name==="Category_Management_Plan_Master_Template"){
    md=md.replace("| Annual spend | |","| Annual spend | "+(internal.spend?internal.spend.total.toLocaleString():"")+" |")
         .replace("| Number of suppliers | |","| Number of suppliers | "+(internal.spend?internal.spend.suppliers.length+"+ (top shown)":(suppliers.length||""))+" |")
         .replace("| Top 20% suppliers covering % of spend | |","| Top 20% suppliers covering % of spend | "+(internal.spend?(internal.spend.top3Share*100).toFixed(0)+"% (top 3)":"")+" |")
         .replace("_Supply risk vs business impact placement and rationale._",`Placement: **${d.quadrant}** (supply risk ${d.supplyRisk.toFixed(1)}/5, business impact ${d.businessImpact.toFixed(1)}/5). ${QUADRANT_META[d.quadrant].advice}.`)
         .replace("_Force scores and what they mean for negotiating leverage._",Object.entries(d.porter).map(([k,v])=>`${k}: ${v.toFixed(1)}/5 (${forceLevel(v)})`).join(" · "));
    if(Object.keys(cl.drivers).length){
      md=md.replace("| Driver | % of cost | Trend |\n|---|---|---|\n| | | |","| Driver | % of cost | Trend |\n|---|---|---|\n"+Object.entries(cl.drivers).map(([id,dd])=>`| ${(COST_DRIVER_LIBRARY[id]||id).split(",")[0]} | ${dd.weight}% | |`).join("\n"));
    }
    if(risks.length){
      md=md.replace("| 1 | | | | | |",risks.map((r,i)=>`| ${i+1} | ${r.risk} | ${r.likelihood} | ${r.impact} | ${r.mitigation} | |`).join("\n"));
    }
    if(cl.levers.length){
      md=md.replace("| Lever | Rationale | Est. value | Horizon |\n|---|---|---|---|\n| | | | |","| Lever | Rationale | Est. value | Horizon |\n|---|---|---|---|\n"+cl.levers.map(l=>{const def=LEVER_LIBRARY[l.id];return def?`| ${def.label} | ${(l.rationale||def.desc)} | ${def.saving} | |`:"";}).filter(Boolean).join("\n"));
    }
    if(exec){
      md=md.replace("| Workstream | Y1 | Y2 | Y3 | Owner |\n|---|---|---|---|---|\n| | | | | |","| Workstream | Y1 | Y2 | Y3 | Owner |\n|---|---|---|---|---|\n"+exec.gantt.map(g=>`| ${g.workstream} | ${g.startQ<=4?"█":""} | ${(g.startQ<=8&&g.endQ>=5)?"█":""} | ${g.endQ>=9?"█":""} | ${g.owner} |`).join("\n"));
    }
  }
  if(name==="Category_Sourcing_Strategy_Master_Template" && chess){
    md=md.replace("_Power balance (our demand power vs supplier power), chosen base strategy and specific plays._",`Our demand power ${d.porter["Buyer power (yours)"].toFixed(1)}/5 vs supplier power ${d.porter["Supplier power"].toFixed(1)}/5 → base strategy: **${chess.quad}**.`)
         .replace("| Play | Rationale | Effort |\n|---|---|---|\n| | | |","| Play | Rationale | Effort |\n|---|---|---|\n"+chess.methods.map(m0=>`| ${m0.name} | ${m0.rationale} | ${m0.effort} |`).join("\n"));
  }
  if(name==="Negotiation_Strategy_Plan_Master_Template" && nego){
    md=md.replace("| Target objectives | | |",`| Target objectives | ${nego.objectivesUs} | ${nego.objectivesThem} |`)
         .replace("| BATNA (best alternative) | | |",`| BATNA (best alternative) | ${nego.batnaUs} | ${nego.batnaThem} |`)
         .replace(/\| Price \| \| \| \| \| \|[\s\S]*?\| Risk allocation \| \| \| \| \| \|/,
           nego.issues.map(x=>`| ${x.issue} | ${x.opening} | ${x.target} | ${x.walkAway} | ${x.priority} | ${x.concessionCost} |`).join("\n"))
         .replace("| 1. Setting the scene | |",`| 1. Setting the scene | ${nego.behaviours.scene} |`)
         .replace("| 2. Exchanging information | |",`| 2. Exchanging information | ${nego.behaviours.exchange} |`)
         .replace("| 3. Bargaining | |",`| 3. Bargaining | ${nego.behaviours.bargain} |`)
         .replace("| 4. Concluding | |",`| 4. Concluding | ${nego.behaviours.conclude} |`);
    if(nego.trades.length) md=md.replace("| We give (low cost to us) | They value it because | We want in return |\n|---|---|---|\n| | | |","| We give (low cost to us) | They value it because | We want in return |\n|---|---|---|\n"+nego.trades.map(t=>`| ${t} | | |`).join("\n"));
  }
  if(name==="Category_Execution_Plan_Master_Template"){
    if(internal.spend) md=md.replace("| Annual spend | | |",`| Annual spend | ${internal.spend.total.toLocaleString()} | |`);
    if(suppliers.length){
      const t1=suppliers.filter(s=>seg(s)==="Strategic partner").map(s=>s.name).join(", ");
      const t2=suppliers.filter(s=>seg(s)==="Develop"||seg(s)==="Transactional expert").map(s=>s.name).join(", ");
      const t3=suppliers.filter(s=>seg(s)==="Tactical / phase out").map(s=>s.name).join(", ");
      md=md.replace("| Tier 1 (strategic / strategy houses) | | Quarterly exec QBR, joint plan |",`| Tier 1 (strategic / strategy houses) | ${t1} | Quarterly exec QBR, joint plan |`)
           .replace("| Tier 2 (important / niche) | | Bi-annual review, scorecard |",`| Tier 2 (important / niche) | ${t2} | Bi-annual review, scorecard |`)
           .replace("| Tier 3 (tail) | | Annual light-touch, P2P channel |",`| Tier 3 (tail) | ${t3} | Annual light-touch, P2P channel |`)
           .replace("| Supplier | Quality | Delivery | Cost | Innovation | ESG | Overall |\n|---|---|---|---|---|---|---|\n| | | | | | | |","| Supplier | Quality | Delivery | Cost | Innovation | ESG | Overall |\n|---|---|---|---|---|---|---|\n"+suppliers.map(s=>`| ${s.name} | ${s.scorecard.quality} | ${s.scorecard.delivery} | ${s.scorecard.cost} | ${s.scorecard.innovation} | ${s.scorecard.esg} | ${(SCORECARD_DIMS.reduce((a,dd)=>a+s.scorecard[dd],0)/5).toFixed(1)} |`).join("\n"));
    }
    if(value){
      md=md.replace("| Initiative | Lever | Est. value | Status |\n|---|---|---|---|\n| | | | |","| Initiative | Lever | Est. value | Status |\n|---|---|---|---|\n"+value.pipeline.map(p=>`| ${p.initiative} | ${p.lever} | ${p.pct}% | ${p.status} |`).join("\n"));
    }
    if(ctx.research){
      md=md.replace("| Disruptor (e.g. AI automation, regulation, sustainability) | Impact | Horizon | Response |\n|---|---|---|---|\n| | | | |","| Disruptor (e.g. AI automation, regulation, sustainability) | Impact | Horizon | Response |\n|---|---|---|---|\n"+(ctx.research.disruptions||[]).map(r=>`| ${r.disruption} | ${r.impact} | | |`).join("\n"));
    }
  }
  return md;
}

function Step5({profile,vars,setVar,generic,internal,marketBrief,strategy,setStrategy,opps,setOpps,sevenPs,cl,setCl,models,research,suppliers,srmReviews,matCheck,risks,chess,nego,exec,value,esgOps,benefits,pitch,setPitch,tierScheme,saveSessionNow,exportSession,importSession}){
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [copied,setCopied]=useState(false);
  const [pitchBusy,setPitchBusy]=useState(false);
  const [pitchErr,setPitchErr]=useState("");
  async function genPitch(){
    setPitchBusy(true); setPitchErr("");
    try{
      const dd=deriveScores(vars,generic);
      const facts=[];
      facts.push(`Kraljic: ${dd.quadrant} (supply risk ${dd.supplyRisk.toFixed(1)}, business impact ${dd.businessImpact.toFixed(1)}) [source: Kraljic step]`);
      facts.push(`Supplier power ${dd.porter["Supplier power"].toFixed(1)}/5, our power ${dd.porter["Buyer power (yours)"].toFixed(1)}/5 [source: Five Forces]`);
      if(marketBrief.summary) facts.push(`Market: ${marketBrief.summary} [source: Market info hub]`);
      if(research) facts.push(`Research findings incl. ${(research.disruptions||[]).slice(0,2).map(x=>x.disruption).join("; ")} [source: Research assistant, with citations]`);
      if(profile.pains?.length) facts.push(`Pain points: ${profile.pains.join("; ")} [source: Category profile]`);
      if(cl.levers.length) facts.push(`Levers: ${cl.levers.map(l=>LEVER_LIBRARY[l.id]?.label).filter(Boolean).join(", ")} [source: Cost drivers & levers]`);
      if(chess){const km=(chess.methods||[]).filter(m=>m.keep!==false); facts.push(`Chessboard strategy: ${chess.quad}${km.length?"; chosen plays (manager-kept): "+km.map(m=>m.name).join(", "):""} [source: Chessboard step]`);}
      if(value) facts.push(`Savings pipeline ~${value.pipeline.reduce((s,p)=>s+(+p.pct||0),0).toFixed(0)}% of spend [source: Savings pipeline]`);
      if(benefits.length) facts.push(`Benefits across ${[...new Set(benefits.map(b=>b.type))].join(", ")} [source: Benefits register]`);
      if(risks.length) facts.push(`Top risk: ${risks[0].risk} (L${risks[0].likelihood}×I${risks[0].impact}) [source: Risk heatmap]`);
      if(esgOps&&esgOps.length) facts.push(`ESG upside: ${esgOps[0].opportunity} [source: ESG opportunities]`);
      const out=await askClaude(
        `You are briefing a category manager to present and DEFEND their strategy for "${profile.name}". Using ONLY the facts below (each tagged with its source step), produce:
1) A 2-minute elevator pitch (180-230 words, plain prose, first person plural, implicit structure situation→complication→recommendation→value→ask, ending with a concrete ask).
2) Exactly 10 FAQs a sceptical stakeholder (CFO, business owner) would ask, each with a crisp answer grounded in the facts, and the source step the answer draws on. Do not invent numbers not in the facts; if a likely question isn't covered by the facts, answer honestly that it needs validation and name what data would settle it.
FACTS:\n${facts.join("\n")}
Respond ONLY with JSON, no fences: {"pitch":"...","faqs":[{"q":"","a":"","source":"which step / where this comes from"}]}`);
      setPitch({text:out.pitch||"",faqs:out.faqs||[],conf:"ai"});
    }catch(e){ setPitchErr(e.message); }
    setPitchBusy(false);
  }
  const hasSevenPs = sevenPs && sevenPs.canvas;
  const hasCL = cl && Object.keys(cl.drivers).length>0;
  const d=useMemo(()=>deriveScores(vars,generic),[vars,generic]);
  /* eslint-disable-next-line */
  /* v2.15 — Document Composer: light/empty sections confirmed in or out.
     7Ps is OUT by default (sell-side add-on to a buy-side paper). */
  const [docExclude,setDocExclude]=useState({sevenps:true});
  const inc=(id)=>!docExclude[id];
  const SECT_STATUS=[
    ["sevenps","Commercial 7Ps (sell-side add-on)", hasSevenPs?"light":"empty"],
    ["suppliers","Suppliers, scorecards & SRM", suppliers&&suppliers.length?(suppliers.length>=3?"rich":"light"):"empty"],
    ["risks","Risk register (5×5) & ESG", risks&&risks.length?(risks.length>=3?"rich":"light"):"empty"],
    ["chess","Purchasing chessboard", chess?(((chess.methods||[]).filter(m=>m.keep!==false).length)?"rich":"light"):"empty"],
    ["costlevers","Cost drivers & levers (should-cost)", hasCL?"rich":"empty"]
  ];
  /* v2.15 — Options & opportunities from should-cost, drivers, levers, plays */
  const [oppBusy,setOppBusy]=useState(false);
  const [oppErr,setOppErr]=useState("");
  async function genOpps(){
    setOppBusy(true); setOppErr("");
    const ctx={
      kraljic:d.quadrant,
      drivers: hasCL?Object.entries(cl.drivers).map(([id,dd])=>({driver:(COST_DRIVER_LIBRARY[id]||id).split(",")[0],weightPct:dd.weight})):[],
      levers: hasCL?cl.levers.map(l=>LEVER_LIBRARY[l.id]?.label).filter(Boolean):[],
      savingsIdeas:(cl&&cl.savings)||[],
      chessPlays:(chess&&(chess.methods||[]).filter(m=>m.keep!==false).map(m=>m.name))||[]
    };
    try{
      if(!ctx.drivers.length&&!ctx.levers.length) throw new Error("nofactbase");
      const out=await askClaude(`From this should-cost and lever fact base for procurement category "${profile.name}", derive 5-8 concrete OPTIONS & OPPORTUNITIES for the category manager. Fact base: ${JSON.stringify(ctx)}\nFor each, decide the right EXECUTION LEVEL: "Portfolio" (needs aggregation across categories, parent-portfolio governance or portfolio-wide contracting) or "Category" (executable within this category alone). Ground every item in the fact base — no generic filler. Respond ONLY with JSON, no fences: {"opps":[{"opportunity":"specific action","basis":"which driver/lever/play it derives from","impact":"High|Medium|Low","level":"Portfolio|Category","rationale":"one line"}]}`);
      if(out&&Array.isArray(out.opps)&&out.opps.length){
        setOpps(out.opps.slice(0,10).map(o=>({opportunity:String(o.opportunity||"").slice(0,180),basis:String(o.basis||"").slice(0,120),impact:["High","Medium","Low"].includes(o.impact)?o.impact:"Medium",level:o.level==="Portfolio"?"Portfolio":"Category",rationale:String(o.rationale||"").slice(0,160),keep:true,source:"ai"})));
      } else throw new Error("no usable JSON");
    }catch(e){
      if(hasCL){
        const top=Object.entries(cl.drivers).sort((a,b)=>(b[1].weight||0)-(a[1].weight||0)).slice(0,5);
        setOpps(top.map(([id,dd],i)=>({
          opportunity:"Attack "+(COST_DRIVER_LIBRARY[id]||id).split(",")[0]+" ("+dd.weight+"% of should-cost)"+(cl.levers[i]&&LEVER_LIBRARY[cl.levers[i].id]?" via "+LEVER_LIBRARY[cl.levers[i].id].label:""),
          basis:"Should-cost weight"+(cl.levers[i]?" × selected lever":""),
          impact:dd.weight>=25?"High":dd.weight>=12?"Medium":"Low",
          level:dd.weight>=25?"Portfolio":"Category",
          rationale:"Rule-based driver-lever pairing (AI unavailable) — validate before use",
          keep:true, source:"template"
        })));
        setOppErr("AI unavailable — a rule-based driver×lever pairing was drafted instead, labelled as such.");
      } else setOppErr(e.message==="nofactbase"?"Complete Step 10 (cost drivers & levers) first — opportunities are derived from that fact base.":"AI unavailable and no should-cost fact base to pair from (Step 10).");
    }finally{ setOppBusy(false); }
  }
  const setOpp=(i,f,v)=>setOpps(opps.map((o,idx)=>idx===i?{...o,[f]:v,...(o.source==="ai"&&f!=="keep"?{source:"ai-edited"}:{})}:o));
  async function generate(){
    /* v2.15 — pre-flight completeness alert BEFORE the AI call */
    const missing=[];
    if(!(marketBrief&&marketBrief.summary)) missing.push("Market brief (Step 3)");
    if(!research) missing.push("Research findings (Step 3 · research assistant)");
    if(!(models&&models.swot)) missing.push("SWOT (Step 4)");
    if(!(models&&models.pestle)) missing.push("PESTLE (Step 4)");
    if(!(suppliers&&suppliers.length)) missing.push("Suppliers (Step 7)");
    if(!(risks&&risks.length)) missing.push("Risk register (Step 8)");
    if(!(chess&&(chess.methods||[]).some(m=>m.keep!==false))) missing.push("Chessboard — no plays kept (Step 9)");
    if(!hasCL) missing.push("Cost drivers & levers (Step 10)");
    if(missing.length && !confirm("Before generating — these inputs are missing or empty:\n\n• "+missing.join("\n• ")+"\n\nOK = generate with the AVAILABLE data (the gaps will be listed under 'Data gaps to close' in the document)\nCancel = go back and complete them first")) return;
    setBusy(true); setErr("");
    try{
      const varDump = ALL_VARS.map(v=>`${v.label}: ${vars[v.id].value}/5 [${CONF[vars[v.id].conf].label}] — ${vars[v.id].rationale}`).join("\n");
      const prompt=`You are a senior category strategist. Write a category strategy for "${profile.name}" (sector: ${profile.sector||"unspecified"}, region: ${profile.region||"Global"}). Context: ${profile.notes||"none"}.
${generic?"IMPORTANT: GENERIC MODE — no internal data. Write a sector-typical playbook. Be explicit where internal data would change the answer, and list those items under dataGaps.":"Internal data is available: "+(internal.spend?`spend ${internal.spend.total.toLocaleString()}, top-3 supplier share ${(internal.spend.top3Share*100).toFixed(0)}%, top suppliers ${internal.spend.suppliers.slice(0,5).map(s=>s.supplier).join(", ")}.`:"assessment sliders only.")}
Kraljic: ${d.quadrant} (supply risk ${d.supplyRisk.toFixed(1)}, impact ${d.businessImpact.toFixed(1)}). Market summary: ${marketBrief.summary||"n/a"}. Price outlook: ${marketBrief.priceOutlook||"n/a"}.
${hasSevenPs?"Commercial 7Ps context (align the category strategy with this): "+PS.map(p=>p+": "+sevenPs.canvas[p]).join(" | "):""}
${hasCL?"Cost driver breakdown (should-cost, % of total): "+Object.entries(cl.drivers).map(([id,d])=>(COST_DRIVER_LIBRARY[id]||id).split(",")[0]+" "+d.weight+"%").join(", ")+". Selected purchasing levers to build the roadmap around: "+cl.levers.map(l=>LEVER_LIBRARY[l.id]?.label).filter(Boolean).join(", ")+". Identified savings opportunities (build the roadmap actions around these): "+(cl.savings||[]).join("; ")+". KPIs the strategy will be measured on (reference them in objectives): "+(cl.kpis||[]).join("; ")+".":""}
${models&&models.swot?"SWOT (buyer's view): "+SWOT_KEYS.map(k=>k+": "+models.swot[k].text.replace(/\n/g,"; ")).join(" | "):""}
${models&&models.pestle?"PESTLE: "+PESTLE_KEYS.map(k=>k+": "+models.pestle[k].text).join(" | "):""}
${research?"Latest research findings (cite in the strategy where relevant): "+(research.pestleRegulatory||[]).slice(0,5).map(r=>r.area+": "+r.finding).join("; ")+". Disruptions: "+(research.disruptions||[]).map(x=>x.disruption).join("; ")+".":""}
${suppliers&&suppliers.length?"Supplier segmentation: "+suppliers.map(s=>s.name+" ("+segmentOf(s.capability,s.alignment)+")").join(", ")+".":""}
${risks&&risks.length?"Top risks: "+risks.map(r=>r.risk+" (L"+r.likelihood+"×I"+r.impact+")").join("; ")+".":""}
${chess?"Chessboard base strategy: "+chess.quad+"; chosen plays (manager-selected): "+((chess.methods||[]).filter(m=>m.keep!==false).map(m=>m.name).join(", ")||"none selected yet")+".":""}
${opps&&opps.some(o=>o.keep)?"Options & opportunities the manager has kept (weave the CATEGORY-level ones into objectives/roadmap; note the PORTFOLIO-level ones as escalations): "+opps.filter(o=>o.keep).map(o=>o.opportunity+" ["+o.level+", "+o.impact+"]").join("; ")+".":""}
Variable board (with confidence flags):\n${varDump}
Respond ONLY with JSON, no markdown fences:
{"executiveSummary":"4-6 sentences","objectives":["3-5 items"],"levers":[{"name":"","rationale":"","horizon":"0-3m|3-6m|6-12m"}],"negotiationApproach":"3-4 sentences","roadmap":[{"phase":"0-3 months","actions":["..."]},{"phase":"3-6 months","actions":["..."]},{"phase":"6-12 months","actions":["..."]}],"risks":[{"risk":"","mitigation":""}],"dataGaps":["..."]}`;
      const out=await askClaude(prompt,false);
      setStrategy(out);
    }catch(e){ setErr("Strategy generation failed — please retry. ("+e.message+")"); }
    setBusy(false);
  }
  function buildMd(){
    let md=`# Category Strategy — ${profile.name}\n_CategoryAI Strategic Category Suite v1.2.0 · ${new Date().toISOString().slice(0,10)}${generic?" · GENERIC MODE (external data only)":""}_\n\n`;
    md+=`**Kraljic:** ${d.quadrant} (supply risk ${d.supplyRisk.toFixed(1)}/5, business impact ${d.businessImpact.toFixed(1)}/5)\n\n`;
    /* v2.13 — decision-paper order (per the management documents): summary,
       pitch, FAQ and the strategy itself lead; evidence follows; the
       assumption register closes. */
    if(pitch&&pitch.text) md+=`## Elevator pitch (2 minutes)\n${pitch.text}\n\n`;
    if(strategy){
      md+=`## Executive summary\n${strategy.executiveSummary}\n\n`;
      md+=`## Objectives\n`+strategy.objectives.map(o=>`- ${o}`).join("\n");
      md+=`\n\n## Sourcing levers\n`+strategy.levers.map(l=>`- **${l.name}** (${l.horizon}) — ${l.rationale}`).join("\n");
      if(opps&&opps.some(o=>o.keep)){
        md+=`\n\n## Options & opportunities (from should-cost, drivers & levers)\n| Opportunity | Basis | Impact | Level | Rationale |\n|---|---|---|---|---|\n`+opps.filter(o=>o.keep).map(o=>`| ${o.opportunity.replace(/\|/g,"/")} | ${o.basis.replace(/\|/g,"/")} | ${o.impact} | **${o.level}** | ${o.rationale.replace(/\|/g,"/")} |`).join("\n");
        md+=`\n_Portfolio-level items need aggregation or parent-portfolio governance — raise them via P3; Category-level items belong on this roadmap._`;
      }
      md+=`\n\n## Negotiation approach\n${strategy.negotiationApproach}\n\n## Roadmap\n`;
      strategy.roadmap.forEach(p=>{md+=`\n### ${p.phase}\n`+p.actions.map(a=>`- ${a}`).join("\n")+"\n";});
      md+=`\n## Risk register\n| Risk | Mitigation |\n|---|---|\n`+strategy.risks.map(r=>`| ${r.risk} | ${r.mitigation} |`).join("\n");
      if(strategy.dataGaps&&strategy.dataGaps.length) md+=`\n\n## Data gaps to close\n`+strategy.dataGaps.map(g=>`- ${g}`).join("\n");
    }
    if(strategy || (pitch && pitch.text)) md+=`\n---\n_Everything below is the supporting evidence and working detail behind the recommendation above — market, models, suppliers, risk, levers, negotiation and execution — with the full assumption register closing the document._\n\n`;

        s.addText([{text:"Selected levers\n",options:{bold:true,fontSize:13}},
          {text:cl.levers.map(l=>"• "+(LEVER_LIBRARY[l.id]?LEVER_LIBRARY[l.id].label:l.id)).join("\n"),options:{fontSize:11.5}}],
          {x:7.2,y:1.3,w:5.7,h:5.2,valign:"top"});
      }
      // 10 Negotiation
      if(nego){ s=slide("Negotiation plan — issue matrix");
        s.addTable([hdr(["Issue","Opening","Target","Walk-away","Priority"]),
          ...(nego.issues||[]).slice(0,7).map(i=>[i.issue,i.opening,i.target,i.walkAway,i.priority])],tblOpts);
      }
      // 11 Roadmap
      if(exec){ s=slide("Execution — 3-year roadmap");
        s.addTable([hdr(["Workstream","Quarters","Owner"]),
          ...(exec.gantt||[]).map(g=>[g.workstream,"Q"+g.startQ+" – Q"+g.endQ,g.owner])],{...tblOpts,colW:[6.5,2.5,3.5]});
      }
      // 12 Savings planned vs delivered
      if(value){ s=slide("Savings pipeline — planned vs delivered");
        const pl=value.pipeline||[];
        s.addChart(pptx.ChartType.bar,[
          {name:"Planned %",labels:pl.map(p=>p.initiative),values:pl.map(p=>+p.pct||0)},
          {name:"Delivered %",labels:pl.map(p=>p.initiative),values:pl.map(p=>p.status==="Delivered"?(+p.delivered||0):0)}],
          {x:0.4,y:1.2,w:12.5,h:5.4,barDir:"bar",chartColors:[P,A],showValue:true,dataLabelFontSize:9,catAxisLabelFontSize:10,showLegend:true,legendPos:"b"});
      }
      // 13 Benefits
      if(benefits&&benefits.length){ s=slide("Benefits register — five value types");
        s.addTable([hdr(["Benefit","Type","Metric","Planned","Delivered","Owner"]),
          ...benefits.slice(0,9).map(b=>[b.benefit,b.type,b.metric,b.planned,b.delivered,b.owner||""])],tblOpts);
      }
      // Closing — outputs & next steps (deck mirrors the Word document)
      { s=slide("Outputs & next steps");
        s.addText([
          {text:"This deck mirrors the Word strategy document (decision-first order).\n\n",options:{fontSize:14,bold:true}},
          {text:"• Full strategy: Word (.docx) — evidence, assumption register, confidence flags\n",options:{fontSize:13}},
          {text:"• Business case: VM template (recommended, procurement-linked) or Five Case Model — both on Step 14\n",options:{fontSize:13}},
          {text:"• FAQ sits at the end of the Word document — it draws on every input\n",options:{fontSize:13}},
          {text:"\nBoard: CategoryAI's own 64-cell chessboard (similar to the A.T. Kearney model); licensed ATK data pluggable via Admin.",options:{fontSize:11,italic:true,color:SL}}
        ],{x:0.5,y:1.3,w:12.4,h:5.4,valign:"top"});
      }
      await pptx.writeFile({fileName:(profile.name||"category").replace(/\s+/g,"-").toLowerCase()+"-strategy.pptx"});
    }catch(e){ alert("PowerPoint generation failed: "+e.message); }
    setPptBusy(false);
  }

  return (
    <div>
      {generic && <div className="banner"><b>Generic mode</b> — this strategy is built from external market data only. Assumptions are flagged in the register below.</div>}
      <div className="card">
        <h2 className="display">Strategy & plan</h2>
        <p className="hint">AI synthesises the full variable board, Kraljic placement, Five Forces and spend data into one strategy. Every input's confidence flag travels into the assumption register. Generation checks completeness first and lists anything missing before you commit.</p>

        {/* v2.15 — Options & opportunities from the should-cost fact base */}
        <details style={{margin:"10px 0", border:"1px solid var(--line)", borderRadius:8, padding:"8px 12px", background:"var(--card)"}}>
          <summary style={{cursor:"pointer", fontWeight:800, fontSize:13, color:"var(--petrol)"}}>💡 Options & opportunities — from should-cost, drivers & levers ({(opps||[]).filter(o=>o.keep).length} kept)</summary>
          <p className="hint" style={{marginTop:6}}>Derived from your Step-10 fact base (driver weights × selected levers) and kept chessboard plays. Each item is flagged <b>Portfolio</b> (needs aggregation or parent-portfolio governance — raise via P3) or <b>Category</b> (executable here — it feeds the roadmap). Kept items enter the strategy generation and the document.</p>
          <div style={{display:"flex", gap:8, margin:"6px 0"}}>
            <button className="btn" disabled={oppBusy} onClick={genOpps}>{oppBusy?"Deriving…":(opps&&opps.length?"↻ Re-derive":"⚡ Derive opportunities")}</button>
          </div>
          {oppErr && <p style={{fontSize:11.5, color:"var(--amber)"}}>{oppErr}</p>}
          {(opps||[]).length>0 && (
            <div style={{overflowX:"auto"}}>
            <table style={{width:"100%", borderCollapse:"collapse", fontSize:11.5}}>
              <thead><tr style={{background:"var(--paper)"}}>{["Keep","Opportunity","Basis","Impact","Level","Rationale"].map(h=><th key={h} style={{border:"1px solid var(--line)", padding:5, textAlign:"left"}}>{h}</th>)}</tr></thead>
              <tbody>
                {opps.map((o,i)=>(
                  <tr key={i} style={o.keep?null:{opacity:0.5}}>
                    <td style={{border:"1px solid var(--line)", padding:4, textAlign:"center"}}><input type="checkbox" checked={!!o.keep} onChange={e=>setOpp(i,"keep",e.target.checked)}/></td>
                    <td style={{border:"1px solid var(--line)", padding:4, minWidth:200}}><input type="text" value={o.opportunity} onChange={e=>setOpp(i,"opportunity",e.target.value)} style={{width:"100%",padding:"3px 5px",border:"1px solid var(--line)",borderRadius:4,background:"#fff",color:"var(--ink)",fontSize:11.5}}/></td>
                    <td style={{border:"1px solid var(--line)", padding:4, fontSize:11}}>{o.basis}</td>
                    <td style={{border:"1px solid var(--line)", padding:4}}><select value={o.impact} onChange={e=>setOpp(i,"impact",e.target.value)} style={{padding:"3px 4px",border:"1px solid var(--line)",borderRadius:4,background:"#fff",color:"var(--ink)",fontSize:11}}>{["High","Medium","Low"].map(v=><option key={v}>{v}</option>)}</select></td>
                    <td style={{border:"1px solid var(--line)", padding:4}}><select value={o.level} onChange={e=>setOpp(i,"level",e.target.value)} style={{padding:"3px 4px",border:"1px solid var(--line)",borderRadius:4,background:"#fff",color:"var(--ink)",fontSize:11, fontWeight:700}}>{["Category","Portfolio"].map(v=><option key={v}>{v}</option>)}</select></td>
                    <td style={{border:"1px solid var(--line)", padding:4, fontSize:11}}>{o.rationale}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            </div>
          )}
          {(opps||[]).length>0 && <SourceNote>Derived {opps.some(o=>o.source==="template")?"rule-based (AI unavailable — driver×lever pairing)":"by AI from your fact base"}; edits mark items user-modified. Portfolio-level items also appear in the document with an escalation note.</SourceNote>}
        </details>

        {/* v2.15 — Document Composer */}
        <details style={{margin:"10px 0", border:"1px solid var(--line)", borderRadius:8, padding:"8px 12px", background:"var(--card)"}}>
          <summary style={{cursor:"pointer", fontWeight:800, fontSize:13, color:"var(--petrol)"}}>🧾 Document composer — confirm what goes in ({SECT_STATUS.filter(([id,,st])=>st!=="empty"&&inc(id)).length + " optional section(s) included"})</summary>
          <p className="hint" style={{marginTop:6}}>Core sections (pitch, executive summary, strategy, market, models, negotiation, execution, savings, assumptions) are always included when they have content. The sections below are <b>optional or currently light</b> — confirm inclusion. Empty sections are omitted automatically rather than padded. The 7Ps is excluded by default: it's a sell-side add-on to a buy-side paper.</p>
          {SECT_STATUS.map(([id,label,st])=>(
            <label key={id} style={{display:"flex", alignItems:"center", gap:8, fontSize:12.5, padding:"4px 0", opacity:st==="empty"?0.6:1}}>
              <input type="checkbox" disabled={st==="empty"} checked={st!=="empty"&&inc(id)} onChange={e=>setDocExclude(x=>({...x,[id]:!e.target.checked}))}/>
              <b>{label}</b>
              <span style={{fontSize:10.5, fontWeight:800, padding:"1px 8px", borderRadius:99, background:st==="rich"?"#E4F0EA":st==="light"?"#F7EFD8":"#EEE", color:st==="rich"?"#1E8E5A":st==="light"?"#8A6D1F":"#777"}}>{st==="rich"?"✓ rich":st==="light"?"◐ light — review":"✗ empty — omitted"}</span>
            </label>
          ))}
        </details>

        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button className="btn dark" disabled={busy} onClick={generate} title="Checks completeness first (you'll see any missing inputs and choose to continue with available data), then sends everything you've entered — with confidence flags — to the AI, which writes the full strategy document below.">{busy?"Synthesising…":strategy?"↻ Regenerate strategy":"⚡ Generate strategy"}</button>
          <span style={{flexBasis:"100%", fontSize:10.5, fontWeight:800, color:"var(--slate)", textTransform:"uppercase", letterSpacing:"0.05em", marginTop:6}}>Outputs — one strategy, several formats:</span>
          <button className="btn primary" onClick={downloadDoc} title="Downloads the full strategy as a real Word document (.docx, with automatic .doc fallback offline) — the format to circulate to stakeholders.">⬇ Download Word document (.docx)</button>
          <button className="btn primary" onClick={()=>downloadBusinessCase("vm")} title="RECOMMENDED — procurement-linked format. Business Case & Benefits Delivery Plan in your organisation's Value Management template: stakeholders → opportunity → benefits delivery plan (L1/L2/L3 tangibility, owners, phasing) → project economics (Capex/Opex distinguished) → risks & alternatives incl. do-nothing. Assembled from this session; anything the app can't know (sponsor names, baselines, Capex/Opex) is an explicit [To complete] marker — a business case needs named accountability, so nothing is invented.">📑 Business case (VM · recommended)</button>
          <button className="btn" onClick={()=>downloadBusinessCase("5c")} title="The same session data argued as a Five Case Model business case: Strategic (why intervene) · Economic (options & value for money, from your kept opportunities) · Commercial (procurement route, plays, BATNA, suppliers) · Financial (affordability — to complete with Finance) · Management (delivery plan, benefits realisation, risks, governance). Choose whichever format your approval route expects.">📑 Business case (Five Case Model)</button>
          <button className="btn primary" style={{background:"var(--amber)",borderColor:"var(--amber)",color:"#2A2004"}} disabled={pptBusy} onClick={downloadPpt} title="Builds a widescreen PowerPoint board deck — one slide per module with native charts (market bars, five forces, cost-driver pie, planned-vs-delivered savings) and tables. Loads the pptxgenjs library from a CDN on first use.">{pptBusy?"Building deck…":"⬇ Download PowerPoint deck (.pptx)"}</button>
          <button className="btn" onClick={download} title="Markdown (.md) is a plain-text format — useful for pasting into wikis, Notion or Confluence. If unsure, use the Word download instead.">⬇ Download as Markdown (.md)<Tip t="Markdown is plain text with simple formatting marks. It opens in Notepad and pastes cleanly into Confluence/Notion/Teams wikis. Most category managers should use the Word download."/></button>
          <button className="btn" onClick={copyDoc} title="Copies the whole document as text to your clipboard.">{copied?"✓ Copied":"Copy text"}</button>
        </div>
        {busy && <Spinner label={getAIName() + " is writing the category strategy…"}/>}
        {err && <div className="err">{err}</div>}
      </div>
      {strategy && (
        <div className="card">
          <h2 className="display">{profile.name} — {d.quadrant} category</h2>
          <p style={{fontSize:14,lineHeight:1.55}}>{strategy.executiveSummary}</p>
          <h3>Objectives</h3>{strategy.objectives.map(o=><div key={o} className="hint" style={{margin:"0 0 5px"}}>• {o}</div>)}
          <h3>Sourcing levers</h3>
          <table><thead><tr><th>Lever</th><th>Horizon</th><th>Rationale</th></tr></thead><tbody>
            {strategy.levers.map((l,i)=><tr key={i}><td><b>{l.name}</b></td><td className="mono">{l.horizon}</td><td>{l.rationale}</td></tr>)}
          </tbody></table>
          <h3>Negotiation approach</h3><p style={{fontSize:13.5,lineHeight:1.5}}>{strategy.negotiationApproach}</p>
          <h3>Roadmap</h3>
          {strategy.roadmap.map(p=>(
            <div key={p.phase}><b style={{fontSize:13}}>{p.phase}</b>{p.actions.map(a=><div key={a} className="hint" style={{margin:"2px 0 2px 12px"}}>• {a}</div>)}</div>
          ))}
          <h3>Risk register</h3>
          <table><thead><tr><th>Risk</th><th>Mitigation</th></tr></thead><tbody>
            {strategy.risks.map((r,i)=><tr key={i}><td>{r.risk}</td><td>{r.mitigation}</td></tr>)}
          </tbody></table>
          {strategy.dataGaps&&strategy.dataGaps.length>0 && (<div><h3>Data gaps to close</h3>

        </div>
      )}
      {hasCL && (
        <div className="card">
          <h2 className="display">Cost drivers & purchasing levers</h2>
          <ShouldCostBar drivers={cl.drivers}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginTop:14}}>
            <div>
              <h3 style={{marginTop:0}}>Selected levers</h3>
              {cl.levers.map(l=>{const def=LEVER_LIBRARY[l.id]; return def && <div key={l.id} className="hint" style={{margin:"0 0 5px"}}>• <b>{def.label}</b> ({def.saving})</div>;})}
            </div>
            <div>
              {cl.savings?.length>0 && <div><h3 style={{marginTop:0}}>💰 Savings opportunities</h3>{cl.savings.map(s=><div key={s} className="hint" style={{margin:"0 0 4px"}}>• {s}</div>)}</div>}
            </div>
            <div>
              {cl.kpis?.length>0 && <div><h3 style={{marginTop:0}}>📏 KPIs</h3>{cl.kpis.map(k=><div key={k} className="hint" style={{margin:"0 0 4px"}}>• {k}</div>)}</div>}
            </div>
            <div>
              {cl.demandDrivers?.length>0 && <div><h3 style={{marginTop:0}}>Demand drivers</h3>{cl.demandDrivers.map(d=><div key={d} className="hint" style={{margin:"0 0 4px"}}>• {d}</div>)}</div>}
            </div>
          </div>
        </div>
      )}
      {hasSevenPs && (
        <div className="card">
          <h2 className="display">Commercial 7Ps — {sevenPs.sector}</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
            {PS.map(p=>(
              <div key={p} style={{background:"var(--mulberrySoft)",borderRadius:8,padding:12}}>
                <div className="display" style={{fontSize:12,textTransform:"uppercase",color:"var(--mulberry)"}}>{p}</div>
                <div style={{fontSize:13,marginTop:4,lineHeight:1.45}}>{sevenPs.canvas[p]}</div>
              </div>
            ))}
          </div>
          <p style={{fontSize:13.5,lineHeight:1.55,background:"var(--paper)",borderRadius:8,padding:14,marginTop:12}}>{sevenPs.narrative}</p>
        </div>
      )}
      <div className="card">
        <h2 className="display">Assumption register<Tip t="Every number in this strategy came from somewhere — you, the AI, or a default. This table is the audit trail. Reviewers check it to decide how much to trust each part of the strategy."/></h2>
        <div className="banner"><b>What is this?</b> Every input behind this strategy, with its source: <span className="badge user">User</span> = you set or confirmed it · <span className="badge ai">AI-inferred</span> = generated by AI, not yet confirmed by you · <span className="badge assumed">Assumed</span> = a default nobody has reviewed yet. <b>You can edit any value or confidence directly in this table</b> — e.g. after checking an AI score, change its confidence to User to mark it validated. The more User rows, the more defensible the strategy.</div>
        <table><thead><tr><th>Input</th><th>Value</th><th>Confidence</th><th>Rationale / source</th></tr></thead><tbody>
          {ALL_VARS.map(v=>{const e=vars[v.id]; return (
            <tr key={v.id}><td>{v.label}</td>
              <td><input type="number" min="1" max="5" value={e.value} style={{width:56,padding:"4px 6px",fontSize:12}}
                onChange={ev=>{const n=Math.max(1,Math.min(5,+ev.target.value||1)); setVar(v.id,{...e,value:n,conf:"user",rationale:"Edited in the assumption register."});}}/></td>
              <td><select value={e.conf} style={{width:120,padding:"4px 6px",fontSize:12}}
                onChange={ev=>setVar(v.id,{...e,conf:ev.target.value})}>
                {Object.entries(CONF).map(([k,c])=><option key={k} value={k}>{c.label}</option>)}</select></td>
              <td>{e.rationale}</td></tr>);})}
          {hasCL && Object.entries(cl.drivers).map(([id,d])=>(
            <tr key={"cd-"+id}><td>Cost driver · {(COST_DRIVER_LIBRARY[id]||id).split(",")[0]}</td>
              <td><input type="number" min="0" max="100" value={d.weight} style={{width:56,padding:"4px 6px",fontSize:12}}
                onChange={ev=>setCl(p=>({...p,drivers:{...p.drivers,[id]:{...d,weight:Math.max(0,Math.min(100,+ev.target.value||0)),conf:"user"}}}))}/>%</td>
              <td><select value={d.conf} style={{width:120,padding:"4px 6px",fontSize:12}}
                onChange={ev=>setCl(p=>({...p,drivers:{...p.drivers,[id]:{...d,conf:ev.target.value}}}))}>
                {Object.entries(CONF).map(([k,c])=><option key={k} value={k}>{c.label}</option>)}</select></td>
              <td>{d.rationale}</td></tr>))}
          {hasCL && cl.levers.map(l=>{const def=LEVER_LIBRARY[l.id]; return def && (
            <tr key={"lv-"+l.id}><td>Lever · {def.label}</td><td className="mono">selected</td>
              <td><select value={l.conf} style={{width:120,padding:"4px 6px",fontSize:12}}
                onChange={ev=>setCl(p=>({...p,levers:p.levers.map(x=>x.id===l.id?{...x,conf:ev.target.value}:x)}))}>
                {Object.entries(CONF).map(([k,c])=><option key={k} value={k}>{c.label}</option>)}</select></td>
              <td>{l.rationale}</td></tr>);})}
          {sevenPs && sevenPs.questions && PS.map(p=>(sevenPs.questions[p]||[]).map((q,i)=>{
            const a=sevenPs.answers[p+"-"+i];
            if(!a||!a.value) return null;
            return (<tr key={p+"-"+i}><td>7Ps · {q}</td><td>{a.value.slice(0,80)}</td>
              <td><span className={"badge "+CONF[a.conf].cls}>{CONF[a.conf].label}</span></td><td>Commercial module input</td></tr>);
          }))}
        </tbody></table>
      </div>
      {/* ============ TO-DO BOX (parked scope, portfolio phase) ============
          3. Benefits tracking — cash, cost avoidance, efficiency, carbon,
             social value; lands with portfolio views & approval workflows.
          4. ESG & social value opportunities — section alongside risks.  */}
      <TemplatesCard profile={profile} internal={internal} suppliers={suppliers} risks={risks} cl={cl}
        chess={chess} nego={nego} exec={exec} value={value} vars={vars} generic={generic} research={research}/>
      <div className="card">
        <h2 className="display">🎤 Elevator pitch<Tip t="A CEB-style 2-minute stakeholder pitch auto-written from everything in this session: situation → complication → recommendation → value → ask. Edit freely (flips to User); it exports at the top of the strategy document."/></h2>
        <p className="hint">The 2-minute version for a stakeholder in a lift: what's going on in this category, why act now, what we recommend, what it's worth, and what we need from them. <b>Every claim is drawn only from the steps you've completed</b> (Kraljic, Five Forces, research, pipeline, benefits, risks) — no invented numbers — and it comes with <b>10 defensible FAQs</b> so you can answer the hard questions in the room. Edit anything to your voice.</p>
        <button className="btn dark" disabled={pitchBusy} onClick={genPitch}>{pitchBusy?"Writing…":pitch?"↻ Regenerate pitch & FAQs":"⚡ AI-write the 2-minute pitch + 10 FAQs"}</button>
        {pitchErr && <div className="err">{pitchErr}</div>}
        {pitch && (<div style={{marginTop:10}}>
          <span className={"badge "+CONF[pitch.conf].cls}>{CONF[pitch.conf].label}</span>
          <textarea rows={8} style={{marginTop:6,fontSize:13.5,lineHeight:1.55}} value={pitch.text}
            onChange={e=>setPitch({...pitch,text:e.target.value,conf:"user"})}/>
          <button className="btn" style={{marginTop:6}} onClick={async()=>{try{await navigator.clipboard.writeText(pitch.text);}catch(e){}}}>Copy pitch</button>
          {pitch.faqs&&pitch.faqs.length>0 && (<div style={{marginTop:14}}>
            <h3 style={{marginTop:0}}>Defend-your-strategy FAQ <span style={{fontWeight:400,fontSize:12,color:"var(--slate)"}}>· the 10 questions to be ready for</span></h3>
            {pitch.faqs.map((f,i)=>(
              <div key={i} style={{borderBottom:"1px dashed var(--line)",padding:"8px 0"}}>
                <div style={{fontSize:13,fontWeight:700}}>Q{i+1}. {f.q}</div>
                <div style={{fontSize:13,margin:"3px 0",lineHeight:1.5}}>{f.a}</div>
                <div style={{fontSize:10.5,color:"var(--slate)"}}>↳ grounded in: {f.source||"session data"}</div>
              </div>))}
            <button className="btn" style={{marginTop:8}} onClick={async()=>{try{await navigator.clipboard.writeText(pitch.faqs.map((f,i)=>`Q${i+1}. ${f.q}\nA. ${f.a}\n(source: ${f.source||""})`).join("\n\n"));}catch(e){}}}>Copy all FAQs</button>
          </div>)}
        </div>)}
      </div>
      <div className="card">
        <h2 className="display">💾 Session data<Tip t="Your work autosaves to this browser as you go. Here you can also save explicitly, download the whole session as a data file, or load a previously downloaded file to resume and change any section."/></h2>
        <p className="hint">Everything in this session — profile, every score with its confidence flag, all models, plans and pipelines — can be <b>saved to this browser</b> or <b>downloaded as a data file (.json)</b>. Load a downloaded file later (or hand it to a colleague) and the whole suite restores exactly, ready for changes to any section; the strategy regenerates from the updated inputs.</p>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <button className="btn primary" onClick={()=>{const ok=saveSessionNow(); setCopied(false); alert(ok?"✓ Session saved to this browser.":"Couldn't save — browser storage unavailable (e.g. inside the Claude.ai preview). Use Download instead.");}}>💾 Save session to browser</button>
          <button className="btn" onClick={exportSession}>⬇ Download session data (.json)</button>
          <label className="btn" style={{cursor:"pointer"}}>⬆ Load session data…
            <input type="file" accept=".json,application/json" style={{display:"none"}}
              onChange={e=>{ if(e.target.files[0]) importSession(e.target.files[0]); }}/>
          </label>
        </div>
      </div>
    </div>
  );
}

/* ================= COST DRIVERS & PURCHASING LEVERS STEP ================= */
function ShouldCostBar({drivers}){
  const entries=Object.entries(drivers).filter(([,d])=>d.weight>0);
  const total=entries.reduce((s,[,d])=>s+d.weight,0)||1;
  const palette=["#0F5E56","#7D3B5E","#C98A12","#2E6FB3","#5A6068","#B3402E","#3E8E7E","#A15A82"];
  let x=0;
  return (
    <div>
      <svg viewBox="0 0 600 46" style={{width:"100%",maxWidth:600,display:"block"}}>
        {entries.map(([id,d],i)=>{
          const w=(d.weight/total)*600; const rect=<rect key={id} x={x} y="0" width={w} height="30" fill={palette[i%palette.length]}/>; x+=w; return rect;
        })}
      </svg>
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px 14px",marginTop:8}}>
        {entries.map(([id,d],i)=>(
          <span key={id} style={{fontSize:11.5,display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:9,height:9,borderRadius:2,background:palette[i%palette.length],display:"inline-block"}}/>

          </span>
        ))}
      </div>
    </div>
  );
}

function StepCostLevers({profile, cl, setCl, next}){
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [addDriver,setAddDriver]=useState("");
  const [addLever,setAddLever]=useState("");
  const archetypeKey = matchArchetype(profile.name, profile.sector);

  function applyArchetype(){
    const a=getArchetype(archetypeKey); if(!a) return;
    const x=ARCHETYPE_EXTRAS[archetypeKey]||{savings:a.savings||[],kpis:a.kpis||[]};
    const drivers=Object.fromEntries(Object.entries(a.costDrivers||{}).map(([id,w])=>[id,{weight:w,conf:"ai",rationale:"From "+archetypeKey+" archetype library."}]));
    const levers=(a.levers||[]).filter(id=>LEVER_LIBRARY[id]).map(id=>({id,conf:"ai",rationale:"Standard lever for "+archetypeKey+"."}));
    setCl({drivers, levers, demandDrivers:a.demandDrivers||[], risks:a.risks||[], savings:x.savings||[], kpis:x.kpis||[], notes:a.notes||"", source:archetypeKey});
  }

  async function aiGenerate(){
    setBusy(true); setErr("");
    try{
      const driverList=Object.entries(COST_DRIVER_LIBRARY).map(([id,d])=>id+": "+d).join("\n");
      const leverList=Object.entries(LEVER_LIBRARY).map(([id,l])=>id+": "+l.label+" — "+l.desc).join("\n");
      const prompt=`You are a category management expert. Category: "${profile.name}" (sector: ${profile.sector||"unspecified"}).
From this master cost-driver library, pick the 4-7 most relevant and assign each a rough % weight of total cost (must sum to ~100):\n${driverList}
From this master purchasing-lever library, pick the 4-6 most relevant levers, ranked by priority:\n${leverList}
Also give 2-4 demand drivers, 2-4 category-specific risks, 3-5 concrete savings opportunities (specific actions, not generic), and 3-5 KPIs to track this category (measurable, e.g. "cost per user").
Respond ONLY with JSON, no markdown fences: {"drivers":{"<driverId>":{"weight":n,"rationale":"one sentence"}},"levers":[{"id":"<leverId>","rationale":"one sentence"}],"demandDrivers":["..."],"risks":["..."],"savings":["..."],"kpis":["..."],"notes":"one sentence should-cost tip"}`;
      const out=await askClaude(prompt,false);
      const drivers=Object.fromEntries(Object.entries(out.drivers||{}).filter(([id])=>COST_DRIVER_LIBRARY[id]).map(([id,d])=>[id,{weight:d.weight,conf:"ai",rationale:d.rationale}]));
      const levers=(out.levers||[]).filter(l=>LEVER_LIBRARY[l.id]).map(l=>({id:l.id,conf:"ai",rationale:l.rationale}));
      setCl({drivers, levers, demandDrivers:out.demandDrivers||[], risks:out.risks||[], savings:out.savings||[], kpis:out.kpis||[], notes:out.notes||"", source:"AI-generated"});
    }catch(e){ setErr("AI generation failed — try again, or apply the archetype library instead. ("+e.message+")"); }
    setBusy(false);
  }

  function updateWeight(id,w){
    setCl(p=>({...p, drivers:{...p.drivers, [id]:{...p.drivers[id], weight:+w, conf:"user"}}}));
  }
  function removeDriver(id){ setCl(p=>{const d={...p.drivers}; delete d[id]; return {...p,drivers:d};}); }
  function addDriverRow(){
    if(!addDriver) return;
    setCl(p=>({...p,drivers:{...p.drivers,[addDriver]:{weight:10,conf:"user",rationale:"Manually added."}}}));
    setAddDriver("");
  }
  function toggleLever(id){
    setCl(p=>{
      const exists=p.levers.find(l=>l.id===id);
      if(exists) return {...p,levers:p.levers.filter(l=>l.id!==id)};
      return {...p,levers:[...p.levers,{id,conf:"user",rationale:"Manually selected."}]};
    });
  }
  function addLeverRow(){
    if(!addLever || cl.levers.find(l=>l.id===addLever)) return;
    setCl(p=>({...p,levers:[...p.levers,{id:addLever,conf:"user",rationale:"Manually added."}]}));

  const hasData = Object.keys(cl.drivers).length>0;

  return (

        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {archetypeKey && <button className="btn dark" onClick={applyArchetype}>📚 Apply "{archetypeKey}" archetype</button>}
          <button className="btn" style={{background:"var(--amberSoft)",color:"var(--ai)",border:"none"}} disabled={busy} onClick={aiGenerate}>
            {busy?"Generating…":"⚡ AI-generate for this category"}</button>
        </div>
        {busy && <Spinner label={getAIName() + " is selecting cost drivers and levers…"}/>}
        {err && <div className="err">{err}</div>}
        {cl.notes && <div className="rationale" style={{marginTop:10}}><b>Should-cost tip:</b> {cl.notes}</div>}
      </div>

      {hasData && (
      <div className="card">
        <h3 style={{marginTop:0}}>Should-cost breakdown</h3>
        <p className="hint">Illustrative cost structure — drag to override any weight (flips to User); percentages are a starting point for negotiation, not a supplier quote.</p>
        <ShouldCostBar drivers={cl.drivers}/>
        <div style={{marginTop:14}}>
          {Object.entries(cl.drivers).map(([id,d])=>(
            <div key={id} className="varrow">

                <span className="varlabel">{COST_DRIVER_LIBRARY[id]||id}</span>

                  <button className="btn ghost" style={{padding:"2px 6px",fontSize:11,border:"none",color:"var(--slate)"}} onClick={()=>removeDriver(id)}>✕</button>

              {d.rationale && <div className="hint" style={{margin:0}}>{d.rationale}</div>}
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginTop:10,alignItems:"center"}}>
          <select value={addDriver} onChange={e=>setAddDriver(e.target.value)} style={{maxWidth:280}}>
            <option value="">+ add a cost driver…</option>
            {Object.entries(COST_DRIVER_LIBRARY).filter(([id])=>!cl.drivers[id]).map(([id,d])=><option key={id} value={id}>{d.split(",")[0]}</option>)}
          </select>
          <button className="btn" onClick={addDriverRow} disabled={!addDriver}>Add</button>
        </div>
      </div>
      )}

      {hasData && (
      <div className="card">
        <h3 style={{marginTop:0}}>Purchasing levers</h3>
        <p className="hint">Selected levers carry through to negotiation prep and the roadmap. Toggle any lever on/off, or add one from the full library.</p>
        <div style={{display:"grid",gap:8}}>
          {cl.levers.map(l=>{
            const def=LEVER_LIBRARY[l.id]; if(!def) return null;
            return (
              <div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,padding:"8px 10px",background:"var(--paper)",borderRadius:8}}>
                <div>
                  <div style={{fontSize:13.5,fontWeight:600}}>{def.label} <span className="mono" style={{fontSize:11,color:"var(--slate)",fontWeight:400}}>· typical saving {def.saving}</span></div>
                  <div className="hint" style={{margin:0}}>{def.desc}{l.rationale?" — "+l.rationale:""}</div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span className={"badge "+CONF[l.conf].cls}>{CONF[l.conf].label}</span>
                  <button className="btn ghost" style={{padding:"2px 6px",fontSize:11,border:"none",color:"var(--slate)"}} onClick={()=>toggleLever(l.id)}>✕</button>

        <div style={{display:"flex",gap:8,marginTop:10,alignItems:"center"}}>
          <select value={addLever} onChange={e=>setAddLever(e.target.value)} style={{maxWidth:280}}>
            <option value="">+ add a lever…</option>
            {Object.entries(LEVER_LIBRARY).filter(([id])=>!cl.levers.find(l=>l.id===id)).map(([id,l])=><option key={id} value={id}>{l.label}</option>)}
          </select>
          <button className="btn" onClick={addLeverRow} disabled={!addLever}>Add</button>
        </div>
        {(cl.demandDrivers?.length>0 || cl.risks?.length>0 || cl.savings?.length>0 || cl.kpis?.length>0) && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginTop:16}}>
            {cl.savings?.length>0 && <div><h3 style={{marginTop:0}}>💰 Savings opportunities</h3>
              {cl.savings.map((s,i)=>(
                <div key={i} className="hint" style={{margin:"0 0 4px",display:"flex",justifyContent:"space-between",gap:6}}>
                  <span>• {s}</span>
                  <button className="btn ghost" style={{padding:"0 4px",fontSize:11,border:"none",color:"var(--slate)"}}
                    onClick={()=>setCl(p=>({...p,savings:p.savings.filter((_,j)=>j!==i)}))}>✕</button>
                </div>))}
              <EditableAdd placeholder="+ add savings opportunity" onAdd={t=>setCl(p=>({...p,savings:[...p.savings,t]}))}/></div>}
            {cl.kpis?.length>0 && <div><h3 style={{marginTop:0}}>📏 KPIs</h3>
              {cl.kpis.map((k,i)=>(
                <div key={i} className="hint" style={{margin:"0 0 4px",display:"flex",justifyContent:"space-between",gap:6}}>
                  <span>• {k}</span>
                  <button className="btn ghost" style={{padding:"0 4px",fontSize:11,border:"none",color:"var(--slate)"}}
                    onClick={()=>setCl(p=>({...p,kpis:p.kpis.filter((_,j)=>j!==i)}))}>✕</button>
                </div>))}

        <p className="hint" style={{marginTop:8}}>The optional sell-side <b>Commercial 7Ps</b> module sits at the end of the flow (just before the Strategy document), so the buy-side work stays unbroken — you'll get the choice to run or skip it there.</p>

    </div>
  );
}

function ForcesRadar({porter}){
  const names=Object.keys(porter), N=names.length, C=110, cx=130, cy=125;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/N; return [cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  const poly=r=>names.map((_,i)=>pt(i,r).join(",")).join(" ");
  const dataPoly=names.map((k,i)=>pt(i,(porter[k]/5)*C).join(",")).join(" ");
  return (
    <svg viewBox="0 0 260 250" style={{width:"100%",maxWidth:300}} role="img" aria-label="Five Forces radar">
      {[0.2,0.4,0.6,0.8,1].map(f=><polygon key={f} points={poly(C*f)} fill="none" stroke="var(--line)"/>)}
      {names.map((_,i)=>{const [x,y]=pt(i,C); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--line)"/>;})}
      <polygon points={dataPoly} fill="rgba(15,94,86,.25)" stroke="var(--petrol)" strokeWidth="2"/>
      {names.map((k,i)=>{const [x,y]=pt(i,C+14); return <text key={k} x={x} y={y} fontSize="8.5" fill="var(--slate)" textAnchor="middle">{k.replace(" (yours)","")}</text>;})}
    </svg>
  );
}

        `You are a procurement research analyst with web search. Do a deep-dive on the supply market for the category "${profile.name}" (sector ${profile.sector||"unspecified"}, region ${profile.region||"Global"})${topic?`, with special focus on: "${topic}"`:""}. Search for the LATEST information and cite real sources (publication + URL) for every finding.
Respond ONLY with JSON, no fences:
{"overview":"3-4 sentence current market overview",
 "pestleRegulatory":[{"area":"Political|Economic|Social|Technological|Legal|Environmental|Regulatory","finding":"one specific recent finding","source":"publication name","url":"https://..."}],

Give 5-8 pestleRegulatory items and 3-5 disruptions. If a source URL is uncertain, give the publication name and put "" for url — never invent URLs.`, true);

/* ---------- SRM review (post-contract) — added v1.1.0, ported from CategoryAI ---------- */
function srmGrade(pct){
  /* concrete hex (matches :root palette) — SVG presentation attributes reject var() */
  if(pct>=90) return {grade:"Executive leader",color:"#0F5E56"};
  if(pct>=70) return {grade:"Preferred partner",color:"#7D3B5E"};
  if(pct>=50) return {grade:"Transactional",color:"#C98A12"};
  return {grade:"Improvement plan",color:"#B3402E"};
}
function SrmPanel({suppliers,srmReviews,setSrmReviews}){
  const [sel,setSel]=useState(suppliers[0]?suppliers[0].name:"");

  const [note,setNote]=useState("");
  const cur=suppliers.find(s=>s.name===sel)||suppliers[0];
  useEffect(()=>{ // prefill from last review of this supplier, else the live scorecard
    if(!cur){ setScores(null); return; }
    const hist=srmReviews.filter(r=>r.supplier===cur.name);
    const src=hist.length?hist[hist.length-1].scores:(cur.scorecard||{});
    setScores(Object.fromEntries(SCORECARD_DIMS.map(d=>[d,Math.min(5,Math.max(1,+src[d]||3))])));
    setNote("");
  },[sel,suppliers.length]);
  if(!cur||!scores) return null;
  const total=SCORECARD_DIMS.reduce((a,d)=>a+(+scores[d]||0),0);
  const pct=Math.round(total/(SCORECARD_DIMS.length*5)*100);
  const {grade,color}=srmGrade(pct);
  const R=42, C=2*Math.PI*R;
  function saveReview(){
    setSrmReviews(rs=>[...rs,{supplier:cur.name,date:new Date().toISOString().slice(0,10),
      scores:{...scores},overall:pct,grade,note:note.trim(),conf:"user"}]);

                onChange={e=>setScores(sc=>({...sc,[d]:+e.target.value}))}/>
              <span className="mono" style={{width:34,fontSize:12}}>{scores[d]}/5</span>
            </div>))}
          <input placeholder="Review note (optional, e.g. Q3 service review)" value={note}
            onChange={e=>setNote(e.target.value)} style={{width:"100%",marginTop:8}}/>
          <button className="btn primary" style={{marginTop:10}} onClick={saveReview}>Save dated review</button>
        </div>
        <div style={{textAlign:"center",flex:"0 0 150px"}}>
          <div style={{position:"relative",width:120,height:120,margin:"0 auto"}}>
            <svg viewBox="0 0 100 100" style={{width:120,height:120,transform:"rotate(-90deg)"}}>
              <circle cx="50" cy="50" r={R} stroke="#E3E1DA" strokeWidth="9" fill="none"/>
              <circle cx="50" cy="50" r={R} stroke={color} strokeWidth="9" fill="none"
                strokeDasharray={C} strokeDashoffset={C*(1-pct/100)} strokeLinecap="round"/>
            </svg>
            <div className="display" style={{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{pct}%</div>
          </div>
          <div style={{fontSize:12,fontWeight:600,color,marginTop:6}}>{grade}</div>

      </div>
      {srmReviews.length>0 && (

              {SCORECARD_DIMS.map(d=><td key={d}>{r.scores[d]}</td>)}
              <td className="mono">{r.overall}%</td>
              <td style={{color:srmGrade(r.overall).color,fontWeight:600}}>{r.grade}</td>
              <td className="hint" style={{fontSize:11}}>{r.note}</td>
              <td><button className="btn" style={{padding:"2px 8px"}} title="Delete this review" onClick={()=>delReview(i)}>✕</button></td></tr>))}
          </tbody></table>
        </div>)}
    </div>
  );
}
const SUPPLIER_ATTR_HELP={
  capability:"Can they actually do the job at scale? Consider: technical depth, capacity, geographic coverage, financial stability, track record in THIS category. 1 = struggles to deliver, 5 = best-in-class.",
  alignment:"Do they want to work with a buyer like us, our way? Consider: cultural fit, responsiveness, willingness to invest in the relationship, how important our business is to them. 1 = we're a nuisance to them, 5 = they treat us as a core account.",
  quality:"Defect rates, rework, spec conformance, complaint history. 1 = frequent failures, 5 = consistently exceeds spec.",
  delivery:"On-time-in-full performance, lead-time reliability, flexibility on urgent asks. 1 = chronically late, 5 = always on time.",
  cost:"Competitiveness vs market benchmarks and transparency of pricing. 1 = expensive & opaque, 5 = market-leading value.",
  innovation:"Do they bring ideas, improvements, new technology proactively? 1 = never, 5 = regular source of innovation.",
  esg:"Sustainability, ethics, compliance posture: certifications, carbon reporting, labour standards, incident history. 1 = red flags, 5 = leader.",
};
const TIER_SCHEMES={standard:["Tier 1","Tier 2","Tier 3"], gsb:["🥇 Gold","🥈 Silver","🥉 Bronze"]};
const TIER_GOV={
  "Tier 1":"Quarterly exec QBRs · joint account plan · named SRM manager · innovation agenda",
  "Tier 2":"Bi-annual reviews · scorecard tracked · escalation route defined",
  "Tier 3":"Annual light-touch review · catalogue / P2P channel · no formal governance",
};
/* Tier scoring calculator (v1.0, adapted from the GA build): score any
   contract on three dimensions → a suggested tier under the chosen naming
   scheme (Gold/Silver/Bronze remains the public-procurement standard).   */
function TierCalculator({tierLabel}){
  const [val,setVal]=useState(3),[risk,setRisk]=useState(3),[cx,setCx]=useState(2);
  const score=0.5*val+0.3*risk+0.2*cx;
  const tier=score>=3.8?"Tier 1":score>=2.6?"Tier 2":"Tier 3";
  const Sl=({label,v,set,help})=>(
    <div style={{flex:"1 1 180px"}}>
      <div style={{fontSize:12,fontWeight:600}}>{label}<Tip t={help}/> <span className="mono" style={{color:"var(--petrol)"}}>{v}/5</span></div>
      <input type="range" min="1" max="5" step="1" value={v} style={{width:"100%"}} onChange={e=>set(+e.target.value)}/>
    </div>);
  return (
    <div style={{border:"1px dashed var(--line)",borderRadius:8,padding:"10px 12px",margin:"10px 0"}}>
      <div style={{fontSize:12.5,fontWeight:700,marginBottom:4}}>🧮 Tier calculator — score any contract<Tip t="A quick governance-tier check for a single contract or supplier, independent of the table above. Weighted: value 50%, supply risk 30%, contract complexity 20%. The suggestion follows your chosen naming scheme — Gold/Silver/Bronze is the recognised public-procurement (GCF) terminology."/></div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
        <Sl label="Value / criticality" v={val} set={setVal} help="How much the contract matters: spend size, business criticality, dependence on outcomes. 1 = minor, 5 = mission-critical."/>
        <Sl label="Supply risk" v={risk} set={setRisk} help="Likelihood and impact of supply failure: market concentration, switching difficulty, continuity exposure. 1 = easily replaced, 5 = severe exposure."/>
        <Sl label="Contract complexity" v={cx} set={setCx} help="How demanding the contract is to manage: bespoke terms, integration, regulatory burden, change volume. 1 = simple catalogue, 5 = highly complex."/>
      </div>
      <div style={{marginTop:8,fontSize:12.5}}>Weighted score <span className="mono"><b>{score.toFixed(1)}</b>/5</span> → suggested tier: <b style={{color:"var(--petrol)"}}>{tierLabel(tier)}</b> <span style={{color:"var(--slate)"}}>— {TIER_GOV[tier]}</span></div>
      <div className="hint" style={{margin:"4px 0 0"}}>A decision aid, not a rule — the table above (segment + spend share) remains the primary basis; use this to sense-check borderline cases or tier a contract that isn't in the supplier list.</div>
    </div>
  );
}

function StepSuppliers({profile,internal,suppliers,setSuppliers,tierScheme,setTierScheme,srmReviews,setSrmReviews,next}){
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const tierNames=TIER_SCHEMES[tierScheme]||TIER_SCHEMES.standard;
  const tierLabel=t=>tierNames[["Tier 1","Tier 2","Tier 3"].indexOf(t)];
  const names=useMemo(()=>{
    const fromCsv=(internal.spend?internal.spend.suppliers.map(s=>s.supplier):[]);
    return [...new Set([...(profile.suppliers||[]),...fromCsv])];
  },[profile.suppliers,internal.spend]);
  function spendShare(n){
    const s=internal.spend&&internal.spend.suppliers.find(x=>x.supplier===n);
    return s?s.share:0;
  }
  function loadBlank(){
    setSuppliers(names.map(n=>({name:n,capability:3,alignment:3,accountAttractiveness:3,relativeValue:3,conf:"assumed",rationale:"Defaults — not yet assessed.",
      scorecard:Object.fromEntries(SCORECARD_DIMS.map(d=>[d,3])), share:spendShare(n)})));
  }
  async function aiAssess(){
    if(!names.length){ setErr("Add incumbent suppliers on the Category profile step (or upload a spend CSV) first."); return; }
    setBusy(true); setErr("");
    try{
      const out=await askClaude(
        `You are a supplier relationship analyst. Category: "${profile.name}" (sector ${profile.sector||"unspecified"}). For each supplier below, score 1-5: capability (technical/delivery capability in this category), alignment (strategic/cultural alignment to a buyer like us), accountAttractiveness (how attractive a typical mid-size buyer's account is TO THIS SUPPLIER: ease, prestige, growth), relativeValue (how big such a buyer's spend likely is relative to the supplier's total revenue: 1=rounding error, 5=material), plus a scorecard of quality, delivery, cost, innovation, esg (1-5, use 3 where unknown), and a one-sentence rationale. Suppliers: ${names.join(", ")}.
Respond ONLY with JSON, no fences: {"suppliers":[{"name":"","capability":n,"alignment":n,"accountAttractiveness":n,"relativeValue":n,"scorecard":{"quality":n,"delivery":n,"cost":n,"innovation":n,"esg":n},"rationale":""}]}`);
      setSuppliers((out.suppliers||[]).filter(s=>s.name).map(s=>({accountAttractiveness:3,relativeValue:3,...s,conf:"ai",share:spendShare(s.name)})));
    }catch(e){ setErr(e.message); }
    setBusy(false);
  }
  const upd=(i,patch)=>setSuppliers(ss=>ss.map((s,j)=>j===i?{...s,...patch,conf:"user"}:s));
  const tierOf=s=>{
    const seg=segmentOf(s.capability,s.alignment);
    if(seg==="Strategic partner"||s.share>0.15) return "Tier 1";

  return (
    <div>
      <div className="card">
        <h2 className="display">Supplier segmentation<Tip t="Positions each supplier by capability vs strategic alignment — decides who you partner with, develop, contract tightly, or phase out. Contract tier & governance are derived from segment + spend share."/></h2>

        <div className="banner"><b>How are these scored?</b> The AI scores from its general market knowledge of each supplier (reputation, scale, track record in this category) plus your category context — it's an informed <b>starting point, not a verified rating</b>, which is why every AI score is flagged <span className="badge ai">AI-inferred</span>. For unknown or niche suppliers it defaults to 3. Replace with your own SRM/performance data wherever you have it (edits flip to <span className="badge user">User</span>). <b>Manual scoring basis:</b> hover any column heading for what a 1 vs a 5 means on that attribute.</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <button className="btn dark" disabled={busy} onClick={aiAssess}>{busy?"Assessing…":"⚡ AI-assess suppliers"}</button>
          <button className="btn" onClick={loadBlank} disabled={!names.length}>Load suppliers for manual scoring</button>
          <div style={{display:"flex",gap:6,alignItems:"center",marginLeft:"auto"}}>
            <input type="text" id="newSupplierInput" placeholder="Type supplier name..." style={{padding:"5px 8px", fontSize:12, borderRadius:6, border:"1px solid var(--line)", background:"var(--card)", color:"var(--ink)"}} 
              onKeyDown={e=>{
                if(e.key==="Enter" && e.target.value.trim()){
                  const sName = e.target.value.trim();
                  if(!names.includes(sName)){
                    setProfile(p=>({...p, suppliers:[...(p.suppliers||[]), sName]}));
                    setSuppliers(ss=>[...ss, {name:sName,capability:3,alignment:3,accountAttractiveness:3,relativeValue:3,conf:"user",rationale:"Added manually.",
                      scorecard:Object.fromEntries(SCORECARD_DIMS.map(d=>[d,3])), share:0}]);
                  }
                  e.target.value = "";
                }
              }}
            />
            <button className="btn" onClick={()=>{
              const input = document.getElementById("newSupplierInput");
              if(input && input.value.trim()){

                  setSuppliers(ss=>[...ss, {name:sName,capability:3,alignment:3,accountAttractiveness:3,relativeValue:3,conf:"user",rationale:"Added manually.",

            }}>+ Add</button>
          </div>
        </div>
        {!names.length && <div className="banner" style={{marginTop:10}}>No suppliers yet — add incumbents using the input field above, on <b>1 · Category profile</b>, or upload a spend CSV on <b>2 · Spend profile</b>.</div>}
        {busy && <Spinner label={getAIName() + " is scoring suppliers…"}/>}
        {err && <div className="err">{err}</div>}
      </div>
      {suppliers.length>0 && (
      <div className="card">
        <div style={{display:"flex",gap:20,flexWrap:"wrap",alignItems:"flex-start"}}>
          <svg viewBox="0 0 320 300" style={{flex:"0 1 340px",width:"100%",maxWidth:360}}>
            <rect x="40" y="12" width="130" height="127" fill="#EAF1F8"/><rect x="170" y="12" width="130" height="127" fill="var(--petrolSoft)"/>
            <rect x="40" y="139" width="130" height="127" fill="#F3F2EE"/><rect x="170" y="139" width="130" height="127" fill="var(--amberSoft)"/>
            <text x="46" y="26" fontSize="9" fontWeight="700" fill="#2E6FB3">DEVELOP</text>
            <text x="296" y="26" fontSize="9" fontWeight="700" fill="var(--petrol)" textAnchor="end">STRATEGIC PARTNER</text>
            <text x="46" y="260" fontSize="9" fontWeight="700" fill="var(--slate)">TACTICAL / PHASE OUT</text>
            <text x="296" y="260" fontSize="9" fontWeight="700" fill="var(--amber)" textAnchor="end">TRANSACTIONAL</text>
            {suppliers.map((s,i)=>{
              const x=40+((s.capability-1)/4)*260, y=266-((s.alignment-1)/4)*254;
              return (<g key={i}><circle cx={x} cy={y} r={5+s.share*30} fill="var(--mulberry)" opacity=".75"/>
                <text x={x+8} y={y+3} fontSize="8.5" fill="var(--ink)">{s.name.slice(0,14)}</text></g>);

            <text x="160" y="292" fontSize="10" fill="var(--slate)" textAnchor="middle">Capability →</text>
            <text x="14" y="150" fontSize="10" fill="var(--slate)" textAnchor="middle" transform="rotate(-90 14 150)">Alignment →</text>
          </svg>
          <div style={{flex:"1 1 260px"}}>
            {Object.entries(SEGMENTS).map(([k,v])=>(
              <div key={k} className="hint" style={{margin:"0 0 6px"}}><b style={{color:v.color}}>{k}:</b> {v.advice}</div>))}
          </div>
        </div>
        <h3>Supplier scorecard & tiering<Tip t="Score 1-5 per dimension. Tier is derived: Tier 1 = strategic partners or >15% of spend; Tier 2 = develop segment or >5%; Tier 3 = the rest. Governance follows the tier."/></h3>
        <div style={{overflowX:"auto"}}>
        <table><thead><tr><th>Supplier</th>
          <th title={SUPPLIER_ATTR_HELP.capability}>Cap. ⓘ</th>
          <th title={SUPPLIER_ATTR_HELP.alignment}>Align. ⓘ</th>
          {SCORECARD_DIMS.map(dd=><th key={dd} style={{textTransform:"capitalize"}} title={SUPPLIER_ATTR_HELP[dd]}>{dd} ⓘ</th>)}
          <th>Segment</th><th>Tier</th><ConfHeader/></tr></thead><tbody>
          {suppliers.map((s,i)=>(
            <tr key={i}>
              <td><b>{s.name}</b>{s.share>0&&<div style={{fontSize:10,color:"var(--slate)"}}>{(s.share*100).toFixed(0)}% spend</div>}</td>
              <td><input type="number" min="1" max="5" value={s.capability} style={{width:44,padding:"3px 4px",fontSize:12}} onChange={e=>upd(i,{capability:Math.max(1,Math.min(5,+e.target.value||1))})}/></td>
              <td><input type="number" min="1" max="5" value={s.alignment} style={{width:44,padding:"3px 4px",fontSize:12}} onChange={e=>upd(i,{alignment:Math.max(1,Math.min(5,+e.target.value||1))})}/></td>
              {SCORECARD_DIMS.map(dd=>(
                <td key={dd}><input type="number" min="1" max="5" value={s.scorecard[dd]} style={{width:44,padding:"3px 4px",fontSize:12}}
                  onChange={e=>upd(i,{scorecard:{...s.scorecard,[dd]:Math.max(1,Math.min(5,+e.target.value||1))}})}/></td>))}
              <td style={{fontSize:11.5,color:SEGMENTS[segmentOf(s.capability,s.alignment)].color,fontWeight:700}}>{segmentOf(s.capability,s.alignment)}</td>
              <td className="mono" style={{fontSize:11.5}}>{tierLabel(tierOf(s))}</td>
              <ConfCell conf={s.conf} onChange={c=>setSuppliers(ss=>ss.map((x,j)=>j===i?{...x,conf:c}:x))}/>
            </tr>))}
        </tbody></table>
        </div>
        <h3>Contract tiering & governance<Tip t="Tiers decide how much management attention each supplier gets — heavyweight governance for the few that matter, light touch for the tail. The basis is spend share + relationship segment."/></h3>
        <div className="banner"><b>What is this and what's the basis?</b> Not every supplier deserves the same management effort — tiering matches governance to importance. The rules here: <b>{tierNames[0]}</b> = Strategic-partner segment <b>or</b> &gt;15% of category spend (your success depends on them — heavyweight governance). <b>{tierNames[1]}</b> = Develop segment <b>or</b> &gt;5% of spend (important — regular reviews). <b>{tierNames[2]}</b> = everyone else (manage for efficiency, not relationship). Adjust a supplier's capability/alignment or spend and its tier moves automatically.</div>
